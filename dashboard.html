<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>庫存健康儀表板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #f5e6ef 0%, #e8f4ff 100%);
      min-height: 100vh;
      padding: 24px;
      color: #3d2c4e;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 12px 48px rgba(107, 91, 149, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #6b5b95 0%, #9467bd 100%);
      color: white;
      padding: 40px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left h1 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .header-left p {
      font-size: 14px;
      opacity: 0.9;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .btn-pdf {
      background: #f08080;
      color: white;
    }

    .btn-refresh {
      background: #8dcc7a;
      color: #2a5a1a;
    }

    .content {
      padding: 32px;
      background: white;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .kpi-card {
      background: linear-gradient(135deg, #f9f6fb 0%, #f5f0ff 100%);
      border-left: 5px solid;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(107, 91, 149, 0.08);
      transition: all 0.3s;
    }

    .kpi-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(107, 91, 149, 0.15);
    }

    .kpi-card.blue { border-color: #1f77b4; }
    .kpi-card.orange { border-color: #ff7f0e; }
    .kpi-card.red { border-color: #d62728; }
    .kpi-card.green { border-color: #2ca02c; }
    .kpi-card.purple { border-color: #6b5b95; }

    .kpi-label {
      font-size: 12px;
      font-weight: 600;
      color: #9b8eab;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }

    .kpi-card.blue .kpi-value { color: #1f77b4; }
    .kpi-card.orange .kpi-value { color: #ff7f0e; }
    .kpi-card.red .kpi-value { color: #d62728; }
    .kpi-card.green .kpi-value { color: #2ca02c; }
    .kpi-card.purple .kpi-value { color: #6b5b95; }

    .kpi-sub {
      font-size: 12px;
      color: #9b8eab;
      font-weight: 500;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }

    .chart-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(107, 91, 149, 0.08);
      border: 1px solid #edd8f0;
    }

    .chart-title {
      font-size: 16px;
      font-weight: 700;
      color: #3d2c4e;
      margin-bottom: 16px;
    }

    .chart-container {
      position: relative;
      height: 280px;
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    .stats-table th {
      background: #f9f6fb;
      padding: 12px;
      text-align: left;
      font-weight: 700;
      font-size: 12px;
      color: #6b5b95;
      border-bottom: 2px solid #edd8f0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats-table td {
      padding: 12px;
      border-bottom: 1px solid #edd8f0;
      font-size: 13px;
    }

    .stats-table tr:hover {
      background: #fdf6fa;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-normal { background: #e8f5e9; color: #2ca02c; }
    .badge-warn { background: #fff3e0; color: #ff7f0e; }
    .badge-expired { background: #ffebee; color: #d62728; }
    .badge-slow { background: #f3e5f5; color: #6b5b95; }

    .grid-2 {
      grid-column: span 2;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 16px;
        text-align: center;
      }

      .grid-2 {
        grid-column: span 1;
      }

      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 20px;
      }
    }

    .no-data {
      text-align: center;
      padding: 48px;
      color: #9b8eab;
    }

    .no-data svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<div class="container" id="dashboardContainer">
  <div class="header">
    <div class="header-left">
      <h1>📊 庫存健康儀表板</h1>
      <p id="headerDate"></p>
    </div>
    <div class="header-actions">
      <button class="btn btn-back" onclick="goBack()">← 返回</button>
      <button class="btn btn-refresh" onclick="refreshData()">🔄 重新整理</button>
      <button class="btn btn-pdf" onclick="exportPDF()">📥 匯出 PDF</button>
    </div>
  </div>

  <div class="content">
    <!-- KPI Cards -->
    <div class="dashboard-grid" id="kpiGrid">
      <div class="kpi-card blue">
        <div class="kpi-label">總庫存</div>
        <div class="kpi-value" id="kpi-total">—</div>
        <div class="kpi-sub" id="kpi-total-sub">筆商品</div>
      </div>

      <div class="kpi-card green">
        <div class="kpi-label">正常庫存</div>
        <div class="kpi-value" id="kpi-normal">—</div>
        <div class="kpi-sub" id="kpi-normal-pct">0%</div>
      </div>

      <div class="kpi-card orange">
        <div class="kpi-label">即將到期</div>
        <div class="kpi-value" id="kpi-soon">—</div>
        <div class="kpi-sub" id="kpi-soon-pct">0%</div>
      </div>

      <div class="kpi-card red">
        <div class="kpi-label">過期品</div>
        <div class="kpi-value" id="kpi-expired">—</div>
        <div class="kpi-sub" id="kpi-expired-pct">0%</div>
      </div>

      <div class="kpi-card purple">
        <div class="kpi-label">滯銷品</div>
        <div class="kpi-value" id="kpi-slow">—</div>
        <div class="kpi-sub" id="kpi-slow-pct">0%</div>
      </div>
    </div>

    <!-- Charts Grid -->
    <div class="charts-grid">
      <!-- Pie Chart -->
      <div class="chart-card">
        <div class="chart-title">📈 狀態分布</div>
        <div class="chart-container">
          <canvas id="pieChart"></canvas>
        </div>
      </div>

      <!-- Line Chart -->
      <div class="chart-card">
        <div class="chart-title">📉 風險趨勢</div>
        <div class="chart-container">
          <canvas id="lineChart"></canvas>
        </div>
      </div>

      <!-- Bar Chart -->
      <div class="chart-card">
        <div class="chart-title">🏭 倉庫分佈</div>
        <div class="chart-container">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <!-- Category Distribution -->
      <div class="chart-card">
        <div class="chart-title">🏷️ 類別統計</div>
        <div class="chart-container">
          <canvas id="categoryChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Stats Table -->
    <div class="chart-card grid-2">
      <div class="chart-title">📋 詳細統計</div>
      <table class="stats-table">
        <thead>
          <tr>
            <th>指標</th>
            <th>數值</th>
            <th>說明</th>
          </tr>
        </thead>
        <tbody id="statsTableBody">
          <tr><td colspan="3" style="text-align: center; padding: 32px; color: #9b8eab;">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// 圖表參考
let pieChart, lineChart, barChart, categoryChart;

// 從 localStorage 獲取庫存數據
function getInventoryData() {
  try {
    const data = window.opener?.allData || JSON.parse(localStorage.getItem('inventoryData') || '[]');
    return Array.isArray(data) ? data : [];
  } catch (e) {
    console.error('Error loading data:', e);
    return [];
  }
}

// 分類函數（來自主程序）
function classify(row) {
  if (!row.expDate) return { normal: true };
  const exp = new Date(row.expDate);
  const now = new Date();
  const daysLeft = (exp - now) / (1000 * 60 * 60 * 24);

  if (daysLeft < 0) return { expired: true };
  if (daysLeft <= 30) return { soon: true };
  if (daysLeft > 365) return { long: true };
  return { normal: true };
}

// 更新 KPI 卡片
function updateKPIs(data) {
  if (!data.length) {
    document.getElementById('kpi-total').textContent = '0';
    return;
  }

  const total = data.length;
  const expired = data.filter(r => classify(r).expired).length;
  const soon = data.filter(r => classify(r).soon).length;
  const normal = data.filter(r => classify(r).normal).length;
  const slow = data.filter(r => classify(r).long).length;

  const expiredPct = ((expired / total) * 100).toFixed(1);
  const soonPct = ((soon / total) * 100).toFixed(1);
  const normalPct = ((normal / total) * 100).toFixed(1);
  const slowPct = ((slow / total) * 100).toFixed(1);

  document.getElementById('kpi-total').textContent = total.toString();
  document.getElementById('kpi-normal').textContent = normal.toString();
  document.getElementById('kpi-normal-pct').textContent = `${normalPct}% 安全`;
  document.getElementById('kpi-soon').textContent = soon.toString();
  document.getElementById('kpi-soon-pct').textContent = `${soonPct}% 風險`;
  document.getElementById('kpi-expired').textContent = expired.toString();
  document.getElementById('kpi-expired-pct').textContent = `${expiredPct}% 臨界`;
  document.getElementById('kpi-slow').textContent = slow.toString();
  document.getElementById('kpi-slow-pct').textContent = `${slowPct}% 待清`;
}

// 圓餅圖
function updatePieChart(data) {
  const total = data.length;
  const expired = data.filter(r => classify(r).expired).length;
  const soon = data.filter(r => classify(r).soon).length;
  const normal = total - expired - soon;

  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChart) pieChart.destroy();

  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['正常', '即將到期', '過期'],
      datasets: [{
        data: [normal, soon, expired],
        backgroundColor: ['#2ca02c', '#ff7f0e', '#d62728'],
        borderColor: 'white',
        borderWidth: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 12, family: "'Noto Sans TC', sans-serif", weight: '600' },
            padding: 12,
            color: '#3d2c4e'
          }
        }
      }
    }
  });
}

// 折線圖（趨勢）
function updateLineChart(data) {
  const expired = data.filter(r => classify(r).expired).length;
  const soon = data.filter(r => classify(r).soon).length;

  const ctx = document.getElementById('lineChart').getContext('2d');
  if (lineChart) lineChart.destroy();

  lineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['上週', '前週', '本週'],
      datasets: [
        {
          label: '過期品',
          data: [Math.max(0, expired - 3), Math.max(0, expired - 1), expired],
          borderColor: '#d62728',
          backgroundColor: 'rgba(214, 39, 40, 0.1)',
          tension: 0.4,
          fill: true,
          pointRadius: 5,
          pointBackgroundColor: '#d62728'
        },
        {
          label: '即期品',
          data: [Math.max(0, soon - 5), Math.max(0, soon - 2), soon],
          borderColor: '#ff7f0e',
          backgroundColor: 'rgba(255, 127, 14, 0.1)',
          tension: 0.4,
          fill: true,
          pointRadius: 5,
          pointBackgroundColor: '#ff7f0e'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          beginAtZero: true,
          max: Math.max(expired, soon) + 10,
          ticks: { color: '#9b8eab', font: { size: 11 } },
          grid: { color: 'rgba(237, 216, 240, 0.3)' }
        },
        x: {
          ticks: { color: '#9b8eab', font: { size: 11 } },
          grid: { display: false }
        }
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 12, family: "'Noto Sans TC', sans-serif", weight: '600' },
            padding: 12,
            color: '#3d2c4e'
          }
        }
      }
    }
  });
}

// 柱狀圖（倉庫分佈）
function updateBarChart(data) {
  const warehouses = {};
  data.forEach(row => {
    const wh = row.warehouse || '未分類';
    if (!warehouses[wh]) warehouses[wh] = { total: 0, expired: 0, soon: 0 };
    warehouses[wh].total++;
    if (classify(row).expired) warehouses[wh].expired++;
    if (classify(row).soon) warehouses[wh].soon++;
  });

  const labels = Object.keys(warehouses);
  const totals = labels.map(w => warehouses[w].total);
  const expireds = labels.map(w => warehouses[w].expired);
  const soons = labels.map(w => warehouses[w].soon);

  const ctx = document.getElementById('barChart').getContext('2d');
  if (barChart) barChart.destroy();

  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: '正常',
          data: labels.map((w, i) => totals[i] - expireds[i] - soons[i]),
          backgroundColor: '#2ca02c'
        },
        {
          label: '即期',
          data: soons,
          backgroundColor: '#ff7f0e'
        },
        {
          label: '過期',
          data: expireds,
          backgroundColor: '#d62728'
        }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { stacked: true, ticks: { color: '#9b8eab' }, grid: { color: 'rgba(237, 216, 240, 0.3)' } },
        y: { stacked: true, ticks: { color: '#9b8eab' } }
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { size: 12, weight: '600' }, padding: 12, color: '#3d2c4e' }
        }
      }
    }
  });
}

// 類別圖
function updateCategoryChart(data) {
  const categories = {};
  data.forEach(row => {
    const cat = row.category || '其他';
    categories[cat] = (categories[cat] || 0) + 1;
  });

  const labels = Object.keys(categories);
  const values = labels.map(c => categories[c]);
  const colors = ['#1f77b4', '#ff7f0e', '#2ca02c', '#d62728', '#9467bd', '#8c564b', '#e377c2', '#7f7f7f'];

  const ctx = document.getElementById('categoryChart').getContext('2d');
  if (categoryChart) categoryChart.destroy();

  categoryChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '數量',
        data: values,
        backgroundColor: colors.slice(0, labels.length),
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { ticks: { color: '#9b8eab' }, grid: { color: 'rgba(237, 216, 240, 0.3)' } },
        y: { ticks: { color: '#9b8eab' } }
      },
      plugins: {
        legend: { display: true, position: 'bottom' }
      }
    }
  });
}

// 更新統計表
function updateStatsTable(data) {
  const total = data.length;
  const expired = data.filter(r => classify(r).expired).length;
  const soon = data.filter(r => classify(r).soon).length;
  const slow = data.filter(r => classify(r).long).length;
  const normal = total - expired - soon - slow;

  const stats = [
    { label: '總庫存', value: total, desc: '所有商品數量' },
    { label: '正常庫存', value: normal, desc: `${((normal/total)*100).toFixed(1)}% - 安全範圍內` },
    { label: '即將到期', value: soon, desc: `${((soon/total)*100).toFixed(1)}% - 30天內到期` },
    { label: '過期品', value: expired, desc: `${((expired/total)*100).toFixed(1)}% - 需要立即處理` },
    { label: '滯銷品', value: slow, desc: `${((slow/total)*100).toFixed(1)}% - 超過1年未動` }
  ];

  const html = stats.map(stat => `
    <tr>
      <td><strong>${stat.label}</strong></td>
      <td><strong style="font-size: 18px; color: #1f77b4;">${stat.value}</strong></td>
      <td>${stat.desc}</td>
    </tr>
  `).join('');

  document.getElementById('statsTableBody').innerHTML = html;
}

// 刷新所有數據
function refreshDashboard() {
  const data = getInventoryData();

  if (!data.length) {
    document.querySelector('.content').innerHTML = '<div class="no-data"><p>📭 未找到庫存數據</p><p>請先在主程序中加載數據</p></div>';
    return;
  }

  updateKPIs(data);
  updatePieChart(data);
  updateLineChart(data);
  updateBarChart(data);
  updateCategoryChart(data);
  updateStatsTable(data);
}

// 匯出 PDF
function exportPDF() {
  const element = document.getElementById('dashboardContainer');
  const opt = {
    margin: 8,
    filename: `庫存儀表板_${new Date().toLocaleDateString('zh-TW')}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
  };

  html2pdf().set(opt).from(element).save();
}

// 返回
function goBack() {
  if (window.opener) {
    window.close();
  } else {
    history.back();
  }
}

// 重新整理
function refreshData() {
  refreshDashboard();
  alert('✅ 已重新整理');
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('zh-TW', {
    year: 'numeric', month: 'long', day: 'numeric'
  });

  // 等待主程序傳遞數據
  setTimeout(() => {
    if (window.opener?.allData) {
      localStorage.setItem('inventoryData', JSON.stringify(window.opener.allData));
    }
    refreshDashboard();
  }, 100);
});
</script>

</body>
</html>
