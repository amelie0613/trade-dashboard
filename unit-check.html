<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>⚠️ 單位異常檢查</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #202124; background: #f8f9fa; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #dadce0; padding: 14px 24px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 17px; font-weight: 600; }
    main { max-width: 800px; margin: 24px auto; padding: 0 16px 40px; }
    .card { background: #fff; border-radius: 10px; border: 1px solid #dadce0; padding: 20px; margin-bottom: 20px; }
    .card-title { font-weight: 600; font-size: 15px; margin-bottom: 14px; }
    .card-title.red  { color: #c5221f; }
    .card-title.warn { color: #e37400; }
    table  { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    th, td { border: 1px solid #dadce0; padding: 7px 9px; text-align: left; }
    th     { background: #f1f3f4; font-weight: 600; font-size: 12px; }
    td     { font-size: 12px; }
    td.num { text-align: right; }
    select, input[type=number] { width: 100%; padding: 5px 7px; border: 1px solid #dadce0; border-radius: 4px; font-size: 12px; }
    .tag { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 11px; font-weight: 600; }
    .tag-入庫 { background: #d4edda; color: #155724; }
    .tag-出庫 { background: #cce5ff; color: #004085; }
    .tag-期初 { background: #e2e3e5; color: #383d41; }
    .info { background: #e8f0fe; border-radius: 6px; padding: 9px 12px; font-size: 12px; color: #1a56db; margin: 8px 0; }
    .ok   { background: #d4edda; border-radius: 6px; padding: 12px; text-align: center; color: #1e8e3e; font-weight: 600; }
    .btn  { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #1a73e8; color: #fff; width: 100%; margin-top: 10px; }
    .btn:disabled { opacity: .4; cursor: default; }
    .loading { text-align: center; padding: 60px 0; color: #5f6368; font-size: 16px; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e8eaed; border-top-color: #1a73e8; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { margin-top: 10px; font-size: 13px; text-align: center; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #5f6368; border-bottom: 1px solid #e8eaed; padding-bottom: 6px; }
  </style>
</head>
<body>
<header>
  <span style="font-size:22px">⚠️</span>
  <h1>單位異常檢查</h1>
</header>
<main><div id="root"><div class="loading"><span class="spinner"></span>檢查單位異常中…</div></div></main>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';
var fixes = {};

fetch(SCRIPT_URL+'?action=unitIssues')
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d||!Array.isArray(d.directIssues)){
      throw new Error('Apps Script 尚未更新，請將最新版 apps-script.gs 貼入 GAS 並重新部署，再重整此頁。');
    }
    render(d);
  })
  .catch(function(e){
    document.getElementById('root').innerHTML='<div class="card"><p style="color:#c5221f;font-weight:600;margin-bottom:8px">❌ 載入失敗：'+e.message+'</p>'
      +'<p style="font-size:12px;color:#5f6368">操作步驟：Google Apps Script → 部署 → 管理部署項目 → 編輯 → 新版本 → 部署</p></div>';
  });

function render(d){
  var html='';

  html+='<h2>① 同品項出現多種單位</h2>';
  if(!d.directIssues.length){
    html+='<div class="ok">✅ 無異常</div>';
  } else {
    d.directIssues.forEach(function(issue,gi){
      var unitBadges=issue.units.map(function(u){return '<span class="tag" style="background:#ffc107;color:#333">'+esc(u)+'</span>';}).join(' ');
      var hasConvNote=issue.rows.find(function(r){return r.note&&/\d+[只箱組]/.test(r.note);});
      html+='<div class="card">'
        +'<div class="card-title red">🔴 '+esc(issue.name)+' <span style="color:#5f6368">/ '+esc(issue.spec)+'</span></div>'
        +'<div style="margin-bottom:8px">使用了多種單位：'+unitBadges+'</div>'
        +'<table><tr><th>列</th><th>屬性</th><th>入庫量</th><th>出庫量</th><th>目前單位</th><th>修正為</th></tr>';
      issue.rows.forEach(function(r){
        var opts=issue.units.map(function(u){return '<option value="'+esc(u)+'"'+(u===r.unit?' selected':'')+'>'+esc(u)+'</option>';}).join('');
        html+='<tr>'
          +'<td style="white-space:nowrap">列'+r.rowIndex+'</td>'
          +'<td><span class="tag tag-'+r.type+'">'+esc(r.type)+'</span></td>'
          +'<td class="num">'+(r.inQty||'')+'</td>'
          +'<td class="num">'+(r.outQty||'')+'</td>'
          +'<td><strong>'+esc(r.unit)+'</strong></td>'
          +'<td><select onchange="setFix('+r.rowIndex+',\'unit\',this.value)">'+opts+'</select></td>'
        +'</tr>';
        if(r.note) html+='<tr><td colspan="6" style="color:#5f6368;background:#fafafa">備註：'+esc(r.note)+'</td></tr>';
      });
      html+='</table>';
      if(hasConvNote){
        html+='<div class="info">💡 備註含換算資訊：「'+esc(hasConvNote.note)+'」，請確認數量是否需換算。</div>'
          +'<table><tr><th>列</th><th>屬性</th><th>修正入庫量</th><th>修正出庫量</th></tr>';
        issue.rows.forEach(function(r){
          html+='<tr><td>列'+r.rowIndex+'</td>'
            +'<td><span class="tag tag-'+r.type+'">'+r.type+'</span></td>'
            +'<td><input type="number" placeholder="不改則留空" onchange="setFix('+r.rowIndex+',\'inQty\',this.value?Number(this.value):undefined)"></td>'
            +'<td><input type="number" placeholder="不改則留空" onchange="setFix('+r.rowIndex+',\'outQty\',this.value?Number(this.value):undefined)"></td>'
          +'</tr>';
        });
        html+='</table>';
      }
      html+='</div>';
    });
  }

  html+='<h2 style="margin-top:20px">② 疑似同品項但單位不同</h2>';
  if(!d.fuzzyIssues.length){
    html+='<div class="ok">✅ 無異常</div>';
  } else {
    d.fuzzyIssues.forEach(function(pair){
      html+='<div class="card">'
        +'<div class="card-title warn">🟠 疑似同品項，單位不一致</div>'
        +'<table><tr><th>品名</th><th>規格</th><th>單位</th></tr>'
        +'<tr><td>'+esc(pair.a.name)+'</td><td>'+esc(pair.a.spec)+'</td><td><strong>'+pair.a.units.join('、')+'</strong></td></tr>'
        +'<tr><td>'+esc(pair.b.name)+'</td><td>'+esc(pair.b.spec)+'</td><td><strong>'+pair.b.units.join('、')+'</strong></td></tr>'
        +'</table>'
        +'<div class="info">🔍 建議先至「品項合併確認」合併後再統一單位。</div>'
      +'</div>';
    });
  }

  var hasAny = d.directIssues.length>0;
  if(hasAny){
    html+='<button class="btn btn-primary" id="apply-btn" onclick="applyAll()">套用單位修正到試算表</button>'
      +'<div id="status"></div>';
  }
  document.getElementById('root').innerHTML=html;
}

function setFix(rowIndex,field,value){
  if(!fixes[rowIndex]) fixes[rowIndex]={rowIndex:rowIndex};
  if(value!==undefined) fixes[rowIndex][field]=value;
  else delete fixes[rowIndex][field];
}

function applyAll(){
  var list=Object.values(fixes).filter(function(f){return f.unit!==undefined||f.inQty!==undefined||f.outQty!==undefined;});
  if(!list.length){document.getElementById('status').innerHTML='<span style="color:#e37400">⚠️ 尚未設定任何修正。</span>';return;}
  document.getElementById('apply-btn').disabled=true;
  document.getElementById('status').innerHTML='<span class="spinner"></span> 套用中…';
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'applyUnitFix',fixes:list})})
    .then(function(r){return r.json();})
    .then(function(res){document.getElementById('status').innerHTML='<span style="color:#1e8e3e">✅ 已修正 '+res.fixed+' 筆記錄。</span>';})
    .catch(function(e){document.getElementById('apply-btn').disabled=false;document.getElementById('status').innerHTML='<span style="color:#c5221f">❌ 錯誤：'+e.message+'</span>';});
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
