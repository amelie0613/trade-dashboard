<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>編輯紀錄</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow:  #FFD54F;
      --yellow2: #FFECB3;
      --cream:   #FFF8E1;
      --brown:   #6D4C41;
      --brown2:  #8D6E63;
      --amber:   #FF8F00;
    }
    * { font-family: 'M PLUS Rounded 1c', 'Microsoft JhengHei', sans-serif; }
    body { background: var(--cream); padding-bottom: 30px; }

    .topbar {
      background: var(--yellow) url('pompompurin-bg.jpg') left center / auto 100% repeat-x;
      padding: .8rem 1rem;
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(109,76,65,.15);
    }
    .topbar h6 { margin: 0; color: var(--brown); font-weight: 800; font-size: 1.05rem; }
    .btn-back {
      background: rgba(109,76,65,.15); border: none;
      border-radius: 10px; padding: .3rem .65rem;
      color: var(--brown); font-size: 1.1rem; line-height: 1;
    }

    .form-block {
      background: #fff; border-radius: 20px; padding: 1.1rem;
      margin-bottom: .8rem; box-shadow: 0 3px 10px rgba(109,76,65,.1);
      border-top: 4px solid var(--yellow);
    }
    .form-block h6 {
      font-size: .78rem; font-weight: 800; color: var(--brown2);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: .85rem;
    }
    .form-control, .form-select {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: .95rem; min-height: 46px; border-radius: 12px;
      border: 2px solid var(--yellow2);
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--yellow); box-shadow: 0 0 0 .2rem rgba(255,213,79,.3);
    }
    .form-label { font-weight: 700; font-size: .88rem; color: var(--brown); }
    .btn-submit {
      background: var(--amber); border: none; color: #fff;
      border-radius: 16px; min-height: 52px; font-size: 1.05rem; font-weight: 800;
      box-shadow: 0 4px 12px rgba(255,143,0,.35); width: 100%;
    }
    .btn-submit:hover { background: #E65100; color: #fff; }
    .btn-submit:disabled { background: var(--brown2); }
    .alert { border-radius: 14px; font-weight: 700; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="d-flex align-items-center gap-2">
    <button class="btn-back" onclick="history.back()"><i class="bi bi-arrow-left"></i></button>
    <h6>✏️ 編輯紀錄</h6>
  </div>
  <div style="width:40px"></div>
</div>

<div class="container-fluid px-3 pt-3" style="max-width:600px">

  <div id="msg" class="alert" style="display:none"></div>

  <input type="hidden" id="edit-row">
  <input type="hidden" id="edit-timestamp">

  <div class="form-block">
    <h6>📋 基本資訊</h6>
    <div class="mb-3">
      <label class="form-label">日期</label>
      <input type="date" class="form-control" id="e-date">
    </div>
    <div class="mb-3">
      <label class="form-label">承辦人員</label>
      <input type="text" class="form-control" id="e-staff">
    </div>
    <div>
      <label class="form-label">屬性</label>
      <select class="form-select" id="e-type" onchange="onTypeChange()">
        <option value="入庫">入庫</option>
        <option value="出庫">出庫</option>
        <option value="借出">借出</option>
      </select>
    </div>
  </div>

  <div class="form-block">
    <h6>🏷️ 產品資訊</h6>
    <div class="mb-3" id="e-vendor-row">
      <label class="form-label">供應商</label>
      <input type="text" class="form-control" id="e-vendor">
    </div>
    <div class="mb-3">
      <label class="form-label">產品類別</label>
      <select class="form-select" id="e-category" onchange="toggleCatOther(this)">
        <option value="">請選擇</option>
        <option value="內包材">內包材</option>
        <option value="外包材">外包材</option>
        <option value="耗材">耗材</option>
        <option value="其他">其他</option>
      </select>
      <input type="text" class="form-control mt-2" id="e-cat-other" placeholder="請輸入類別" style="display:none">
    </div>
    <div class="mb-3">
      <label class="form-label">產品名稱</label>
      <input type="text" class="form-control" id="e-product">
    </div>
    <div>
      <label class="form-label">規格</label>
      <input type="text" class="form-control" id="e-spec">
    </div>
  </div>

  <div class="form-block">
    <h6>🔢 數量資訊</h6>
    <div class="row g-2">
      <div class="col-8">
        <label class="form-label" id="e-qty-label">數量</label>
        <input type="number" class="form-control" id="e-qty" min="0" step="0.01">
      </div>
      <div class="col-4">
        <label class="form-label">單位</label>
        <select class="form-select" id="e-unit">
          <option value="">單位</option>
          <option value="箱">箱</option>
          <option value="只">只</option>
          <option value="組">組</option>
          <option value="公斤">公斤</option>
        </select>
      </div>
    </div>
    <div class="mt-2">
      <label class="form-label" id="e-location-label">存放位置</label>
      <input type="text" class="form-control" id="e-location">
    </div>
    <div class="mt-2" id="e-cost-row">
      <label class="form-label">成本 (NT$)</label>
      <input type="number" class="form-control" id="e-cost" min="0">
    </div>
  </div>

  <div class="form-block">
    <h6>📝 備註</h6>
    <textarea class="form-control" id="e-notes" rows="2"></textarea>
  </div>

  <button class="btn-submit mb-3" id="save-btn" onclick="saveEdit()">💾 儲存變更</button>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';

window.addEventListener('DOMContentLoaded', () => {
  const raw = sessionStorage.getItem('editRecord');
  if (!raw) { location.href = 'otpompompurin-list.html'; return; }

  const r = JSON.parse(raw);
  document.getElementById('edit-row').value       = r._row       || '';
  document.getElementById('edit-timestamp').value = r['時間戳記'] || '';
  document.getElementById('e-date').value    = toInputDate(r['日期']);
  document.getElementById('e-staff').value   = r['承辦人員']           || '';
  document.getElementById('e-type').value    = r['屬性']               || '入庫';
  document.getElementById('e-vendor').value  = r['供應商'] || r['供應商名稱'] || '';
  document.getElementById('e-product').value = r['產品名稱']           || '';
  document.getElementById('e-spec').value    = r['規格']               || '';
  document.getElementById('e-unit').value    = r['單位']               || '';
  document.getElementById('e-location').value= r['存放位置'] || r['存放位置/領取單位'] || '';
  document.getElementById('e-cost').value    = r['成本']               || '';
  document.getElementById('e-notes').value   = r['備註']               || '';

  setCategoryValue(r['產品類別'] || '');

  const isIn = r['屬性'] === '入庫';
  document.getElementById('e-qty').value = isIn ? (r['入庫數量'] || 0) : (r['出庫數量'] || 0);

  onTypeChange();
});

function onTypeChange() {
  const type = document.getElementById('e-type').value;
  const qtyLabels = { '入庫': '入庫數量', '出庫': '出庫數量', '借出': '借出數量' };
  document.getElementById('e-qty-label').textContent = qtyLabels[type] || '數量';
  const locLabels = { '入庫': '存放位置', '出庫': '領取單位', '借出': '領取單位' };
  document.getElementById('e-location-label').textContent = locLabels[type] || '存放位置/領取單位';
  document.getElementById('e-location').placeholder = type === '入庫' ? '請輸入存放位置' : '請輸入領取單位';
  document.getElementById('e-vendor-row').style.display = type === '入庫' ? '' : 'none';
  document.getElementById('e-cost-row').style.display   = type === '入庫' ? '' : 'none';
}

function toggleCatOther(sel) {
  document.getElementById('e-cat-other').style.display = sel.value === '其他' ? '' : 'none';
}

function setCategoryValue(value) {
  const sel = document.getElementById('e-category');
  const other = document.getElementById('e-cat-other');
  other.style.display = 'none';
  other.value = '';
  if (!value) { sel.value = ''; return; }
  if (['內包材', '外包材', '耗材'].includes(value)) {
    sel.value = value;
  } else if (value.startsWith('其他')) {
    sel.value = '其他';
    other.style.display = '';
    other.value = value.replace(/^其他：?/, '');
  } else {
    sel.value = '';
  }
}

function getCategoryValue() {
  const cat = document.getElementById('e-category').value;
  if (cat === '其他') {
    const txt = document.getElementById('e-cat-other').value.trim();
    return txt ? `其他：${txt}` : '其他';
  }
  return cat;
}

async function saveEdit() {
  const btn  = document.getElementById('save-btn');
  const type = document.getElementById('e-type').value;
  const data = {
    action:    'update',
    row:       Number(document.getElementById('edit-row').value),
    timestamp: document.getElementById('edit-timestamp').value,
    date:      document.getElementById('e-date').value,
    staff:     document.getElementById('e-staff').value,
    type,
    vendor:    document.getElementById('e-vendor').value,
    category:  getCategoryValue(),
    product:   document.getElementById('e-product').value,
    spec:      document.getElementById('e-spec').value,
    inQty:  type === '入庫' ? document.getElementById('e-qty').value : 0,
    outQty: (type === '出庫' || type === '借出') ? document.getElementById('e-qty').value : 0,
    unit:      document.getElementById('e-unit').value,
    location:  document.getElementById('e-location').value,
    cost:      document.getElementById('e-cost').value,
    notes:     document.getElementById('e-notes').value,
  };

  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
    showMsg('✅ 已更新！', 'success');
    sessionStorage.removeItem('editRecord');
    setTimeout(() => { location.href = 'otpompompurin-list.html'; }, 1000);
  } catch {
    showMsg('❌ 更新失敗，請重試', 'danger');
    btn.disabled = false; btn.textContent = '💾 儲存變更';
  }
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.className = `alert alert-${type} mt-2`;
  m.textContent = text;
  m.style.display = 'block';
  window.scrollTo(0, 0);
}

function toInputDate(v) {
  if (!v) return '';
  const d = new Date(v);
  if (isNaN(d)) return '';
  return d.toISOString().slice(0, 10);
}
</script>
</body>
</html>
