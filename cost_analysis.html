<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>各倉庫貨幣區間成本分析</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #f0f4f9 0%, #e8f4ff 100%);
      min-height: 100vh;
      padding: 20px;
      color: #1a1a1a;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 82, 204, 0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #003D7A 0%, #0052CC 100%);
      color: white;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .btn-primary {
      background: #f08080;
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .content {
      padding: 20px 24px 24px;
    }

    .scope-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .scope-card {
      background: #fff;
      border: 1px solid #d0d9e8;
      border-top: 4px solid #0052CC;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,82,204,0.07);
    }

    .scope-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8edf5;
    }

    .scope-card-name {
      font-size: 15px;
      font-weight: 800;
      color: #003D7A;
      line-height: 1.3;
    }

    .scope-card-wh {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
      font-weight: 400;
    }

    .scope-card-total {
      font-size: 20px;
      font-weight: 900;
      color: #0052CC;
      text-align: right;
      white-space: nowrap;
    }

    .scope-card-total-label {
      font-size: 10px;
      color: #999;
      text-align: right;
    }

    .scope-card-rows {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .scope-card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .scope-card-row-label {
      color: #555;
      font-weight: 600;
    }

    .scope-card-row-value {
      font-weight: 700;
      color: #0052CC;
      text-align: right;
    }

    .scope-card-row-value.red   { color: #DC2626; }
    .scope-card-row-value.orange { color: #EA580C; }
    .scope-card-row-value.muted  { color: #bbb; font-weight: 400; }

    .table-section {
      margin-top: 16px;
    }

    .table-title {
      font-size: 18px;
      font-weight: 700;
      color: #0052CC;
      padding: 12px;
      background: #f0f4f9;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 4px solid #0052CC;
    }

    .table-wrapper {
      border-radius: 8px;
      border: 1px solid #d0d9e8;
      overflow: hidden;
    }

    /* table-layout:fixed + 明確欄寬 → 確保不超出 A4 直式寬度 */
    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
    }

    th {
      background: #0052CC;
      color: white;
      padding: 10px 6px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      border: 1px solid #fff;
      overflow: hidden;
      word-break: break-word;
    }

    td {
      padding: 9px 6px;
      font-size: 13px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }

    tr.parent-row td {
      background: #f0f4f9;
      font-weight: 600;
      color: #1a1a1a;
    }

    tr.child-row td {
      background: #fafbfc;
      color: #444;
    }

    tr.total-row td {
      background: #e0e7ff;
      font-weight: 700;
      color: #1a1a1a;
    }

    .currency {
      color: #0052CC;
      font-weight: 700;
    }

    .expired-value {
      color: #DC2626 !important;
      font-weight: 700;
    }

    .expand-btn {
      cursor: pointer;
      user-select: none;
      font-weight: bold;
      color: #0052CC;
      margin-right: 6px;
    }

    .expand-btn:before {
      content: '▼ ';
    }

    .expand-btn.collapsed:before {
      content: '▶ ';
    }

    .child-row.hidden {
      display: none;
    }

    .footer {
      padding: 16px 24px;
      background: #f5f5f5;
      border-top: 1px solid #edd8f0;
      font-size: 14px;
      color: #999;
    }

    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; gap: 12px; }
      table { font-size: 11px; }
      th, td { padding: 6px 4px; }
    }

    /* ── 列印 / PDF 輸出樣式 ─────────────────────────── */
    @page {
      size: A4 portrait;
      margin: 10mm 8mm;
    }

    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      html, body {
        margin: 0;
        padding: 0;
        background: white !important;
        width: 100%;
      }

      .container {
        border-radius: 0 !important;
        box-shadow: none !important;
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
      }

      /* 隱藏按鈕列 */
      .header-actions { display: none !important; }

      /* 保持子列隱藏狀態 */
      .child-row.hidden { display: none !important; }

      /* 防止表格跨頁斷行 */
      table { page-break-inside: auto; }
      thead { display: table-header-group; }
      tr    { page-break-inside: avoid; }

      /* 背景色強制輸出 */
      .header       { background: linear-gradient(135deg, #003D7A 0%, #0052CC 100%) !important; }
      th            { background: #0052CC !important; color: white !important; }
      tr.parent-row td { background: #f0f4f9 !important; }
      tr.total-row  td { background: #e0e7ff !important; }
      .kpi-card     { background: #f8fafc !important; }
      .table-title  { background: #f0f4f9 !important; }
      .footer       { background: #f5f5f5 !important; }
    }
  </style>
</head>
<body>

<div class="container" id="reportContainer">
  <div class="header">
    <h1>🔍 各倉庫貨幣區間成本分析</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="window.history.back()">← 返回</button>
      <button class="btn btn-primary" onclick="exportImage()">📥 匯出 PDF</button>
    </div>
  </div>

  <div class="content">
    <!-- 核算範圍卡片（動態生成） -->
    <div class="scope-grid" id="scopeGrid"></div>

    <!-- Table Section -->
    <div class="table-section">
      <div class="table-title">
        📋 按倉庫分類的成本明細（可展開/收合）
      </div>

      <div class="table-wrapper">
        <table id="costTable">
          <thead>
            <tr>
              <th style="width:28%;">核算範圍 / 倉庫</th>
              <th style="width:15%;">全部成本</th>
              <th style="width:14%;">正常</th>
              <th style="width:14%; color:#ffcccc;">過期品</th>
              <th style="width:15%;">長期在庫</th>
              <th style="width:14%;">即將到期</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- 動態生成 -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="footer">
    💡 說明：每個核算範圍可點擊展開查看個別倉庫的成本明細 | 🔵 藍色數字表示成本 | ⚠️ 紅色數字表示過期品
  </div>
</div>

<script>
let costData = [];

// ── 格式化 ────────────────────────────────────────────────────────
function fmt(num) {
  if (!num || num === 0) return '<span style="color:#bbb;">—</span>';
  return '$' + num.toLocaleString();
}

// ── 渲染表格 ──────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  if (!costData.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:#999;">
      ⚠️ 無成本數據。請先在主程序設定單價與核算範圍，再點「📊 成本分析」。
    </td></tr>`;
    return;
  }

  let grandTotal = 0, grandNormal = 0, grandExpired = 0, grandLongterm = 0, grandSoon = 0, grandQty = 0;

  costData.forEach(parent => {
    grandTotal    += parent.total;
    grandNormal   += parent.normal;
    grandExpired  += parent.expired;
    grandLongterm += parent.longterm;
    grandSoon     += parent.soon;
    grandQty      += parent.qty;

    const expClass = parent.expired > 0 ? 'expired-value' : 'currency';
    const hasChildren = parent.children && parent.children.length > 0;

    // 核算範圍主列
    const parentRow = document.createElement('tr');
    parentRow.className = 'parent-row';
    if (hasChildren) parentRow.style.cursor = 'pointer';
    parentRow.innerHTML = `
      <td>
        ${hasChildren ? `<span class="expand-btn" onclick="toggleChildren(this)"></span>` : ''}
        ${parent.name}
        ${hasChildren ? `<span style="font-size:14px;color:#999;margin-left:6px;">(${parent.children.length} 個倉庫)</span>` : ''}
      </td>
      <td class="currency" style="text-align:right;">${fmt(parent.total)}</td>
      <td class="currency" style="text-align:right;">${fmt(parent.normal)}</td>
      <td class="${expClass}" style="text-align:right;">${fmt(parent.expired)}</td>
      <td class="currency" style="text-align:right;">${fmt(parent.longterm)}</td>
      <td class="currency" style="text-align:right;">${fmt(parent.soon)}</td>
    `;
    tbody.appendChild(parentRow);

    // 各倉庫子列（預設隱藏）
    if (hasChildren) {
      parent.children.forEach(child => {
        const childRow = document.createElement('tr');
        childRow.className = 'child-row hidden';
        const childExpClass = child.expired > 0 ? 'expired-value' : 'currency';
        childRow.innerHTML = `
          <td style="padding-left:36px;">🏭 ${child.name}</td>
          <td class="currency" style="text-align:right;">${fmt(child.total)}</td>
          <td class="currency" style="text-align:right;">${fmt(child.normal)}</td>
          <td class="${childExpClass}" style="text-align:right;">${fmt(child.expired)}</td>
          <td class="currency" style="text-align:right;">${fmt(child.longterm)}</td>
          <td class="currency" style="text-align:right;">${fmt(child.soon)}</td>
        `;
        tbody.appendChild(childRow);
      });
    }
  });

  // 合計列
  const totalExpClass = grandExpired > 0 ? 'expired-value' : 'currency';
  const totalRow = document.createElement('tr');
  totalRow.className = 'total-row';
  totalRow.innerHTML = `
    <td>合計</td>
    <td class="currency" style="text-align:right;">${fmt(grandTotal)}</td>
    <td class="currency" style="text-align:right;">${fmt(grandNormal)}</td>
    <td class="${totalExpClass}" style="text-align:right;">${fmt(grandExpired)}</td>
    <td class="currency" style="text-align:right;">${fmt(grandLongterm)}</td>
    <td class="currency" style="text-align:right;">${fmt(grandSoon)}</td>
  `;
  tbody.appendChild(totalRow);
}

// ── 展開 / 收合子列 ───────────────────────────────────────────────
function toggleChildren(btn) {
  btn.classList.toggle('collapsed');
  const parentRow = btn.closest('tr');
  let sibling = parentRow.nextElementSibling;
  while (sibling && sibling.classList.contains('child-row')) {
    sibling.classList.toggle('hidden');
    sibling = sibling.nextElementSibling;
  }
}

// ── 渲染核算範圍卡片 ──────────────────────────────────────────────
function renderScopeCards() {
  const grid = document.getElementById('scopeGrid');
  grid.innerHTML = '';

  if (!costData.length) return;

  const borderColors = ['#0052CC','#2563EB','#1D4ED8','#3B82F6','#6366F1','#7C3AED'];

  costData.forEach((scope, i) => {
    const color = borderColors[i % borderColors.length];
    const whCount = scope.children ? scope.children.length : 0;

    const fmtCard = v => v > 0
      ? '$' + v.toLocaleString()
      : '<span style="color:#ccc;">—</span>';

    const card = document.createElement('div');
    card.className = 'scope-card';
    card.style.borderTopColor = color;

    card.innerHTML = `
      <div class="scope-card-header">
        <div>
          <div class="scope-card-name">${scope.name}</div>
          <div class="scope-card-wh">${whCount > 0 ? whCount + ' 個倉庫' : '—'}</div>
        </div>
        <div>
          <div class="scope-card-total-label">總成本</div>
          <div class="scope-card-total" style="color:${color};">${fmtCard(scope.total)}</div>
        </div>
      </div>
      <div class="scope-card-rows">
        <div class="scope-card-row">
          <span class="scope-card-row-label">正常品</span>
          <span class="scope-card-row-value">${fmtCard(scope.normal)}</span>
        </div>
        <div class="scope-card-row">
          <span class="scope-card-row-label" style="color:#DC2626;">過期品</span>
          <span class="scope-card-row-value ${scope.expired > 0 ? 'red' : 'muted'}">${fmtCard(scope.expired)}</span>
        </div>
        <div class="scope-card-row">
          <span class="scope-card-row-label" style="color:#EA580C;">長期在庫</span>
          <span class="scope-card-row-value ${scope.longterm > 0 ? 'orange' : 'muted'}">${fmtCard(scope.longterm)}</span>
        </div>
        <div class="scope-card-row">
          <span class="scope-card-row-label">即將到期</span>
          <span class="scope-card-row-value ${scope.soon > 0 ? '' : 'muted'}">${fmtCard(scope.soon)}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── 匯出 PDF（使用瀏覽器原生列印，版面 100% 精確）──────────────
function exportImage() {
  // 展開所有子列，確保 PDF 完整顯示
  document.querySelectorAll('.child-row.hidden').forEach(r => r.classList.remove('hidden'));
  document.querySelectorAll('.expand-btn').forEach(b => b.classList.remove('collapsed'));

  window.print();
}

// ── 初始化 ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  let payload = null;
  try {
    const raw = localStorage.getItem('costAnalysisPayload');
    if (raw) payload = JSON.parse(raw);
  } catch (e) {
    console.warn('Failed to parse costAnalysisPayload:', e);
  }

  if (payload && payload.costData && payload.costData.length) {
    costData = payload.costData;
  }

  renderScopeCards();
  renderTable();
});
</script>

</body>
</html>
