<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>各倉庫貨幣區間成本分析</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: linear-gradient(135deg, #f0f4f9 0%, #e8f4ff 100%);
      min-height: 100vh;
      padding: 20px;
      color: #1a1a1a;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 82, 204, 0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #003D7A 0%, #0052CC 100%);
      color: white;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 900;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    .btn-primary {
      background: #f08080;
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .content {
      padding: 24px;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: #f8fafc;
      border-left: 4px solid;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      border: 1px solid #e2e8f0;
    }

    .kpi-card.blue { border-left-color: #0052CC; }
    .kpi-card.red { border-left-color: #DC2626; }
    .kpi-card.orange { border-left-color: #EA580C; }
    .kpi-card.purple { border-left-color: #0052CC; }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .kpi-card.blue .kpi-value { color: #0052CC; }
    .kpi-card.red .kpi-value { color: #DC2626; }
    .kpi-card.orange .kpi-value { color: #EA580C; }
    .kpi-card.purple .kpi-value { color: #0052CC; }

    .kpi-sub {
      font-size: 11px;
      color: #999;
    }

    .table-section {
      margin-top: 16px;
    }

    .table-title {
      font-size: 13px;
      font-weight: 700;
      color: #0052CC;
      padding: 12px;
      background: #f0f4f9;
      border-radius: 8px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 4px solid #0052CC;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid #d0d9e8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th {
      background: #0052CC;
      color: white;
      padding: 12px 8px;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
      border: 1px solid #fff;
    }

    td {
      padding: 10px 8px;
      border: 1px solid #e2e8f0;
    }

    tr.parent-row td {
      background: #f0f4f9;
      font-weight: 600;
      color: #1a1a1a;
    }

    tr.child-row td {
      background: #fafbfc;
      color: #444;
      padding-left: 30px;
    }

    tr.total-row td {
      background: #e0e7ff;
      font-weight: 700;
      color: #1a1a1a;
    }

    .currency {
      color: #0052CC;
      font-weight: 700;
    }

    .expired-value {
      color: #DC2626 !important;
      font-weight: 700;
    }

    .expand-btn {
      cursor: pointer;
      user-select: none;
      font-weight: bold;
      color: #0052CC;
      margin-right: 6px;
    }

    .expand-btn:before {
      content: '▼ ';
    }

    .expand-btn.collapsed:before {
      content: '▶ ';
    }

    .child-row.hidden {
      display: none;
    }

    .footer {
      padding: 16px 24px;
      background: #f5f5f5;
      border-top: 1px solid #edd8f0;
      font-size: 11px;
      color: #999;
    }

    @media (max-width: 768px) {
      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .header {
        flex-direction: column;
        gap: 12px;
      }

      table {
        font-size: 10px;
      }

      th, td {
        padding: 8px 4px;
      }
    }
  </style>
</head>
<body>

<div class="container" id="reportContainer">
  <div class="header">
    <h1>🔍 各倉庫貨幣區間成本分析</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="window.history.back()">← 返回</button>
      <button class="btn btn-primary" onclick="exportImage()">📥 匯出圖片</button>
    </div>
  </div>

  <div class="content">
    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-label">總庫存番數</div>
        <div class="kpi-value" data-kpi="total">—</div>
        <div class="kpi-sub">筆商品</div>
      </div>

      <div class="kpi-card red">
        <div class="kpi-label">過期品</div>
        <div class="kpi-value" data-kpi="expired">—</div>
        <div class="kpi-sub" id="kpi-expired-pct">0件</div>
      </div>

      <div class="kpi-card orange">
        <div class="kpi-label">長期在庫</div>
        <div class="kpi-value" data-kpi="longterm">—</div>
        <div class="kpi-sub" id="kpi-longterm-pct">0件</div>
      </div>

      <div class="kpi-card purple">
        <div class="kpi-label">即將到期</div>
        <div class="kpi-value" data-kpi="soon">—</div>
        <div class="kpi-sub" id="kpi-soon-pct">0件</div>
      </div>
    </div>

    <!-- Table Section -->
    <div class="table-section">
      <div class="table-title">
        📋 按倉庫分類的成本成本明細（可展開/收合）
      </div>

      <div class="table-wrapper">
        <table id="costTable">
          <thead>
            <tr>
              <th style="width: 26%;">核算範圍 / 倉庫</th>
              <th style="width: 16%; text-align:right;">全部成本</th>
              <th style="width: 15%; text-align:right;">正常</th>
              <th style="width: 15%; text-align:right; color:#ffcccc;">過期品</th>
              <th style="width: 15%; text-align:right;">長期在庫</th>
              <th style="width: 13%; text-align:right;">即將到期</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- 動態生成 -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="footer">
    💡 說明：每個核算範圍可點擊展開查看個別倉庫的成本明細 | 🔵 藍色數字表示成本 | ⚠️ 紅色數字表示過期品
  </div>
</div>

<script>
let costData = [];

// ── 格式化 ────────────────────────────────────────────────────────
function fmt(num) {
  if (!num || num === 0) return '<span style="color:#bbb;">—</span>';
  return '$' + num.toLocaleString();
}

// ── 渲染表格 ──────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  if (!costData.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:#999;">
      ⚠️ 無成本數據。請先在主程序設定單價與核算範圍，再點「📊 成本分析」。
    </td></tr>`;
    return;
  }

  let grandTotal = 0, grandNormal = 0, grandExpired = 0, grandLongterm = 0, grandSoon = 0, grandQty = 0;

  costData.forEach(parent => {
    grandTotal    += parent.total;
    grandNormal   += parent.normal;
    grandExpired  += parent.expired;
    grandLongterm += parent.longterm;
    grandSoon     += parent.soon;
    grandQty      += parent.qty;

    const expClass = parent.expired > 0 ? 'expired-value' : 'currency';
    const hasChildren = parent.children && parent.children.length > 0;

    // 核算範圍主列
    const parentRow = document.createElement('tr');
    parentRow.className = 'parent-row';
    if (hasChildren) parentRow.style.cursor = 'pointer';
    parentRow.innerHTML = `
      <td>
        ${hasChildren ? `<span class="expand-btn" onclick="toggleChildren(this)"></span>` : ''}
        ${parent.name}
        ${hasChildren ? `<span style="font-size:10px;color:#999;margin-left:6px;">(${parent.children.length} 個倉庫)</span>` : ''}
      </td>
      <td class="currency" style="text-align:right;">${fmt(parent.total)}</td>
      <td class="currency" style="text-align:right;">${fmt(parent.normal)}</td>
      <td class="${expClass}" style="text-align:right;">${fmt(parent.expired)}</td>
      <td class="currency" style="text-align:right;">${fmt(parent.longterm)}</td>
      <td class="currency" style="text-align:right;">${fmt(parent.soon)}</td>
    `;
    tbody.appendChild(parentRow);

    // 各倉庫子列（預設隱藏）
    if (hasChildren) {
      parent.children.forEach(child => {
        const childRow = document.createElement('tr');
        childRow.className = 'child-row hidden';
        const childExpClass = child.expired > 0 ? 'expired-value' : 'currency';
        childRow.innerHTML = `
          <td style="padding-left:36px;">🏭 ${child.name}</td>
          <td class="currency" style="text-align:right;">${fmt(child.total)}</td>
          <td class="currency" style="text-align:right;">${fmt(child.normal)}</td>
          <td class="${childExpClass}" style="text-align:right;">${fmt(child.expired)}</td>
          <td class="currency" style="text-align:right;">${fmt(child.longterm)}</td>
          <td class="currency" style="text-align:right;">${fmt(child.soon)}</td>
        `;
        tbody.appendChild(childRow);
      });
    }
  });

  // 合計列
  const totalExpClass = grandExpired > 0 ? 'expired-value' : 'currency';
  const totalRow = document.createElement('tr');
  totalRow.className = 'total-row';
  totalRow.innerHTML = `
    <td>合計</td>
    <td class="currency" style="text-align:right;">${fmt(grandTotal)}</td>
    <td class="currency" style="text-align:right;">${fmt(grandNormal)}</td>
    <td class="${totalExpClass}" style="text-align:right;">${fmt(grandExpired)}</td>
    <td class="currency" style="text-align:right;">${fmt(grandLongterm)}</td>
    <td class="currency" style="text-align:right;">${fmt(grandSoon)}</td>
  `;
  tbody.appendChild(totalRow);
}

// ── 展開 / 收合子列 ───────────────────────────────────────────────
function toggleChildren(btn) {
  btn.classList.toggle('collapsed');
  const parentRow = btn.closest('tr');
  let sibling = parentRow.nextElementSibling;
  while (sibling && sibling.classList.contains('child-row')) {
    sibling.classList.toggle('hidden');
    sibling = sibling.nextElementSibling;
  }
}

// ── 更新 KPI 卡片 ─────────────────────────────────────────────────
function updateKPIs(kpi) {
  document.querySelector('[data-kpi="total"]').textContent    = kpi.total    ?? '—';
  document.querySelector('[data-kpi="expired"]').textContent  = kpi.expired  ?? '—';
  document.querySelector('[data-kpi="longterm"]').textContent = kpi.longterm ?? '—';
  document.querySelector('[data-kpi="soon"]').textContent     = kpi.soon     ?? '—';
  document.getElementById('kpi-expired-pct').textContent  = kpi.expired  + ' 件';
  document.getElementById('kpi-longterm-pct').textContent = kpi.longterm + ' 件';
  document.getElementById('kpi-soon-pct').textContent     = kpi.soon     + ' 件';
}

// ── 匯出 PDF ──────────────────────────────────────────────────────
function exportImage() {
  const btn = document.querySelector('.btn-primary');
  btn.textContent = '⏳ 產生中...';
  btn.disabled = true;

  const el = document.getElementById('reportContainer');
  const opt = {
    margin:     [6, 6, 6, 6],
    filename:   `成本分析報告_${new Date().toLocaleDateString('zh-TW')}.pdf`,
    image:      { type: 'jpeg', quality: 0.98 },
    html2canvas:{ scale: 2, useCORS: true, logging: false },
    jsPDF:      { orientation: 'portrait', unit: 'mm', format: 'a4' }
  };

  html2pdf().set(opt).from(el).save().then(() => {
    btn.textContent = '📥 匯出 PDF';
    btn.disabled = false;
  });
}

// ── 初始化 ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  let payload = null;
  try {
    const raw = localStorage.getItem('costAnalysisPayload');
    if (raw) payload = JSON.parse(raw);
  } catch (e) {
    console.warn('Failed to parse costAnalysisPayload:', e);
  }

  if (payload && payload.costData && payload.costData.length) {
    costData = payload.costData;
    updateKPIs(payload.kpiData || { total: 0, expired: 0, longterm: 0, soon: 0 });
  } else {
    updateKPIs({ total: 0, expired: 0, longterm: 0, soon: 0 });
  }

  renderTable();
});
</script>

</body>
</html>
