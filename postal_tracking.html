<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📬 郵局物流查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            opacity: 0.95;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        /* 輸入區域 */
        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e9ecef;
        }

        .input-box h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 16px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f4ff;
        }

        .upload-area:hover {
            background: #e6ebff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e6ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-area p {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .upload-area small {
            color: #999;
            display: block;
        }

        #fileInput {
            display: none;
        }

        /* 按鈕區域 */
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
            border-color: #667eea;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #ff5252;
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #40c057;
        }

        /* 進度條 */
        .progress-section {
            display: none;
            margin-bottom: 30px;
        }

        .progress-section.active {
            display: block;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .status-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-message.error {
            background: #ffebee;
            color: #c62828;
        }

        .status-message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        /* 統計資訊 */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }

        /* 結果表格 */
        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge.delivered {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-badge.in-transit {
            background: #fff9c4;
            color: #f57f17;
        }

        .status-badge.pending {
            background: #f3e5f5;
            color: #6a1b9a;
        }

        .status-badge.failed {
            background: #ffcdd2;
            color: #c62828;
        }

        .status-badge.cached {
            font-size: 10px;
            opacity: 0.7;
        }

        /* 篩選 */
        .filter-section {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e9ecef;
            background: white;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 13px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 快取指示 */
        .cache-indicator {
            font-size: 10px;
            color: #999;
            margin-left: 4px;
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .input-section {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }
        }

        .hidden {
            display: none !important;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #e9ecef;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📬 郵局物流查詢系統</h1>
            <p>支援批量查詢、本地快取、智慧去重</p>
        </div>

        <div class="content">
            <!-- 輸入區域 -->
            <div class="input-section">
                <div class="input-box">
                    <h3>✏️ 直接輸入</h3>
                    <textarea id="manualInput" placeholder="貼上寄件號碼（每行或逗號分隔）&#10;例如：&#10;1234567890123&#10;1234567890124&#10;1234567890125"></textarea>
                </div>

                <div class="input-box">
                    <h3>📁 上傳 Excel / CSV</h3>
                    <div class="upload-area" id="uploadArea">
                        <p>點擊或拖曳檔案上傳</p>
                        <small>支援 Excel (.xlsx, .xls) 或 CSV</small>
                    </div>
                    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
                </div>
            </div>

            <!-- 操作按鈕 -->
            <div class="button-group">
                <button class="btn-primary" id="queryBtn">
                    <span>🚀</span>
                    <span>開始查詢</span>
                </button>
                <button class="btn-secondary" id="clearBtn">
                    <span>🗑️</span>
                    <span>清空輸入</span>
                </button>
                <button class="btn-secondary" id="clearCacheBtn">
                    <span>🔄</span>
                    <span>清除快取</span>
                </button>
                <button class="btn-success hidden" id="exportBtn">
                    <span>💾</span>
                    <span>導出 Excel</span>
                </button>
                <button class="btn-success hidden" id="copyBtn">
                    <span>📋</span>
                    <span>複製結果</span>
                </button>
            </div>

            <!-- 進度條 -->
            <div class="progress-section" id="progressSection">
                <div class="progress-info">
                    <span id="progressText">準備中...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-message" id="statusMessage"></div>
            </div>

            <!-- 統計資訊 -->
            <div class="stats" id="statsSection">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">總筆數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="successCount">0</div>
                    <div class="stat-label">已查詢</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="cacheCount">0</div>
                    <div class="stat-label">快取命中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="failureCount">0</div>
                    <div class="stat-label">失敗</div>
                </div>
            </div>

            <!-- 篩選與搜尋 -->
            <div class="filter-section hidden" id="filterSection">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="delivered">已送達</button>
                <button class="filter-btn" data-filter="in-transit">配送中</button>
                <button class="filter-btn" data-filter="pending">待處理</button>
                <button class="filter-btn" data-filter="failed">失敗</button>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜尋寄件號碼或位置...">
                </div>
            </div>

            <!-- 結果表格 -->
            <div class="results-section" id="resultsSection">
                <div class="table-container">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th style="width: 15%">寄件號碼</th>
                                <th style="width: 20%">狀態</th>
                                <th style="width: 25%">位置</th>
                                <th style="width: 25%">最後更新</th>
                                <th style="width: 15%">備註</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="footer">
                💡 本系統使用本地快取，同一號碼 6 小時內只查詢一次 | 資料完全在本地，不上傳伺服器
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // 1. 初始化與事件綁定
        // ============================================

        const state = {
            results: [],
            originalResults: [],
            currentFilter: 'all',
            isQuerying: false,
            stats: {
                total: 0,
                success: 0,
                cached: 0,
                failure: 0
            }
        };

        // 上傳檔案拖曳
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFileUpload(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileUpload(e.target.files[0]);
        });

        // 按鈕事件
        document.getElementById('queryBtn').addEventListener('click', startQuery);
        document.getElementById('clearBtn').addEventListener('click', clearInput);
        document.getElementById('clearCacheBtn').addEventListener('click', clearCache);
        document.getElementById('exportBtn').addEventListener('click', exportToExcel);
        document.getElementById('copyBtn').addEventListener('click', copyResults);

        // 篩選
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.currentFilter = e.target.dataset.filter;
                filterResults();
            });
        });

        // 搜尋
        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterResults(e.target.value);
        });

        // ============================================
        // 2. 檔案上傳處理
        // ============================================

        function handleFileUpload(file) {
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let data;

                    if (file.name.endsWith('.csv')) {
                        // CSV 處理
                        data = e.target.result.split('\n')
                            .map(row => row.split(',')[0].trim())
                            .filter(v => v);
                    } else {
                        // Excel 處理
                        const workbook = XLSX.read(e.target.result, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        data = XLSX.utils.sheet_to_json(worksheet, { header: 1 })
                            .map(row => row[0]?.toString().trim())
                            .filter(v => v);
                    }

                    document.getElementById('manualInput').value = data.join('\n');
                    showStatus(`✅ 已載入 ${data.length} 筆號碼`, 'success');
                } catch (error) {
                    showStatus(`❌ 檔案解析失敗: ${error.message}`, 'error');
                }
            };

            reader.readAsArrayBuffer(file);
        }

        // ============================================
        // 3. 解析與驗證
        // ============================================

        function parseInput() {
            const text = document.getElementById('manualInput').value;
            const numbers = text
                .split(/[\n,\s]+/)
                .map(n => n.trim())
                .filter(n => n && n.match(/^\d{13}$/)); // 13 位數字

            const unique = [...new Set(numbers)];

            state.stats.total = unique.length;

            return unique;
        }

        // ============================================
        // 4. 快取管理
        // ============================================

        function getCachedResult(trackingNumber) {
            const cached = localStorage.getItem(`track_${trackingNumber}`);
            if (!cached) return null;

            const data = JSON.parse(cached);

            // 檢查過期（6小時）
            if (Date.now() - data.timestamp > 6 * 60 * 60 * 1000) {
                localStorage.removeItem(`track_${trackingNumber}`);
                return null;
            }

            return data;
        }

        function setCachedResult(trackingNumber, result) {
            localStorage.setItem(
                `track_${trackingNumber}`,
                JSON.stringify({ ...result, timestamp: Date.now() })
            );
        }

        function clearCache() {
            if (confirm('確定要清除所有快取嗎？')) {
                const keys = Object.keys(localStorage);
                keys.forEach(key => {
                    if (key.startsWith('track_')) {
                        localStorage.removeItem(key);
                    }
                });
                showStatus('✅ 快取已清除', 'success');
            }
        }

        // ============================================
        // 5. 查詢邏輯
        // ============================================

        async function startQuery() {
            const numbers = parseInput();

            if (numbers.length === 0) {
                showStatus('❌ 請輸入有效的寄件號碼（13位數字）', 'error');
                return;
            }

            state.isQuerying = true;
            state.results = [];
            state.stats = { total: numbers.length, success: 0, cached: 0, failure: 0 };

            document.getElementById('progressSection').classList.add('active');
            document.getElementById('queryBtn').disabled = true;

            for (let i = 0; i < numbers.length; i++) {
                const result = await queryNumber(numbers[i]);
                state.results.push(result);
                state.originalResults = [...state.results];

                updateProgress(i + 1, numbers.length);

                // 限流：避免過快
                await new Promise(r => setTimeout(r, 300));
            }

            state.isQuerying = false;
            document.getElementById('queryBtn').disabled = false;
            document.getElementById('progressSection').classList.remove('active');
            document.getElementById('resultsSection').classList.add('active');
            document.getElementById('statsSection').classList.add('active');
            document.getElementById('filterSection').classList.remove('hidden');
            document.getElementById('exportBtn').classList.remove('hidden');
            document.getElementById('copyBtn').classList.remove('hidden');

            renderResults();
            updateStats();

            showStatus(
                `✅ 查詢完成！成功: ${state.stats.success}, 快取: ${state.stats.cached}, 失敗: ${state.stats.failure}`,
                'success'
            );
        }

        async function queryNumber(trackingNumber) {
            // 檢查快取
            const cached = getCachedResult(trackingNumber);
            if (cached) {
                state.stats.cached++;
                state.stats.success++;
                return { ...cached, cached: true };
            }

            try {
                // 模擬郵局 API 查詢
                // 實際使用時，需要呼叫真實 API 或 Apps Script Web App
                const result = await fetchPostalData(trackingNumber);

                if (result) {
                    state.stats.success++;
                    setCachedResult(trackingNumber, result);
                    return { ...result, cached: false };
                } else {
                    state.stats.failure++;
                    return {
                        number: trackingNumber,
                        status: '查詢失敗',
                        location: '-',
                        lastUpdate: new Date().toLocaleString('zh-TW'),
                        cached: false
                    };
                }
            } catch (error) {
                state.stats.failure++;
                return {
                    number: trackingNumber,
                    status: '錯誤',
                    location: error.message,
                    lastUpdate: new Date().toLocaleString('zh-TW'),
                    cached: false
                };
            }
        }

        async function fetchPostalData(trackingNumber) {
            // TODO: 替換為實際的郵局 API 或 Apps Script Web App 端點
            // 示例：
            // const response = await fetch(
            //   `https://script.google.com/macros/d/YOUR_DEPLOYMENT_ID/usercache/v1?trackingNumber=${trackingNumber}`
            // );
            // return await response.json();

            // 示例回應（供測試用）
            const mockData = {
                number: trackingNumber,
                status: ['已送達', '配送中', '待處理'][Math.floor(Math.random() * 3)],
                location: ['台北郵局', '新店分局', '萬華分局'][Math.floor(Math.random() * 3)],
                lastUpdate: new Date().toLocaleString('zh-TW')
            };

            return new Promise(resolve => {
                setTimeout(() => resolve(mockData), 500);
            });
        }

        // ============================================
        // 6. UI 更新
        // ============================================

        function updateProgress(current, total) {
            const percent = Math.round((current / total) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressText').textContent = `正在查詢: ${current}/${total}`;
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = state.stats.total;
            document.getElementById('successCount').textContent = state.stats.success;
            document.getElementById('cacheCount').textContent = state.stats.cached;
            document.getElementById('failureCount').textContent = state.stats.failure;
        }

        function renderResults() {
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';

            state.results.forEach(result => {
                const row = document.createElement('tr');
                const statusClass = getStatusClass(result.status);

                row.innerHTML = `
                    <td><code>${result.number}</code></td>
                    <td>
                        <span class="status-badge ${statusClass}">${result.status}</span>
                    </td>
                    <td>${result.location}</td>
                    <td>${result.lastUpdate}</td>
                    <td>
                        ${result.cached ? '<span class="cache-indicator">💾 快取</span>' : ''}
                    </td>
                `;

                tbody.appendChild(row);
            });
        }

        function filterResults(searchTerm = '') {
            state.results = state.originalResults.filter(result => {
                const matchesFilter = state.currentFilter === 'all' ||
                    getStatusClass(result.status).replace('status-badge ', '') === state.currentFilter;

                const matchesSearch = !searchTerm ||
                    result.number.includes(searchTerm) ||
                    result.location.includes(searchTerm);

                return matchesFilter && matchesSearch;
            });

            renderResults();
        }

        function getStatusClass(status) {
            if (status.includes('已送達') || status.includes('delivered')) return 'delivered';
            if (status.includes('配送中') || status.includes('in-transit') || status.includes('in transit')) return 'in-transit';
            if (status.includes('待處理') || status.includes('pending')) return 'pending';
            return 'failed';
        }

        function showStatus(message, type = 'info') {
            const msg = document.getElementById('statusMessage');
            msg.textContent = message;
            msg.className = `status-message ${type}`;
        }

        // ============================================
        // 7. 導出功能
        // ============================================

        function exportToExcel() {
            const data = [
                ['寄件號碼', '狀態', '位置', '最後更新', '備註'],
                ...state.results.map(r => [
                    r.number,
                    r.status,
                    r.location,
                    r.lastUpdate,
                    r.cached ? '快取' : ''
                ])
            ];

            const worksheet = XLSX.utils.aoa_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, '查詢結果');

            XLSX.writeFile(workbook, `郵局物流查詢_${new Date().toLocaleDateString('zh-TW')}.xlsx`);
        }

        function copyResults() {
            const text = state.results
                .map(r => `${r.number}\t${r.status}\t${r.location}\t${r.lastUpdate}`)
                .join('\n');

            navigator.clipboard.writeText(text).then(() => {
                showStatus('✅ 已複製到剪貼簿', 'success');
            });
        }

        function clearInput() {
            document.getElementById('manualInput').value = '';
            document.getElementById('fileInput').value = '';
        }

        // 頁面載入時恢復快取結果
        window.addEventListener('load', () => {
            showStatus('✅ 準備就緒，請輸入寄件號碼開始查詢', 'success');
        });
    </script>
</body>
</html>
