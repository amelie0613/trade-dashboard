<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📬 郵局物流查詢系統 - 本地版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            opacity: 0.95;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e9ecef;
        }

        .input-box h3 {
            color: #667eea;
            margin-bottom: 12px;
            font-size: 16px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f0f4ff;
        }

        .upload-area:hover {
            background: #e6ebff;
            border-color: #764ba2;
        }

        .upload-area p {
            color: #667eea;
            font-weight: 500;
            margin-bottom: 8px;
        }

        #fileInput {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e9ecef;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e9ecef;
            border-color: #667eea;
        }

        .btn-success {
            background: #51cf66;
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            background: #40c057;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
        }

        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .filter-section {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e9ecef;
            background: white;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 13px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: #667eea;
            color: white;
        }

        th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.processing {
            background: #cfe2ff;
            color: #084298;
        }

        .status-badge.delivered {
            background: #d1e7dd;
            color: #0f5132;
        }

        .input-form {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #2196f3;
        }

        .input-form h4 {
            color: #1976d2;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-bottom: 12px;
        }

        .form-group input {
            padding: 10px;
            border: 2px solid #cfe2ff;
            border-radius: 6px;
            font-size: 13px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2196f3;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #e9ecef;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .input-section {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }
        }

        .hidden {
            display: none !important;
        }

        .info-box {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #00acc1;
            margin-bottom: 20px;
            font-size: 13px;
            color: #00695c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📬 郵局物流查詢系統</h1>
            <p>本地版 - 完全離線運作 ✨</p>
        </div>

        <div class="content">
            <div class="info-box">
                💡 <strong>使用方式：</strong>先在郵局官方網站查詢結果，複製貼入下方或上傳 CSV/Excel 檔案，系統自動幫你整理、快取、導出
            </div>

            <!-- 輸入區域 -->
            <div class="input-section">
                <div class="input-box">
                    <h3>✏️ 直接輸入</h3>
                    <textarea id="manualInput" placeholder="貼上寄件號碼（每行一個）&#10;例如：&#10;1234567890123&#10;1234567890124&#10;1234567890125"></textarea>
                </div>

                <div class="input-box">
                    <h3>📁 上傳 Excel / CSV</h3>
                    <div class="upload-area" id="uploadArea">
                        <p>點擊或拖曳檔案上傳</p>
                        <small>支援 Excel (.xlsx, .xls) 或 CSV</small>
                    </div>
                    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />
                </div>
            </div>

            <!-- 手動輸入結果區域 -->
            <div class="input-form">
                <h4>🔍 輸入查詢結果</h4>
                <p style="margin-bottom: 15px; color: #1976d2; font-size: 12px;">在郵局官網查詢後，在此輸入寄件號碼及狀態</p>
                <div class="form-group">
                    <input type="text" id="trackingNumber" placeholder="寄件號碼 (13碼)">
                    <input type="text" id="trackingStatus" placeholder="狀態" style="flex: 0 0 200px;">
                </div>
                <div class="form-group">
                    <input type="text" id="trackingLocation" placeholder="位置 / 分局">
                    <button class="btn-primary" onclick="addManualResult()" style="flex: 0 0 auto;">➕ 新增</button>
                </div>
            </div>

            <!-- 操作按鈕 -->
            <div class="button-group">
                <button class="btn-secondary" onclick="clearInput()">
                    <span>🗑️</span>
                    <span>清空輸入</span>
                </button>
                <button class="btn-secondary" onclick="clearCache()">
                    <span>🔄</span>
                    <span>清除快取</span>
                </button>
                <button class="btn-success hidden" id="exportBtn" onclick="exportToExcel()">
                    <span>💾</span>
                    <span>導出 Excel</span>
                </button>
                <button class="btn-success hidden" id="copyBtn" onclick="copyResults()">
                    <span>📋</span>
                    <span>複製結果</span>
                </button>
            </div>

            <!-- 統計資訊 -->
            <div class="stats" id="statsSection">
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">總筆數</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="deliveredCount">0</div>
                    <div class="stat-label">已送達</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="processingCount">0</div>
                    <div class="stat-label">配送中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">待處理</div>
                </div>
            </div>

            <!-- 篩選與搜尋 -->
            <div class="filter-section hidden" id="filterSection">
                <button class="filter-btn active" data-filter="all" onclick="filterByStatus('all')">全部</button>
                <button class="filter-btn" data-filter="delivered" onclick="filterByStatus('delivered')">✅ 已送達</button>
                <button class="filter-btn" data-filter="processing" onclick="filterByStatus('processing')">📦 配送中</button>
                <button class="filter-btn" data-filter="pending" onclick="filterByStatus('pending')">⏳ 待處理</button>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜尋寄件號碼或位置..." oninput="filterResults()">
                </div>
            </div>

            <!-- 結果表格 -->
            <div class="results-section" id="resultsSection">
                <div class="table-container">
                    <table id="resultsTable">
                        <thead>
                            <tr>
                                <th style="width: 15%">寄件號碼</th>
                                <th style="width: 20%">狀態</th>
                                <th style="width: 25%">位置</th>
                                <th style="width: 25%">最後更新</th>
                                <th style="width: 15%">操作</th>
                            </tr>
                        </thead>
                        <tbody id="resultsBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="footer">
                ✅ 完全本地運作 | 📊 自動快取 | 🔒 資料隱私 | 📱 支援所有設備
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // 狀態管理
        // ============================================

        const state = {
            results: [],
            currentFilter: 'all',
            searchTerm: ''
        };

        const STORAGE_KEY = 'postal_tracking_data';

        // ============================================
        // 1. 初始化
        // ============================================

        window.addEventListener('load', () => {
            loadFromStorage();
            setupUploadArea();
            if (state.results.length > 0) {
                renderResults();
                updateStats();
                document.getElementById('resultsSection').classList.add('active');
                document.getElementById('filterSection').classList.remove('hidden');
                document.getElementById('exportBtn').classList.remove('hidden');
                document.getElementById('copyBtn').classList.remove('hidden');
            }
        });

        // ============================================
        // 2. 文件上傳
        // ============================================

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFileUpload(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileUpload(e.target.files[0]);
        });

        function handleFileUpload(file) {
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let data;

                    if (file.name.endsWith('.csv')) {
                        data = e.target.result.split('\n')
                            .map(row => row.split(',')[0].trim())
                            .filter(v => v);
                    } else {
                        const workbook = XLSX.read(e.target.result, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        data = XLSX.utils.sheet_to_json(worksheet, { header: 1 })
                            .map(row => row[0]?.toString().trim())
                            .filter(v => v);
                    }

                    document.getElementById('manualInput').value = data.join('\n');
                    alert(`✅ 已載入 ${data.length} 筆號碼`);
                } catch (error) {
                    alert(`❌ 檔案解析失敗: ${error.message}`);
                }
            };

            reader.readAsArrayBuffer(file);
        }

        // ============================================
        // 3. 手動輸入結果
        // ============================================

        function addManualResult() {
            const number = document.getElementById('trackingNumber').value.trim();
            const status = document.getElementById('trackingStatus').value.trim();
            const location = document.getElementById('trackingLocation').value.trim();

            if (!number || !status) {
                alert('請輸入寄件號碼和狀態');
                return;
            }

            if (!number.match(/^\d{13}$/)) {
                alert('寄件號碼必須是 13 位數字');
                return;
            }

            // 檢查重複
            const exists = state.results.find(r => r.number === number);
            if (exists) {
                if (confirm(`寄件號碼 ${number} 已存在，要更新嗎？`)) {
                    exists.status = status;
                    exists.location = location;
                    exists.lastUpdate = new Date().toLocaleString('zh-TW');
                } else {
                    return;
                }
            } else {
                state.results.push({
                    number,
                    status,
                    location,
                    lastUpdate: new Date().toLocaleString('zh-TW')
                });
            }

            // 清空輸入框
            document.getElementById('trackingNumber').value = '';
            document.getElementById('trackingStatus').value = '';
            document.getElementById('trackingLocation').value = '';

            // 保存並重新渲染
            saveToStorage();
            renderResults();
            updateStats();
            showResultsPanel();

            alert('✅ 已新增');
        }

        // ============================================
        // 4. 渲染結果
        // ============================================

        function renderResults() {
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';

            const filtered = state.results.filter(r => {
                const matchesFilter = state.currentFilter === 'all' || 
                    getStatusType(r.status) === state.currentFilter;
                const matchesSearch = !state.searchTerm ||
                    r.number.includes(state.searchTerm) ||
                    r.location.includes(state.searchTerm) ||
                    r.status.includes(state.searchTerm);
                return matchesFilter && matchesSearch;
            });

            filtered.forEach(result => {
                const row = document.createElement('tr');
                const statusType = getStatusType(result.status);
                const statusClass = `status-badge ${statusType}`;

                row.innerHTML = `
                    <td><code>${result.number}</code></td>
                    <td><span class="${statusClass}">${result.status}</span></td>
                    <td>${result.location || '-'}</td>
                    <td>${result.lastUpdate}</td>
                    <td>
                        <button class="btn-secondary" onclick="editResult('${result.number}')" style="padding: 4px 8px; font-size: 12px;">編輯</button>
                        <button class="btn-secondary" onclick="deleteResult('${result.number}')" style="padding: 4px 8px; font-size: 12px;">刪除</button>
                    </td>
                `;

                tbody.appendChild(row);
            });
        }

        function getStatusType(status) {
            if (status.includes('已送達') || status.includes('delivered')) return 'delivered';
            if (status.includes('配送中') || status.includes('processing') || status.includes('運送')) return 'processing';
            return 'pending';
        }

        // ============================================
        // 5. 篩選與搜尋
        // ============================================

        function filterByStatus(status) {
            state.currentFilter = status;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderResults();
        }

        function filterResults() {
            state.searchTerm = document.getElementById('searchInput').value.trim();
            renderResults();
        }

        // ============================================
        // 6. 編輯與刪除
        // ============================================

        function editResult(number) {
            const result = state.results.find(r => r.number === number);
            if (!result) return;

            const newStatus = prompt('輸入新狀態:', result.status);
            if (newStatus === null) return;

            const newLocation = prompt('輸入新位置:', result.location);
            if (newLocation === null) return;

            result.status = newStatus;
            result.location = newLocation;
            result.lastUpdate = new Date().toLocaleString('zh-TW');

            saveToStorage();
            renderResults();
            updateStats();
        }

        function deleteResult(number) {
            if (!confirm(`確定要刪除寄件號碼 ${number} 嗎？`)) return;

            state.results = state.results.filter(r => r.number !== number);
            saveToStorage();
            renderResults();
            updateStats();

            if (state.results.length === 0) {
                document.getElementById('resultsSection').classList.remove('active');
                document.getElementById('filterSection').classList.add('hidden');
                document.getElementById('exportBtn').classList.add('hidden');
                document.getElementById('copyBtn').classList.add('hidden');
            }
        }

        // ============================================
        // 7. 統計更新
        // ============================================

        function updateStats() {
            const total = state.results.length;
            const delivered = state.results.filter(r => getStatusType(r.status) === 'delivered').length;
            const processing = state.results.filter(r => getStatusType(r.status) === 'processing').length;
            const pending = state.results.filter(r => getStatusType(r.status) === 'pending').length;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('deliveredCount').textContent = delivered;
            document.getElementById('processingCount').textContent = processing;
            document.getElementById('pendingCount').textContent = pending;
        }

        // ============================================
        // 8. 導出功能
        // ============================================

        function exportToExcel() {
            const data = [
                ['寄件號碼', '狀態', '位置', '最後更新'],
                ...state.results.map(r => [r.number, r.status, r.location, r.lastUpdate])
            ];

            const worksheet = XLSX.utils.aoa_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, '查詢結果');

            XLSX.writeFile(workbook, `郵局物流查詢_${new Date().toLocaleDateString('zh-TW')}.xlsx`);
        }

        function copyResults() {
            const text = state.results
                .map(r => `${r.number}\t${r.status}\t${r.location}\t${r.lastUpdate}`)
                .join('\n');

            navigator.clipboard.writeText(text).then(() => {
                alert('✅ 已複製到剪貼簿');
            });
        }

        // ============================================
        // 9. 存儲管理
        // ============================================

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.results));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    state.results = JSON.parse(saved);
                } catch (e) {
                    state.results = [];
                }
            }
        }

        function clearCache() {
            if (confirm('確定要清除所有資料嗎？')) {
                state.results = [];
                localStorage.removeItem(STORAGE_KEY);
                document.getElementById('resultsSection').classList.remove('active');
                document.getElementById('filterSection').classList.add('hidden');
                document.getElementById('exportBtn').classList.add('hidden');
                document.getElementById('copyBtn').classList.add('hidden');
                alert('✅ 已清除');
            }
        }

        // ============================================
        // 10. 輔助函數
        // ============================================

        function clearInput() {
            document.getElementById('manualInput').value = '';
            document.getElementById('fileInput').value = '';
        }

        function showResultsPanel() {
            document.getElementById('resultsSection').classList.add('active');
            document.getElementById('filterSection').classList.remove('hidden');
            document.getElementById('exportBtn').classList.remove('hidden');
            document.getElementById('copyBtn').classList.remove('hidden');
        }

        function setupUploadArea() {
            const area = document.getElementById('uploadArea');
            area.style.cursor = 'pointer';
        }
    </script>
</body>
</html>
