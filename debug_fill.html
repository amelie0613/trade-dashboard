<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>補填診斷工具</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
body{font-family:sans-serif;max-width:700px;margin:0 auto;padding:20px;background:#f0f4f8;}
h2{color:#0b1d35;}
input{width:100%;padding:10px;border:1.5px solid #cbd5e1;border-radius:8px;font-size:15px;margin-bottom:12px;box-sizing:border-box;}
button{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-right:8px;margin-bottom:8px;}
.btn-blue{background:#0369a1;color:#fff;}
.btn-green{background:#16a34a;color:#fff;}
.btn-red{background:#dc2626;color:#fff;}
.btn-gray{background:#64748b;color:#fff;}
.step{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1.5px solid #e2e8f0;}
.step-title{font-weight:700;font-size:14px;margin-bottom:8px;color:#0369a1;}
.result{font-size:13px;padding:10px 12px;border-radius:8px;margin-top:8px;white-space:pre-wrap;word-break:break-all;font-family:monospace;}
.ok{background:#f0fdf4;border:1px solid #86efac;color:#15803d;}
.err{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;}
.warn{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;}
.info{background:#eff6ff;border:1px solid #bae6fd;color:#1e40af;}
.loading{color:#64748b;font-style:italic;}
</style>
</head>
<body>
<h2>🔍 補填連結診斷工具</h2>
<p style="font-size:13px;color:#64748b;">輸入案件編號，逐步測試每個環節，找出真正的失敗原因。</p>

<div class="step">
  <div class="step-title">輸入要測試的案件編號</div>
  <input type="text" id="caseId" placeholder="例：T20260424A01">
  <button class="btn-blue" onclick="runAll()">▶ 全部測試</button>
  <button class="btn-gray" onclick="clearAll()">清除</button>
</div>

<!-- STEP 1 -->
<div class="step">
  <div class="step-title">步驟 1：Firebase SDK 是否載入</div>
  <button class="btn-gray" onclick="testSDK()">測試</button>
  <div id="r1" class="result info">尚未測試</div>
</div>

<!-- STEP 2 -->
<div class="step">
  <div class="step-title">步驟 2：Firebase 匿名登入</div>
  <button class="btn-gray" onclick="testAuth()">測試</button>
  <div id="r2" class="result info">尚未測試</div>
</div>

<!-- STEP 3 -->
<div class="step">
  <div class="step-title">步驟 3：Firestore 讀取案件</div>
  <button class="btn-gray" onclick="testFirestore()">測試</button>
  <div id="r3" class="result info">尚未測試</div>
</div>

<!-- STEP 4 -->
<div class="step">
  <div class="step-title">步驟 4：GAS 連線（getRates）</div>
  <button class="btn-gray" onclick="testGAS()">測試</button>
  <div id="r4" class="result info">尚未測試</div>
</div>

<!-- STEP 5 -->
<div class="step">
  <div class="step-title">步驟 5：GAS getCase 備援</div>
  <button class="btn-gray" onclick="testGASCase()">測試</button>
  <div id="r5" class="result info">尚未測試</div>
</div>

<!-- STEP 6 -->
<div class="step">
  <div class="step-title">步驟 6：模擬 checkFillMode 完整流程</div>
  <button class="btn-gray" onclick="testFullFlow()">測試</button>
  <div id="r6" class="result info">尚未測試</div>
</div>

<!-- RAW DATA -->
<div class="step" id="raw-section" style="display:none;">
  <div class="step-title">📋 讀取到的原始資料</div>
  <div id="raw-data" class="result info"></div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAvyDv1dEC9K-xYwLuyUahGhRPuQunWlxs",
  authDomain:        "ot001-5c061.firebaseapp.com",
  projectId:         "ot001-5c061",
  storageBucket:     "ot001-5c061.firebasestorage.app",
  messagingSenderId: "569582007093",
  appId:             "1:569582007093:web:9e3b2aa67053030ee2d27c",
};
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyXxIvnOZM4Oeq_TkIB8RI-G3hYJAULShVyvezOACjcTw1XcK8kAMUrx0R8Te-q7HrdRw/exec';

var _fbApp = null, _fbDb = null;

function set(id, cls, msg){ var el=document.getElementById(id); el.className='result '+cls; el.textContent=msg; }
function getCaseId(){ return document.getElementById('caseId').value.trim(); }

// ── 步驟1：SDK ──
function testSDK(){
  set('r1','loading','測試中...');
  try {
    if(window.firebase && firebase.firestore){
      set('r1','ok','✅ Firebase SDK 載入正常\nfirebase 版本：' + (firebase.SDK_VERSION||'(無法取得)'));
    } else {
      set('r1','err','❌ Firebase SDK 未載入，請確認網路或 CDN 是否正常');
    }
  } catch(e){ set('r1','err','❌ 發生錯誤：'+e.toString()); }
}

// ── 步驟2：Auth ──
async function testAuth(){
  set('r2','loading','嘗試匿名登入中...');
  try {
    var app;
    try { app = firebase.app(); } catch(e) { app = firebase.initializeApp(FIREBASE_CONFIG); }
    _fbApp = app;
    _fbDb = app.firestore();
    var result = await firebase.auth().signInAnonymously();
    set('r2','ok','✅ 匿名登入成功\nUID：' + result.user.uid);
  } catch(e){
    set('r2','err','❌ 匿名登入失敗：' + e.code + '\n' + e.message
      + '\n\n→ 請到 Firebase Console → Authentication → Sign-in method → 啟用「匿名」');
  }
}

// ── 步驟3：Firestore ──
async function testFirestore(){
  var caseId = getCaseId();
  if(!caseId){ set('r3','warn','⚠️ 請先輸入案件編號'); return; }
  set('r3','loading','從 Firestore 讀取中...');
  try {
    if(!_fbDb){
      try { _fbApp = firebase.app(); } catch(e) { _fbApp = firebase.initializeApp(FIREBASE_CONFIG); }
      _fbDb = _fbApp.firestore();
    }
    await firebase.auth().signInAnonymously().catch(function(){});
    var snap = await _fbDb.collection('cases').doc(caseId).get();
    if(snap.exists){
      var data = snap.data();
      set('r3','ok','✅ Firestore 讀取成功！\n\n案件存在，key 清單：\n' + Object.keys(data).join(', '));
      document.getElementById('raw-section').style.display='block';
      document.getElementById('raw-data').textContent = JSON.stringify(data, null, 2);
    } else {
      set('r3','err','❌ Firestore 中找不到案件「' + caseId + '」\n→ 案件可能儲存在舊系統（Google Sheets）而非 Firebase\n→ 或案件編號輸入有誤');
    }
  } catch(e){
    set('r3','err','❌ Firestore 讀取失敗：\n' + e.code + ' - ' + e.message
      + '\n\n可能原因：\n• Security Rules 未允許讀取（需加 allow read: if true 或允許匿名用戶）\n• 網路問題');
  }
}

// ── 步驟4：GAS getRates ──
function testGAS(){
  set('r4','loading','呼叫 GAS 中（最多等 12 秒）...');
  var cbName = '_test_cb_' + Date.now();
  var done = false;
  var timer = setTimeout(function(){
    if(done) return; done=true;
    delete window[cbName];
    set('r4','err','❌ GAS 連線逾時（12秒）\n→ GAS 可能未部署，或 SCRIPT_URL 有誤\n→ 確認 GAS 已部署為「以我的身分執行、任何人可存取」');
  }, 12000);
  window[cbName] = function(d){
    clearTimeout(timer); done=true; delete window[cbName];
    if(d && d.status==='ok' && d.rates){
      set('r4','ok','✅ GAS 連線正常\n匯率回傳：USD=' + d.rates.USD + ', JPY=' + d.rates.JPY);
    } else {
      set('r4','warn','⚠️ GAS 有回應但格式異常：\n' + JSON.stringify(d));
    }
  };
  var s = document.createElement('script');
  s.onerror = function(){ clearTimeout(timer); done=true; delete window[cbName]; set('r4','err','❌ GAS 腳本載入失敗（script error）'); };
  s.src = SCRIPT_URL + '?action=getRates&callback=' + cbName + '&_=' + Date.now();
  document.head.appendChild(s);
}

// ── 步驟5：GAS getCase ──
function testGASCase(){
  var caseId = getCaseId();
  if(!caseId){ set('r5','warn','⚠️ 請先輸入案件編號'); return; }
  set('r5','loading','呼叫 GAS getCase 中...');
  var cbName = '_test_gc_' + Date.now();
  var done = false;
  var timer = setTimeout(function(){
    if(done) return; done=true; delete window[cbName];
    set('r5','err','❌ GAS getCase 逾時\n→ GAS 版本可能尚未更新（需重新部署）');
  }, 15000);
  window[cbName] = function(d){
    clearTimeout(timer); done=true; delete window[cbName];
    if(d && d.status==='ok' && d.row){
      set('r5','ok','✅ GAS getCase 成功！\n案件資料取得，key 清單：\n' + Object.keys(d.row).join(', '));
      document.getElementById('raw-section').style.display='block';
      document.getElementById('raw-data').textContent = JSON.stringify(d.row, null, 2);
    } else if(d && d.status==='error'){
      set('r5','err','❌ GAS 回傳錯誤：' + d.message
        + '\n\n若訊息為「找不到案件」→ 案件可能只存在舊 Sheets 中\n若訊息為「getCase is not a function」→ GAS 版本未更新，請重新部署');
    } else {
      set('r5','warn','⚠️ GAS 回應格式異常：\n' + JSON.stringify(d));
    }
  };
  var s = document.createElement('script');
  s.onerror = function(){ clearTimeout(timer); done=true; delete window[cbName]; set('r5','err','❌ script error（GAS 可能尚未更新版本）'); };
  s.src = SCRIPT_URL + '?action=getCase&caseId=' + encodeURIComponent(caseId) + '&callback=' + cbName + '&_=' + Date.now();
  document.head.appendChild(s);
}

// ── 步驟6：完整流程模擬 ──
async function testFullFlow(){
  var caseId = getCaseId();
  if(!caseId){ set('r6','warn','⚠️ 請先輸入案件編號'); return; }
  set('r6','loading','模擬 checkFillMode 完整流程...');

  var log = [];
  function addLog(msg){ log.push(msg); set('r6','loading', log.join('\n')); }

  // 1. Firebase init
  addLog('1. 初始化 Firebase...');
  try {
    try { _fbApp = firebase.app(); } catch(e) { _fbApp = firebase.initializeApp(FIREBASE_CONFIG); }
    _fbDb = _fbApp.firestore();
    addLog('   ✅ Firebase 初始化成功');
  } catch(e){ addLog('   ❌ Firebase 初始化失敗：' + e.message); set('r6','err', log.join('\n')); return; }

  // 2. Auth
  addLog('2. 匿名登入...');
  try {
    var u = await firebase.auth().signInAnonymously();
    addLog('   ✅ 登入成功 UID=' + u.user.uid);
  } catch(e){ addLog('   ❌ 登入失敗：' + e.code); set('r6','err', log.join('\n')); return; }

  // 3. Firestore read
  addLog('3. 讀取 Firestore cases/' + caseId + '...');
  var row = null;
  try {
    var snap = await _fbDb.collection('cases').doc(caseId).get();
    if(snap.exists){
      row = snap.data();
      addLog('   ✅ Firestore 找到資料');
    } else {
      addLog('   ⚠️ Firestore 找不到此案件，改走 GAS 備援...');
    }
  } catch(e){
    addLog('   ❌ Firestore 錯誤：' + e.code + ' - ' + e.message);
    addLog('   → 改走 GAS 備援...');
  }

  // 4. 若 Firestore 無資料，走 GAS
  if(!row){
    addLog('4. 呼叫 GAS getCase...');
    row = await new Promise(function(resolve){
      var cbName = '_test_full_' + Date.now();
      var done = false;
      var timer = setTimeout(function(){ if(done)return; done=true; delete window[cbName]; resolve(null); }, 12000);
      window[cbName] = function(d){
        clearTimeout(timer); done=true; delete window[cbName];
        if(d && d.status==='ok' && d.row){ resolve(d.row); }
        else { addLog('   ❌ GAS 回傳：' + JSON.stringify(d)); resolve(null); }
      };
      var s = document.createElement('script');
      s.onerror = function(){ clearTimeout(timer); done=true; delete window[cbName]; resolve(null); };
      s.src = SCRIPT_URL + '?action=getCase&caseId=' + encodeURIComponent(caseId) + '&callback=' + cbName + '&_=' + Date.now();
      document.head.appendChild(s);
    });
    if(row){ addLog('   ✅ GAS 備援成功'); }
    else    { addLog('   ❌ GAS 備援也失敗'); }
  }

  // 5. 分析資料
  if(row){
    addLog('\n=== 資料分析 ===');
    var meta     = row.meta     || {};
    var purchase = row.purchase || {};
    var sales    = row.sales    || {};
    var transfer = row.transfer || {};
    addLog('案件名稱：' + (meta.caseName || row['案件名稱'] || '(空)'));
    addLog('案件屬性：' + (meta.caseType || row['案件屬性'] || '(空)'));
    addLog('業務：'     + (meta.staff    || row['業務名稱'] || '(空)'));
    addLog('補填狀態：' + (transfer.fillStatus || row['銷售補填狀態'] || '(空)'));
    addLog('採購供應商：' + (purchase.supplier || row['供應商（賣方）'] || '(空)'));
    addLog('銷售客戶：'  + (sales.customer    || row['客戶（買方）']   || '(空)'));
    addLog('\n✅ 流程可正常執行！若頁面還是失敗，問題在 processFillRow 之後的 UI 渲染');
    set('r6','ok', log.join('\n'));
    document.getElementById('raw-section').style.display='block';
    document.getElementById('raw-data').textContent = JSON.stringify(row, null, 2);
  } else {
    addLog('\n❌ 無法取得案件資料，兩條路都失敗');
    addLog('\n可能原因：');
    addLog('• 案件根本不在 Firebase（新系統），只存在舊 Google Sheets');
    addLog('• 案件編號打錯');
    addLog('• GAS 尚未部署新版本（script_v9）');
    set('r6','err', log.join('\n'));
  }
}

async function runAll(){
  testSDK();
  await new Promise(r=>setTimeout(r,300));
  await testAuth();
  await new Promise(r=>setTimeout(r,500));
  await testFirestore();
  await new Promise(r=>setTimeout(r,500));
  testGAS();
  await new Promise(r=>setTimeout(r,1000));
  testGASCase();
  await new Promise(r=>setTimeout(r,1000));
  await testFullFlow();
}

function clearAll(){
  ['r1','r2','r3','r4','r5','r6'].forEach(function(id){
    set(id,'info','尚未測試');
  });
  document.getElementById('raw-section').style.display='none';
}
</script>
</body>
</html>
