<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出庫計算機</title>

<style>
body{font-family:sans-serif;background:#f2f2f7;margin:0}
.header{background:#fff;padding:10px 15px;border-bottom:1px solid #ddd}
.badge{padding:5px 10px;border-radius:10px;background:#eee;margin-right:5px;font-size:12px}
.planned-row{display:flex;gap:10px;padding:8px 10px;border-bottom:1px solid #eee}
.remain-ok{color:green}
.remain-over{color:red}
</style>
</head>

<body>

<div class="header">
  <span class="badge" id="badge-container">貨櫃容量 —</span>
  <span class="badge" id="badge-weight">已選 0</span>
</div>

<div style="padding:10px">
  <div>
    貨櫃容量：
    <input type="number" oninput="saveContainerCapacity(this.value)">
  </div>
</div>

<div id="planned"></div>

<script>
let data = [
  {name:'鮭魚', qty:100, unit:'公斤'},
  {name:'鮪魚', qty:200, unit:'公斤'}
];

let checked = {};
let plannedQty = {};
let containerCapacity = localStorage.getItem('containerCapacity') || '';

updateContainerBadge();
render();

function saveContainerCapacity(val){
  containerCapacity = val;
  localStorage.setItem('containerCapacity', val);
  updateContainerBadge();
}

function updateContainerBadge(){
  const el = document.getElementById('badge-container');
  if(containerCapacity){
    el.textContent = '貨櫃容量 ' + containerCapacity;
  }else{
    el.textContent = '貨櫃容量 —';
  }
}

function render(){
  const el = document.getElementById('planned');
  el.innerHTML = '';

  data.forEach(item=>{
    if(!(item.name in checked)) checked[item.name] = 0;

    const planned = plannedQty[item.name] || '';
    const selected = checked[item.name];
    const remain = planned === '' ? '—' : planned - selected;

    const div = document.createElement('div');
    div.className = 'planned-row';

    div.innerHTML = `
      <div style="width:80px">${item.name}</div>
      <input type="number" value="${planned}" 
        oninput="setPlanned('${item.name}', this.value)">
      <button onclick="add('${item.name}', ${item.qty})">+選</button>
      <div class="${remain < 0 ? 'remain-over':'remain-ok'}">
        ${remain}
      </div>
    `;

    el.appendChild(div);
  });

  updateSummary();
}

function setPlanned(name, val){
  plannedQty[name] = val === '' ? '' : Number(val);
  updateSummary();
  render();
}

function add(name, qty){
  checked[name] += qty;
  updateSummary();
  render();
}

function updateSummary(){
  let total = 0;

  Object.keys(checked).forEach(k=>{
    total += checked[k];
  });

  document.getElementById('badge-weight').textContent = '已選 ' + total;
}
</script>

</body>
</html>
