<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增紀錄</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow:  #FFD54F;
      --yellow2: #FFECB3;
      --cream:   #FFF8E1;
      --brown:   #6D4C41;
      --brown2:  #8D6E63;
      --amber:   #FF8F00;
    }
    * { font-family: 'M PLUS Rounded 1c', 'Microsoft JhengHei', sans-serif; }
    body { background: var(--cream); padding-bottom: 76px; }

    .topbar {
      background: var(--yellow) url('pompompurin-bg.jpg') left center / auto 100% repeat-x;
      padding: .8rem 1rem;
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; gap: .5rem;
      box-shadow: 0 2px 8px rgba(109,76,65,.15);
    }
    .topbar h6 { margin: 0; color: var(--brown); font-weight: 800; font-size: 1.05rem; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 3px solid var(--yellow);
      display: flex; box-shadow: 0 -2px 12px rgba(109,76,65,.12);
    }
    .bottom-nav a {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 9px 0;
      color: var(--brown2); text-decoration: none;
      font-size: .6rem; font-weight: 700; gap: 2px;
    }
    .bottom-nav a i { font-size: 1.2rem; }
    .bottom-nav a.active { color: var(--amber); }

    .form-block {
      background: #fff;
      border-radius: 20px;
      padding: 1.1rem;
      margin-bottom: .8rem;
      box-shadow: 0 3px 10px rgba(109,76,65,.1);
      border-top: 4px solid var(--yellow);
    }
    .form-block h6 {
      font-size: .78rem; font-weight: 800;
      color: var(--brown2); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: .85rem;
    }
    .form-control, .form-select {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: .95rem; min-height: 46px;
      border-radius: 12px;
      border: 2px solid var(--yellow2);
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 .2rem rgba(255,213,79,.3);
    }
    .form-label { font-weight: 700; font-size: .88rem; color: var(--brown); }
    .btn-submit {
      background: var(--amber); border: none; color: #fff;
      border-radius: 16px; min-height: 52px;
      font-size: 1.05rem; font-weight: 800;
      box-shadow: 0 4px 12px rgba(255,143,0,.35);
      width: 100%;
    }
    .btn-submit:hover { background: #E65100; color: #fff; }
    .btn-submit:disabled { background: var(--brown2); }
    .alert { border-radius: 14px; font-weight: 700; }
    .cat-group { display: flex; flex-direction: column; gap: 2px; }
    .cat-item {
      display: flex; align-items: center; gap: .6rem;
      padding: .55rem .75rem; border-radius: 10px; cursor: pointer;
      font-weight: 600; font-size: .95rem; color: var(--brown);
      border: 2px solid transparent; transition: background .15s;
    }
    .cat-item:hover { background: var(--yellow2); }
    .cat-item input[type="checkbox"] {
      width: 20px; height: 20px; border-radius: 5px;
      border: 2px solid var(--brown2); cursor: pointer; flex-shrink: 0;
      accent-color: var(--amber);
    }
    .cat-other-input { margin-top: .35rem; border-radius: 10px; }
  </style>
</head>
<body>

<div class="topbar">
  <span style="font-size:1.5rem">🐶</span>
  <h6>新增入出庫紀錄</h6>
</div>

<div class="container-fluid px-3 pt-3" style="max-width:600px">

  <div id="msg" class="alert" style="display:none"></div>

  <form onsubmit="submitForm(event)">
    <div class="form-block">
      <h6>📋 基本資訊</h6>
      <div class="mb-3">
        <label class="form-label">日期</label>
        <input type="date" class="form-control" id="date" required>
      </div>
      <div class="mb-3">
        <label class="form-label">承辦人員</label>
        <input type="text" class="form-control" id="staff" placeholder="請輸入姓名" required>
      </div>
      <div>
        <label class="form-label">屬性</label>
        <select class="form-select" id="type" onchange="onTypeChange()" required>
          <option value="">請選擇</option>
          <option value="入庫">📦 入庫</option>
          <option value="出庫">🚚 出庫</option>
          <option value="借出">🤝 借出</option>
        </select>
      </div>
    </div>

    <div class="form-block">
      <h6>🏷️ 產品資訊</h6>
      <div class="mb-3" id="vendor-row">
        <label class="form-label">供應商</label>
        <input type="text" class="form-control" id="vendor" placeholder="供應商名稱">
      </div>
      <div class="mb-3">
        <label class="form-label">產品類別</label>
        <div class="cat-group" id="form-category">
          <label class="cat-item"><input type="checkbox" class="cat-cb" value="內包材"> 內包材</label>
          <label class="cat-item"><input type="checkbox" class="cat-cb" value="外包材"> 外包材</label>
          <label class="cat-item"><input type="checkbox" class="cat-cb" value="耗材"> 耗材</label>
          <label class="cat-item">
            <input type="checkbox" class="cat-cb" value="其他" onchange="toggleOtherInput('cat-other-text', this)"> 其他：
          </label>
          <input type="text" class="form-control cat-other-input" id="cat-other-text" placeholder="請輸入" style="display:none">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">產品名稱 <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="product" placeholder="請輸入產品名稱" required>
      </div>
      <div>
        <label class="form-label">規格</label>
        <input type="text" class="form-control" id="spec" placeholder="例：50cm×500m">
      </div>
    </div>

    <div class="form-block">
      <h6>🔢 數量資訊</h6>
      <div class="row g-2">
        <div class="col-8">
          <label class="form-label" id="qty-label">數量</label>
          <input type="number" class="form-control" id="qty" min="0" step="0.01" placeholder="0" required>
        </div>
        <div class="col-4">
          <label class="form-label">單位</label>
          <input type="text" class="form-control" id="unit" placeholder="個/箱">
        </div>
      </div>
      <div class="mt-2" id="location-row">
        <label class="form-label" id="location-label">存放位置</label>
        <input type="text" class="form-control" id="location" placeholder="請輸入存放位置">
      </div>
      <div class="mt-2" id="cost-row">
        <label class="form-label">成本 (NT$)</label>
        <input type="number" class="form-control" id="cost" min="0" placeholder="0">
      </div>
    </div>

    <div class="form-block">
      <h6>📝 備註</h6>
      <textarea class="form-control" id="notes" rows="2" placeholder="備註（選填）"></textarea>
    </div>

    <button type="submit" class="btn-submit mb-3" id="submit-btn">💾 儲存</button>
  </form>
</div>

<nav class="bottom-nav">
  <a href="otpompompurin-inventory.html"><i class="bi bi-boxes"></i>庫存</a>
  <a href="otpompompurin.html" class="active"><i class="bi bi-plus-circle-fill"></i>新增</a>
  <a href="otpompompurin-list.html"><i class="bi bi-journal-text"></i>紀錄</a>
  <a href="otpompompurin-stocktake.html"><i class="bi bi-clipboard-check"></i>盤點</a>
</nav>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';

document.getElementById('date').value = new Date().toISOString().slice(0,10);

function toggleOtherInput(inputId, cb) {
  document.getElementById(inputId).style.display = cb.checked ? '' : 'none';
}

// 收集勾選框的值（可多選，用「、」串接）
function getCategoryValue() {
  const cbs = document.querySelectorAll('#form-category .cat-cb:checked');
  return [...cbs].map(cb => {
    if (cb.value === '其他') {
      const txt = document.getElementById('cat-other-text').value.trim();
      return txt ? `其他：${txt}` : '其他';
    }
    return cb.value;
  }).join('、');
}

// 編輯時還原勾選狀態
function setCategoryValue(value) {
  document.querySelectorAll('#edit-category .cat-cb').forEach(cb => cb.checked = false);
  document.getElementById('e-cat-other-text').style.display = 'none';
  if (!value) return;
  value.split('、').forEach(p => {
    const cb = [...document.querySelectorAll('#edit-category .cat-cb')].find(c => p.startsWith(c.value));
    if (cb) {
      cb.checked = true;
      if (cb.value === '其他') {
        const el = document.getElementById('e-cat-other-text');
        el.style.display = '';
        el.value = p.replace(/^其他：?/, '');
      }
    }
  });
}

function onTypeChange() {
  const type = document.getElementById('type').value;
  // 數量標籤
  const qtyLabels = { '入庫': '入庫數量', '出庫': '出庫數量', '借出': '借出數量' };
  document.getElementById('qty-label').textContent = qtyLabels[type] || '數量';
  // 存放位置 / 領取單位 標籤（全部屬性都顯示，但標籤不同）
  const locLabels = { '入庫': '存放位置', '出庫': '領取單位', '借出': '領取單位' };
  document.getElementById('location-label').textContent = locLabels[type] || '存放位置/領取單位';
  const locInput = document.getElementById('location');
  locInput.placeholder = type === '入庫' ? '請輸入存放位置（例：包材室）' : '請輸入領取單位';
  // 供應商：只有入庫顯示
  document.getElementById('vendor-row').style.display = type === '入庫' ? '' : 'none';
  // 成本：只有入庫顯示
  document.getElementById('cost-row').style.display   = type === '入庫' ? '' : 'none';
}

async function submitForm(e) {
  e.preventDefault();
  const btn  = document.getElementById('submit-btn');
  const type = document.getElementById('type').value;
  const data = {
    date: document.getElementById('date').value,
    staff: document.getElementById('staff').value,
    type,
    vendor: document.getElementById('vendor').value,
    category: getCategoryValue(),
    product: document.getElementById('product').value,
    spec: document.getElementById('spec').value,
    inQty:  type === '入庫' ? document.getElementById('qty').value : 0,
    outQty: (type === '出庫' || type === '借出') ? document.getElementById('qty').value : 0,
    unit: document.getElementById('unit').value,
    location: document.getElementById('location').value,
    cost: document.getElementById('cost').value,
    notes: document.getElementById('notes').value,
  };
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(data) });
    showMsg('✅ 已成功儲存！', 'success');
    e.target.reset();
    document.getElementById('date').value = new Date().toISOString().slice(0,10);
    onTypeChange();
  } catch {
    showMsg('❌ 儲存失敗，請重試', 'danger');
  } finally {
    btn.disabled = false; btn.textContent = '💾 儲存';
  }
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.className = `alert alert-${type} mt-2`;
  m.textContent = text;
  m.style.display = 'block';
  setTimeout(() => m.style.display = 'none', 3000);
}
</script>
</body>
</html>
