<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>發票查詢工具 v5.1 - 貿易大漁</title>
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: #fdf6f0; padding: 1.5rem 1rem 3rem; color: #2d2020; font-size: 13px;
    }
    .wrap { max-width: 1200px; margin: 0 auto; }

    h1 { font-size: 1.15rem; font-weight: 700; color: #3a1f1f; text-align: center; margin-bottom: .2rem; }
    .subtitle { text-align: center; font-size: .72rem; color: #a07070; margin-bottom: 1.2rem; }

    /* ── 搜尋列 ── */
    .search-bar {
      display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
      background: #fff; border: 1.5px solid #f2a7c3; border-radius: 12px;
      padding: .75rem 1rem; box-shadow: 0 3px 12px rgba(242,167,195,.13); margin-bottom: 1.2rem;
    }
    .search-bar label { font-size: .76rem; font-weight: 600; color: #6b5b95; white-space: nowrap; }
    .search-bar input {
      padding: .42rem .72rem; border: 1.5px solid #e0d4f0; border-radius: 7px;
      font-size: .88rem; background: #fdf6ff; transition: border-color .2s;
    }
    .search-bar input:focus { outline: none; border-color: #c9a8e0; }
    #monthInput { width: 88px; }
    #invInput   { flex: 1; min-width: 180px; }
    .btn { padding: .42rem .95rem; border: none; border-radius: 7px; font-size: .81rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-ghost   { background: #f5f0ff; color: #6b5b95; }
    .btn-primary { background: linear-gradient(135deg, #f2a7c3, #e8836a); color: #fff; box-shadow: 0 2px 8px rgba(232,131,106,.22); }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-secondary { background: #fff; color: #6b5b95; border: 1.5px solid #c9a8e0; }
    .status { font-size: .7rem; color: #b09090; margin-left: auto; white-space: nowrap; }
    .sbadge { background: #f7d96b; color: #7a4a00; padding: .12rem .45rem; border-radius: 4px; font-size: .66rem; font-weight: 700; margin-left: .25rem; }
    .sbadge.ok { background: #c8e6c9; color: #1b5e20; }

    /* ── 上傳區域 ── */
    .file-input { display: none; }
    .file-label { display: inline-block; }

    /* ── 發票標題列 ── */
    .inv-title {
      display: flex; align-items: center; gap: .55rem;
      padding: .4rem .1rem; border-bottom: 2px solid #f2a7c3;
      margin-bottom: .3rem; margin-top: 1.2rem;
    }
    .inv-title:first-child { margin-top: 0; }
    .inv-no   { font-size: .92rem; font-weight: 700; color: #3a1f1f; }
    .inv-meta { font-size: .7rem; color: #a07070; }
    .inv-count { font-size: .65rem; font-weight: 700;
      background: linear-gradient(135deg, #f2a7c3, #e8836a); color: #fff;
      border-radius: 20px; padding: .15rem .55rem; margin-left: auto; }

    /* ── 表格 ── */
    table { width: 100%; border-collapse: collapse; background: #fff;
      border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(107,91,149,.07); }

    thead th {
      background: linear-gradient(135deg, rgba(242,167,195,.12), rgba(126,200,227,.12));
      padding: .48rem .65rem; text-align: left; font-size: .7rem; font-weight: 700;
      color: #6b5b95; white-space: nowrap; position: sticky; top: 0;
    }
    tbody tr { border-bottom: 1px solid #f3eeff; transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fdf8ff; }
    tbody td { padding: .52rem .65rem; vertical-align: middle; }

    tfoot td {
      background: linear-gradient(135deg, rgba(242,167,195,.08), rgba(126,200,227,.08));
      font-weight: 700; font-size: .8rem; padding: .48rem .65rem;
      color: #3a1f1f; border-top: 2px solid #e8d0f8;
    }

    /* ── 欄位樣式 ── */
    .ref-no  { font-family: 'Courier New', monospace; font-size: .78rem; letter-spacing: .02em; }
    .qty-neg { color: #e8836a; font-weight: 700; }
    .supplier { color: #4a7a6a; font-size: .78rem; }
    .batch    { color: #6b5b95; font-weight: 600; font-size: .78rem; font-family: monospace; }
    .src-ref  { color: #5a7aaa; font-size: .76rem; font-family: monospace; }
    .none-val { color: #ccc; font-size: .72rem; }

    .no-result { text-align: center; padding: 2.5rem; color: #c0a0a0;
      background: #fff; border-radius: 12px; border: 1px dashed #e8d0d0; }

    .message { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .8rem; }
    .message.success { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #81c784; }
    .message.error { background: #ffebee; color: #c62828; border-left: 3px solid #ef5350; }
    .message.info { background: #e3f2fd; color: #1565c0; border-left: 3px solid #64b5f6; }

    .progress { width: 100%; height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; margin-bottom: 1rem; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #f2a7c3, #e8836a); width: 0%; transition: width .3s; }

    .toolbar { margin-bottom: 1.2rem; display: flex; gap: .5rem; flex-wrap: wrap; }
    .toolbar button { font-size: .75rem; padding: .3rem .6rem; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>🐟 發票查詢工具 v5.1</h1>
  <p class="subtitle">銷售發票 + 進項來源 / 供應商 / 批號 | Excel 轉換 + 本機快取</p>

  <!-- 主搜尋列 -->
  <div class="search-bar">
    <label>月份</label>
    <input type="text" id="monthInput" value="202604" maxlength="6" placeholder="YYYYMM">
    <button class="btn btn-ghost" onclick="loadMonth()">載入</button>

    <label style="margin-left:.4rem">發票號碼</label>
    <input type="text" id="invInput" placeholder="例：ZF08444613" autocomplete="off">
    <button class="btn btn-primary" onclick="search()">查詢</button>

    <div class="status">
      月份：<span class="sbadge" id="statusBadge">202604 (樣本)</span>
    </div>
  </div>

  <!-- 上傳 Excel 區 -->
  <div style="margin-bottom: 1.2rem;">
    <div style="display: flex; gap: .5rem; align-items: center; flex-wrap: wrap;">
      <label class="btn btn-secondary file-label">
        📁 上傳 Excel
        <input type="file" id="excelFile" accept=".xlsx,.xlsm" class="file-input" onchange="handleExcelUpload(event)">
      </label>
      <span id="uploadStatus" style="font-size: .75rem; color: #999;"></span>
    </div>
  </div>

  <!-- 進度和訊息 -->
  <div id="messages"></div>
  <div id="progressArea" style="display: none;">
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- 結果區 -->
  <div id="results"></div>

  <!-- 工具列 -->
  <div id="toolbarArea" class="toolbar" style="display: none;">
    <button class="btn btn-secondary" onclick="downloadJSON()">⬇️ 下載 JSON</button>
    <button class="btn btn-secondary" onclick="copyJSON()">📋 複製</button>
    <button class="btn btn-secondary" onclick="clearAllData()">🗑️ 清除資料</button>
  </div>
</div>

<script>
let MONTH = '202604';
let INDEX = {};

const SAMPLE = {
  "ZF08444613": {
    "invoice_no": "ZF08444613",
    "details": [
      {
        "sale_type":"銷售發票","date":"2026/04/10","product":"冷凍黃鰭鮪碎肉",
        "qty":-2000,"unit":"KG","price":86,"total_price":-172000,"notes":"菄海115/03",
        "source":{"type":"進項發票","ref_no":"QX38261603","supplier":"環宇水產有限公司","batch":null}
      },
      {
        "sale_type":"銷售發票","date":"2026/04/10","product":"冷凍黃鰭鮪碎肉",
        "qty":-1000,"unit":"KG","price":86,"total_price":-86000,"notes":"菄海115/03",
        "source":{"type":"進口報單","ref_no":"BD 14 036 F0224","supplier":null,"batch":"20251117-001"}
      },
      {
        "sale_type":"銷售發票","date":"2026/04/10","product":"冷凍黃鰭鮪碎肉",
        "qty":-1200,"unit":"KG","price":86,"total_price":-103200,"notes":"菄海115/03",
        "source":{"type":"進口報單","ref_no":"BD 15 036 F0050","supplier":null,"batch":"20260309-001"}
      }
    ]
  }
};

window.addEventListener('load', () => {
  loadFromCache();
  if (Object.keys(INDEX).length === 0) {
    INDEX = JSON.parse(JSON.stringify(SAMPLE));
  }
  updateStatusBadge();
  if (Object.keys(INDEX).length > 0) {
    document.getElementById('toolbarArea').style.display = 'flex';
  }
});

function saveToCache() {
  const key = `invoice_v51_${MONTH}`;
  localStorage.setItem(key, JSON.stringify(INDEX));
}

function loadFromCache() {
  const key = `invoice_v51_${MONTH}`;
  const cached = localStorage.getItem(key);
  if (cached) {
    try {
      INDEX = JSON.parse(cached);
    } catch (e) {
      console.error('快取解析失敗:', e);
    }
  }
}

function updateStatusBadge() {
  const count = Object.keys(INDEX).length;
  const isSample = count === 1 && INDEX['ZF08444613'];
  const isCached = localStorage.getItem(`invoice_v51_${MONTH}`);
  
  let text = `${MONTH} `;
  if (isSample) {
    text += '(樣本)';
  } else if (isCached) {
    text += `✓ ${count} 筆`;
  } else {
    text += `${count} 筆`;
  }
  
  const badge = document.getElementById('statusBadge');
  badge.textContent = text;
  if (isCached && !isSample) {
    badge.classList.add('ok');
  } else {
    badge.classList.remove('ok');
  }
}

async function loadMonth() {
  const m = document.getElementById('monthInput').value.trim();
  if (!/^\d{6}$/.test(m)) { 
    showMessage('格式錯誤，請輸入 YYYYMM', 'error');
    return; 
  }
  
  MONTH = m;
  document.getElementById('statusBadge').textContent = '載入中…';
  
  try {
    const r = await fetch(`invoice_index_v5_${m}.json`);
    if (!r.ok) throw new Error('檔案不存在');
    INDEX = await r.json();
    saveToCache();
    showMessage(`✓ 已載入月份 ${m}，共 ${Object.keys(INDEX).length} 筆發票`, 'success');
  } catch (err) {
    INDEX = JSON.parse(JSON.stringify(SAMPLE));
    showMessage(`未找到 ${m} 的資料，已載入樣本`, 'info');
  }
  
  updateStatusBadge();
  document.getElementById('results').innerHTML = '';
  document.getElementById('toolbarArea').style.display = 'flex';
}

function handleExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (typeof XLSX === 'undefined') {
    showMessage('❌ SheetJS 庫尚未載入，請稍候…', 'error');
    return;
  }

  document.getElementById('uploadStatus').textContent = '處理中…';
  document.getElementById('progressArea').style.display = 'block';
  setProgress(0);

  const reader = new FileReader();
  reader.onerror = () => {
    showMessage('檔案讀取錯誤', 'error');
    document.getElementById('uploadStatus').textContent = '❌ 讀取失敗';
    document.getElementById('progressArea').style.display = 'none';
  };
  
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      
      setProgress(30);
      convertExcelToJSON(workbook);
      setProgress(100);
      
      const count = Object.keys(INDEX).length;
      if (count === 0) {
        showMessage('❌ 檔案中找不到銷項發票資料', 'error');
        document.getElementById('uploadStatus').textContent = '❌ 無有效資料';
      } else {
        setTimeout(() => {
          showMessage(`✓ Excel 轉換成功！共 ${count} 筆發票`, 'success');
          document.getElementById('uploadStatus').textContent = `✓ ${file.name}`;
          saveToCache();
          updateStatusBadge();
          document.getElementById('progressArea').style.display = 'none';
          document.getElementById('toolbarArea').style.display = 'flex';
        }, 500);
      }
    } catch (err) {
      console.error('轉換錯誤:', err);
      showMessage('檔案處理失敗: ' + err.message, 'error');
      document.getElementById('uploadStatus').textContent = '❌ 處理失敗';
      document.getElementById('progressArea').style.display = 'none';
    }
  };
  reader.readAsArrayBuffer(file);
}

function convertExcelToJSON(workbook) {
  INDEX = {};
  const sheetNames = workbook.SheetNames;

  sheetNames.forEach((sheetName) => {
    if (sheetName.includes('NEW') || sheetName === '返回目錄') return;

    try {
      const ws = workbook.Sheets[sheetName];
      if (!ws) return;
      
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      let headerRow = -1;
      for (let i = 0; i < Math.min(10, rows.length); i++) {
        const firstCell = rows[i] && rows[i][0];
        if (firstCell && String(firstCell).includes('來源')) {
          headerRow = i;
          break;
        }
      }
      if (headerRow === -1) return;

      for (let i = headerRow + 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || !row[0]) continue;

        const source_type = String(row[0] || '').trim();
        const unit_no = row[1];
        const invoice_no = row[2];
        const customer = row[3];
        const product = row[4];
        const qty = parseFloat(row[5]) || 0;
        const unit = (String(row[6] || 'KG').replace(/\s+/g, '').trim()) || 'KG';
        const price = parseFloat(row[7]) || 0;
        const total_price = parseFloat(row[8]) || 0;
        const notes = (row[14] || '').toString().trim();

        if (!source_type.includes('銷項')) continue;
        if (!invoice_no && !customer) continue;

        const inv_key = String(invoice_no || customer).trim();
        if (!inv_key) continue;

        if (!INDEX[inv_key]) {
          INDEX[inv_key] = { invoice_no: inv_key, details: [] };
        }

        INDEX[inv_key].details.push({
          sale_type: '銷售發票',
          date: formatDate(unit_no),
          invoice_no: inv_key,
          product: (product || '未知').toString().trim(),
          qty: qty,
          unit: unit,
          price: price,
          total_price: total_price,
          notes: notes || (customer || '').toString().trim(),
          source: null
        });
      }
    } catch (err) {
      console.error(`Sheet ${sheetName} 處理失敗:`, err);
    }
  });
}

function formatDate(val) {
  if (!val) return '';
  const str = String(val);
  if (str.includes('/')) return str;
  if (!isNaN(val)) {
    try {
      const date = new Date((val - 25569) * 86400 * 1000);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}/${m}/${d}`;
    } catch (e) {
      return '';
    }
  }
  return '';
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}

function showMessage(msg, type = 'info') {
  const msgDiv = document.getElementById('messages');
  const html = `<div class="message ${type}">${msg}</div>`;
  msgDiv.innerHTML = html;
  setTimeout(() => { msgDiv.innerHTML = ''; }, 5000);
}

function search() {
  const q = document.getElementById('invInput').value.trim().toUpperCase();
  const out = document.getElementById('results');
  if (!INDEX || !q) { out.innerHTML = ''; return; }

  const hits = Object.values(INDEX).filter(v => v.invoice_no.toUpperCase().includes(q));
  out.innerHTML = hits.length
    ? hits.map(renderInvoice).join('')
    : `<div class="no-result">找不到「${q}」<br><small>確認月份或嘗試部分號碼</small></div>`;
}

function renderInvoice(inv) {
  const d = inv.details || [];
  const totalQty = d.reduce((s, r) => s + (r.qty || 0), 0);
  const totalAmt = d.reduce((s, r) => s + (r.total_price || 0), 0);
  const unit = d[0]?.unit || 'KG';

  const rows = d.map(r => {
    const src = r.source || {};
    return `<tr>
      <td class="ref-no">${inv.invoice_no}</td>
      <td>${r.date || '—'}</td>
      <td>${r.product || '—'}</td>
      <td class="qty-neg">${fmt(r.qty)} ${r.unit || ''}</td>
      <td>${r.price != null ? 'NT$' + r.price : '—'}</td>
      <td>${r.notes || '—'}</td>
      <td class="src-ref">${dash(src.ref_no)}</td>
      <td class="supplier">${dash(src.supplier)}</td>
      <td class="batch">${dash(src.batch)}</td>
    </tr>`;
  }).join('');

  return `
    <div class="inv-title">
      <span class="inv-no">發票 ${inv.invoice_no}</span>
      <span class="inv-meta">${d[0]?.date || ''} · ${d[0]?.sale_type || ''}</span>
      <span class="inv-count">${d.length} 筆</span>
    </div>
    <table>
      <thead><tr>
        <th>銷售發票</th>
        <th>日期</th>
        <th>品名</th>
        <th>數量</th>
        <th>單價</th>
        <th>備註</th>
        <th>進項來源</th>
        <th>供應商</th>
        <th>批號</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="3">合計</td>
        <td class="qty-neg">${fmt(totalQty)} ${unit}</td>
        <td>—</td>
        <td>NT$ ${fmt(totalAmt)}</td>
        <td colspan="3"></td>
      </tr></tfoot>
    </table>`;
}

function fmt(n) { return n != null ? Number(n).toLocaleString() : ''; }
function dash(v) { return v ? v : '<span class="none-val">—</span>'; }

function downloadJSON() {
  const json = JSON.stringify(INDEX, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `invoice_index_v5_${MONTH}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showMessage('✓ JSON 已下載', 'success');
}

function copyJSON() {
  const json = JSON.stringify(INDEX, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    showMessage('✓ JSON 已複製到剪貼簿', 'success');
  }).catch(() => {
    showMessage('複製失敗', 'error');
  });
}

function clearAllData() {
  if (confirm('確定要清除此月份的所有資料嗎？')) {
    INDEX = {};
    localStorage.removeItem(`invoice_v51_${MONTH}`);
    document.getElementById('results').innerHTML = '';
    document.getElementById('messages').innerHTML = '';
    document.getElementById('uploadStatus').textContent = '';
    document.getElementById('invInput').value = '';
    updateStatusBadge();
    showMessage('✓ 資料已清除', 'success');
    document.getElementById('toolbarArea').style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('invInput').addEventListener('keydown', e => { 
    if (e.key === 'Enter') search(); 
  });
  document.getElementById('monthInput').addEventListener('keydown', e => { 
    if (e.key === 'Enter') loadMonth(); 
  });
});
</script>
</body>
</html>
