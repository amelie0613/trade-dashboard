<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>📦 品項合併確認</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #202124; background: #f8f9fa; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #dadce0; padding: 14px 24px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 17px; font-weight: 600; }
    .progress-label { margin-left: auto; font-size: 13px; color: #5f6368; }
    .progress-wrap { height: 4px; background: #e8eaed; }
    .progress-bar  { height: 100%; background: #1a73e8; transition: width .3s; }
    main { max-width: 800px; margin: 24px auto; padding: 0 16px 40px; }
    .card { background: #fff; border-radius: 10px; border: 1px solid #dadce0; padding: 20px; margin-bottom: 20px; }
    .card-title { font-weight: 600; font-size: 15px; margin-bottom: 14px; color: #1a73e8; }
    table  { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
    th, td { border: 1px solid #dadce0; padding: 8px 10px; text-align: left; }
    th     { background: #f1f3f4; font-weight: 600; font-size: 13px; }
    td     { font-size: 13px; }
    td.num { text-align: right; }
    .radio-group { display: flex; gap: 20px; margin-bottom: 14px; }
    .radio-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .field-label { font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #3c4043; }
    select, input[type=text] { width: 100%; padding: 8px 10px; border: 1px solid #dadce0; border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
    .custom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .qty-preview { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 12px 0; }
    .qty-box { background: #e8f0fe; border-radius: 6px; padding: 10px; text-align: center; }
    .qty-box .val { font-size: 18px; font-weight: 700; color: #1a56db; }
    .qty-box .lbl { font-size: 11px; color: #5f6368; margin-top: 2px; }
    .nav { display: flex; gap: 10px; margin-top: 4px; }
    .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn-primary   { background: #1a73e8; color: #fff; }
    .btn-secondary { background: #f1f3f4; color: #202124; }
    .btn-success   { background: #1e8e3e; color: #fff; }
    .summary-merge { background: #d4edda; border-radius: 6px; padding: 10px 12px; margin: 6px 0; font-size: 13px; }
    .summary-keep  { background: #e2e3e5; border-radius: 6px; padding: 10px 12px; margin: 6px 0; font-size: 13px; }
    .stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 16px; }
    .stat-box { background: #f1f3f4; border-radius: 8px; padding: 14px; text-align: center; }
    .stat-box .val { font-size: 24px; font-weight: 700; }
    .stat-box .lbl { font-size: 12px; color: #5f6368; margin-top: 2px; }
    .loading { text-align: center; padding: 60px 0; color: #5f6368; font-size: 16px; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e8eaed; border-top-color: #1a73e8; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .group-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .group-chip { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 2px solid transparent; background: #f1f3f4; color: #3c4043; }
    .group-chip.active     { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
    .group-chip.done-merge { background: #d4edda; color: #1e8e3e; }
    .group-chip.done-keep  { background: #e2e3e5; color: #5f6368; }
    #status { margin-top: 10px; font-size: 13px; }
  </style>
</head>
<body>
<header>
  <span style="font-size:22px">📦</span>
  <h1>品項合併確認</h1>
  <span class="progress-label" id="prog-label"></span>
</header>
<div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
<main><div id="root"><div class="loading"><span class="spinner"></span>分析品項相似度中，請稍候…</div></div></main>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';
var groups=[], decisions={}, page=0;

fetch(SCRIPT_URL+'?action=groups')
  .then(function(r){return r.json();})
  .then(function(d){
    if(!Array.isArray(d)||(d.length>0&&!Array.isArray(d[0]))){
      throw new Error('Apps Script 尚未更新，請將最新版 apps-script.gs 貼入 GAS 並重新部署，再重整此頁。');
    }
    groups=d;render();
  })
  .catch(function(e){
    document.getElementById('root').innerHTML='<div class="card"><p style="color:#c5221f;font-weight:600;margin-bottom:8px">❌ 載入失敗：'+e.message+'</p>'
      +'<p style="font-size:12px;color:#5f6368">操作步驟：Google Apps Script → 部署 → 管理部署項目 → 編輯 → 新版本 → 部署</p></div>';
  });

function render(){
  var N=groups.length, done=Object.keys(decisions).length;
  document.getElementById('prog-label').textContent=done+' / '+N+' 已確認';
  document.getElementById('prog-bar').style.width=(N?done/N*100:100)+'%';
  if(!N){document.getElementById('root').innerHTML='<div class="card" style="text-align:center;padding:40px;color:#1e8e3e">✅ 未發現寫法不一致的品項！</div>';return;}
  if(page>=N){renderSummary(N);return;}
  renderGroup(page,N);
}

function renderGroup(p,N){
  var g=groups[p], prev=decisions[p]||{}, isStd=prev.action!=='skip';

  // 群組導覽 chip
  var chips=groups.map(function(_,i){
    var d=decisions[i], cl=!d?'':(d.action==='standardize'?' done-merge':' done-keep');
    var lbl=!d?(i===p?'▶ 組'+(i+1):'組'+(i+1)):(d.action==='standardize'?'✓':'–')+' 組'+(i+1);
    return '<span class="group-chip'+(i===p?' active':'')+cl+'" onclick="jumpTo('+i+')">'+lbl+'</span>';
  }).join('');

  // 收集此群組所有單位
  var allUnits=[];
  g.forEach(function(r){(r.units||[]).forEach(function(u){if(allUnits.indexOf(u)<0)allUnits.push(u);});});

  // 資料表
  var rows=g.map(function(r){
    return '<tr>'
      +'<td style="font-size:12px;color:#5f6368">'+r.rowIndices.length+'筆</td>'
      +'<td>'+esc(r.name)+'</td>'
      +'<td>'+esc(r.spec)+'</td>'
      +'<td>'+esc((r.units||[]).join('、'))+'</td>'
      +'<td class="num">'+r.inQty.toLocaleString()+'</td>'
      +'<td class="num">'+r.outQty.toLocaleString()+'</td>'
      +'<td class="num">'+r.stock.toLocaleString()+'</td>'
    +'</tr>';
  }).join('');

  // 「以此列為準」下拉選單
  var opts=g.map(function(r,i){
    return '<option value="'+i+'">'+esc(r.name)+' ／ '+esc(r.spec||'（無規格）')+' ／ '+esc((r.units||[]).join('、')||'（無單位）')+'</option>';
  }).join('');

  // 單位下拉選單
  var unitOpts='<option value="">— 不變更單位 —</option>'
    +allUnits.map(function(u){return '<option value="'+esc(u)+'">'+esc(u)+'</option>';}).join('');

  // 還原上次決定
  var prevMaster = prev.masterIdx !== undefined ? prev.masterIdx : 0;
  var prevName   = prev.finalName  || g[0].name;
  var prevSpec   = prev.finalSpec  || g[0].spec;
  var prevUnit   = prev.finalUnit  || '';

  document.getElementById('root').innerHTML=
    '<div class="group-list">'+chips+'</div>'
    +'<div class="card"><div class="card-title">第 '+(p+1)+' 組 / 共 '+N+' 組 — 寫法不一致</div>'
    +'<table><tr><th>筆數</th><th>產品名稱</th><th>規格</th><th>單位</th><th>進貨量</th><th>出貨量</th><th>在庫量</th></tr>'+rows+'</table>'
    +'<div class="radio-group">'
      +'<label><input type="radio" name="act" value="standardize"'+(isStd?' checked':'')+'>統一寫法（套用至所有相關紀錄）</label>'
      +'<label><input type="radio" name="act" value="skip"'+(!isStd?' checked':'')+'>略過（確認為不同品項）</label>'
    +'</div>'
    +'<div id="std-opts">'
      +'<div class="field-label">以此列的寫法為準（可手動修改）</div>'
      +'<select id="master-sel">'+opts+'</select>'
      +'<div class="custom-row" style="margin-top:10px">'
        +'<div><div class="field-label">統一品名</div><input type="text" id="cname" value="'+esc(prevName)+'"></div>'
        +'<div><div class="field-label">統一規格</div><input type="text" id="cspec" value="'+esc(prevSpec)+'"></div>'
      +'</div>'
      +'<div style="margin-top:8px"><div class="field-label">統一單位</div>'
        +'<select id="cunit" style="width:100%;padding:8px 10px;border:1px solid #dadce0;border-radius:6px;font-size:13px">'+unitOpts+'</select>'
      +'</div>'
    +'</div>'
    +'<div class="nav" style="margin-top:14px">'
      +'<button class="btn btn-secondary" onclick="goBack()"'+(p===0?' disabled':'')+'>← 上一組</button>'
      +'<button class="btn btn-primary" onclick="confirm_()">'+(p===N-1?'完成確認 ✓':'確認 → 下一組')+'</button>'
    +'</div></div>';

  document.getElementById('master-sel').value=prevMaster;
  document.getElementById('cunit').value=prevUnit;
  document.querySelectorAll('input[name=act]').forEach(function(r){r.addEventListener('change',updateStdOpts);});
  document.getElementById('master-sel').addEventListener('change',syncMaster);
  updateStdOpts();
}

function syncMaster(){
  var g=groups[page], idx=parseInt(document.getElementById('master-sel').value)||0;
  document.getElementById('cname').value=g[idx].name;
  document.getElementById('cspec').value=g[idx].spec||'';
  var u=document.getElementById('cunit');
  if(g[idx].units&&g[idx].units[0]) u.value=g[idx].units[0]; else u.value='';
}
function updateStdOpts(){
  var on=document.querySelector('input[name=act]:checked').value==='standardize';
  document.getElementById('std-opts').style.display=on?'block':'none';
}
function confirm_(){
  var N=groups.length, g=groups[page], action=document.querySelector('input[name=act]:checked').value;
  if(action==='standardize'){
    var midx=parseInt(document.getElementById('master-sel').value)||0;
    decisions[page]={
      action:'standardize',
      masterIdx:midx,
      finalName:document.getElementById('cname').value.trim(),
      finalSpec:document.getElementById('cspec').value.trim(),
      finalUnit:document.getElementById('cunit').value,
      groups:g.map(function(r){return {name:r.name,spec:r.spec,units:r.units||[],rowIndices:r.rowIndices};})
    };
  }else{decisions[page]={action:'skip'};}
  page=(page>=N-1)?N:page+1;render();
}
function goBack(){if(page>0){page--;render();}}
function jumpTo(i){page=i;render();}

function renderSummary(N){
  var stds=[],skips=[];
  Object.keys(decisions).forEach(function(k){
    var d=decisions[k];
    if(d.action==='standardize') stds.push({idx:+k,d:d}); else skips.push({idx:+k,d:d});
  });
  document.getElementById('root').innerHTML=
    '<div class="card"><div class="card-title">✅ 確認完成 — 變更摘要</div>'
    +'<div class="stat-row">'+stat(N,'群組總數','#202124')+stat(stds.length,'統一寫法','#1e8e3e')+stat(skips.length,'略過','#5f6368')+'</div>'
    +(stds.length?'<p style="font-weight:600;margin-bottom:6px">統一寫法項目</p>'+stds.map(function(m){
      var unitHint=m.d.finalUnit?' ／ <strong>'+esc(m.d.finalUnit)+'</strong>':'';
      return '<div class="summary-merge">組'+(m.idx+1)+'　'
        +groups[m.idx].map(function(r){return '「'+esc(r.name)+'」';}).join(' ＋ ')
        +'　→　<strong>'+esc(m.d.finalName)+' / '+esc(m.d.finalSpec)+'</strong>'+unitHint+'</div>';
    }).join(''):'')
    +(skips.length?'<p style="font-weight:600;margin:10px 0 6px">略過</p>'+skips.map(function(k){
      return '<div class="summary-keep">組'+(k.idx+1)+'　'+groups[k.idx].map(function(r){return '「'+esc(r.name)+'」';}).join('、')+'</div>';
    }).join(''):'')
    +'<div class="nav" style="margin-top:16px">'
      +'<button class="btn btn-secondary" onclick="page=groups.length-1;render()">← 返回修改</button>'
      +'<button class="btn btn-success" id="apply-btn" onclick="applyAll()">套用至試算表</button>'
    +'</div><div id="status"></div></div>';
}
function stat(v,l,c){return '<div class="stat-box"><div class="val" style="color:'+c+'">'+v+'</div><div class="lbl">'+l+'</div></div>';}
function applyAll(){
  var list=Object.values(decisions).filter(function(d){return d.action==='standardize';});
  if(!list.length){document.getElementById('status').innerHTML='<span style="color:#e37400">⚠️ 沒有選擇統一寫法的項目。</span>';return;}
  document.getElementById('apply-btn').disabled=true;
  document.getElementById('status').innerHTML='<span class="spinner"></span> 套用中，請勿關閉頁面…';
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'applyDecisions',decisions:list})})
    .then(function(r){return r.json();})
    .then(function(res){document.getElementById('status').innerHTML='<span style="color:#1e8e3e">✅ 完成！已統一 '+list.length+' 組，更新 '+res.updated+' 筆記錄的品名／規格／單位。在庫統計將自動重算。</span>';})
    .catch(function(e){document.getElementById('apply-btn').disabled=false;document.getElementById('status').innerHTML='<span style="color:#c5221f">❌ 錯誤：'+e.message+'</span>';});
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
