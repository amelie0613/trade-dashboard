<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出入庫紀錄</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow:  #FFD54F;
      --yellow2: #FFECB3;
      --cream:   #FFF8E1;
      --brown:   #6D4C41;
      --brown2:  #8D6E63;
      --amber:   #FF8F00;
    }
    * { font-family: 'M PLUS Rounded 1c', 'Microsoft JhengHei', sans-serif; }
    body { background: var(--cream); padding-bottom: 76px; }

    .topbar {
      background: var(--yellow) url('pompompurin-bg.jpg') left center / auto 100% repeat-x;
      padding: .8rem 1rem;
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(109,76,65,.15);
    }
    .topbar h6 { margin: 0; color: var(--brown); font-weight: 800; font-size: 1.05rem; }
    .btn-icon {
      background: rgba(109,76,65,.15); border: none;
      border-radius: 10px; padding: .3rem .6rem;
      color: var(--brown); font-size: 1rem; cursor: pointer;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 3px solid var(--yellow);
      display: flex; box-shadow: 0 -2px 12px rgba(109,76,65,.12);
    }
    .bottom-nav a {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 9px 0;
      color: var(--brown2); text-decoration: none;
      font-size: .6rem; font-weight: 700; gap: 2px;
    }
    .bottom-nav a i { font-size: 1.2rem; }
    .bottom-nav a.active { color: var(--amber); }

    .stat-card {
      background: #fff; border-radius: 16px; padding: .85rem .5rem;
      text-align: center; box-shadow: 0 3px 10px rgba(109,76,65,.1);
      border-bottom: 4px solid var(--yellow);
    }
    .stat-card .num { font-size: 1.35rem; font-weight: 800; }
    .stat-card .lbl { font-size: .68rem; color: var(--brown2); font-weight: 700; margin-top: 2px; }

    .search-bar {
      background: #fff; border-radius: 16px; padding: .75rem;
      margin-bottom: .75rem; box-shadow: 0 2px 8px rgba(109,76,65,.08);
    }
    .form-control, .form-select {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      border-radius: 10px; border: 2px solid var(--yellow2); font-size: .88rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--yellow); box-shadow: 0 0 0 .2rem rgba(255,213,79,.3);
    }

    .rec-card {
      background: #fff; border-radius: 14px; padding: .85rem 1rem;
      margin-bottom: .5rem; box-shadow: 0 2px 8px rgba(109,76,65,.08);
      cursor: pointer; transition: transform .1s, box-shadow .1s;
      border-left: 5px solid var(--yellow);
    }
    .rec-card.in     { border-left-color: #2E7D32; }
    .rec-card.out    { border-left-color: #E65100; }
    .rec-card.borrow { border-left-color: #1565C0; }
    .rec-card:active { transform: scale(.98); box-shadow: 0 1px 4px rgba(109,76,65,.12); }
    .rec-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
    .rec-name { font-weight: 800; font-size: .95rem; color: var(--brown); }
    .rec-spec { font-size: .75rem; color: var(--brown2); margin-top: 1px; }
    .rec-meta { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .4rem; align-items: center; }
    .rec-tag {
      font-size: .7rem; font-weight: 700; border-radius: 8px;
      padding: .2em .55em; background: var(--yellow2); color: var(--brown);
    }
    .badge-in     { background: #E8F5E9; color: #2E7D32; }
    .badge-out    { background: #FBE9E7; color: #BF360C; }
    .badge-borrow { background: #E3F2FD; color: #1565C0; }
    .rec-qty { font-weight: 800; font-size: 1rem; }
    .qty-in     { color: #2E7D32; }
    .qty-out    { color: #E65100; }
    .qty-borrow { color: #1565C0; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="d-flex align-items-center gap-2">
    <span style="font-size:1.5rem">🐶</span>
    <h6>出入庫紀錄</h6>
  </div>
  <button class="btn-icon" onclick="loadRecords()"><i class="bi bi-arrow-clockwise"></i></button>
</div>

<div class="container-fluid px-3 pt-3">

  <div class="row g-2 mb-3">
    <div class="col-4">
      <div class="stat-card">
        <div class="num text-primary" id="stat-total">-</div>
        <div class="lbl">總筆數</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card">
        <div class="num" style="color:#2E7D32" id="stat-in">-</div>
        <div class="lbl">入庫量</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card">
        <div class="num" style="color:#E65100" id="stat-out">-</div>
        <div class="lbl">出庫量</div>
      </div>
    </div>
  </div>

  <div class="search-bar">
    <div class="row g-2">
      <div class="col-8">
        <input type="search" class="form-control" id="search"
          placeholder="🔍 搜尋產品、承辦人…" oninput="filterRecords()">
      </div>
      <div class="col-4">
        <select class="form-select" id="filter-type" onchange="filterRecords()">
          <option value="">全部</option>
          <option value="入庫">入庫</option>
          <option value="出庫">出庫</option>
          <option value="借出">借出</option>
        </select>
      </div>
    </div>
  </div>

  <div id="rec-list">
    <div class="text-center py-5" style="color:var(--brown2)">🐾 載入中…</div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="otpompompurin-inventory.html"><i class="bi bi-boxes"></i>庫存</a>
  <a href="otpompompurin.html"><i class="bi bi-plus-circle-fill"></i>新增</a>
  <a href="otpompompurin-list.html" class="active"><i class="bi bi-journal-text"></i>紀錄</a>
  <a href="otpompompurin-stocktake.html"><i class="bi bi-clipboard-check"></i>盤點</a>
</nav>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';
let allRows = [];

window.addEventListener('DOMContentLoaded', loadRecords);

async function loadRecords() {
  document.getElementById('rec-list').innerHTML =
    '<div class="text-center py-5" style="color:#8D6E63">🐾 載入中…</div>';
  try {
    const res = await fetch(SCRIPT_URL);
    allRows = await res.json();
    renderCards(allRows);
    renderStats(allRows);
  } catch (err) {
    document.getElementById('rec-list').innerHTML =
      `<div class="text-center py-4 text-danger">❌ 載入失敗：${err.message}</div>`;
  }
}

function renderCards(rows) {
  const el = document.getElementById('rec-list');
  if (!rows.length) {
    el.innerHTML = '<div class="text-center py-4" style="color:#8D6E63">沒有資料</div>';
    return;
  }
  el.innerHTML = rows.map((r, i) => {
    const type     = r['屬性'];
    const isIn     = type === '入庫';
    const cardCls  = isIn ? 'in' : type === '借出' ? 'borrow' : 'out';
    const qty      = isIn ? r['入庫數量'] : r['出庫數量'];
    const badgeCls = isIn ? 'badge-in' : type === '借出' ? 'badge-borrow' : 'badge-out';
    const qtyCls   = isIn ? 'qty-in'   : type === '借出' ? 'qty-borrow'   : 'qty-out';
    return `
      <div class="rec-card ${cardCls}" onclick="openEdit(${i})">
        <div class="rec-top">
          <div>
            <div class="rec-name">${r['產品名稱']}</div>
            ${r['規格'] ? `<div class="rec-spec">${r['規格']}</div>` : ''}
          </div>
          <div class="text-end">
            <div class="rec-qty ${qtyCls}">${Number(qty || 0).toLocaleString()}</div>
            <div style="font-size:.7rem;color:var(--brown2);font-weight:700">${r['單位'] || ''}</div>
          </div>
        </div>
        <div class="rec-meta">
          <span class="rec-tag ${badgeCls}">${type}</span>
          <span class="rec-tag">${fmtDate(r['日期'])}</span>
          ${r['承辦人員'] ? `<span class="rec-tag">${r['承辦人員']}</span>` : ''}
          <span style="margin-left:auto;font-size:.75rem;color:var(--brown2)">
            <i class="bi bi-pencil"></i> 點擊編輯
          </span>
        </div>
      </div>`;
  }).join('');
}

function renderStats(rows) {
  document.getElementById('stat-total').textContent = rows.length;
  document.getElementById('stat-in').textContent  =
    rows.reduce((s, r) => s + (Number(r['入庫數量']) || 0), 0).toLocaleString();
  document.getElementById('stat-out').textContent =
    rows.reduce((s, r) => s + (Number(r['出庫數量']) || 0), 0).toLocaleString();
}

function filterRecords() {
  const kw   = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('filter-type').value;
  const f = allRows.filter(r => {
    const matchKw   = !kw || Object.values(r).some(v => String(v).toLowerCase().includes(kw));
    const matchType = !type || r['屬性'] === type;
    return matchKw && matchType;
  });
  renderCards(f);
  renderStats(f);
}

function openEdit(index) {
  sessionStorage.setItem('editRecord', JSON.stringify(allRows[index]));
  location.href = 'otpompompurin-edit.html';
}

function fmtDate(v) {
  if (!v) return '';
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString('zh-TW');
}
</script>
</body>
</html>
