<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出入庫紀錄</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow:  #FFD54F;
      --yellow2: #FFECB3;
      --cream:   #FFF8E1;
      --brown:   #6D4C41;
      --brown2:  #8D6E63;
      --amber:   #FF8F00;
    }
    * { font-family: 'M PLUS Rounded 1c', 'Microsoft JhengHei', sans-serif; }
    body { background: var(--cream); padding-bottom: 76px; }

    .topbar {
      background: var(--yellow);
      padding: .8rem 1rem;
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(109,76,65,.15);
    }
    .topbar h6 { margin: 0; color: var(--brown); font-weight: 800; font-size: 1.05rem; }
    .btn-refresh {
      background: rgba(109,76,65,.15); border: none;
      border-radius: 10px; padding: .3rem .6rem;
      color: var(--brown); font-size: 1rem;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 3px solid var(--yellow);
      display: flex; box-shadow: 0 -2px 12px rgba(109,76,65,.12);
    }
    .bottom-nav a {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 9px 0;
      color: var(--brown2); text-decoration: none;
      font-size: .65rem; font-weight: 700; gap: 2px;
    }
    .bottom-nav a i { font-size: 1.3rem; }
    .bottom-nav a.active { color: var(--amber); }

    .stat-card {
      background: #fff; border-radius: 16px;
      padding: .85rem .5rem; text-align: center;
      box-shadow: 0 3px 10px rgba(109,76,65,.1);
      border-bottom: 4px solid var(--yellow);
    }
    .stat-card .num { font-size: 1.35rem; font-weight: 800; }
    .stat-card .lbl { font-size: .68rem; color: var(--brown2); font-weight: 700; margin-top: 2px; }

    .search-bar {
      background: #fff; border-radius: 16px;
      padding: .75rem; margin-bottom: .75rem;
      box-shadow: 0 2px 8px rgba(109,76,65,.08);
    }
    .form-control, .form-select {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      border-radius: 10px; border: 2px solid var(--yellow2); font-size: .88rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--yellow); box-shadow: 0 0 0 .2rem rgba(255,213,79,.3);
    }

    .table-card {
      background: #fff; border-radius: 16px; overflow: hidden;
      box-shadow: 0 3px 10px rgba(109,76,65,.1);
    }
    .table { margin: 0; }
    .table thead th {
      background: var(--brown); color: #fff;
      font-size: .78rem; font-weight: 800;
      white-space: nowrap; padding: .65rem .6rem;
    }
    .table tbody td {
      font-size: .82rem; padding: .55rem .6rem;
      vertical-align: middle; border-color: var(--yellow2);
    }
    .table tbody tr:hover { background: var(--cream); }

    .badge-in  { background: #2E7D32; color:#fff; border-radius:8px; padding:.3em .6em; font-weight:700; font-size:.72rem; }
    .badge-out { background: #E65100; color:#fff; border-radius:8px; padding:.3em .6em; font-weight:700; font-size:.72rem; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="d-flex align-items-center gap-2">
    <span style="font-size:1.5rem">🐶</span>
    <h6>出入庫紀錄</h6>
  </div>
  <button class="btn-refresh" onclick="loadRecords()"><i class="bi bi-arrow-clockwise"></i></button>
</div>

<div class="container-fluid px-3 pt-3">

  <!-- 統計卡片 -->
  <div class="row g-2 mb-3">
    <div class="col-4">
      <div class="stat-card">
        <div class="num text-primary" id="stat-total">-</div>
        <div class="lbl">總筆數</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card">
        <div class="num" style="color:#2E7D32" id="stat-in">-</div>
        <div class="lbl">入庫量</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card">
        <div class="num" style="color:#E65100" id="stat-out">-</div>
        <div class="lbl">出庫量</div>
      </div>
    </div>
  </div>

  <!-- 搜尋 -->
  <div class="search-bar">
    <div class="row g-2">
      <div class="col-8">
        <input type="search" class="form-control" id="search"
          placeholder="🔍 搜尋產品、承辦人…" oninput="filterRecords()">
      </div>
      <div class="col-4">
        <select class="form-select" id="filter-type" onchange="filterRecords()">
          <option value="">全部</option>
          <option value="進貨">進貨</option>
          <option value="出貨">出貨</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 表格 -->
  <div class="table-card">
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>日期</th>
            <th>屬性</th>
            <th>產品名稱</th>
            <th>入庫</th>
            <th>出庫</th>
            <th>單位</th>
            <th>承辦人</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" class="text-center py-4" style="color:var(--brown2)">🐾 載入中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="otpompompurin-list.html" class="active"><i class="bi bi-journal-text"></i>紀錄</a>
  <a href="otpompompurin.html"><i class="bi bi-plus-circle-fill"></i>新增</a>
  <a href="otpompompurin-inventory.html"><i class="bi bi-boxes"></i>庫存</a>
</nav>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';
let allRows = [];

async function loadRecords() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4" style="color:#8D6E63">🐾 載入中…</td></tr>';
  try {
    const res = await fetch(SCRIPT_URL);
    allRows = await res.json();
    renderTable(allRows);
    renderStats(allRows);
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger">❌ 載入失敗：${err.message}</td></tr>`;
  }
}

function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4" style="color:#8D6E63">沒有資料</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${fmtDate(r['日期'])}</td>
      <td>${r['屬性']==='進貨'
        ? '<span class="badge-in">進貨</span>'
        : '<span class="badge-out">出貨</span>'}</td>
      <td>${r['產品名稱']}</td>
      <td class="text-end">${r['入庫數量']||'-'}</td>
      <td class="text-end">${r['出庫數量']||'-'}</td>
      <td>${r['單位']||''}</td>
      <td>${r['承辦人員']||''}</td>
    </tr>`).join('');
}

function renderStats(rows) {
  document.getElementById('stat-total').textContent = rows.length;
  document.getElementById('stat-in').textContent  = rows.reduce((s,r)=>s+(Number(r['入庫數量'])||0),0).toLocaleString();
  document.getElementById('stat-out').textContent = rows.reduce((s,r)=>s+(Number(r['出庫數量'])||0),0).toLocaleString();
}

function filterRecords() {
  const kw   = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('filter-type').value;
  const f = allRows.filter(r => {
    const matchKw   = !kw || Object.values(r).some(v=>String(v).toLowerCase().includes(kw));
    const matchType = !type || r['屬性']===type;
    return matchKw && matchType;
  });
  renderTable(f);
  renderStats(f);
}

function fmtDate(v) {
  if (!v) return '';
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString('zh-TW');
}

loadRecords();
</script>
</body>
</html>
