<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出入庫紀錄</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --yellow:  #FFD54F;
      --yellow2: #FFECB3;
      --cream:   #FFF8E1;
      --brown:   #6D4C41;
      --brown2:  #8D6E63;
      --amber:   #FF8F00;
    }
    * { font-family: 'M PLUS Rounded 1c', 'Microsoft JhengHei', sans-serif; }
    body { background: var(--cream); padding-bottom: 76px; }

    .topbar {
      background: var(--yellow) url('pompompurin-bg.jpg') left center / auto 100% repeat-x; padding: .8rem 1rem;
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(109,76,65,.15);
    }
    .topbar h6 { margin: 0; color: var(--brown); font-weight: 800; font-size: 1.05rem; }
    .btn-icon {
      background: rgba(109,76,65,.15); border: none;
      border-radius: 10px; padding: .3rem .6rem;
      color: var(--brown); font-size: 1rem; cursor: pointer;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 3px solid var(--yellow);
      display: flex; box-shadow: 0 -2px 12px rgba(109,76,65,.12);
    }
    .bottom-nav a {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 9px 0;
      color: var(--brown2); text-decoration: none;
      font-size: .6rem; font-weight: 700; gap: 2px;
    }
    .bottom-nav a i { font-size: 1.2rem; }
    .bottom-nav a.active { color: var(--amber); }

    .stat-card {
      background: #fff; border-radius: 16px; padding: .85rem .5rem;
      text-align: center; box-shadow: 0 3px 10px rgba(109,76,65,.1);
      border-bottom: 4px solid var(--yellow);
    }
    .stat-card .num { font-size: 1.35rem; font-weight: 800; }
    .stat-card .lbl { font-size: .68rem; color: var(--brown2); font-weight: 700; margin-top: 2px; }

    .search-bar {
      background: #fff; border-radius: 16px; padding: .75rem;
      margin-bottom: .75rem; box-shadow: 0 2px 8px rgba(109,76,65,.08);
    }
    .form-control, .form-select {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      border-radius: 10px; border: 2px solid var(--yellow2); font-size: .88rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--yellow); box-shadow: 0 0 0 .2rem rgba(255,213,79,.3);
    }

    /* 紀錄卡片（取代表格，更適合手機） */
    .rec-card {
      background: #fff; border-radius: 14px; padding: .85rem 1rem;
      margin-bottom: .5rem; box-shadow: 0 2px 8px rgba(109,76,65,.08);
      cursor: pointer; transition: transform .1s, box-shadow .1s;
      border-left: 5px solid var(--yellow);
    }
    .rec-card.in     { border-left-color: #2E7D32; }
    .rec-card.out    { border-left-color: #E65100; }
    .rec-card.borrow { border-left-color: #1565C0; }
    .qty-borrow { color: #1565C0; }
    .rec-card:active { transform: scale(.98); box-shadow: 0 1px 4px rgba(109,76,65,.12); }
    .rec-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
    .rec-name { font-weight: 800; font-size: .95rem; color: var(--brown); }
    .rec-spec { font-size: .75rem; color: var(--brown2); margin-top: 1px; }
    .rec-meta { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .4rem; align-items: center; }
    .rec-tag  {
      font-size: .7rem; font-weight: 700; border-radius: 8px;
      padding: .2em .55em; background: var(--yellow2); color: var(--brown);
    }
    .badge-in     { background: #E8F5E9; color: #2E7D32; }
    .badge-out    { background: #FBE9E7; color: #BF360C; }
    .badge-borrow { background: #E3F2FD; color: #1565C0; }
    .rec-qty { font-weight: 800; font-size: 1rem; }
    .qty-in  { color: #2E7D32; }
    .qty-out { color: #E65100; }

    /* 編輯 Offcanvas */
    .offcanvas { border-radius: 20px 20px 0 0; max-height: 90vh; }
    .offcanvas-header {
      background: var(--yellow); border-radius: 20px 20px 0 0;
      padding: 1rem 1.25rem .8rem;
    }
    .offcanvas-header .offcanvas-title { color: var(--brown); font-weight: 800; }
    .offcanvas-body { overflow-y: auto; padding: 1rem 1.25rem; }

    .edit-block {
      background: var(--cream); border-radius: 14px;
      padding: .9rem; margin-bottom: .75rem;
    }
    .edit-block h6 {
      font-size: .75rem; font-weight: 800; color: var(--brown2);
      text-transform: uppercase; margin-bottom: .65rem; letter-spacing: .05em;
    }
    .form-label { font-weight: 700; font-size: .85rem; color: var(--brown); }
    .cat-group { display: flex; flex-direction: column; gap: 2px; }
    .cat-item {
      display: flex; align-items: center; gap: .6rem;
      padding: .45rem .6rem; border-radius: 10px; cursor: pointer;
      font-weight: 600; font-size: .9rem; color: var(--brown);
    }
    .cat-item:hover { background: var(--yellow2); }
    .cat-item input[type="checkbox"] {
      width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0;
      accent-color: var(--amber); cursor: pointer;
    }
    .cat-other-input { margin-top: .3rem; border-radius: 10px; }

    .btn-save {
      background: var(--amber); border: none; color: #fff;
      border-radius: 14px; min-height: 48px; width: 100%;
      font-size: 1rem; font-weight: 800;
      box-shadow: 0 4px 12px rgba(255,143,0,.3);
    }
    .btn-save:disabled { background: var(--brown2); color: #fff; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="d-flex align-items-center gap-2">
    <span style="font-size:1.5rem">🐶</span>
    <h6>出入庫紀錄</h6>
  </div>
  <button class="btn-icon" onclick="loadRecords()"><i class="bi bi-arrow-clockwise"></i></button>
</div>

<div class="container-fluid px-3 pt-3">

  <div class="row g-2 mb-3">
    <div class="col-4">
      <div class="stat-card">
        <div class="num text-primary" id="stat-total">-</div>
        <div class="lbl">總筆數</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card">
        <div class="num" style="color:#2E7D32" id="stat-in">-</div>
        <div class="lbl">入庫量</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card">
        <div class="num" style="color:#E65100" id="stat-out">-</div>
        <div class="lbl">出庫量</div>
      </div>
    </div>
  </div>

  <div class="search-bar">
    <div class="row g-2">
      <div class="col-8">
        <input type="search" class="form-control" id="search"
          placeholder="🔍 搜尋產品、承辦人…" oninput="filterRecords()">
      </div>
      <div class="col-4">
        <select class="form-select" id="filter-type" onchange="filterRecords()">
          <option value="">全部</option>
          <option value="入庫">入庫</option>
          <option value="出庫">出庫</option>
          <option value="借出">借出</option>
        </select>
      </div>
    </div>
  </div>

  <div id="rec-list">
    <div class="text-center py-5" style="color:var(--brown2)">🐾 載入中…</div>
  </div>

</div>

<!-- 編輯 Offcanvas（從底部滑出） -->
<div class="offcanvas offcanvas-bottom" tabindex="-1" id="editPanel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">✏️ 編輯紀錄</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <input type="hidden" id="edit-row">
    <input type="hidden" id="edit-timestamp">

    <div class="edit-block">
      <h6>📋 基本資訊</h6>
      <div class="mb-2">
        <label class="form-label">日期</label>
        <input type="date" class="form-control" id="e-date">
      </div>
      <div class="mb-2">
        <label class="form-label">承辦人員</label>
        <input type="text" class="form-control" id="e-staff">
      </div>
      <div>
        <label class="form-label">屬性</label>
        <select class="form-select" id="e-type" onchange="onEditTypeChange()">
          <option value="入庫">入庫</option>
          <option value="出庫">出庫</option>
          <option value="借出">借出</option>
        </select>
      </div>
    </div>

    <div class="edit-block">
      <h6>🏷️ 產品資訊</h6>
      <div class="mb-2" id="e-vendor-row">
        <label class="form-label">供應商</label>
        <input type="text" class="form-control" id="e-vendor">
      </div>
      <div class="mb-2">
        <label class="form-label">產品類別</label>
        <div class="cat-group" id="edit-category">
          <label class="cat-item"><input type="checkbox" class="cat-cb" value="內包材"> 內包材</label>
          <label class="cat-item"><input type="checkbox" class="cat-cb" value="外包材"> 外包材</label>
          <label class="cat-item"><input type="checkbox" class="cat-cb" value="耗材"> 耗材</label>
          <label class="cat-item">
            <input type="checkbox" class="cat-cb" value="其他" onchange="toggleOtherInput('e-cat-other-text', this)"> 其他：
          </label>
          <input type="text" class="form-control cat-other-input" id="e-cat-other-text" placeholder="請輸入" style="display:none">
        </div>
      </div>
      <div class="mb-2">
        <label class="form-label">產品名稱</label>
        <input type="text" class="form-control" id="e-product">
      </div>
      <div>
        <label class="form-label">規格</label>
        <input type="text" class="form-control" id="e-spec">
      </div>
    </div>

    <div class="edit-block">
      <h6>🔢 數量資訊</h6>
      <div class="row g-2">
        <div class="col-8">
          <label class="form-label" id="e-qty-label">數量</label>
          <input type="number" class="form-control" id="e-qty" min="0" step="0.01">
        </div>
        <div class="col-4">
          <label class="form-label">單位</label>
          <input type="text" class="form-control" id="e-unit">
        </div>
      </div>
      <div class="mt-2" id="e-location-row">
        <label class="form-label" id="e-location-label">存放位置</label>
        <input type="text" class="form-control" id="e-location" placeholder="請輸入存放位置">
      </div>
      <div class="mt-2" id="e-cost-row">
        <label class="form-label">成本 (NT$)</label>
        <input type="number" class="form-control" id="e-cost" min="0">
      </div>
    </div>

    <div class="edit-block">
      <h6>📝 備註</h6>
      <textarea class="form-control" id="e-notes" rows="2"></textarea>
    </div>

    <div id="edit-msg" class="alert" style="display:none"></div>
    <button class="btn-save mb-2" id="save-btn" onclick="saveEdit()">💾 儲存變更</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="otpompompurin-inventory.html"><i class="bi bi-boxes"></i>庫存</a>
  <a href="otpompompurin.html"><i class="bi bi-plus-circle-fill"></i>新增</a>
  <a href="otpompompurin-list.html" class="active"><i class="bi bi-journal-text"></i>紀錄</a>
  <a href="otpompompurin-stocktake.html"><i class="bi bi-clipboard-check"></i>盤點</a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';
let allRows = [];
let editPanel;

window.addEventListener('DOMContentLoaded', () => {
  editPanel = new bootstrap.Offcanvas(document.getElementById('editPanel'));
  loadRecords();
});

async function loadRecords() {
  document.getElementById('rec-list').innerHTML =
    '<div class="text-center py-5" style="color:#8D6E63">🐾 載入中…</div>';
  try {
    const res = await fetch(SCRIPT_URL);
    allRows = await res.json();
    renderCards(allRows);
    renderStats(allRows);
  } catch (err) {
    document.getElementById('rec-list').innerHTML =
      `<div class="text-center py-4 text-danger">❌ 載入失敗：${err.message}</div>`;
  }
}

function renderCards(rows) {
  const el = document.getElementById('rec-list');
  if (!rows.length) {
    el.innerHTML = '<div class="text-center py-4" style="color:#8D6E63">沒有資料</div>';
    return;
  }
  el.innerHTML = rows.map((r, i) => {
    const type   = r['屬性'];
    const isIn   = type === '入庫';
    const cardCls = isIn ? 'in' : type === '借出' ? 'borrow' : 'out';
    const qty    = isIn ? r['入庫數量'] : r['出庫數量'];
    const badgeCls = isIn ? 'badge-in' : type === '借出' ? 'badge-borrow' : 'badge-out';
    const qtyCls   = isIn ? 'qty-in'   : type === '借出' ? 'qty-borrow'   : 'qty-out';
    return `
      <div class="rec-card ${cardCls}" onclick="openEdit(${i})">
        <div class="rec-top">
          <div>
            <div class="rec-name">${r['產品名稱']}</div>
            ${r['規格'] ? `<div class="rec-spec">${r['規格']}</div>` : ''}
          </div>
          <div class="text-end">
            <div class="rec-qty ${qtyCls}">${Number(qty||0).toLocaleString()}</div>
            <div style="font-size:.7rem;color:var(--brown2);font-weight:700">${r['單位']||''}</div>
          </div>
        </div>
        <div class="rec-meta">
          <span class="rec-tag ${badgeCls}">${type}</span>
          <span class="rec-tag">${fmtDate(r['日期'])}</span>
          ${r['承辦人員'] ? `<span class="rec-tag">${r['承辦人員']}</span>` : ''}
          ${r['供應商名稱'] ? `<span class="rec-tag">${r['供應商名稱']}</span>` : ''}
          <span style="margin-left:auto;font-size:.75rem;color:var(--brown2)">
            <i class="bi bi-pencil"></i> 點擊編輯
          </span>
        </div>
      </div>`;
  }).join('');
}

function renderStats(rows) {
  document.getElementById('stat-total').textContent = rows.length;
  document.getElementById('stat-in').textContent  = rows.reduce((s,r)=>s+(Number(r['入庫數量'])||0),0).toLocaleString();
  document.getElementById('stat-out').textContent = rows.reduce((s,r)=>s+(Number(r['出庫數量'])||0),0).toLocaleString();
}

function filterRecords() {
  const kw   = document.getElementById('search').value.toLowerCase();
  const type = document.getElementById('filter-type').value;
  const f = allRows.filter(r => {
    const matchKw   = !kw || Object.values(r).some(v=>String(v).toLowerCase().includes(kw));
    const matchType = !type || r['屬性']===type;
    return matchKw && matchType;
  });
  renderCards(f);
  renderStats(f);
}

// 開啟編輯面板
function openEdit(index) {
  const r = allRows[index];
  document.getElementById('edit-row').value       = r._row;
  document.getElementById('edit-timestamp').value = r['時間戳記'] || '';
  document.getElementById('e-date').value     = toInputDate(r['日期']);
  document.getElementById('e-staff').value    = r['承辦人員']   || '';
  document.getElementById('e-type').value     = r['屬性']       || '進貨';
  document.getElementById('e-vendor').value   = r['供應商名稱'] || '';
  setCategoryValue(r['產品類別'] || '');
  document.getElementById('e-product').value  = r['產品名稱']   || '';
  document.getElementById('e-spec').value     = r['規格']       || '';
  document.getElementById('e-unit').value     = r['單位']       || '';
  document.getElementById('e-location').value = r['存放位置/領取單位'] || '';
  document.getElementById('e-cost').value     = r['成本']       || '';
  document.getElementById('e-notes').value    = r['備註']       || '';

  const isIn = r['屬性'] === '進貨';
  document.getElementById('e-qty').value = isIn ? (r['入庫數量']||0) : (r['出庫數量']||0);

  onEditTypeChange();
  document.getElementById('edit-msg').style.display = 'none';
  editPanel.show();
}

function onEditTypeChange() {
  const type = document.getElementById('e-type').value;
  const qtyLabels = { '入庫': '入庫數量', '出庫': '出庫數量', '借出': '借出數量' };
  document.getElementById('e-qty-label').textContent = qtyLabels[type] || '數量';
  const locLabels = { '入庫': '存放位置', '出庫': '領取單位', '借出': '領取單位' };
  document.getElementById('e-location-label').textContent = locLabels[type] || '存放位置/領取單位';
  document.getElementById('e-location').placeholder = type === '入庫' ? '請輸入存放位置（例：包材室）' : '請輸入領取單位';
  document.getElementById('e-vendor-row').style.display = type === '入庫' ? '' : 'none';
  document.getElementById('e-cost-row').style.display   = type === '入庫' ? '' : 'none';
}

async function saveEdit() {
  const btn  = document.getElementById('save-btn');
  const type = document.getElementById('e-type').value;
  const data = {
    action:    'update',
    row:       Number(document.getElementById('edit-row').value),
    timestamp: document.getElementById('edit-timestamp').value,
    date:      document.getElementById('e-date').value,
    staff:     document.getElementById('e-staff').value,
    type,
    vendor:    document.getElementById('e-vendor').value,
    category:  getEditCategoryValue(),
    product:   document.getElementById('e-product').value,
    spec:      document.getElementById('e-spec').value,
    inQty:  type === '入庫' ? document.getElementById('e-qty').value : 0,
    outQty: (type === '出庫' || type === '借出') ? document.getElementById('e-qty').value : 0,
    unit:      document.getElementById('e-unit').value,
    location:  document.getElementById('e-location').value,
    cost:      document.getElementById('e-cost').value,
    notes:     document.getElementById('e-notes').value,
  };

  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(data) });
    showEditMsg('✅ 已更新！', 'success');
    setTimeout(() => { editPanel.hide(); loadRecords(); }, 1200);
  } catch {
    showEditMsg('❌ 更新失敗，請重試', 'danger');
  } finally {
    btn.disabled = false; btn.textContent = '💾 儲存變更';
  }
}

function showEditMsg(text, type) {
  const m = document.getElementById('edit-msg');
  m.className = `alert alert-${type}`;
  m.textContent = text;
  m.style.display = 'block';
}

function toggleOtherInput(inputId, cb) {
  document.getElementById(inputId).style.display = cb.checked ? '' : 'none';
}

function getEditCategoryValue() {
  const cbs = document.querySelectorAll('#edit-category .cat-cb:checked');
  return [...cbs].map(cb => {
    if (cb.value === '其他') {
      const txt = document.getElementById('e-cat-other-text').value.trim();
      return txt ? `其他：${txt}` : '其他';
    }
    return cb.value;
  }).join('、');
}

function setCategoryValue(value) {
  document.querySelectorAll('#edit-category .cat-cb').forEach(cb => cb.checked = false);
  document.getElementById('e-cat-other-text').style.display = 'none';
  document.getElementById('e-cat-other-text').value = '';
  if (!value) return;
  value.split('、').forEach(p => {
    const cb = [...document.querySelectorAll('#edit-category .cat-cb')].find(c => p.startsWith(c.value));
    if (cb) {
      cb.checked = true;
      if (cb.value === '其他') {
        const el = document.getElementById('e-cat-other-text');
        el.style.display = '';
        el.value = p.replace(/^其他：?/, '');
      }
    }
  });
}

function fmtDate(v) {
  if (!v) return '';
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString('zh-TW');
}

function toInputDate(v) {
  if (!v) return '';
  const d = new Date(v);
  if (isNaN(d)) return '';
  return d.toISOString().slice(0,10);
}
</script>
</body>
</html>
