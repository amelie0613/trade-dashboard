<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Firebase 一次性匯入工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyIugOQCfTo5WvJhw-YHsIX9MW1yN0_yU",
            authDomain: "rental-ledger-87143.firebaseapp.com",
            projectId: "rental-ledger-87143",
            storageBucket: "rental-ledger-87143.firebasestorage.app",
            messagingSenderId: "356282267258",
            appId: "1:356282267258:web:12b9d7fcbac12f1e5fedc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, user => {
            const loginBtn = document.getElementById('loginBtn');
            const mainArea = document.getElementById('mainArea');
            const userInfo = document.getElementById('userInfo');
            if (user) {
                loginBtn.style.display = 'none';
                mainArea.style.display = 'block';
                userInfo.textContent = '已登入：' + user.displayName;
            } else {
                loginBtn.style.display = 'block';
                mainArea.style.display = 'none';
                userInfo.textContent = '';
            }
        });

        window._login = () => signInWithPopup(auth, provider).catch(e => alert('登入失敗：' + e.message));

        window._import = async () => {
            const input = document.getElementById('fileInput');
            if (!input.files[0]) { alert('請先選擇檔案'); return; }

            const statusEl = document.getElementById('status');
            const progressEl = document.getElementById('progress');
            statusEl.textContent = '讀取 Excel...';

            try {
                // 讀取 Excel
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const wb = window.XLSX.read(e.target.result, { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const raw = window.XLSX.utils.sheet_to_json(ws);

                        statusEl.textContent = `讀取完成，共 ${raw.length} 筆，準備寫入 Firebase...`;

                        // 整理資料
                        const rows = raw.map(r => ({
                            產品類別: String(r['產品類別'] || ''),
                            產品代碼: String(r['產品代碼'] || ''),
                            產品名稱: String(r['產品名稱'] || '').trim(),
                            產品規格: String(r['產品規格'] || ''),
                            基本單位: String(r['基本單位'] || ''),
                            倉庫: String(r['倉庫'] || ''),
                            存貨屬性: String(r['存貨屬性'] || ''),
                            批號: String(r['批號'] || '').trim(),
                            庫存狀態: String(r['庫存狀態'] || ''),
                            採購部門: String(r['採購部門'] || ''),
                            前期結餘: parseFloat(r['月租金(結餘)']) || 0,
                            月結歷史: {},
                            updatedAt: new Date().toISOString()
                        })).filter(r => r.產品名稱 && r.批號);

                        // 分批寫入（每批 400 筆）
                        const chunkSize = 400;
                        let written = 0;
                        for (let i = 0; i < rows.length; i += chunkSize) {
                            const batch = writeBatch(db);
                            const chunk = rows.slice(i, i + chunkSize);
                            chunk.forEach(row => {
                                const id = (row.產品名稱 + '|' + row.批號).replace(/\//g, '_');
                                batch.set(doc(db, 'ledger', id), row);
                            });
                            await batch.commit();
                            written += chunk.length;
                            progressEl.textContent = `進度：${written} / ${rows.length}`;
                            statusEl.textContent = `寫入中...`;
                        }

                        statusEl.innerHTML = `<span style="color:green; font-weight:bold;">✅ 匯入完成！共寫入 ${rows.length} 筆</span>`;
                        progressEl.textContent = '';

                    } catch(e) {
                        statusEl.innerHTML = `<span style="color:red;">❌ 失敗：${e.message}</span>`;
                        console.error(e);
                    }
                };
                reader.readAsArrayBuffer(input.files[0]);

            } catch(e) {
                statusEl.innerHTML = `<span style="color:red;">❌ 失敗：${e.message}</span>`;
            }
        };
    </script>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 2rem;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 0.5rem; }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 0.8rem 1rem;
            margin: 1rem 0;
            font-size: 0.9rem;
            color: #856404;
        }
        button {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 0.5rem 0;
        }
        #loginBtn { background: #4285f4; color: white; width: 100%; }
        #importBtn { background: #e8836a; color: white; width: 100%; }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 0.8rem;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin: 1rem 0;
            cursor: pointer;
            background: #fafafa;
        }
        #status { margin-top: 1rem; font-size: 1rem; min-height: 1.5rem; }
        #progress { color: #666; font-size: 0.9rem; margin-top: 0.3rem; }
        #userInfo { color: #4a9a37; font-size: 0.9rem; margin-top: 0.5rem; }
        #mainArea { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔥 Firebase 一次性匯入工具</h1>
        <p>把本期總檔匯入 Firebase 總帳資料庫</p>
        <div id="userInfo"></div>

        <div class="warning">
            ⚠️ 此工具只需使用一次！匯入完成後請刪除此頁面。
        </div>

        <button id="loginBtn" onclick="window._login()">🔑 Google 登入</button>

        <div id="mainArea">
            <p style="color:#555; font-size:0.9rem; margin-bottom:0.5rem;">選擇「本期總檔.xlsx」（需包含「月租金(結餘)」欄位）：</p>
            <input type="file" id="fileInput" accept=".xlsx" />
            <button id="importBtn" onclick="window._import()">🚀 開始匯入 Firebase</button>
            <div id="status"></div>
            <div id="progress"></div>
        </div>
    </div>
</body>
</html>
