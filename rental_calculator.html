    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyIugOQCfTo5WvJhw-YHsIX9MW1yN0_yU",
            authDomain: "rental-ledger-87143.firebaseapp.com",
            projectId: "rental-ledger-87143",
            storageBucket: "rental-ledger-87143.firebasestorage.app",
            messagingSenderId: "356282267258",
            appId: "1:356282267258:web:12b9d7fcbac12f1e5fedc3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window._db = db;
        window._auth = auth;
        window._fs = { collection, doc, setDoc, getDoc, getDocs, deleteDoc, writeBatch };

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            window._currentUser = user;
            updateAuthUI(user);
            if (user) {
                window._fbReady = true;
                document.dispatchEvent(new Event('firebase-ready'));
            }
        });

        window._googleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch(e) {
                alert('登入失敗：' + e.message);
            }
        };

        window._googleLogout = async () => {
            await signOut(auth);
        };

        function updateAuthUI(user) {
            const userHTML = user ? `
                <div style="display:flex; align-items:center; gap:0.8rem;">
                    <img src="${user.photoURL}" style="width:28px; height:28px; border-radius:50%; border:2px solid white;" />
                    <span style="font-size:0.85rem; color:white; font-weight:600;">${user.displayName}</span>
                    <button onclick="window._googleLogout()" style="background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.5); color:white; border-radius:8px; padding:0.3rem 0.8rem; font-size:0.78rem; font-weight:700; cursor:pointer; font-family:'Nunito',sans-serif;">登出</button>
                </div>` : `
                <button onclick="window._googleLogin()" style="display:flex; align-items:center; gap:0.5rem; background:white; border:none; border-radius:8px; padding:0.4rem 1rem; font-size:0.85rem; font-weight:700; cursor:pointer; color:#764ba2; font-family:'Nunito',sans-serif;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:16px; height:16px;" />
                    Google 登入
                </button>`;
            ['authBar','authBar2'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = userHTML;
            });
        }

        window._fbReady = false;
    </script>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {

        --orange: #f7a35c;
        --yellow: #f7d96b;

        --green:  #8dcc7a;
        --coral:  #e8836a;
        --purple: #c9a8e0;
        --dark:   #2a1f2d;
        --cream:  #fdf6ee;
        --text:   #3d2c1e;
    }

        font-family: 'Nunito', sans-serif;
        background: var(--cream);

        padding: 2rem 1rem;
        position: relative;
        overflow-x: hidden;

            radial-gradient(circle 6px at 25% 90%, var(--pink) 70%, transparent 71%);
        opacity: 0.5;
        z-index: 0;
    }

    .container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0 8px 40px rgba(42,31,45,0.12);
        overflow: hidden;
        position: relative;
        z-index: 1;
    }

    .header {
        background: var(--dark);
        color: white;
        padding: 2rem 2rem 1.5rem;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    /* 頂部小花裝飾帶 */

        justify-content: center;
        gap: 0.4rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
    }
    .flower-band svg {
        width: 28px;
        height: 28px;
        animation: sway 3s ease-in-out infinite;
    }
    .flower-band svg:nth-child(odd) { animation-delay: 0.5s; }
    .flower-band svg:nth-child(3n) { animation-delay: 1s; }
    @keyframes sway {
        0%, 100% { transform: rotate(-8deg) scale(1); }
        50% { transform: rotate(8deg) scale(1.08); }
    }

    .header h1 {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: 0.02em;
        margin-bottom: 0.3rem;
    }
    .header p {
        opacity: 0.7;
        font-size: 0.9rem;
        font-weight: 400;
    }

    .content {
        padding: 1.5rem 2rem 2rem;
    }

    .top-panel {
        background: #fdf0f7;
        border: 2px solid var(--pink);
        border-radius: 16px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
    }

    .top-grid {
        display: grid;
        grid-template-columns: 2fr 1.5fr;
        gap: 1.5rem;
        align-items: start;
    }
    @media (max-width: 1024px) {
        .top-grid { grid-template-columns: 1fr; }
    }

    .section-title {
        font-size: 0.8rem;
        font-weight: 800;
        color: var(--coral);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.8rem;
        padding-bottom: 0.4rem;
        border-bottom: 2px dashed var(--pink);
        display: flex;
        align-items: center;
        gap: 0.4rem;
    }

    .form-group {
        margin-bottom: 0.8rem;
    }

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.3rem;
        color: var(--text);
        font-size: 0.85rem;
    }

    input, select {
        width: 100%;
        padding: 0.55rem 0.75rem;
        border: 1.5px solid #e8d5ef;
        border-radius: 10px;
        font-size: 0.88rem;
        font-family: 'Nunito', sans-serif;
        background: white;
        color: var(--text);
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
        outline: none;
        border-color: var(--pink);
        box-shadow: 0 0 0 3px rgba(242,167,195,0.2);
    }

    .file-input-label {
        display: block;
        padding: 0.75rem;
        background: white;
        border: 2px dashed var(--blue);
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        color: #5b9dba;
        font-weight: 700;
        font-size: 0.85rem;
    }
    .file-input-label:hover {
        background: #eef8fc;
        border-color: #5b9dba;
    }
    .file-input-label.has-file {
        border-color: var(--green);
        color: #4a9a37;
        background: #f0faf0;
    }
    input[type="file"] { display: none; }

    .button-group {
        display: flex;
        gap: 0.7rem;
        margin-top: 1.2rem;
    }

    button {
        flex: 1;
        padding: 0.75rem;
        border: none;
        border-radius: 10px;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.18s;
        font-size: 0.9rem;
        font-family: 'Nunito', sans-serif;
    }
    .btn-primary {
        background: var(--coral);
        color: white;
        box-shadow: 0 3px 10px rgba(232,131,106,0.35);
    }
    .btn-primary:hover { background: #d96d55; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
        background: white;
        color: var(--coral);
        border: 2px solid var(--coral);
    }
    .btn-secondary:hover { background: #fff3f0; }

    .status {
        margin-top: 0.8rem;
        padding: 0.75rem 1rem;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 600;
    }
    .status.success { background: #f0faf0; color: #2d7a2d; border: 1.5px solid var(--green); }
    .status.error   { background: #fff0f0; color: #b93030; border: 1.5px solid var(--coral); }
    .status.info    { background: #eef8fc; color: #2a6a82; border: 1.5px solid var(--blue); }

    .result-section {
        background: white;
        border: 2px solid #ecdff5;
        border-radius: 16px;
        padding: 1.5rem;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.75rem;
    }
    th, td {
        padding: 0.5rem 0.6rem;
        text-align: left;
        border-bottom: 1px solid #f0e8f8;
    }
    th {
        background: #fdf0f7;
        font-weight: 700;
        color: #8a4570;
        white-space: nowrap;
    }
    th.highlight {
        background: #fff8e6;
        color: #b07020;
    }
    tr:hover { background: #fdf6ff; }

    .config-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
    }
    .config-item {
        background: white;
        padding: 0.7rem 0.8rem;
        border-radius: 8px;
        border: 1.5px solid #e8d5ef;
    }
    .config-item label {
        font-size: 0.75rem;
        color: #8a6a9a;
        margin-bottom: 0.25rem;
    }

    .export-btn {
        background: var(--green);
        color: white;
        margin-top: 1rem;
        width: 100%;
        box-shadow: 0 3px 10px rgba(141,204,122,0.35);
    }
    .export-btn:hover { background: #6ab358; transform: translateY(-1px); }

    .summary-cards {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        margin-bottom: 1rem;
    }
    .card {
        padding: 1rem;
        border-radius: 12px;
        text-align: center;
    }
    .card:nth-child(1) { background: #fdf0f7; border: 2px solid var(--pink); }
    .card:nth-child(2) { background: #fff8e8; border: 2px solid var(--yellow); }
    .card-label { font-size: 0.8rem; color: #8a6a7a; font-weight: 600; margin-bottom: 0.3rem; }
    .card-value { font-size: 1.5rem; font-weight: 800; color: var(--coral); }

    .overflow-auto { overflow-x: auto; }
    .panel { background: #f8f9fb; border: 1px solid #e0e4e8; border-radius: 8px; padding: 1.5rem; }
    .tabs { display:flex; border-bottom: 2px solid #e0e4e8; margin-bottom:1.5rem; }
    .tab { padding:0.8rem 1.2rem; cursor:pointer; border:none; background:none; font-weight:600; color:#999; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.2s; font-family:'Nunito',sans-serif; }
    .tab.active { color: var(--coral); border-bottom-color: var(--coral); }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
</style>

<script>
const ledgerFiles = {};
let files = { file1: null, file2: null, file3: null };
let rentalTableData = null;
let calculatedData = null;

['file1', 'file2', 'file3'].forEach((id, idx) => {
    const fileInput = document.getElementById(id);
    const label = document.getElementById('label' + (idx + 1));
    
    fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) {
            files[id] = e.target.files[0];
            label.textContent = e.target.files[0].name;
            label.classList.add('has-file');
        }
    });
    
    label.addEventListener('click', () => fileInput.click());
});

function autoFormatDate(el) {
    const digits = el.value.replace(/\D/g, '').slice(0, 8);
    if (digits.length === 8) {
        el.value = digits.slice(0,4) + '-' + digits.slice(4,6) + '-' + digits.slice(6,8);
        el.style.color = '#2d7a2d';
        el.style.fontWeight = '700';
    } else {
        el.value = digits;
        el.style.color = '#333';
        el.style.fontWeight = '400';
    }
}

function dragOver(e, el) {
    e.preventDefault();
    el.style.borderColor = '#e8836a';
    el.style.background = '#fff3f0';
}
function dragLeave(el) {
    el.style.borderColor = '';
    el.style.background = '';
}
function dropFile(e, fileId, el) {
    e.preventDefault();
    dragLeave(el);
    const file = e.dataTransfer.files[0];
    if (!file) return;
    if (!file.name.endsWith('.xlsx')) {
        showStatus('❌ 請上傳 .xlsx 格式', 'error');
        return;
    }
    // 同時更新主頁面和ledger的檔案暫存
    files[fileId] = file;
    ledgerFiles[fileId] = file;
    el.textContent = '✅ ' + file.name;
    el.classList.add('has-file');
}

function syncDateText(dateId, textId) {
    const val = document.getElementById(dateId).value;
    document.getElementById(textId).value = val;
}
function syncDatePicker(textId, dateId) {
    const val = document.getElementById(textId).value.trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(val)) {
        document.getElementById(dateId).value = val;
    }
}

// ===== 頁面切換 =====
window.switchPage = function(page) {
    const isCalc = page === 'calc';
    document.getElementById('page_calc').style.display = isCalc ? '' : 'none';
    document.getElementById('page_ledger').style.display = isCalc ? 'none' : '';
    ['btn_calc','btn_calc2'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.background = isCalc ? 'white' : 'transparent';
        el.style.color = isCalc ? '#764ba2' : 'white';
        el.style.borderColor = isCalc ? 'white' : 'rgba(255,255,255,0.5)';
    });
    ['btn_ledger','btn_ledger2'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.background = !isCalc ? 'white' : 'transparent';
        el.style.color = !isCalc ? '#764ba2' : 'white';
        el.style.borderColor = !isCalc ? 'white' : 'rgba(255,255,255,0.5)';
    });
    if (!isCalc) refreshLedgerStatus();
}

// ===== Firebase 等待就緒 =====
function waitFirebase() {
    return new Promise((resolve, reject) => {
        if (window._fbReady && window._currentUser) { resolve(); return; }
        if (window._currentUser === null) { reject(new Error('請先點右上角「Google 登入」才能存取總帳')); return; }
        const handler = () => {
            if (window._currentUser) resolve();
            else reject(new Error('請先點右上角「Google 登入」才能存取總帳'));
        };
        document.addEventListener('firebase-ready', handler, { once: true });
        setTimeout(() => reject(new Error('請先點右上角「Google 登入」才能存取總帳')), 8000);
    });
}

// ===== 總帳 Firestore 操作 =====
const LEDGER_COL = 'ledger';
const MONTHLY_COL = 'monthly_records';
const LS_KEY = 'rental_ledger_rows_v2';
const LS_BACKUP_KEY = 'rental_ledger_backup_v2';

// ===== localStorage 主要操作 =====
function lsSaveLedgerRows(rows) {
    try {
        const current = localStorage.getItem(LS_KEY);
        if (current) localStorage.setItem(LS_BACKUP_KEY, current);
        const data = JSON.stringify(rows);
        localStorage.setItem(LS_KEY, data);
        console.log(`✅ localStorage 寫入成功，${rows.length} 筆，${(data.length/1024).toFixed(1)}KB`);
    } catch(e) {
        console.error('localStorage 寫入失敗：', e);
        alert(`❌ 本地儲存失敗（可能容量不足）：${e.message}\n請嘗試清除瀏覽器資料後再試。`);
    }
}
function lsLoadLedgerRows() {
    const raw = localStorage.getItem(LS_KEY);
    return raw ? JSON.parse(raw) : null;
}
function lsClearLedger() {
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem(LS_BACKUP_KEY);
}

// ===== 復原上一次備份 =====
window.restoreBackup = async function() {
    const backup = localStorage.getItem(LS_BACKUP_KEY);
    if (!backup) { alert('沒有備份資料可以復原'); return; }
    const rows = JSON.parse(backup);
    if (!confirm(`確定要復原到上一次備份？（共 ${rows.length} 筆）\n⚠️ 目前資料將被覆蓋`)) return;
    localStorage.setItem(LS_KEY, backup);
    invalidateCache();
    await refreshLedgerStatus();
    document.getElementById('ledger_results').innerHTML = `
        <div style="text-align:center; padding:2rem;">
            <div style="font-size:2rem;">↩️</div>
            <div style="font-weight:800; color:#4a9a37; margin-top:0.5rem;">已復原到上一次備份（${rows.length} 筆）</div>
        </div>`;
};

// ===== 主要讀寫：優先用 localStorage =====
async function saveLedgerRows(rows) {
    lsSaveLedgerRows(rows);
    invalidateCache();
}

async function loadLedgerRows(forceRefresh = false) {
    const local = lsLoadLedgerRows();
    if (local && !forceRefresh) return local; // 有本地資料直接回傳，不碰 Firebase
    // 沒有本地資料才去讀 Firestore（需要登入）
    try {
        await waitFirebase();
        const { getDocs, collection } = window._fs;
        const db = window._db;
        const snap = await getDocs(collection(db, LEDGER_COL));
        const rows = snap.docs.map(d => d.data());
        if (rows.length > 0) {
            lsSaveLedgerRows(rows);
            _ledgerCache = rows;
            _ledgerCacheTime = Date.now();
        }
        return rows;
    } catch(e) {
        console.warn('Firestore 讀取失敗，回傳空陣列：', e.message);
        return [];
    }
}

async function clearAllLedger() {
    lsClearLedger();
    invalidateCache();
}

// ===== 手動同步到 Firestore =====
async function syncToFirestore() {
    const rows = lsLoadLedgerRows();
    if (!rows || rows.length === 0) { alert('本地沒有總帳資料'); return; }
    const statusEl = document.getElementById('sync_status');
    if (statusEl) statusEl.textContent = '⏳ 同步中...';
    try {
        await waitFirebase();
        const { writeBatch, doc, collection, getDocs } = window._fs;
        const db = window._db;
        // 先清除 Firestore 舊資料
        const snap = await getDocs(collection(db, LEDGER_COL));
        const delBatch = writeBatch(db);
        snap.docs.forEach(d => delBatch.delete(d.ref));
        await delBatch.commit();
        // 分批寫入
        const chunkSize = 400;
        for (let i = 0; i < rows.length; i += chunkSize) {
            const batch = writeBatch(db);
            rows.slice(i, i + chunkSize).forEach(row => {
                const id = (row.產品名稱 + '|' + row.批號).replace(/\//g, '_');
                batch.set(doc(db, LEDGER_COL, id), row);
            });
            await batch.commit();
        }
        if (statusEl) statusEl.textContent = `✅ 已同步 ${rows.length} 筆到雲端`;
        setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 3000);
    } catch(e) {
        if (statusEl) statusEl.textContent = `❌ 同步失敗：${e.message}`;
    }
}
window.syncToFirestore = syncToFirestore;

// ===== 從 Firestore 載入到 localStorage =====
async function syncFromFirestore() {
    const statusEl = document.getElementById('sync_status');
    if (statusEl) statusEl.textContent = '⏳ 從雲端載入...';
    try {
        await waitFirebase();
        const { getDocs, collection } = window._fs;
        const db = window._db;
        const snap = await getDocs(collection(db, LEDGER_COL));
        const rows = snap.docs.map(d => d.data());
        if (rows.length === 0) {
            if (statusEl) statusEl.textContent = '⚠️ 雲端沒有資料';
            return;
        }
        lsSaveLedgerRows(rows);
        _ledgerCache = rows;
        _ledgerCacheTime = Date.now();
        await refreshLedgerStatus();
        if (statusEl) statusEl.textContent = `✅ 已載入 ${rows.length} 筆到本地`;
        setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 3000);
    } catch(e) {
        // 失敗時不動 localStorage，保留原有資料
        if (statusEl) statusEl.textContent = `❌ 載入失敗（配額超限請明天再試）`;
        console.error(e);
    }
}
window.syncFromFirestore = syncFromFirestore;

// ===== 總帳記憶體快取 =====
let _ledgerCache = null;
let _ledgerCacheTime = 0;
const CACHE_TTL = 5 * 60 * 1000; // 5分鐘

function invalidateCache() { _ledgerCache = null; }

async function loadLedgerRows(forceRefresh = false) {
    await waitFirebase();
    const now = Date.now();
    if (!forceRefresh && _ledgerCache && (now - _ledgerCacheTime) < CACHE_TTL) {
        return _ledgerCache;
    }
    const { getDocs, collection } = window._fs;
    const db = window._db;
    const snap = await getDocs(collection(db, LEDGER_COL));
    _ledgerCache = snap.docs.map(d => d.data());
    _ledgerCacheTime = now;
    return _ledgerCache;
}

async function deleteLedgerRow(productName, batchNo) {
    await waitFirebase();
    const { doc, deleteDoc } = window._fs;
    const db = window._db;
    const id = (productName + '|' + batchNo).replace(/\//g, '_');
    await deleteDoc(doc(db, LEDGER_COL, id));
}

async function saveMonthlyRecord(label, summary) {
    await waitFirebase();
    const { doc, setDoc } = window._fs;
    const db = window._db;
    await setDoc(doc(db, MONTHLY_COL, label), { ...summary, savedAt: new Date().toISOString() });
}

async function clearAllLedger() {
    await waitFirebase();
    const { getDocs, collection, doc, writeBatch } = window._fs;
    const db = window._db;
    const snap = await getDocs(collection(db, LEDGER_COL));
    const batch = writeBatch(db);
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
}

    if (!confirm('確定要清除所有總帳資料嗎？此動作無法復原。')) return;

    const statusEl = document.getElementById('ledger_status_monthly');
    statusEl.innerHTML = '<span style="color:#2a6a82;">⏳ 計算中...</span>';

    try {
        const d1 = f1 ? await readExcel(f1, false) : [];
        const d2 = f2 ? await readExcel(f2, false) : [];

        statusEl.innerHTML = '<span style="color:#2a6a82;">⏳ 讀取總帳...</span>';
        const existingRows = lsLoadLedgerRows() || [];
        console.log('總帳筆數:', existingRows.length);
        if (existingRows.length > 0) console.log('第一筆:', existingRows[0].產品名稱, existingRows[0].批號, existingRows[0].前期結餘, existingRows[0].月租金結餘);
        const ledgerMap = {};
        existingRows.forEach(r => { ledgerMap[r.產品名稱 + '|' + r.批號] = r; });

        const makeKey = r => String(r['產品名稱']||'').trim() + '|' + String(r['批號']||'').trim();

            const hl = previewHighlight.includes(col) ? ' highlight' : '';
            html += `<th class="${hl}" style="cursor:pointer; white-space:nowrap; user-select:none;" onclick="sortPreviewTable(${idx})" title="點擊排序">
                ${col} <span id="psort_${idx}" style="font-size:0.7rem; color:#aaa;">⇅</span>
            </th>`;
        });

        html += `</tr></thead><tbody id="previewBody">`;

        kept.forEach((r, rowIdx) => {
            const willDel = r.本期結存 === 0 && r.月租金結餘 === 0;
            const rowStyle = willDel ? 'color:#bbb;' : '';
            const tag = willDel
                ? '<span style="background:#fef2f2; color:#e8836a; border-radius:4px; padding:1px 5px; font-size:0.72rem; font-weight:700;">導入後移除</span>'
                : (r._isNew ? '<span style="background:#fff8e8; color:#b07020; border-radius:4px; padding:1px 5px; font-size:0.72rem; font-weight:700;">新增</span>' : '');

            const eStyle = `width:100%; min-width:55px; padding:0.3rem 0.4rem; border:none; border-bottom:1.5px solid transparent; background:transparent; font-size:0.78rem; font-family:inherit; text-align:right; outline:none; cursor:pointer;`;
            const eFocus = `onfocus="this.style.borderBottomColor='#f2a7c3';this.style.background='#fff8fc';" onblur="this.style.borderBottomColor='transparent';this.style.background='transparent';"`;
            const noteStyle = `width:100%; min-width:100px; padding:0.3rem 0.4rem; border:none; border-bottom:1.5px solid transparent; background:transparent; font-size:0.78rem; font-family:inherit; outline:none; cursor:pointer;`;

            const numCell = (colName, extraStyle='') => {
                const key = colKeyMap[colName] || colName;
                const raw = r[key] !== undefined ? r[key] : '';
                // 不加千分位，避免parseFloat解析錯誤
                const val = raw !== '' ? raw : '';
                return `<td style="padding:0;"><input type="text" value="${val}" data-prow="${rowIdx}" data-pcol="${colName}" onchange="onPreviewEdit(this)" style="${eStyle}${extraStyle}" ${eFocus} /></td>`;
            };

            html += `<tr style="${rowStyle}" data-preview-row="${rowIdx}">
                <td style="white-space:nowrap;">${r.產品名稱}</td>
                <td style="white-space:nowrap;">${r.批號}</td>
                <td style="white-space:nowrap;">${r.採購部門}</td>
                ${numCell('總檔結存')}
                ${numCell('上期結存')}
                ${numCell('本期入庫')}
                ${numCell('本期出庫')}
                ${numCell('本期結存')}
                ${numCell('總檔租金結餘')}
                ${numCell(`${label}上`)}
                ${numCell(`${label}下`)}
                ${numCell('租金總計','font-weight:700;')}
                ${numCell('分攤單價')}
                ${numCell('月租金(出庫)')}
                ${numCell('月租金(結餘)',`color:${willDel?'#bbb':'#c0507a'};font-weight:700;`)}
                <td>${tag}</td>
                <td style="padding:0;"><input type="text" value="${r.備註||''}" data-prow="${rowIdx}" data-pcol="備註" onchange="onPreviewEdit(this)" style="${noteStyle}" ${eFocus} placeholder="備註..." /></td>
            </tr>`;
        });

        html += `</tbody></table></div></div>`;
        document.getElementById('ledger_results').innerHTML = html;
        statusEl.innerHTML = '<span style="color:#4a9a37; font-weight:700;">✅ 預覽完成，請確認後導入</span>';
        // 只把結餘!=0的存入pendingMonthly（導入時移除清零的）
        window._pendingMonthly = { preview: kept, label, colKeyMap };

    } catch(e) {
        statusEl.innerHTML = `<span style="color:#e8836a;">❌ 失敗：${e.message}</span>`;
        console.error(e);
    }
}

// ===== 預覽表格編輯 =====
window.onPreviewEdit = function(input) {
    const rowIdx = parseInt(input.dataset.prow);
    const colName = input.dataset.pcol;
    if (!window._pendingMonthly) return;
    const r = window._pendingMonthly.preview[rowIdx];
    if (!r) return;

    if (colName === '備註') {
        r.備註 = input.value;
    } else {
        // 移除所有千分位逗號再解析
        const cleaned = input.value.replace(/,/g, '').trim();
        // 只有輸入有效數字才更新，空值不覆蓋
        if (cleaned !== '' && !isNaN(parseFloat(cleaned))) {
            const val = parseFloat(cleaned);
            const keyMap = {
                '總檔結存':'總檔結存',
                '上期結存':'上期結存','本期入庫':'本期入庫','本期出庫':'本期出庫','本期結存':'本期結存',
                '總檔租金結餘':'前期結餘','月租金(出庫)':'月租金出庫','月租金(結餘)':'月租金結餘',
                '租金總計':'租金總計','分攤單價':'分攤單價',
            };
            Object.keys(window._pendingMonthly.colKeyMap||{}).forEach(k => { keyMap[k] = window._pendingMonthly.colKeyMap[k]; });
            const key = keyMap[colName] || colName;
            r[key] = val;
        }
    }

    input.style.background = '#fffbe6';

    // 更新合計卡片 + 紫色合計列
    const allRows = window._pendingMonthly.preview;
    const colKeyMap = window._pendingMonthly.colKeyMap || {};
    const label = window._pendingMonthly.label || '';

    const sumMap = {
        '總檔結存': allRows.reduce((s,row)=>s+(parseFloat(row.總檔結存)||0),0),
        '上期結存': allRows.reduce((s,row)=>s+(row.上期結存||0),0),
        '本期入庫': allRows.reduce((s,row)=>s+(row.本期入庫||0),0),
        '本期出庫': allRows.reduce((s,row)=>s+(row.本期出庫||0),0),
        '本期結存': allRows.reduce((s,row)=>s+(row.本期結存||0),0),
        '總檔租金結餘': allRows.reduce((s,row)=>s+(row.前期結餘||0),0),
        '租金總計': allRows.reduce((s,row)=>s+(row.租金總計||0),0),
        '月租金(出庫)': allRows.reduce((s,row)=>s+(row.月租金出庫||0),0),
        '月租金(結餘)': allRows.reduce((s,row)=>s+(row.月租金結餘||0),0),
    };
    sumMap[`${label}上`] = allRows.reduce((s,row)=>s+(row.上半期||0),0);
    sumMap[`${label}下`] = allRows.reduce((s,row)=>s+(row.下半期||0),0);

    // 更新合計卡片
    const upd = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = '$'+Math.round(val).toLocaleString(); };
    upd('psum_出庫', sumMap['月租金(出庫)']);
    upd('psum_結餘', sumMap['月租金(結餘)']);
    upd('psum_租金總計', sumMap['租金總計']);
    upd('psum_上期', sumMap[`${label}上`]);
    upd('psum_下期', sumMap[`${label}下`]);
    upd('psum_期租金', (sumMap[`${label}上`]||0)+(sumMap[`${label}下`]||0));

    // 更新紫色合計列（第一個tr）
    const thead = document.querySelector('#previewTable thead');
    if (thead) {
        const sumRow = thead.querySelector('tr:first-child');
        if (sumRow) {
            const cols = ['產品名稱','批號','採購部門','總檔結存','上期結存','本期入庫','本期出庫','本期結存','總檔租金結餘',`${label}上`,`${label}下`,'租金總計','分攤單價','月租金(出庫)','月租金(結餘)','狀態','備註'];
            const skipCols = ['產品名稱','批號','採購部門','分攤單價','狀態','備註'];
            Array.from(sumRow.cells).forEach((td, i) => {
                const col = cols[i];
                if (!col || skipCols.includes(col)) return;
                const val = sumMap[col];
                if (val !== undefined) td.textContent = Math.round(val).toLocaleString();
            });
        }
    }
};

let previewSortState = { col: -1, asc: true };
window.sortPreviewTable = function(colIdx) {
    const tbody = document.getElementById('previewBody');
    if (!tbody) return;
    const rows = Array.from(tbody.querySelectorAll('tr')).filter(r => !r.style.background.includes('fdf0f7'));
    previewSortState.asc = (previewSortState.col === colIdx) ? !previewSortState.asc : true;
    previewSortState.col = colIdx;
    rows.sort((a, b) => {
        const aVal = a.cells[colIdx]?.textContent.replace(/,/g,'').trim() || '';
        const bVal = b.cells[colIdx]?.textContent.replace(/,/g,'').trim() || '';
        const aNum = parseFloat(aVal), bNum = parseFloat(bVal);
        if (!isNaN(aNum) && !isNaN(bNum)) return previewSortState.asc ? aNum - bNum : bNum - aNum;
        return previewSortState.asc ? aVal.localeCompare(bVal,'zh-TW') : bVal.localeCompare(aVal,'zh-TW');
    });
    document.querySelectorAll('[id^="psort_"]').forEach(el => el.textContent = '⇅');
    const icon = document.getElementById('psort_' + colIdx);
    if (icon) icon.textContent = previewSortState.asc ? '↑' : '↓';
    const sumRow = tbody.querySelector('tr[style*="fdf0f7"]');
    rows.forEach(r => tbody.insertBefore(r, sumRow || null));
};

async function confirmMonthly() {
    if (!window._pendingMonthly) return;
    const { preview: allPreview, label } = window._pendingMonthly;
    // 導入時才過濾掉本期結存=0的（已出清）
    const preview = allPreview.filter(r => r.本期結存 > 0);
    const resultsEl = document.getElementById('ledger_results');
    resultsEl.innerHTML = '<p style="text-align:center; padding:2rem; color:#2a6a82;">⏳ 寫入 Firebase 中...</p>';

    try {
        // 讀取現有資料（保留月結歷史、採購部門等）
        const existingRows = lsLoadLedgerRows() || [];
        const existingMap = {};
        existingRows.forEach(r => { existingMap[r.產品名稱+'|'+r.批號] = r; });

        const newRows = preview.map(r => {
            const old = existingMap[r._key] || {};
            return {
                產品類別: r.產品類別 || old.產品類別 || '',
                產品代碼: r.產品代碼 || old.產品代碼 || '',
                產品名稱: r.產品名稱,
                批號: r.批號,
                // 採購部門：有值才更新，沒有就保留舊的
                採購部門: r.採購部門 || old.採購部門 || '',
                // 庫存數量
                上期結存: r.上期結存 || 0,
                本期入庫: r.本期入庫 || 0,
                本期出庫: r.本期出庫 || 0,
                本期結存: r.本期結存 || 0,
                總檔結存: r.本期結存 || 0,        // 顯示用：同步更新
                // 租金計算
                前期結餘: r.月租金結餘 || 0,      // 下月計算用：存這月的月租金結餘
                上半期租金: r.上半期 || 0,
                下半期租金: r.下半期 || 0,
                租金總計: r.租金總計 || 0,
                分攤單價: r.分攤單價 || 0,
                月租金出庫: r.月租金出庫 || 0,
                月租金結餘: r.月租金結餘 || 0,
                總檔租金結餘: r.月租金結餘 || 0,  // 顯示用：同步更新
                // 歷史和備註
                月結歷史: { ...(old.月結歷史||{}), [label]: r.租金總計 },
                備註: r.備註 || old.備註 || '',
                月份: label,
                updatedAt: new Date().toISOString()
            };
        });

        // 不清除舊資料，但明確移除本期結存=0的（已出清，不該有結餘）
        const finalMap = {};
        existingRows.forEach(r => { finalMap[r.產品名稱+'|'+r.批號] = r; });
        newRows.forEach(r => { finalMap[r.產品名稱+'|'+r.批號] = r; });
        
        // 刪除本期結存=0的（已出清，無論有無結餘）
        const finalRows = Object.values(finalMap).filter(r => r.本期結存 > 0);

        await saveLedgerRows(finalRows);
        await saveMonthlyRecord(label, {
            count: newRows.length,
            totalRental: preview.reduce((s,r)=>s+r.租金總計,0)
        });
        await refreshLedgerStatus();
        window._pendingMonthly = null;

        resultsEl.innerHTML = `
            <div style="text-align:center; padding:2rem;">
                <div style="font-size:2rem; margin-bottom:0.5rem;">🎉</div>
                <div style="font-weight:800; font-size:1.2rem; color:#4a9a37;">${label} 月結算完成！</div>
                <div style="color:#8a6a7a; margin-top:0.5rem;">更新 ${newRows.length} 筆，總帳共 ${finalRows.length} 筆</div>
                <button onclick="viewLedger()" class="btn-primary" style="margin-top:1rem; width:auto; padding:0.6rem 1.5rem;">📋 檢視總帳</button>
            </div>`;
    } catch(e) {
        resultsEl.innerHTML = `<p style="color:#e8836a; text-align:center; padding:2rem;">❌ 寫入失敗：${e.message}</p>`;
    }
}

async function viewLedger() {

        if (rows.length === 0) { resultsEl.innerHTML = '<p style="color:#999; text-align:center; padding:2rem;">總帳尚無資料</p>'; return; }

        // 只顯示月租金結餘 > 0 的
        const activeRows = rows.filter(r => (r.月租金結餘 ?? r.前期結餘 ?? 0) > 0);

        // 採購部門小計

                    <div style="font-size:1.1rem; font-weight:800; color:#c0507a;">$${Math.round(total).toLocaleString()}</div>
                </div>`).join('');

        let grandTotal = activeRows.reduce((s,r) => s+(r.月租金結餘 ?? r.前期結餘 ?? 0), 0);

        let tableRows = '';
        activeRows.sort((a,b) => {

        }).forEach(r => {

                <td style="white-space:nowrap;">${r.產品類別||''}</td>
                <td style="white-space:nowrap;">${r.產品代碼||''}</td>
                <td>${r.產品名稱}</td>
                <td style="white-space:nowrap;">${r.批號}</td>

// 出入庫表標準欄位（有標題時欄名對應，沒標題時用位置對應）
const IO_COLS = ['單據日期','核算組織名稱','業務屬性','產品代碼','產品名稱','產品規格',
                 '數量','入庫單位名稱','倉庫名稱','存貨屬性','批號','出入庫時間',
                 '往來對象名稱','備註','部門名稱','人員名稱','來源單種類'];

function readExcel(file, isIOTable = false) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const wb = window.XLSX.read(e.target.result, { type: 'array' });
                const ws = wb.Sheets[wb.SheetNames[0]];

                if (isIOTable) {
                    // 先讀無標題版本，檢查第一列是否為日期資料
                    const rawRows = window.XLSX.utils.sheet_to_json(ws, { header: 1 });
                    if (rawRows.length === 0) { resolve([]); return; }

                    const firstRow = rawRows[0];
                    // 判斷有無標題：第一格是日期（數字或日期字串）就代表沒有標題
                    const firstCell = String(firstRow[0] || '').trim();
                    const hasHeader = isNaN(Date.parse(firstCell)) && firstCell !== '' && !firstCell.match(/^\d{4}-\d{2}-\d{2}/);

                    let json;
                    if (hasHeader) {
                        // 有標題行，正常讀取
                        json = window.XLSX.utils.sheet_to_json(ws);
                    } else {
                        // 無標題行，手動套用欄位名稱
                        const colCount = firstRow.length;
                        const cols = IO_COLS.slice(0, colCount);
                        json = rawRows.map(row => {
                            const obj = {};
                            cols.forEach((col, i) => { obj[col] = row[i]; });
                            return obj;
                        });
                    }
                    resolve(json);
                } else {
                    // 租金表和重量表都有標題，正常讀取
                    const json = window.XLSX.utils.sheet_to_json(ws);
                    resolve(json);
                }
            } catch (err) {
                reject(err);
            }
        };
        reader.onerror = () => reject(new Error('檔案讀取失敗'));
        reader.readAsArrayBuffer(file);
    });
}

function calculateRental(rentalData, ioData, weightData) {
    const config = getConfig();
    const result = [];

    for (const row of rentalData) {
        const productName = String(row[config.col_product1] || '').trim();
        const batchNo = String(row[config.col_batch1] || '').trim();
        const beginQty = parseFloat(row[config.col_begin]) || 0;
        const endQty = parseFloat(row[config.col_end]) || 0;
        const inboundQty = parseFloat(row[config.col_inbound]) || 0;

        // 查詢重量
        const weightRow = weightData.find(w => String(w[config.col_product3] || '').trim() === productName);
        const weight = weightRow ? parseFloat(weightRow[config.col_weight]) || 0 : 0;

        // 計算計價重量
        let pricingWeight = 0;
        if (beginQty !== 0) {
            pricingWeight = beginQty * weight;
        } else if (inboundQty !== 0) {
            pricingWeight = inboundQty * weight;
        }

        // 安全日期解析（支援 YYYY-MM-DD 字串或 Excel 數字格式）
        const parseDate = (val) => {
            if (!val) return null;
            if (val instanceof Date) return isNaN(val) ? null : val;
            if (typeof val === 'number') {
                // Excel 數字日期（序列號）
                const d = new Date(Math.round((val - 25569) * 86400 * 1000));
                return isNaN(d) ? null : d;
            }
            const str = String(val).trim().replace(/\//g, '-');
            const d = new Date(str);
            return isNaN(d) ? null : d;
        };

        const periodStart = parseDate(document.getElementById('startDate').value);
        const periodEnd = parseDate(document.getElementById('endDate').value);

        if (!periodStart || !periodEnd) {
            throw new Error('請先填入正確的期初/期末日期（格式：20260401）');
        }

        // 入庫類型（含「入」或明確名稱）
        const isInbound = (type) => type && (type.includes('採購收貨') || type.includes('調撥入庫') || type.includes('拆解入庫') || type.includes('入庫'));
        // 出庫類型（含「出」）
        const isOutbound = (type) => type && (type.includes('調撥出庫') || type.includes('銷售出貨') || type.includes('拆解出庫') || type.includes('出庫') || type.includes('出貨'));

        // 該產品批號的出入庫記錄（trim避免空白差異）
        const normalize = (v) => String(v || '').trim();
        const ioMatch = ioData.filter(io =>
            normalize(io[config.col_product2]) === normalize(productName) &&
            normalize(io[config.col_batch2]) === normalize(batchNo)
        );

        // 情況1：期初數量 = 0 → 起始日 = 批號前8碼（入庫日）
        // 情況2：期初數量 ≠ 0 → 起始日 = 設定的期初日期
        let startDate = periodStart;
        if (beginQty === 0) {
            const digits = batchNo.replace(/\D/g, '').slice(0, 8);
            if (digits.length === 8) {
                const d = parseDate(`${digits.slice(0,4)}-${digits.slice(4,6)}-${digits.slice(6,8)}`);
                if (d) startDate = d;
            }
        }

        // 情況3：期末數量 = 0 → 結束日 = 最後一筆出庫日期
        // 情況4：期末數量 ≠ 0 → 結束日 = 設定的期末日期
        let endDate = periodEnd;
        if (endQty === 0) {
            const outRecords = ioMatch
                .filter(io => isOutbound(io[config.col_type]))
                .map(io => parseDate(io[config.col_date]))
                .filter(d => d !== null)
                .sort((a, b) => b - a);
            if (outRecords.length > 0) endDate = outRecords[0];
        }

        // 天數 = (結束日 - 起始日) + 1
        const days = (startDate && endDate)
            ? Math.max(1, Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1)
            : 1;

        // 格式化日期顯示
        const fmt = d => d ? d.toISOString().slice(0, 10) : '';
        const startDateStr = fmt(startDate);
        const endDateStr = fmt(endDate);

        // 出入庫酌收：只有「期初=0 且 有入庫」才收（代表本期新入庫的批次）
        const hasInbound = beginQty === 0 && ioMatch.some(io => isInbound(io[config.col_type]));

        // 採購部門（本期入庫的部門）
        let purchaseDept = '';
        const inboundRecords = ioMatch.filter(io => isInbound(io[config.col_type]));
        if (inboundRecords.length > 0) {
            purchaseDept = inboundRecords[0][config.col_dept] || '';
        }

        // 計算租金
        const baseRate = parseFloat(document.getElementById('dailyRate').value) || 0.8;
        const handlingFee = parseFloat(document.getElementById('handlingFee').value) || 1.0;
        const ratePer15Days = 15;

        let rentalCost = 0;
        // 天數 > 10 用整期費率，天數 <= 10 按比例計算
        if (days > 10) {
            rentalCost = baseRate * pricingWeight;
        } else {
            rentalCost = (baseRate / ratePer15Days) * days * pricingWeight;
        }
        rentalCost = Math.round(rentalCost); // 四捨五入整數

        // 出入庫酌收（分開）
        let handlingCost = 0;
        if (hasInbound) {
            handlingCost = handlingFee * pricingWeight;
        }

        const totalCost = rentalCost + handlingCost;

        // 組合結果（保留原欄位 + 新增計算欄位）
        const result_row = {
            ...row,
            '[期初]': startDateStr || '',
            '[期末]': endDateStr || '',
            '天數': days,
            '淨重': weight.toFixed(4),
            '計價重量': pricingWeight.toFixed(2),
            '出入庫': Math.round(handlingCost).toString(),
            '租金': rentalCost.toString(),
            '總計': (rentalCost + Math.round(handlingCost)).toString(),
            '採購部門': purchaseDept
        };

        result.push(result_row);
    }

    return result;
}

let sortState = { col: -1, asc: true };

function sortTable(colIdx) {
    const tbody = document.getElementById('resultBody');
    if (!tbody) return;
    const rows = Array.from(tbody.querySelectorAll('tr'));

    if (sortState.col === colIdx) {
        sortState.asc = !sortState.asc;
    } else {
        sortState.col = colIdx;
        sortState.asc = true;
    }

    rows.sort((a, b) => {
        const aVal = a.cells[colIdx]?.textContent.trim() || '';
        const bVal = b.cells[colIdx]?.textContent.trim() || '';
        const aNum = parseFloat(aVal);
        const bNum = parseFloat(bVal);
        if (!isNaN(aNum) && !isNaN(bNum)) {
            return sortState.asc ? aNum - bNum : bNum - aNum;
        }
        return sortState.asc ? aVal.localeCompare(bVal, 'zh-TW') : bVal.localeCompare(aVal, 'zh-TW');
    });

    // 更新排序圖示
    document.querySelectorAll('[id^="sort_"]').forEach(el => el.textContent = '⇅');
    const icon = document.getElementById('sort_' + colIdx);
    if (icon) icon.textContent = sortState.asc ? '↑' : '↓';

    rows.forEach(r => tbody.appendChild(r));
    updateCount();
}

function applyFilter() {
    const keyword = document.getElementById('filterInput')?.value.trim().toLowerCase() || '';
    const col = document.getElementById('filterCol')?.value || '產品名稱';
    const displayCols = [
        '產品類別', '產品代碼', '產品名稱', '產品規格', '基本單位',
        '倉庫', '存貨屬性', '批號', '庫存狀態',
        '上期結存', '本期入庫', '本期出庫', '本期結存',
        '[期初]', '[期末]', '天數', '淨重', '計價重量',
        '出入庫', '租金', '總計', '採購部門'
    ];
    const colIdx = displayCols.indexOf(col);
    const tbody = document.getElementById('resultBody');
    if (!tbody) return;

    let visible = 0;
    tbody.querySelectorAll('tr').forEach(row => {
        const cell = colIdx >= 0 ? row.cells[colIdx]?.textContent.toLowerCase() || '' : '';
        const show = !keyword || cell.includes(keyword);
        row.style.display = show ? '' : 'none';
        if (show) visible++;
    });

    const note = document.getElementById('filterNote');
    if (note) note.textContent = keyword ? `顯示 ${visible} 筆` : '';
    updateCount();
    recalcSummary();
}

function clearFilter() {
    const input = document.getElementById('filterInput');
    if (input) input.value = '';
    const tbody = document.getElementById('resultBody');
    if (tbody) tbody.querySelectorAll('tr').forEach(r => r.style.display = '');
    const note = document.getElementById('filterNote');
    if (note) note.textContent = '';
    updateCount();
    recalcSummary();
}

function updateCount() {
    const tbody = document.getElementById('resultBody');
    const counter = document.getElementById('resultCount');
    if (!tbody || !counter) return;
    const total = tbody.querySelectorAll('tr').length;
    const visible = Array.from(tbody.querySelectorAll('tr')).filter(r => r.style.display !== 'none').length;
    counter.textContent = visible < total ? `${visible} / ${total}` : total;
}

function onCellEdit(input) {
    const rowIdx = parseInt(input.dataset.row);
    const col = input.dataset.col;
    calculatedData[rowIdx][col] = input.value;

    // 若修改出入庫或租金，自動更新總計
    if (col === '出入庫' || col === '租金') {
        const row = calculatedData[rowIdx];
        const newTotal = (parseFloat(row['租金']) || 0) + (parseFloat(row['出入庫']) || 0);
        row['總計'] = Math.round(newTotal).toString();
        // 更新同行的總計input
        const tr = input.closest('tr');
        if (tr) {
            const inputs = tr.querySelectorAll('input[data-col="總計"]');
            inputs.forEach(el => el.value = row['總計']);
        }
    }
    // 標記已手動修改（背景變淡黃）
    input.style.background = '#fffbe6';
    recalcSummary();
}

function recalcSummary() {
    const tbody = document.getElementById('resultBody');
    if (!tbody) return;

    // 只加總目前「可見」的列
    const visibleRows = Array.from(tbody.querySelectorAll('tr[data-row]'))
        .filter(r => r.style.display !== 'none');

    let totalRental = 0, totalHandling = 0, totalSum = 0, totalWeight = 0;
    visibleRows.forEach(tr => {
        const rowIdx = parseInt(tr.dataset.row);
        const row = calculatedData[rowIdx];
        if (!row) return;
        totalRental   += parseFloat(row['租金'])      || 0;
        totalHandling += parseFloat(row['出入庫'])     || 0;
        totalSum      += parseFloat(row['總計'])       || 0;
        totalWeight   += parseFloat(row['計價重量'])   || 0;
    });

    const fmt = n => '$' + Math.round(n).toLocaleString();
    const el = id => document.getElementById(id);
    if (el('totalRental'))   el('totalRental').textContent   = fmt(totalRental);
    if (el('totalHandling')) el('totalHandling').textContent = fmt(totalHandling);
    if (el('totalSum'))      el('totalSum').textContent      = fmt(totalSum);
    if (el('totalWeight'))   el('totalWeight').textContent   = totalWeight.toFixed(2);
}

function toggleTotalRow() {
    const show = document.getElementById('showTotal')?.checked;
    const row = document.getElementById('totalRow');
    if (row) row.style.display = show ? '' : 'none';
    if (show) recalcSummary();
}

function exportResults() {
    if (!calculatedData) return;
    // 匯出時包含手動修改後的值（直接讀calculatedData，onCellEdit已同步）
    const ws = window.XLSX.utils.json_to_sheet(calculatedData);
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, "租金計算結果");
    const filename = `租金計算_${new Date().toISOString().slice(0,10)}.xlsx`;
    window.XLSX.writeFile(wb, filename);
    showStatus('✅ 檔案已下載！', 'success');
}
// 掛載所有函式到 window
window.doInitLedger = doInitLedger;
window.previewMonthly = previewMonthly;
window.confirmMonthly = confirmMonthly;
window.viewLedger = viewLedger;
window.exportLedger = exportLedger;
window.clearLedger = clearLedger;
window.openSettings = openSettings;
window.closeSettings = closeSettings;
window.resetForm = resetForm;
window.processFiles = processFiles;
window.sortTable = sortTable;
window.applyFilter = applyFilter;
window.clearFilter = clearFilter;
window.exportResults = exportResults;
window.onCellEdit = onCellEdit;
window.toggleTotalRow = toggleTotalRow;
window.autoFormatDate = autoFormatDate;
window.dragOver = dragOver;
window.dragLeave = dragLeave;
window.dropFile = dropFile;
</script>
