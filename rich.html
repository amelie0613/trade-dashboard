<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>應付款日曆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f9fb;
    --bg2: #ffffff;
    --bg3: #f1f3f7;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15);
    --text: #1a1d27;
    --text2: #5a5f75;
    --text3: #9094a8;
    --ntd: #1a7abf;
    --ntd-bg: rgba(26,122,191,0.10);
    --usd: #1a9e6e;
    --usd-bg: rgba(26,158,110,0.10);
    --jpy: #b87413;
    --jpy-bg: rgba(184,116,19,0.10);
    --zar: #c0432a;
    --zar-bg: rgba(192,67,42,0.10);
    --overdue: #c0302f;
    --overdue-bg: rgba(192,48,47,0.10);
    --est: #6d45d4;
    --est-bg: rgba(109,69,212,0.10);
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .status-pill {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2); box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    color: var(--text2);
  }
  .status-pill.ok { border-color: rgba(87,217,163,0.4); color: var(--usd); }
  .status-pill.loading { border-color: rgba(244,169,66,0.4); color: var(--jpy); }
  .status-pill.error { border-color: rgba(240,101,101,0.4); color: var(--overdue); }

  /* ── Summary bar ── */
  .summary-wrap {
    padding: 16px 24px 0;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sum-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    min-width: 140px;
    flex: 1;
    max-width: 220px;
  }
  .sum-label { font-size: 10px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .sum-val { font-size: 16px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .sum-val.ntd { color: var(--ntd); }
  .sum-val.usd { color: var(--usd); }
  .sum-val.jpy { color: var(--jpy); }
  .sum-val.zar { color: var(--zar); }

  /* ── Calendar nav ── */
  .cal-nav {
    padding: 16px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .cal-title { font-size: 22px; font-weight: 700; letter-spacing: 0.02em; }
  .cal-title span { color: var(--text3); font-weight: 400; font-size: 16px; margin-left: 6px; }
  .nav-btns { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    background: var(--bg2);
    border: 1px solid var(--border2); box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    border-radius: var(--radius);
    color: var(--text2);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .nav-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-btn.today { border-color: rgba(78,168,222,0.4); color: var(--ntd); }

  /* ── Legend ── */
  .legend {
    padding: 0 24px 12px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--text3);
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .leg-ntd { background: var(--ntd); }
  .leg-usd { background: var(--usd); }
  .leg-jpy { background: var(--jpy); }
  .leg-zar { background: var(--zar); }
  .leg-overdue { background: var(--overdue); }
  .leg-est { background: var(--est); }

  /* ── Calendar grid ── */
  .cal-wrap { padding: 0 24px 24px; }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .dow-label {
    text-align: center;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    padding: 6px 0 8px;
    letter-spacing: 0.05em;
  }
  .day-cell {
    min-height: 88px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .day-cell:hover { border-color: var(--border2); background: var(--bg3); }
  .day-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .day-cell.today { border-color: rgba(78,168,222,0.5); }
  .day-cell.today::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--ntd);
    border-radius: 2px 2px 0 0;
  }
  .day-num {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    margin-bottom: 5px;
  }
  .day-cell.today .day-num { color: var(--ntd); font-weight: 700; }
  .amt-pill {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    border-radius: 4px;
    padding: 2px 5px;
    margin-bottom: 2px;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }
  .pill-ntd { background: var(--ntd-bg); color: var(--ntd); }
  .pill-usd { background: var(--usd-bg); color: var(--usd); }
  .pill-jpy { background: var(--jpy-bg); color: var(--jpy); }
  .pill-zar { background: var(--zar-bg); color: var(--zar); }
  .pill-overdue { background: var(--overdue-bg); color: var(--overdue); }
  .pill-est { background: var(--est-bg); color: var(--est); }
  .day-count { font-size: 9px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2); box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 580px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-hdr {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .modal-date { font-size: 13px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 2px; }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-close {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--bg3); }
  .filter-row {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-btn {
    font-size: 11px;
    font-family: 'Noto Sans TC', sans-serif;
    border: 1px solid var(--border2); box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    background: none;
    color: var(--text2);
    transition: all 0.15s;
  }
  .filter-btn:hover { background: var(--bg3); color: var(--text); }
  .filter-btn.active { background: rgba(78,168,222,0.15); border-color: rgba(78,168,222,0.5); color: var(--ntd); }
  .modal-body { overflow-y: auto; padding: 0 20px 16px; flex: 1; }
  .item-row {
    display: grid;
    grid-template-columns: 46px 60px 1fr auto;
    gap: 8px;
    align-items: start;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .item-row:last-child { border-bottom: none; }
  .dept-tag {
    background: var(--bg3);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 10px;
    color: var(--text2);
    text-align: center;
    font-weight: 500;
  }
  .cat-wrap { display: flex; flex-direction: column; gap: 3px; }
  .cat-txt { font-size: 10px; color: var(--text3); }
  .status-badge {
    font-size: 9px;
    border-radius: 3px;
    padding: 1px 4px;
    font-family: 'DM Mono', monospace;
  }
  .s-overdue { background: var(--overdue-bg); color: var(--overdue); }
  .s-ap { background: var(--ntd-bg); color: var(--ntd); }
  .s-est { background: var(--est-bg); color: var(--est); }
  .note-txt { color: var(--text); font-size: 12px; line-height: 1.5; }
  .amt-col { text-align: right; }
  .amt-ntd { color: var(--ntd); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
  .amt-usd { color: var(--usd); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
  .amt-jpy { color: var(--jpy); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
  .amt-zar { color: var(--zar); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; }
  .modal-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }
  .modal-footer strong { color: var(--text); font-weight: 700; }

  /* ── Skeleton shimmer ── */
  @keyframes shimmer {
    0% { background-position: -600px 0; }
    100% { background-position: 600px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, #ececec 25%, #f5f5f5 50%, #ececec 75%);
    background-size: 600px 100%;
    animation: shimmer 1.4s infinite linear;
    border-radius: 4px;
  }
  .skel-pill { height: 13px; margin-bottom: 4px; }
  .updating-badge {
    display: none;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(184,116,19,0.12);
    color: var(--jpy);
    border: 1px solid rgba(184,116,19,0.25);
    margin-left: 8px;
    vertical-align: middle;
  }
  .updating-badge.show { display: inline; }

  @media (max-width: 600px) {
    .topbar { padding: 0 14px; }
    .summary-wrap, .cal-nav, .legend, .cal-wrap { padding-left: 12px; padding-right: 12px; }
    .sum-card { max-width: 100%; }
    .day-cell { min-height: 64px; padding: 4px 5px; }
    .item-row { grid-template-columns: 40px 1fr auto; }
    .cat-wrap { display: none; }
  }
</style>
</head>
<body>


<div class="topbar">
  <div>
    <div class="topbar-title">應付款日曆 <span class="updating-badge" id="updating-badge">更新中...</span></div>
    <div class="topbar-sub" id="last-update">--</div>
  </div>
  <div id="status-pill" class="status-pill loading">載入中...</div>
</div>

<div class="summary-wrap" id="summary-wrap"></div>

<div class="cal-nav">
  <div>
    <div class="cal-title" id="cal-title">-- 年 -- 月<span id="cal-count"></span></div>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="prevMonth()">‹ 上月</button>
    <button class="nav-btn today" onclick="goToday()">今天</button>
    <button class="nav-btn" onclick="nextMonth()">下月 ›</button>
  </div>
</div>

<div class="legend">
  <span class="legend-item"><span class="legend-dot leg-ntd"></span>NTD</span>
  <span class="legend-item"><span class="legend-dot leg-usd"></span>USD</span>
  <span class="legend-item"><span class="legend-dot leg-jpy"></span>JPY</span>
  <span class="legend-item"><span class="legend-dot leg-zar"></span>ZAR</span>
  <span class="legend-item"><span class="legend-dot leg-overdue"></span>逾期</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--ntd)"></span>應付</span>
  <span class="legend-item"><span class="legend-dot leg-est"></span>預估</span>
</div>

<div class="cal-wrap">
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-date" id="modal-date"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="filter-row" id="filter-row"></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
// 部署好 Apps Script 後，把 URL 貼在這裡
const API_URL = 'https://script.google.com/macros/s/AKfycbzwTjIUwk78gMe3bIGBcJRrm88XEKNG94S5VA5O14AmqI7uBuzgLmJL_23bPM1fqvuQfA/exec';

// 如果還沒設定 API，使用靜態資料作為 fallback
const FALLBACK_DATA = null; // 留 null 會顯示錯誤提示
// ────────────────────────────────────────────────────────

const today = new Date();
let curYear = today.getFullYear();
let curMonth = today.getMonth();
let allData = [];
let modalItems = [];
let modalFilter = '全部';

function fmtNTD(v) { return v ? 'NT$' + Math.round(v).toLocaleString() : null; }
function fmtUSD(v) { return v ? 'US$' + (+v).toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2}) : null; }
function fmtJPY(v) { return v ? '¥' + Math.round(v).toLocaleString() : null; }
function fmtZAR(v) { return v ? 'ZAR ' + (+v).toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2}) : null; }

function sumCur(items) {
  return items.reduce((a, r) => ({
    ntd: a.ntd + (r.ntd||0),
    usd: a.usd + (r.usd||0),
    jpy: a.jpy + (r.jpy||0),
    zar: a.zar + (r.zar||0)
  }), {ntd:0, usd:0, jpy:0, zar:0});
}

function groupByDate(data) {
  const m = {};
  data.forEach(r => { if (!m[r.date]) m[r.date] = []; m[r.date].push(r); });
  return m;
}

function pillClass(items) {
  if (items.some(r => r.status === '逾期')) return 'pill-overdue';
  if (items.some(r => r.status === '預估')) return 'pill-est';
  return null;
}

function renderSummary() {
  const byDate = groupByDate(allData);
  let ntd=0, usd=0, jpy=0, zar=0;
  Object.keys(byDate).forEach(k => {
    const d = new Date(k.replace(/\//g, '-'));
    if (d.getFullYear() === curYear && d.getMonth() === curMonth) {
      const s = sumCur(byDate[k]);
      ntd += s.ntd; usd += s.usd; jpy += s.jpy; zar += s.zar;
    }
  });
  let html = '';
  if (ntd) html += `<div class="sum-card"><div class="sum-label">NTD · 本月</div><div class="sum-val ntd">NT$${Math.round(ntd).toLocaleString()}</div></div>`;
  if (usd) html += `<div class="sum-card"><div class="sum-label">USD · 本月</div><div class="sum-val usd">US$${usd.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>`;
  if (jpy) html += `<div class="sum-card"><div class="sum-label">JPY · 本月</div><div class="sum-val jpy">¥${Math.round(jpy).toLocaleString()}</div></div>`;
  if (zar) html += `<div class="sum-card"><div class="sum-label">ZAR · 本月</div><div class="sum-val zar">ZAR ${zar.toFixed(2)}</div></div>`;
  document.getElementById('summary-wrap').innerHTML = html;
}

function renderCalendar() {
  const byDate = groupByDate(allData);
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

  let monthCount = 0;
  Object.keys(byDate).forEach(k => {
    const d = new Date(k.replace(/\//g, '-'));
    if (d.getFullYear() === curYear && d.getMonth() === curMonth) monthCount += byDate[k].length;
  });

  document.getElementById('cal-title').innerHTML = `${curYear} 年 ${monthNames[curMonth]}<span>${monthCount ? ' · ' + monthCount + ' 筆' : ''}</span>`;

  const DOWS = ['日','一','二','三','四','五','六'];
  let html = DOWS.map(d => `<div class="dow-label">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) html += `<div class="day-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${curYear}/${String(curMonth+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
    const items = byDate[ds] || [];
    const isTd = today.getFullYear()===curYear && today.getMonth()===curMonth && today.getDate()===d;
    const cls = pillClass(items);
    html += `<div class="day-cell${isTd?' today':''}${items.length?' has-data':''}" onclick="openModal('${ds}')">
      <div class="day-num">${d}</div>`;
    if (items.length) {
      const s = sumCur(items);
      if (s.ntd) html += `<span class="amt-pill ${cls||'pill-ntd'}">${fmtNTD(s.ntd)}</span>`;
      if (s.usd) html += `<span class="amt-pill ${cls||'pill-usd'}">${fmtUSD(s.usd)}</span>`;
      if (s.jpy) html += `<span class="amt-pill ${cls||'pill-jpy'}">${fmtJPY(s.jpy)}</span>`;
      if (s.zar) html += `<span class="amt-pill ${cls||'pill-zar'}">${fmtZAR(s.zar)}</span>`;
      if (items.length > 3) html += `<div class="day-count">+${items.length} 筆</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  renderSummary();
}

function prevMonth() { curMonth--; if (curMonth < 0) { curMonth = 11; curYear--; } renderCalendar(); }
function nextMonth() { curMonth++; if (curMonth > 11) { curMonth = 0; curYear++; } renderCalendar(); }
function goToday() { curYear = today.getFullYear(); curMonth = today.getMonth(); renderCalendar(); }

function openModal(dateStr) {
  const byDate = groupByDate(allData);
  const items = byDate[dateStr];
  if (!items || !items.length) return;
  modalItems = items;
  modalFilter = '全部';
  const p = dateStr.split('/');
  document.getElementById('modal-date').textContent = dateStr;
  document.getElementById('modal-title').textContent = `${p[1]} 月 ${p[2]} 日 應付款`;
  renderModalContent();
  document.getElementById('modal-overlay').classList.add('open');
}

function renderModalContent() {
  const items = modalFilter === '全部' ? modalItems
    : modalItems.filter(r => r.status === modalFilter || r.dept === modalFilter);

  const depts = [...new Set(modalItems.map(r => r.dept))];
  const statuses = [...new Set(modalItems.map(r => r.status))];

  let fHtml = `<button class="filter-btn${modalFilter==='全部'?' active':''}" onclick="setFilter('全部')">全部 (${modalItems.length})</button>`;
  depts.forEach(d => {
    const n = modalItems.filter(r => r.dept === d).length;
    fHtml += `<button class="filter-btn${modalFilter===d?' active':''}" onclick="setFilter('${d}')">${d} (${n})</button>`;
  });
  statuses.forEach(s => {
    const n = modalItems.filter(r => r.status === s).length;
    const cl = s==='逾期'?'s-overdue':s==='預估'?'s-est':'s-ap';
    fHtml += `<button class="filter-btn${modalFilter===s?' active':''}" onclick="setFilter('${s}')">${s} (${n})</button>`;
  });
  document.getElementById('filter-row').innerHTML = fHtml;

  let iHtml = '';
  items.forEach(r => {
    const sc = r.status==='逾期'?'s-overdue':r.status==='預估'?'s-est':'s-ap';
    const amts = [];
    if (r.ntd) amts.push(`<div class="amt-ntd">${fmtNTD(r.ntd)}</div>`);
    if (r.usd) amts.push(`<div class="amt-usd">${fmtUSD(r.usd)}</div>`);

      <div><div class="dept-tag">${r.dept}</div></div>
      <div class="cat-wrap">
        <div class="cat-txt">${r.cat}</div>

  });

  const s = sumCur(items);
  let tHtml = '合計 ';
  if (s.ntd) tHtml += `<strong>${fmtNTD(s.ntd)}</strong> `;
  if (s.usd) tHtml += `<strong>${fmtUSD(s.usd)}</strong> `;
  if (s.jpy) tHtml += `<strong>${fmtJPY(s.jpy)}</strong> `;
  if (s.zar) tHtml += `<strong>${fmtZAR(s.zar)}</strong>`;
  document.getElementById('modal-footer').innerHTML = tHtml;
}

// ── Data loading with localStorage cache ─────────────
const CACHE_KEY = 'ap_calendar_data';
const CACHE_TS_KEY = 'ap_calendar_ts';
const CACHE_TTL = 5 * 60 * 1000; // 5 分鐘內不重新抓

function saveCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
  } catch(e) {}
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function cacheAge() {
  try {
    const ts = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
    return Date.now() - ts;
  } catch(e) { return Infinity; }
}

function renderSkeleton() {
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const DOWS = ['日','一','二','三','四','五','六'];
  let html = DOWS.map(d => `<div class="dow-label">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="day-cell empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    html += `<div class="day-cell" style="cursor:default">
      <div class="day-num">${d}</div>
      ${Math.random()>0.55 ? `<div class="skel-pill skeleton" style="width:${60+Math.random()*30}%"></div>` : ''}
      ${Math.random()>0.75 ? `<div class="skel-pill skeleton" style="width:${40+Math.random()*25}%"></div>` : ''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

async function fetchFromAPI() {
  const res = await fetch(API_URL);
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function loadData() {
  const cached = loadCache();

  if (cached) {
    // 有快取 → 立即顯示，背景靜默更新
    allData = cached;
    const ts = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
    const timeStr = ts ? new Date(ts).toLocaleString('zh-TW') : '--';
    document.getElementById('last-update').textContent = '快取：' + timeStr;
    document.getElementById('status-pill').className = 'status-pill ok';
    document.getElementById('status-pill').textContent = '快取資料';
    renderCalendar();

    // 超過 TTL 才背景更新
    if (cacheAge() > CACHE_TTL && API_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') {
      document.getElementById('updating-badge').classList.add('show');
      try {
        const fresh = await fetchFromAPI();
        allData = fresh;
        saveCache(fresh);
        document.getElementById('last-update').textContent = '更新：' + new Date().toLocaleString('zh-TW');
        document.getElementById('status-pill').className = 'status-pill ok';
        document.getElementById('status-pill').textContent = '已同步';
        renderCalendar();
      } catch(e) {
        console.warn('背景更新失敗', e.message);
      } finally {
        document.getElementById('updating-badge').classList.remove('show');
      }
    }
  } else {
    // 無快取 → 顯示骨架畫面，等 API 回來
    renderSkeleton();
    document.getElementById('status-pill').textContent = '載入中...';
    try {
      if (!API_URL || API_URL === 'YOUR_APPS_SCRIPT_URL_HERE') throw new Error('未設定 API');
      const data = await fetchFromAPI();
      allData = data;
      saveCache(data);
      document.getElementById('last-update').textContent = '更新：' + new Date().toLocaleString('zh-TW');
      document.getElementById('status-pill').className = 'status-pill ok';
      document.getElementById('status-pill').textContent = '已同步';
    } catch(e) {
      console.warn('API 失敗，使用靜態資料', e.message);
      allData = getInlineData();
      document.getElementById('status-pill').className = 'status-pill error';
      document.getElementById('status-pill').textContent = '離線資料';
      document.getElementById('last-update').textContent = '使用靜態資料';
    }
    renderCalendar();
  }
}
