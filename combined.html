<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收付款日曆</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  /* 小花風格配色 */
  --pink:#F2A7C3; --red:#F08080; --orange:#F7A35C; --yellow:#F7D96B;
  --green:#8DCC7A; --sky:#7EC8E3; --indigo:#6B5B95; --coral:#E8836A; --purple:#C9A8E0;

  /* 背景 */
  --bg:linear-gradient(135deg,#fff0f6 0%,#f3eeff 50%,#e8f6ff 100%);
  --bg-solid:#fff5f9;
  --bg2:#ffffff;
  --bg3:#fdf0f7;
  --border:rgba(242,167,195,0.25);
  --border2:rgba(242,167,195,0.5);
  --text:#3d2a3a; --text2:#7a5870; --text3:#b08fa0;

  /* 應付 */
  --ntd:#5b8dd9; --ntd-bg:rgba(91,141,217,0.12);
  --usd:#3aab7a; --usd-bg:rgba(58,171,122,0.12);
  --jpy:#c07428; --jpy-bg:rgba(192,116,40,0.12);
  --zar:#d04545; --zar-bg:rgba(208,69,69,0.12);
  /* 應收 */
  --rcv:#46b86e; --rcv-bg:rgba(70,184,110,0.12);
  --rcv-usd:#2e87c8; --rcv-usd-bg:rgba(46,135,200,0.12);
  /* 狀態 */
  --overdue:#e05252; --overdue-bg:rgba(224,82,82,0.12);
  --est:#8b6bd6; --est-bg:rgba(247,217,107,0.35);
  --done:#9aabb8; --done-bg:rgba(154,171,184,0.10);
  --radius:18px; --radius-lg:20px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fafbff;background-image:linear-gradient(135deg,#fff8fb 0%,#f8f5ff 50%,#f2f9ff 100%);font-family:'Noto Sans TC',sans-serif;color:var(--text);min-height:100vh;}

/* ── 花卉裝飾 SVG ── */
.flower-bar{position:relative;overflow:hidden;background:linear-gradient(90deg,#F2A7C3,#C9A8E0,#7EC8E3,#8DCC7A,#F7D96B,#F7A35C,#F08080,#F2A7C3);height:5px;}

/* ── topbar ── */
.topbar{background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(242,167,195,0.15);}
.topbar-title{font-size:15px;font-weight:700;font-family:'Quicksand',sans-serif;color:var(--indigo);}
.topbar-title::before{content:'🌸 ';}
.topbar-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:1px;}
.status-row{display:flex;gap:6px;align-items:center;}
.spill{font-size:10px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);background:rgba(255,255,255,0.8);}
.spill.ok{border-color:rgba(58,171,122,0.4);color:var(--usd);background:rgba(58,171,122,0.08);}
.spill.err{border-color:rgba(224,82,82,0.4);color:var(--overdue);background:rgba(224,82,82,0.08);}
.upd-badge{display:none;font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:20px;background:rgba(247,163,92,0.15);color:var(--orange);border:1px solid rgba(247,163,92,0.35);}
.upd-badge.show{display:inline;}

/* ── source toggle ── */
.src-toggle{display:flex;gap:8px;padding:12px 20px 0;flex-wrap:wrap;}
.src-btn{font-size:11px;padding:5px 14px;border-radius:20px;border:1.5px solid var(--border2);background:rgba(255,255,255,0.85);color:var(--text2);cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:5px;box-shadow:0 2px 6px rgba(242,167,195,0.15);}
.src-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(242,167,195,0.25);}
.src-btn.on{border-color:var(--pink);background:rgba(242,167,195,0.15);color:var(--indigo);}
.src-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* ── summary ── */
.summary-wrap{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px 0;}
.sum-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;min-width:130px;flex:1;max-width:200px;box-shadow:0 3px 10px rgba(242,167,195,0.12);transition:transform .15s,box-shadow .15s;}
.sum-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(242,167,195,0.2);}
.sum-label{font-size:10px;color:var(--text3);letter-spacing:.06em;margin-bottom:4px;font-family:'DM Mono',monospace;}
.sum-val{font-size:14px;font-weight:700;font-family:'DM Mono',monospace;}

/* ── cal nav ── */
.cal-nav{padding:14px 20px 8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.cal-title{font-size:20px;font-weight:700;font-family:'Quicksand',sans-serif;color:var(--indigo);}
.cal-title span{font-size:14px;font-weight:400;color:var(--text3);margin-left:6px;}
.nav-btns{display:flex;gap:6px;}
.nav-btn{background:rgba(255,255,255,0.9);border:1.5px solid var(--border2);border-radius:20px;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;padding:5px 14px;cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(242,167,195,0.12);}
.nav-btn:hover{background:var(--pink);color:#fff;border-color:var(--pink);transform:translateY(-1px);}

/* ── legend ── */
.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--text3);padding:0 20px 10px;align-items:center;}
.li{display:flex;align-items:center;gap:4px;}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* ── calendar ── */
.cal-wrap{padding:0 20px 28px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.dow{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);padding:5px 0 7px;letter-spacing:.04em;}
.day{min-height:90px;background:rgba(255,255,255,0.85);border:1.5px solid var(--border);border-radius:var(--radius);padding:6px 7px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s,box-shadow .15s;overflow:hidden;}
.day:hover{border-color:var(--pink);background:#fff;transform:translateY(-2px);box-shadow:0 4px 14px rgba(242,167,195,0.2);}
.day.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.day.today{border-color:var(--pink);background:rgba(242,167,195,0.08);}
.day.today::after{content:'🌸';position:absolute;top:2px;right:4px;font-size:10px;line-height:1;}
.day{position:relative;}
.day-num{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:4px;}
.day.today .day-num{color:var(--coral);font-weight:700;}
.pill{font-size:10px;font-family:'DM Mono',monospace;border-radius:10px;padding:2px 6px;margin-bottom:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
/* 應付幣別 */
.p-ntd{background:var(--ntd-bg);color:var(--ntd);}
.p-usd{background:var(--usd-bg);color:var(--usd);}
.p-jpy{background:var(--jpy-bg);color:var(--jpy);}
.p-zar{background:var(--zar-bg);color:var(--zar);}
/* 應收 */
.p-rcv{background:var(--rcv-bg);color:var(--rcv);}
.p-rcv-usd{background:var(--rcv-usd-bg);color:var(--rcv-usd);}
/* 貿易大漁 採購=紅 / 銷售=綠 */
.p-tr-ap{background:rgba(240,128,128,0.18);color:#c0302f;border:1px solid rgba(240,128,128,0.45);}
.p-tr-rcv{background:rgba(141,204,122,0.2);color:#2d7a1f;border:1px solid rgba(141,204,122,0.5);}
.p-overdue{background:var(--overdue-bg);color:var(--overdue);}
.p-est{background:rgba(247,217,107,0.4);color:#6b45c8;border:1px solid rgba(247,217,107,0.7);}
.p-done{background:var(--done-bg);color:var(--done);}
.day-more{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}

/* ── skeleton ── */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skeleton{background:linear-gradient(90deg,#fce4f0 25%,#fff0f6 50%,#fce4f0 75%);background-size:600px 100%;animation:shimmer 1.4s infinite linear;border-radius:8px;}
.skel-p{height:13px;margin-bottom:4px;}

/* ── modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(107,91,149,0.25);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:14px;}
.modal-overlay.open{display:flex;}
.modal{background:linear-gradient(160deg,#fff8fb 0%,#f5eeff 100%);border:1.5px solid var(--border2);border-radius:var(--radius-lg);box-shadow:0 12px 40px rgba(107,91,149,0.2);width:100%;max-width:600px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;}
.m-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.m-date{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:2px;}
.m-title{font-size:16px;font-weight:700;font-family:'Quicksand',sans-serif;color:var(--indigo);}
.m-close{background:rgba(242,167,195,0.15);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:18px;line-height:1;padding:4px 9px;border-radius:20px;transition:all .15s;}
.m-close:hover{background:var(--pink);color:#fff;border-color:var(--pink);}
.m-filters{padding:8px 20px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;}
.mf-btn{font-size:11px;border:1.5px solid var(--border2);border-radius:20px;padding:3px 10px;cursor:pointer;background:rgba(255,255,255,0.7);color:var(--text2);font-family:'Noto Sans TC',sans-serif;transition:all .15s;}
.mf-btn:hover{background:rgba(242,167,195,0.15);}
.mf-btn.on{background:rgba(107,91,149,0.12);border-color:var(--indigo);color:var(--indigo);}
.m-body{overflow-y:auto;padding:0 20px 14px;flex:1;}

/* section header */
.sec-hdr{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--text2);padding:10px 0 6px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* item rows */
.item{display:grid;grid-template-columns:46px 56px 1fr auto;gap:8px;align-items:start;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;}
.item:last-child{border-bottom:none;}
.tag{background:rgba(201,168,224,0.2);border:1px solid rgba(201,168,224,0.4);border-radius:8px;padding:2px 6px;font-size:10px;color:var(--indigo);text-align:center;font-weight:500;white-space:nowrap;}
.cat{font-size:10px;color:var(--text3);line-height:1.6;}
.sbadge{font-size:9px;border-radius:8px;padding:1px 5px;font-family:'DM Mono',monospace;}
.s-ap{background:var(--ntd-bg);color:var(--ntd);}
.s-ov{background:var(--overdue-bg);color:var(--overdue);}
.s-est{background:rgba(247,217,107,0.4);color:#6b45c8;border:1px solid rgba(247,217,107,0.7);}
.s-rcv{background:var(--rcv-bg);color:var(--rcv);}
.s-done{background:var(--done-bg);color:var(--done);}
/* 貿易大漁 採購=紅 / 銷售=綠 */
.s-tr-ap{background:rgba(240,128,128,0.18);color:#c0302f;border:1px solid rgba(240,128,128,0.4);}
.s-tr-rcv{background:rgba(141,204,122,0.2);color:#2d7a1f;border:1px solid rgba(141,204,122,0.5);}
.note{color:var(--text);font-size:12px;line-height:1.5;}
.amt{text-align:right;white-space:nowrap;}
.a-ntd{color:var(--ntd);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.a-usd{color:var(--usd);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.a-jpy{color:var(--jpy);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.a-zar{color:var(--zar);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.a-rcv{color:var(--rcv);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.a-rcv-usd{color:var(--rcv-usd);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}

.m-footer{padding:10px 20px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text3);flex-shrink:0;font-family:'DM Mono',monospace;background:rgba(255,255,255,0.5);}
.m-footer strong{color:var(--text);font-weight:700;}

@media(max-width:600px){
  .topbar,.summary-wrap,.cal-nav,.legend,.cal-wrap,.src-toggle{padding-left:12px;padding-right:12px;}
  .sum-card{max-width:100%;}
  .day{min-height:68px;padding:4px 5px;}
  .item{grid-template-columns:38px 1fr auto;}
  .cat{display:none;}
}
</style>
</head>
<body>
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">收付款合併日曆</h2>

<div class="flower-bar"></div>
<div class="topbar">
  <div>
    <div class="topbar-title">收付款日曆 <span class="upd-badge" id="upd-badge">更新中...</span></div>
    <div class="topbar-sub" id="last-update">--</div>
  </div>
  <div class="status-row">
    <div class="spill" id="s-ap">應付 --</div>
    <div class="spill" id="s-tr">貿易 --</div>
  </div>
</div>

<div class="src-toggle">
  <button class="src-btn on" id="toggle-ap" onclick="toggleSrc('ap')">
    <span class="dot" style="background:var(--ntd)"></span>應付款（船務/貿易帳款）
  </button>
  <button class="src-btn on" id="toggle-tr" onclick="toggleSrc('tr')">
    <span class="dot" style="background:var(--rcv)"></span>貿易大漁（應收/應付）
  </button>
</div>

<div class="summary-wrap" id="summary-wrap"></div>

<div class="cal-nav">
  <div class="cal-title" id="cal-title">-- 年 -- 月<span id="cal-count"></span></div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="prevM()">‹ 上月</button>
    <button class="nav-btn" onclick="goToday()">今天</button>
    <button class="nav-btn" onclick="nextM()">下月 ›</button>
  </div>
</div>

<div class="legend">
  <span class="li"><span class="ld" style="background:var(--ntd)"></span>應付 NTD</span>
  <span class="li"><span class="ld" style="background:var(--usd)"></span>應付 USD</span>
  <span class="li"><span class="ld" style="background:var(--jpy)"></span>JPY/ZAR</span>
  <span class="li"><span class="ld" style="background:var(--overdue)"></span>逾期</span>
  <span class="li"><span class="ld" style="background:var(--est)"></span>預估</span>
  <span class="li"><span class="ld" style="background:#c0302f"></span>貿易大漁●採購</span>
  <span class="li"><span class="ld" style="background:#2d7a1f"></span>貿易大漁●銷售</span>
</div>

<div class="cal-wrap"><div class="cal-grid" id="cal-grid"></div></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="m-hdr">
      <div>
        <div class="m-date" id="m-date"></div>
        <div class="m-title" id="m-title"></div>
      </div>
      <button class="m-close" id="m-close">×</button>
    </div>
    <div class="m-filters" id="m-filters"></div>
    <div class="m-body" id="m-body"></div>
    <div class="m-footer" id="m-footer"></div>
  </div>
</div>

<script>
// ══ CONFIG ════════════════════════════════════════════
const API_AP = 'https://script.google.com/macros/s/AKfycbzwTjIUwk78gMe3bIGBcJRrm88XEKNG94S5VA5O14AmqI7uBuzgLmJL_23bPM1fqvuQfA/exec';
const CSV_TR = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTJ6nBKr5P1RFidrD6V_7MRLRraKBrrf3CmT8StmKm4uPYL19HCE0zYHjJmY1E0TI-NYWR7AvJFu8RQ/pub?gid=953244165&single=true&output=csv';
const CACHE_AP = 'cal_ap_v1';
const CACHE_TR = 'cal_tr_v1';
const CACHE_TS = 'cal_ts_v1';
const TTL = 5 * 60 * 1000;

// ══ STATE ═════════════════════════════════════════════
const today = new Date();
let curYear = today.getFullYear(), curMonth = today.getMonth();
let dataAP = [], dataTR = [];
let showAP = true, showTR = true;
let modalItems = [], modalFilter = '全部';

// ══ FORMAT ════════════════════════════════════════════
const fNTD = v => v ? 'NT$' + Math.round(v).toLocaleString() : null;
const fUSD = v => v ? 'US$' + (+v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}) : null;
const fJPY = v => v ? 'JP¥' + Math.round(v).toLocaleString() : null;
const fZAR = v => v ? 'ZAR '+( +v).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}) : null;

// 貿易大漁原幣格式
function fTrade(amt, cur) {
  if (!amt) return null;
  const n = Math.round(parseFloat(amt) || 0);
  const sym = {TWD:'NT$', USD:'US$', JPY:'JP¥', EUR:'€'}[cur] || cur;
  return sym + n.toLocaleString();
}

// ══ NORMALIZE DATA ════════════════════════════════════
// 把兩個來源統一成相同格式
// { src, dir('ap'=應付/'rcv'=應收), date, dept, cat, note, status, cur, amt, amtRaw, curRaw }

function normalizeAP(raw) {
  return raw.map(r => ({
    src: 'ap',
    dir: 'ap',
    date: r.date,
    dept: r.dept,
    cat: r.cat,
    note: r.note,
    status: r.status,  // 應付/逾期/預估
    // 幣別金額
    ntd: r.ntd || 0,
    usd: r.usd || 0,
    jpy: r.jpy || 0,
    zar: r.zar || 0,
  }));
}

function normalizeTR(payments) {
  // payments 為空時用靜態資料
  if (!payments || !payments.length) return TR_INLINE;
  // 若 API 有資料則解析（分期展開）
  const out = [];
  payments.forEach(p => {
    const date = (p['預計日期'] || '').replace(/-/g, '/');
    if (!date) return;
    const isBuy = p['類型'] === '採購';
    const isPaid = p['已付收'] === '是';
    if (isPaid) return;
    const cur = (p['幣別'] || 'TWD').toUpperCase();
    const amt = parseFloat(p['金額']) || 0;
    if (!amt) return;
    out.push({
      src:'tr', dir: isBuy ? 'ap' : 'rcv', date,
      dept:'貿易大漁', cat: p['期別名稱'] || (isBuy ? '採購' : '銷售'),
      note: (p['案件名稱']||'') + (p['業務名稱'] ? ' · '+p['業務名稱'] : ''),
      status:'預估', cur, amt,
    });
  });
  return out.length ? out : TR_INLINE;
}

function allItems() {
  const items = [];
  if (showAP) items.push(...dataAP);
  if (showTR) items.push(...dataTR);
  return items;
}

function groupByDate(items) {
  const m = {};
  items.forEach(r => {
    if (!m[r.date]) m[r.date] = [];
    m[r.date].push(r);
  });
  return m;
}

// ══ CALENDAR RENDER ═══════════════════════════════════
function renderCalendar() {
  const mn = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const items = allItems();
  const byDate = groupByDate(items);
  const first = new Date(curYear, curMonth, 1).getDay();
  const days = new Date(curYear, curMonth + 1, 0).getDate();

  let cnt = 0;
  Object.keys(byDate).forEach(k => {
    const d = new Date(k.replace(/\//g,'-'));
    if (d.getFullYear() === curYear && d.getMonth() === curMonth) cnt += byDate[k].length;
  });
  document.getElementById('cal-title').innerHTML = `${curYear} 年 ${mn[curMonth]}<span>${cnt ? ' · ' + cnt + ' 筆' : ''}</span>`;

  const DOWS = ['日','一','二','三','四','五','六'];
  let html = DOWS.map(d => `<div class="dow">${d}</div>`).join('');
  for (let i = 0; i < first; i++) html += `<div class="day empty"></div>`;

  for (let d = 1; d <= days; d++) {
    const ds = `${curYear}/${String(curMonth+1).padStart(2,'0')}/${String(d).padStart(2,'0')}`;

          apSums.jpy += r.jpy || 0;
          apSums.zar += r.zar || 0;

      if (apSums.jpy) html += `<span class="pill ${baseCls||'p-jpy'}">${fJPY(apSums.jpy)}</span>`;
      if (apSums.zar) html += `<span class="pill ${baseCls||'p-zar'}">${fZAR(apSums.zar)}</span>`;

      if (its.length > 3) html += `<div class="day-more">共 ${its.length} 筆</div>`;
    }
    html += `</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
  renderSummary();
}

function renderSummary() {
  const items = allItems().filter(r => {
    const d = new Date(r.date.replace(/\//g,'-'));

// ══ CACHE ═════════════════════════════════════════════
function saveCache(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); localStorage.setItem(CACHE_TS+'_'+key, Date.now().toString()); } catch(e){} }
function loadCache(key) { try { const r=localStorage.getItem(key); return r?JSON.parse(r):null; } catch(e){return null;} }
function cacheAge(key) { try { return Date.now() - parseInt(localStorage.getItem(CACHE_TS+'_'+key)||'0'); } catch(e){return Infinity;} }

// ══ CSV 解析工具 ═══════════════════════════════════════
function parseCSV(text) {
  const lines = text.split('\n');
  if (!lines.length) return [];
  // 處理 CSV 引號與換行
  const rows = [], colCount = lines[0].split(',').length;
  let cur = [];
  let inQ = false, cell = '';
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { cur.push(cell); cell = ''; continue; }
    if ((c === '\n' || c === '\r') && !inQ) {
      cur.push(cell); cell = '';
      if (cur.some(s => s.trim())) rows.push(cur);
      cur = []; continue;
    }
    cell += c;
  }
  if (cell || cur.length) { cur.push(cell); if (cur.some(s=>s.trim())) rows.push(cur); }
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (row[i] || '').trim(); });
    return obj;
  });
}

function parseTRFromCSV(text) {
  const rows = parseCSV(text);
  const items = [];
  const cleanDate = d => {
    d = (d||'').trim().replace(/-/g,'/');
    const p = d.split('/');
    if (p.length === 3) return `${p[0]}/${p[1].padStart(2,'0')}/${p[2].padStart(2,'0')}`;
    return d;
  };
  rows.forEach(r => {
    if ((r['老闆已同意']||'').trim() !== '是') return;
    const caseName = r['案件名稱'] || '';
    const staff = r['業務名稱'] || '';
    const label = caseName + (staff ? ' · ' + staff : '');
    for (let i of ['1','2','3']) {
      // 採購期（應付）
      const bAmt = parseFloat(r[`採購期${i}金額`]) || 0;
      const bDate = cleanDate(r[`採購期${i}預計日`]);
      const bCur = (r[`採購期${i}幣別`] || 'TWD').toUpperCase();
      const bName = r[`採購期${i}名稱`] || `採購期${i}`;
      if (bAmt > 0 && bDate) items.push({src:'tr',dir:'ap',date:bDate,dept:'貿易大漁',cat:bName,note:label,status:'預估',cur:bCur,amt:bAmt});
      // 銷售期（應收）
      const sAmt = parseFloat(r[`銷售期${i}金額`]) || 0;
      const sDate = cleanDate(r[`銷售期${i}預計日`]);
      const sCur = (r[`銷售期${i}幣別`] || 'TWD').toUpperCase();
      const sName = r[`銷售期${i}名稱`] || `銷售期${i}`;
      if (sAmt > 0 && sDate) items.push({src:'tr',dir:'rcv',date:sDate,dept:'貿易大漁',cat:sName,note:label,status:'預估',cur:sCur,amt:sAmt});
    }
  });
  return items;
}

// ══ LOAD DATA ═════════════════════════════════════════
async function loadAll() {
  const cachedAP = loadCache(CACHE_AP);
  const cachedTR = loadCache(CACHE_TR);

  // 1. 立刻顯示（快取 > 靜態）不等 API
  dataAP = cachedAP ? normalizeAP(cachedAP) : normalizeAP(getInlineAP());
  dataTR = cachedTR ? normalizeTR(cachedTR) : TR_INLINE;
  document.getElementById('s-ap').className = 'spill ok';
  document.getElementById('s-ap').textContent = cachedAP ? '應付 快取' : '應付 靜態';
  document.getElementById('last-update').textContent = cachedAP ? '快取資料' : '靜態資料（更新中...）';
  renderCalendar();

  // 若快取夠新就不背景更新
  if (cachedAP && cachedTR && cacheAge(CACHE_AP) < TTL && cacheAge(CACHE_TR) < TTL) {
    document.getElementById('last-update').textContent = '快取資料';
    return;
  }

  // 2. 背景靜默更新 API
  document.getElementById('upd-badge').classList.add('show');

  // 兩個 API 平行發出
  const [apResult, trResult] = await Promise.allSettled([
    fetch(API_AP).then(r => r.json()),
    fetch(CSV_TR).then(r => r.text()),
  ]);

  if (apResult.status === 'fulfilled' && !apResult.value.error) {
    dataAP = normalizeAP(apResult.value);
    saveCache(CACHE_AP, apResult.value);
    document.getElementById('s-ap').className = 'spill ok';
    document.getElementById('s-ap').textContent = '應付 ✓';
  } else {
    dataAP = normalizeAP(getInlineAP());
    document.getElementById('s-ap').className = 'spill err';
    document.getElementById('s-ap').textContent = '應付 離線';
  }

  if (trResult.status === 'fulfilled' && trResult.value) {
    const parsed = parseTRFromCSV(trResult.value);
    if (parsed.length) {
      dataTR = parsed;
      saveCache(CACHE_TR, parsed);
      document.getElementById('s-tr').className = 'spill ok';
      document.getElementById('s-tr').textContent = `貿易 ✓ (${parsed.length}筆)`;
    } else {
      dataTR = TR_INLINE;
      document.getElementById('s-tr').className = 'spill err';
      document.getElementById('s-tr').textContent = '貿易 無資料';
    }
  } else {
    dataTR = TR_INLINE;
    document.getElementById('s-tr').className = 'spill err';
    document.getElementById('s-tr').textContent = '貿易 離線';
  }

  document.getElementById('upd-badge').classList.remove('show');
  document.getElementById('last-update').textContent = '更新：' + new Date().toLocaleString('zh-TW');
  renderCalendar();
}
