    tbody tr { border-bottom: 1px solid #f3eeff; transition: background .1s; }

<body>
<div class="wrap">

  <!-- жҗңе°ӢеҚЎзүҮ -->
  <div class="search-card">
    <!-- з¬¬дёҖеҲ—пјҡжңҲд»Ҫ + зӢҖж…Ӣ -->

      <input type="text" id="monthInput" value="202604" maxlength="6" placeholder="YYYYMM">
      <button class="btn btn-ghost" onclick="loadMonth()">ијүе…Ҙ</button>

    <!-- з¬¬дәҢеҲ—пјҡзҷјзҘЁијёе…Ҙ + жҹҘи©ў -->
    <div class="search-row2">
      <label style="padding-top:.45rem">зҷјзҘЁиҷҹзўј</label>
      <div class="multi-input-wrap">
        <textarea id="invInput" rows="2" placeholder="ијёе…ҘзҷјзҘЁиҷҹзўјпјҢеӨҡзӯҶз”Ёз©әж јгҖҒйҖ—иҷҹжҲ–жҸӣиЎҢеҲҶйҡ”&#10;дҫӢпјҡZF08444613 ZF08444614 ZF08444615"></textarea>
        <div class="input-hint">ж”ҜжҸҙеӨҡзӯҶпјҡз©әж ј / йҖ—иҷҹ / жҸӣиЎҢ еҲҶйҡ”</div>
        <div id="tagArea"></div>

  <!-- дёҠеӮіеҲ— -->
  <div style="margin-bottom: 1rem; display: flex; gap: .5rem; align-items: center; flex-wrap: wrap;">
    <label class="btn btn-secondary file-label">
      рҹ“Ғ дёҠеӮі Excel
      <input type="file" id="excelFile" accept=".xlsx,.xlsm" class="file-input" onchange="handleExcelUpload(event)">

    <div class="progress-text" id="progressText">жә–еӮҷдёӯвҖҰ</div>

  <!-- еӢҫйҒёжҺ§еҲ¶еҲ— -->
  <div id="checkControls" class="check-controls" style="display: none;">

    <button class="btn btn-primary" onclick="exportChecked()">рҹ“Ҡ еҢҜеҮә Excel</button>
    <button class="btn btn-primary" onclick="exportApply()">рҹ”§ з”іе ұеҢҜеҮә</button>

<script>
let MONTH = '202604';
let INDEX = {};
let SELECTIONS = {};

const SAMPLE = {
  "ZF08444613": { "invoice_no": "ZF08444613", "details": [
    {"sale_type":"йҠ·е”®зҷјзҘЁ","date":"2026/04/10","product":"еҶ·еҮҚй»ғй°ӯй®ӘзўҺиӮү","qty":-2000,"unit":"KG","price":86,"total_price":-172000,"notes":"иҸ„жө·115/03","source":{"type":"йҖІеҸЈе ұе–®","ref_no":"QX38261603","supplier":"з’°е®Үж°ҙз”ў","batch":null}},
    {"sale_type":"йҠ·е”®зҷјзҘЁ","date":"2026/04/10","product":"еҶ·еҮҚй»ғй°ӯй®ӘзўҺиӮү","qty":-1000,"unit":"KG","price":86,"total_price":-86000,"notes":"иҸ„жө·115/03","source":{"type":"йҖІеҸЈе ұе–®","ref_no":"BD 14 036 F0224","supplier":null,"batch":"20251117-001"}},
    {"sale_type":"йҠ·е”®зҷјзҘЁ","date":"2026/04/10","product":"еҶ·еҮҚй»ғй°ӯй®ӘзўҺиӮү","qty":-1200,"unit":"KG","price":86,"total_price":-103200,"notes":"иҸ„жө·115/03","source":{"type":"йҖІеҸЈе ұе–®","ref_no":"BD 15 036 F0050","supplier":null,"batch":"20260309-001"}}
  ]}
};

// в”Җв”Җ еҲқе§ӢеҢ– в”Җв”Җ
window.addEventListener('load', () => {
  loadFromCache();
  loadSelectionsFromCache();
  if (Object.keys(INDEX).length === 0) INDEX = JSON.parse(JSON.stringify(SAMPLE));
  updateStatusBadge();
  updateCheckedCount();
  if (Object.keys(INDEX).length > 0) {
    document.getElementById('toolbarArea').style.display = 'flex';
    document.getElementById('checkControls').style.display = 'flex';
  }
});

// в”Җв”Җ еҝ«еҸ– в”Җв”Җ
function saveToCache() { localStorage.setItem(`invoice_v56_${MONTH}`, JSON.stringify(INDEX)); }
function loadFromCache() {
  const d = localStorage.getItem(`invoice_v56_${MONTH}`);
  if (d) { try { INDEX = JSON.parse(d); } catch(e){} }
}
function saveSelectionsToCache() { localStorage.setItem(`sel_v56_${MONTH}`, JSON.stringify(SELECTIONS)); }
function loadSelectionsFromCache() {
  const d = localStorage.getItem(`sel_v56_${MONTH}`);
  if (d) { try { SELECTIONS = JSON.parse(d); } catch(e){} }
}

function updateStatusBadge() {
  const count = Object.keys(INDEX).length;
  const isSample = count === 1 && INDEX['ZF08444613'];
  const isCached = localStorage.getItem(`invoice_v56_${MONTH}`);
  const badge = document.getElementById('statusBadge');
  badge.textContent = `${MONTH} ${isSample ? '(жЁЈжң¬)' : isCached ? `вң“ ${count} зӯҶ` : `${count} зӯҶ`}`;
  badge.classList.toggle('ok', !isSample && !!isCached);
}

// в”Җв”Җ еӢҫйҒё в”Җв”Җ
function toggleCheck(detailId) {
  SELECTIONS[detailId] = !SELECTIONS[detailId];
  saveSelectionsToCache();
  updateCheckedCount();
  const row = document.querySelector(`[data-detail-id="${detailId}"]`);
  if (row) row.classList.toggle('checked', SELECTIONS[detailId]);
}
function checkAll() {
  Object.keys(SELECTIONS).forEach(id => SELECTIONS[id] = true);
  saveSelectionsToCache(); updateCheckedCount();
  document.querySelectorAll('tbody input[type="checkbox"]').forEach(cb => cb.checked = true);
  document.querySelectorAll('tbody tr[data-detail-id]').forEach(tr => tr.classList.add('checked'));
}
function uncheckAll() {
  Object.keys(SELECTIONS).forEach(id => SELECTIONS[id] = false);
  saveSelectionsToCache(); updateCheckedCount();
  document.querySelectorAll('tbody input[type="checkbox"]').forEach(cb => cb.checked = false);
  document.querySelectorAll('tbody tr[data-detail-id]').forEach(tr => tr.classList.remove('checked'));
}
function updateCheckedCount() {
  const checked = Object.values(SELECTIONS).filter(Boolean).length;
  const el = document.getElementById('checkedCount');
  el.textContent = checked > 0 ? `е·ІеӢҫйҒё ${checked} зӯҶ` : '';
}
function initializeSelections() {
  Object.values(INDEX).forEach(inv => {
    inv.details.forEach((_, idx) => {
      const id = `${inv.invoice_no}_${idx}`;
      if (!(id in SELECTIONS)) SELECTIONS[id] = false;
    });
  });
  saveSelectionsToCache();
}

// в”Җв”Җ и§ЈжһҗеӨҡзӯҶзҷјзҘЁиҷҹзўј в”Җв”Җ
function parseInvInput() {
  const raw = document.getElementById('invInput').value;
  // з”Ёз©әж јгҖҒйҖ—иҷҹгҖҒй “иҷҹгҖҒжҸӣиЎҢеҲҶйҡ”
  const tokens = raw.split(/[\s,пјҢгҖҒ\n]+/).map(s => s.trim().toUpperCase()).filter(s => s.length > 0);
  return [...new Set(tokens)]; // еҺ»йҮҚ
}

function renderTags(tokens) {
  const area = document.getElementById('tagArea');
  if (tokens.length <= 1) { area.innerHTML = ''; return; }
  area.innerHTML = tokens.map(t =>
    `<span class="inv-tag">${t} <span class="rm" onclick="removeTag('${t}')">вң•</span></span>`
  ).join('');
}

function removeTag(token) {
  const textarea = document.getElementById('invInput');
  const tokens = parseInvInput().filter(t => t !== token);
  textarea.value = tokens.join('\n');
  renderTags(tokens);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('invInput').addEventListener('input', () => {
    renderTags(parseInvInput());
  });
  document.getElementById('invInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); search(); }
  });
  document.getElementById('monthInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadMonth();
  });
});

// в”Җв”Җ жҹҘи©ў в”Җв”Җ
function search() {
  const tokens = parseInvInput();
  renderTags(tokens);
  const out = document.getElementById('results');
  if (!INDEX || tokens.length === 0) { out.innerHTML = ''; return; }

  const hits = [];
  const notFound = [];

  tokens.forEach(q => {
    const matched = Object.values(INDEX).filter(v => v.invoice_no.toUpperCase().includes(q));
    if (matched.length > 0) {
      matched.forEach(m => { if (!hits.find(h => h.invoice_no === m.invoice_no)) hits.push(m); });
    } else {
      notFound.push(q);
    }
  });

  let html = '';
  if (hits.length > 0) html += hits.map(renderInvoice).join('');
  if (notFound.length > 0) {
    html += `<div class="no-result" style="margin-top:1rem">жүҫдёҚеҲ°пјҡ<strong>${notFound.join('гҖҒ')}</strong><br><small>зўәиӘҚжңҲд»ҪжҲ–зҷјзҘЁиҷҹзўјжҳҜеҗҰжӯЈзўә</small></div>`;
  }
  out.innerHTML = html || `<div class="no-result">жІ’жңүз¬ҰеҗҲзҡ„иЁҳйҢ„</div>`;
}

// в”Җв”Җ жңҲд»Ҫијүе…Ҙ в”Җв”Җ
async function loadMonth() {
  const m = document.getElementById('monthInput').value.trim();
  if (!/^\d{6}$/.test(m)) { showMessage('ж јејҸйҢҜиӘӨпјҢи«Ӣијёе…Ҙ YYYYMM', 'error'); return; }
  MONTH = m;
  document.getElementById('statusBadge').textContent = 'ијүе…ҘдёӯвҖҰ';
  try {
    const r = await fetch(`invoice_index_v5_${m}.json`);
    if (!r.ok) throw new Error();
    INDEX = await r.json();
    saveToCache();
    showMessage(`вң“ е·Іијүе…Ҙ ${m}пјҢе…ұ ${Object.keys(INDEX).length} зӯҶ`, 'success');
  } catch {
    INDEX = JSON.parse(JSON.stringify(SAMPLE));
    showMessage(`жңӘжүҫеҲ° ${m}пјҢе·Іијүе…ҘжЁЈжң¬`, 'info');
  }
  loadSelectionsFromCache();
  updateStatusBadge();
  document.getElementById('results').innerHTML = '';
  document.getElementById('toolbarArea').style.display = 'flex';
  document.getElementById('checkControls').style.display = 'flex';
  updateCheckedCount();
}

// в”Җв”Җ Excel дёҠеӮі в”Җв”Җ
function handleExcelUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (typeof XLSX === 'undefined') { showMessage('вқҢ SheetJS еә«е°ҡжңӘијүе…Ҙ', 'error'); return; }

  document.getElementById('uploadStatus').textContent = 'й–Ӣе§Ӣиҷ•зҗҶвҖҰ';
  document.getElementById('progressArea').style.display = 'block';
  setProgress(0);
  showMessage('иҷ•зҗҶдёӯпјҲи«ӢеӢҝй—ңй–үжӯӨй ҒйқўпјүвҖҰ', 'processing');

  const reader = new FileReader();
  reader.onerror = () => {
    showMessage('жӘ”жЎҲи®ҖеҸ–йҢҜиӘӨ', 'error');
    document.getElementById('uploadStatus').textContent = 'вқҢ и®ҖеҸ–еӨұж•—';
    document.getElementById('progressArea').style.display = 'none';
  };
  reader.onload = (e) => {
    setTimeout(() => {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        setProgress(10); updateProgress('и§Јжһҗ Excel дёӯвҖҰ');
        setTimeout(() => {
          convertExcelAsync(workbook, () => {
            setProgress(100); updateProgress('е®ҢжҲҗпјҒ');
            const count = Object.keys(INDEX).length;
            if (count === 0) {
              showMessage('вқҢ жүҫдёҚеҲ°йҠ·й …зҷјзҘЁиіҮж–ҷ', 'error');
              document.getElementById('uploadStatus').textContent = 'вқҢ з„Ўжңүж•ҲиіҮж–ҷ';
            } else {
              setTimeout(() => {
                showMessage(`вң“ иҪүжҸӣжҲҗеҠҹпјҒе…ұ ${count} зӯҶзҷјзҘЁ`, 'success');
                document.getElementById('uploadStatus').textContent = `вң“ ${file.name}`;
                saveToCache(); initializeSelections(); loadSelectionsFromCache();
                updateStatusBadge(); updateCheckedCount();
                document.getElementById('progressArea').style.display = 'none';
                document.getElementById('toolbarArea').style.display = 'flex';
                document.getElementById('checkControls').style.display = 'flex';
              }, 500);
            }
          });
        }, 100);
      } catch (err) {
        showMessage('вқҢ ' + err.message, 'error');
        document.getElementById('uploadStatus').textContent = 'вқҢ иҷ•зҗҶеӨұж•—';
        document.getElementById('progressArea').style.display = 'none';
      }
    }, 100);
  };
  reader.readAsArrayBuffer(file);
}

function convertExcelAsync(workbook, callback) {
  INDEX = {};
  const sheetNames = workbook.SheetNames;
  let batchCounter = 0;

  function processNextSheet(idx) {
    if (idx >= sheetNames.length) { callback(); return; }
    const name = sheetNames[idx];
    updateProgress(`иҷ•зҗҶ ${idx + 1}/${sheetNames.length}: ${name}`);
    setProgress(Math.round((idx / sheetNames.length) * 80) + 10);
    setTimeout(() => { processSheet(name); processNextSheet(idx + 1); }, 10);
  }

  function processSheet(sheetName) {
    if (sheetName.includes('NEW') || sheetName === 'иҝ”еӣһзӣ®йҢ„') return;
    try {
      const ws = workbook.Sheets[sheetName];
      if (!ws) return;
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      let headerRow = -1;
      for (let i = 0; i < Math.min(10, rows.length); i++) {
        if (rows[i][0] && String(rows[i][0]).includes('дҫҶжәҗ')) { headerRow = i; break; }
      }
      if (headerRow === -1) return;

      let currentBatch = null;
      const maxRows = Math.min(rows.length, headerRow + 501);

      for (let i = headerRow + 1; i < maxRows; i++) {
        const row = rows[i];
        if (!row || !row[0]) continue;
        try {
          const src = String(row[0] || '').trim();
          const unit_no = row[1];
          const ref_no = String(row[2] || '').trim();
          const customer = String(row[3] || '').trim();
          const product = String(row[4] || '').trim();
          const qty = parseFloat(row[5]) || 0;
          const unit = (String(row[6] || 'KG').replace(/\s+/g, '') || 'KG');
          const price = parseFloat(row[7]) || 0;
          const total_price = parseFloat(row[8]) || 0;
          const batch_info = String(row[14] || '').trim();

          // в”Җв”Җ еҲҶйЎһеҲӨж–·пјҲдҫқз…§жҘӯеӢҷе®ҡзҫ©пјүв”Җв”Җ
          const isSales = ['йҠ·й …зҷјзҘЁ','йҠ·й …зҷјзҘЁ(дәҢиҒҜ)','йҠ·е”®зҷјзҘЁ','дәҢиҒҜзҷјзҘЁ','дәҢиҒҜејҸзҷјзҘЁ','йӣ»еӯҗзҷјзҘЁ'].some(k => src.includes(k));
          const isReturn = ['йҠ·иІЁйҖҖеӣһ','йҖІй …йҖҖеҮә'].some(k => src.includes(k));
          const isImport = ['йҖІеҸЈе ұе–®','йҖІй …зҷјзҘЁ'].some(k => src.includes(k));
          const isImportOther = ['й«ҳйӣ„иЁҲеғ№е–®','е°ҸжёҜдј°еғ№е–®','й«ҳйӣ„дј°еғ№е–®','е°ҸжёҜиЁҲеғ№е–®','йӯҡеёӮе ҙиЁҲеғ№е–®','жјҒж°‘ж”¶ж“ҡ','й«ҳйӣ„иЁҲеғ№е–®(иІ ж•ёиЁҲеғ№е–®)','1/1й«ҳйӣ„иЁҲеғ№е–®','2/16й«ҳйӣ„иЁҲеғ№е–®','2/18й«ҳйӣ„иЁҲеғ№е–®'].some(k => src.includes(k));
          const isExport = ['еҮәеҸЈе ұе–®','еҠ е·Ҙ','еҠ е·Ҙе–®'].some(k => src.includes(k));

          // йҖІй …пјҡй–Ӣж–°еҚҖеЎҠ
          if (isImport || isImportOther) {
            batchCounter++;
            currentBatch = {
              ref_no: ref_no,
              batch: extractBatch(batch_info),
              supplier: customer
            };
            continue;
          }

          // йҠ·й … + йҖҖиІЁпјҡеҠ е…ҘиіҮж–ҷ
          if (isSales || isReturn || isExport) {
            if (!ref_no && !customer) continue;
            const key = ref_no || customer;
            if (!INDEX[key]) INDEX[key] = { invoice_no: key, details: [] };
            const notes_o = String(row[14] || '').trim();  // Oж¬„
            const notes_p = String(row[15] || '').trim();  // Pж¬„
            const notes = [notes_o, notes_p].filter(Boolean).join(' / ');
            INDEX[key].details.push({
              sale_type: isReturn ? 'йҖҖиІЁ' : 'йҠ·е”®зҷјзҘЁ',
              is_return: isReturn,
              date: formatDate(unit_no),
              invoice_no: key,
              product: product || 'жңӘзҹҘ',
              qty, unit, price, total_price,
              notes: notes || customer || '',
              source: currentBatch ? { type: 'йҖІеҸЈе ұе–®', ref_no: currentBatch.ref_no, supplier: currentBatch.supplier, batch: currentBatch.batch } : null
            });
            continue;
          }

          // е°ҸиЁҲпјҡеҚҖеЎҠзөҗжқҹ
          if (src.includes('е°ҸиЁҲ')) currentBatch = null;

        } catch(e) { console.warn(`иЎҢ ${i}:`, e); }
      }
    } catch(err) { console.error(`Sheet ${sheetName}:`, err); }
  }

  processNextSheet(0);
}

function extractBatch(text) {
  if (!text) return null;
  const m1 = text.match(/(\d{8}-\d{3})/);  if (m1) return m1[1];
  const m2 = text.match(/\d{8}-\d+/);       if (m2) return m2[0];
  return text || null;
}

function formatDate(val) {
  if (!val) return '';
  const s = String(val);
  if (s.includes('/')) return s;
  if (!isNaN(val) && val > 0) {
    const d = new Date((val - 25569) * 86400000);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
  return '';
}

function setProgress(p) { document.getElementById('progressBar').style.width = p + '%'; }
function updateProgress(t) { document.getElementById('progressText').textContent = t; }

function showMessage(msg, type = 'info') {
  document.getElementById('messages').innerHTML = `<div class="message ${type}">${msg}</div>`;
  if (type !== 'processing') setTimeout(() => { document.getElementById('messages').innerHTML = ''; }, 5000);
}

// в”Җв”Җ жёІжҹ“зҷјзҘЁ в”Җв”Җ
function renderInvoice(inv) {
  const d = inv.details || [];
  const totalQty = d.reduce((s, r) => s + (r.qty || 0), 0);
  const totalAmt = d.reduce((s, r) => s + (r.total_price || 0), 0);
  const unit = d[0]?.unit || 'KG';

  const rows = d.map((r, idx) => {
    const id = `${inv.invoice_no}_${idx}`;
    const chk = SELECTIONS[id] || false;
    const src = r.source || {};
    const isRet = r.is_return;
    const trClass = [isRet ? 'is-return' : '', chk ? 'checked' : ''].filter(Boolean).join(' ');
    const retBadge = isRet ? '<span class="return-badge">йҖҖиІЁ</span>' : '';
    return `<tr data-detail-id="${id}" class="${trClass}">
      <td><input type="checkbox" ${chk ? 'checked' : ''} onchange="toggleCheck('${id}')"></td>
      <td class="ref-no">${inv.invoice_no}${retBadge}</td>
      <td>${r.date || 'вҖ”'}</td>
      <td>${r.product || 'вҖ”'}</td>
      <td class="qty-neg">${fmt(r.qty)} ${r.unit || ''}</td>
      <td>${r.price != null ? 'NT$' + r.price : 'вҖ”'}</td>
      <td>${r.notes || 'вҖ”'}</td>
      <td class="src-ref">${dash(src.ref_no)}</td>
      <td class="supplier">${dash(src.supplier)}</td>
      <td class="batch">${dash(src.batch)}</td>
    </tr>`;
  }).join('');

  return `
    <div class="inv-title">
      <span class="inv-no">зҷјзҘЁ ${inv.invoice_no}</span>
      <span class="inv-meta">${d[0]?.date || ''} В· ${d[0]?.sale_type || ''}</span>
      <span class="inv-count">${d.length} зӯҶ</span>
    </div>
    <table>
      <thead><tr>
        <th>вң“</th><th>йҠ·е”®зҷјзҘЁ</th><th>ж—Ҙжңҹ</th><th>е“ҒеҗҚ</th>
        <th>ж•ёйҮҸ</th><th>е–®еғ№</th><th>еӮҷиЁ»</th>
        <th>йҖІй …дҫҶжәҗ</th><th>дҫӣжҮүе•Ҷ</th><th>жү№иҷҹ</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td colspan="3" style="text-align:right">еҗҲиЁҲ</td>
        <td class="qty-neg">${fmt(totalQty)} ${unit}</td>
        <td>вҖ”</td>
        <td>NT$ ${fmt(totalAmt)}</td>
        <td colspan="4"></td>
      </tr></tfoot>
    </table>`;
}

function fmt(n) { return n != null ? Number(n).toLocaleString() : ''; }
function dash(v) { return v ? v : '<span class="none-val">вҖ”</span>'; }

// в”Җв”Җ еҢҜеҮә Excel в”Җв”Җ
function exportChecked() {
  const checkedIds = Object.entries(SELECTIONS).filter(([,v]) => v).map(([k]) => k);
  if (checkedIds.length === 0) { showMessage('вқҢ и«Ӣе…ҲеӢҫйҒёиҰҒеҢҜеҮәзҡ„иЁҳйҢ„', 'error'); return; }

  const rows = [['зҷјзҘЁиҷҹзўј','йЎһеһӢ','ж—Ҙжңҹ','е“ҒеҗҚ','ж•ёйҮҸ','е–®дҪҚ','е–®еғ№','еҗҲиЁҲ','еӮҷиЁ»','йҖІй …е ұе–®','дҫӣжҮүе•Ҷ','жү№иҷҹ']];
  Object.values(INDEX).forEach(inv => {
    inv.details.forEach((d, idx) => {
      if (!SELECTIONS[`${inv.invoice_no}_${idx}`]) return;
      const s = d.source || {};
      rows.push([inv.invoice_no, d.is_return ? 'йҖҖиІЁ' : 'йҠ·е”®', d.date||'', d.product||'', d.qty, d.unit||'', d.price||'', d.total_price||'', d.notes||'', s.ref_no||'', s.supplier||'', s.batch||'']);
    });
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // иЁӯе®ҡж¬„еҜ¬
  ws['!cols'] = [14,8,12,20,10,6,10,12,16,18,16,14].map(w => ({ wch: w }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'зҷјзҘЁжҳҺзҙ°');
  XLSX.writeFile(wb, `invoice_export_${MONTH}.xlsx`);
  showMessage(`вң“ е·ІеҢҜеҮә ${checkedIds.length} зӯҶ`, 'success');
}

// в”Җв”Җ з”іе ұеҢҜеҮәпјҲеӢҫйҒёй …зӣ® вҶ’ JSONпјүв”Җв”Җ
function exportApply() {
  const checkedIds = Object.entries(SELECTIONS).filter(([,v]) => v).map(([k]) => k);
  if (checkedIds.length === 0) { showMessage('вқҢ и«Ӣе…ҲеӢҫйҒёиҰҒз”іе ұзҡ„иЁҳйҢ„', 'error'); return; }

  const items = [];
  Object.values(INDEX).forEach(inv => {
    inv.details.forEach((d, idx) => {
      if (!SELECTIONS[`${inv.invoice_no}_${idx}`]) return;
      const s = d.source || {};
      items.push({
        invoice_no: inv.invoice_no,
        product: d.product,
        qty: d.qty,
        unit: d.unit,
        price: d.price,
        total_price: d.total_price,
        notes: d.notes,
        source: {
          ref_no: s.ref_no,
          supplier: s.supplier,
          batch: s.batch
        }
      });
    });
  });

  const applyData = {
    export_date: new Date().toISOString().split('T')[0],
    export_type: 'з”іе ұз”Ё',
    month: MONTH,
    item_count: items.length,
    items: items
  };

  const blob = new Blob([JSON.stringify(applyData, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `apply_${MONTH}_${new Date().getTime()}.json`
  });
  a.click(); URL.revokeObjectURL(a.href);
  showMessage(`вң“ з”іе ұиіҮж–ҷе·ІеҢҜеҮәпјҲ${items.length} зӯҶпјү`, 'success');
}

// в”Җв”Җ JSON дёӢијү / иӨҮиЈҪ / жё…йҷӨ в”Җв”Җ
function downloadJSON() {
  const blob = new Blob([JSON.stringify(INDEX, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: `invoice_index_v5_${MONTH}.json` });
  a.click(); URL.revokeObjectURL(a.href);
  showMessage('вң“ JSON е·ІдёӢијү', 'success');
}
function copyJSON() {
  navigator.clipboard.writeText(JSON.stringify(INDEX, null, 2))
    .then(() => showMessage('вң“ JSON е·ІиӨҮиЈҪ', 'success'))
    .catch(() => showMessage('иӨҮиЈҪеӨұж•—', 'error'));
}
function clearAllData() {
  if (!confirm('зўәе®ҡжё…йҷӨжӯӨжңҲд»ҪжүҖжңүиіҮж–ҷпјҹ')) return;
  INDEX = {}; SELECTIONS = {};
  localStorage.removeItem(`invoice_v56_${MONTH}`);
  localStorage.removeItem(`sel_v56_${MONTH}`);
  document.getElementById('results').innerHTML = '';
  document.getElementById('uploadStatus').textContent = '';
  document.getElementById('invInput').value = '';
  document.getElementById('tagArea').innerHTML = '';
  updateStatusBadge(); updateCheckedCount();
  showMessage('вң“ иіҮж–ҷе·Іжё…йҷӨ', 'success');
  document.getElementById('toolbarArea').style.display = 'none';
  document.getElementById('checkControls').style.display = 'none';
}
