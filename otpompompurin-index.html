<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倉庫管理系統</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --yellow:#FFD54F; --yellow2:#FFECB3; --cream:#FFF8E1; --brown:#6D4C41; --brown2:#8D6E63; --amber:#FF8F00; }
    * { font-family:'M PLUS Rounded 1c','Microsoft JhengHei',sans-serif; }
    body { background:var(--cream); padding-bottom:76px; }

    /* ── topbar ── */
    .topbar {
      background: var(--yellow) url('pompompurin-bg.jpg') left center / auto 100% repeat-x;
      padding:.8rem 1rem; position:sticky; top:0; z-index:50;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 2px 8px rgba(109,76,65,.15);
    }
    .topbar h6 { margin:0; color:var(--brown); font-weight:800; font-size:1.05rem; }
    .btn-icon {
      background:rgba(109,76,65,.15); border:none; border-radius:10px;
      padding:.3rem .6rem; color:var(--brown); font-size:1rem; cursor:pointer; line-height:1;
    }

    /* ── bottom nav ── */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0; z-index:100;
      background:#fff; border-top:3px solid var(--yellow);
      display:flex; box-shadow:0 -2px 12px rgba(109,76,65,.12);
    }
    .bottom-nav a {
      flex:1; display:flex; flex-direction:column; align-items:center;
      padding:9px 0; color:var(--brown2); text-decoration:none;
      font-size:.6rem; font-weight:700; gap:2px; cursor:pointer;
    }
    .bottom-nav a i { font-size:1.2rem; }
    .bottom-nav a.active { color:var(--amber); }

    /* ── shared ── */
    .stat-card {
      background:#fff; border-radius:16px; padding:.85rem .5rem;
      text-align:center; box-shadow:0 3px 10px rgba(109,76,65,.1);
      border-bottom:4px solid var(--yellow);
    }
    .stat-card .num { font-size:1.35rem; font-weight:800; }
    .stat-card .lbl { font-size:.68rem; color:var(--brown2); font-weight:700; margin-top:2px; }
    .search-bar {
      background:#fff; border-radius:16px; padding:.75rem;
      margin-bottom:.75rem; box-shadow:0 2px 8px rgba(109,76,65,.08);
    }
    .form-control,.form-select {
      font-family:'M PLUS Rounded 1c',sans-serif;
      font-size:.88rem; border-radius:10px; border:2px solid var(--yellow2);
    }
    .form-control:focus,.form-select:focus {
      border-color:var(--yellow); box-shadow:0 0 0 .2rem rgba(255,213,79,.3);
    }
    .section-title {
      font-size:.78rem; font-weight:800; color:var(--brown2);
      text-transform:uppercase; letter-spacing:.06em; margin:.75rem 0 .4rem .25rem;
    }
    .alert { border-radius:14px; font-weight:700; }

    /* ── 庫存 ── */
    .inv-card {
      background:#fff; border-radius:16px; padding:.9rem 1rem; margin-bottom:.6rem;
      box-shadow:0 2px 8px rgba(109,76,65,.09); border-left:6px solid var(--yellow);
      display:flex; align-items:center; gap:.75rem;
      cursor:pointer; transition:transform .1s, box-shadow .1s;
    }
    .inv-card:active { transform:scale(.98); box-shadow:0 1px 4px rgba(109,76,65,.1); }
    .inv-card:hover  { box-shadow:0 4px 14px rgba(109,76,65,.15); }
    .inv-card.low      { border-left-color:#E53935; }
    .inv-card.zero     { border-left-color:#B0BEC5; opacity:.7; }
    .inv-card.abnormal { border-left-color:#7B1FA2; background:#F3E5F5; }
    .inv-card .info    { flex:1; min-width:0; }
    .inv-card .pname   { font-weight:800; font-size:.95rem; color:var(--brown); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .inv-card .spec    { font-size:.75rem; color:var(--brown2); margin-top:2px; }
    .inv-card .numbers { display:flex; gap:.6rem; margin-top:.4rem; }
    .inv-notes { font-size:.72rem; color:var(--brown2); margin-top:.3rem; line-height:1.4; white-space:pre-wrap; word-break:break-all; }
    .inv-card .itag    { font-size:.72rem; font-weight:700; border-radius:8px; padding:.15em .55em; }
    .itag-in  { background:#E8F5E9; color:#2E7D32; }
    .itag-out { background:#FBE9E7; color:#BF360C; }
    .inv-card .balance      { text-align:right; flex-shrink:0; }
    .inv-card .balance .qty { font-size:1.5rem; font-weight:800; line-height:1; }
    .inv-card .balance .unit{ font-size:.72rem; color:var(--brown2); font-weight:700; }
    .qty-ok       { color:#2E7D32; }
    .qty-low      { color:#E53935; }
    .qty-zero     { color:#90A4AE; }
    .qty-abnormal { color:#7B1FA2; }
    .tag-abnormal {
      font-size:.72rem; font-weight:800; border-radius:8px; padding:.15em .6em;
      background:#7B1FA2; color:#fff; animation:pulse-ab 1.2s infinite;
    }
    @keyframes pulse-ab { 0%,100%{opacity:1} 50%{opacity:.55} }

    /* ── 紀錄 ── */
    .rec-card {
      background:#fff; border-radius:14px; padding:.85rem 1rem; margin-bottom:.5rem;
      box-shadow:0 2px 8px rgba(109,76,65,.08); cursor:pointer;
      transition:transform .1s; border-left:5px solid var(--yellow);
    }
    .rec-card.in     { border-left-color:#2E7D32; }
    .rec-card.out    { border-left-color:#E65100; }
    .rec-card.borrow { border-left-color:#1565C0; }
    .rec-card:active { transform:scale(.98); }
    .rec-top  { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; }
    .rec-name { font-weight:800; font-size:.95rem; color:var(--brown); }
    .rec-spec { font-size:.75rem; color:var(--brown2); margin-top:1px; }
    .rec-meta { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.4rem; align-items:center; }
    .rec-tag  { font-size:.7rem; font-weight:700; border-radius:8px; padding:.2em .55em; background:var(--yellow2); color:var(--brown); }
    .badge-in     { background:#E8F5E9; color:#2E7D32; }
    .badge-out    { background:#FBE9E7; color:#BF360C; }
    .badge-borrow { background:#E3F2FD; color:#1565C0; }
    .rec-qty  { font-weight:800; font-size:1rem; }
    .rec-notes { font-size:.75rem; color:var(--brown2); margin-top:.35rem; padding-top:.35rem; border-top:1px solid var(--yellow2); line-height:1.45; word-break:break-all; }
    .qty-in   { color:#2E7D32; }
    .qty-out  { color:#E65100; }
    .qty-borrow { color:#1565C0; }

    /* ── 精準篩選提示 ── */
    .ef-chip {
      display: inline-flex; align-items: center; gap: .4rem;
      background: #FFF3E0; border: 1.5px solid var(--amber);
      border-radius: 20px; padding: .3em .75em;
      font-size: .78rem; font-weight: 700; color: var(--amber);
    }
    .ef-chip button {
      background: none; border: none; cursor: pointer;
      color: var(--brown2); font-size: .8rem; padding: 0; line-height: 1;
    }
    .ef-chip button:hover { color: #E53935; }

    /* ── 排序列 ── */
    .sort-bar {
      display: flex; align-items: center; gap: .45rem;
      margin-bottom: .6rem; flex-wrap: wrap;
    }
    .sort-lbl { font-size: .72rem; font-weight: 700; color: var(--brown2); white-space: nowrap; }
    .sort-btn {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      font-size: .72rem; font-weight: 700;
      border: 2px solid var(--yellow2); background: #fff;
      color: var(--brown2); border-radius: 20px;
      padding: .25em .75em; cursor: pointer;
      transition: all .15s; white-space: nowrap;
    }
    .sort-btn:hover  { border-color: var(--amber); color: var(--amber); }
    .sort-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }
    .sort-btn .arrow { font-style: normal; font-size: .65rem; margin-left: .2em; }

    /* ── 表單（新增 + 編輯）── */
    .form-block {
      background:#fff; border-radius:20px; padding:1.1rem; margin-bottom:.8rem;
      box-shadow:0 3px 10px rgba(109,76,65,.1); border-top:4px solid var(--yellow);
    }
    .form-block h6 { font-size:.78rem; font-weight:800; color:var(--brown2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:.85rem; }
    .form-block .form-control,
    .form-block .form-select { font-size:.95rem; min-height:46px; border-radius:12px; }
    .form-label  { font-weight:700; font-size:.88rem; color:var(--brown); }
    .btn-submit  { background:var(--amber); border:none; color:#fff; border-radius:16px; min-height:52px; font-size:1.05rem; font-weight:800; box-shadow:0 4px 12px rgba(255,143,0,.35); width:100%; }
    .btn-submit:hover    { background:#E65100; color:#fff; }
    .btn-submit:disabled { background:var(--brown2); }
    .btn-delete  { background:#fff; border:2px solid #E53935; color:#E53935; border-radius:16px; min-height:46px; font-size:.95rem; font-weight:800; width:100%; cursor:pointer; }
    .btn-delete:hover    { background:#FFEBEE; }
    .btn-delete:disabled { opacity:.5; cursor:not-allowed; }

    /* ── 盤點 ── */
    .info-block { background:#fff; border-radius:16px; padding:.9rem 1rem; margin-bottom:.75rem; box-shadow:0 3px 10px rgba(109,76,65,.1); border-top:4px solid var(--yellow); display:flex; gap:2rem; align-items:center; }
    .info-block .lbl { font-size:.72rem; color:var(--brown2); font-weight:700; }
    .info-block .val { font-size:.95rem; font-weight:800; color:var(--brown); margin-top:2px; }
    .product-card { background:#fff; border-radius:14px; padding:.8rem .5rem; text-align:center; box-shadow:0 2px 8px rgba(109,76,65,.09); border-bottom:4px solid var(--yellow); height:100%; }
    .product-card .pname { font-size:.8rem; font-weight:700; color:var(--brown); line-height:1.35; min-height:2.7em; display:flex; align-items:center; justify-content:center; }
    .product-card .pqty  { font-size:1.75rem; font-weight:800; color:var(--amber); margin-top:.35rem; line-height:1; }
    .product-card .pqty.zero { color:#90A4AE; }
    .product-card .pqty.plow { color:#E53935; }

    /* ── 盤點人 banner ── */
    .st-person-banner {
      background: var(--yellow); border-radius: 14px;
      padding: .7rem 1rem; margin-bottom: .55rem;
      display: flex; align-items: center; gap: .6rem;
      box-shadow: 0 2px 8px rgba(109,76,65,.12);
    }
    .st-person-banner .icon { font-size: 1.4rem; line-height: 1; }
    .st-person-banner .name { font-size: 1.1rem; font-weight: 800; color: var(--brown); }
    .st-person-banner .sub  { font-size: .7rem; color: var(--brown2); font-weight: 700; margin-top: 1px; }

    /* ── 盤點時間條 ── */
    .st-time-bar {
      background: #fff; border-radius: 11px;
      padding: .5rem .9rem; margin-bottom: .8rem;
      display: flex; align-items: center; gap: .4rem;
      font-size: .8rem; color: var(--brown2); font-weight: 700;
      box-shadow: 0 1px 4px rgba(109,76,65,.08);
    }
    .st-time-bar i { color: var(--brown2); }

    /* ── 盤點表格 ── */
    .st-table { width: 100%; border-collapse: collapse; }
    .st-table thead tr { background: var(--yellow2); }
    .st-table th {
      padding: .55rem .9rem; font-size: .76rem; font-weight: 800;
      color: var(--brown2); letter-spacing: .05em;
    }
    .st-table th:first-child { border-radius: 12px 0 0 0; text-align: left; }
    .st-table th:last-child  { border-radius: 0 12px 0 0; text-align: right; }
    .st-table tbody { background: #fff; }
    .st-table td {
      padding: .65rem .9rem; font-size: .93rem; font-weight: 600;
      color: var(--brown); border-top: 1px solid var(--yellow2);
    }
    .st-table td:first-child { text-align: left; }
    .st-table td:last-child  { text-align: right; font-size: 1.05rem; font-weight: 800; }
    .st-table tbody tr:last-child td:first-child  { border-radius: 0 0 0 12px; }
    .st-table tbody tr:last-child td:last-child   { border-radius: 0 0 12px 0; }
    .st-table tbody tr { cursor: pointer; }
    .st-table tbody tr:hover { background: #FFFDE7; }
    .st-table tbody tr:hover .st-go { opacity: 1; }
    .st-go { opacity: 0; transition: opacity .15s; color: var(--amber); font-size: .85rem; padding-left: 4px; }
    .st-wrap {
      background: #fff; border-radius: 14px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(109,76,65,.09);
    }
    .st-qty-ok   { color: var(--amber); }
    .st-qty-low  { color: #E53935; }
    .st-qty-zero { color: #90A4AE; }
  </style>
</head>
<body>

<!-- ═══ 底部導航 ═══ -->
<nav class="bottom-nav">
  <a id="nav-inventory" onclick="navigate('inventory')"><i class="bi bi-boxes"></i>庫存</a>
  <a id="nav-form"      onclick="navigate('form')"><i class="bi bi-plus-circle-fill"></i>新增</a>
  <a id="nav-list"      onclick="navigate('list')"><i class="bi bi-journal-text"></i>紀錄</a>
  <a id="nav-stocktake" onclick="navigate('stocktake')"><i class="bi bi-clipboard-check"></i>盤點</a>
</nav>

<!-- ═══ 庫存頁 ═══ -->
<div class="page" id="page-inventory">
  <div class="topbar">
    <div class="d-flex align-items-center gap-2"><span style="font-size:1.5rem">🐶</span><h6>庫存結餘</h6></div>
    <button class="btn-icon" onclick="loadInventory()"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
  <div class="container-fluid px-3 pt-3">
    <div class="row g-2 mb-3">
      <div class="col-3"><div class="stat-card"><div class="num text-primary" id="inv-stat-items">-</div><div class="lbl">品項數</div></div></div>
      <div class="col-3"><div class="stat-card"><div class="num" style="color:#2E7D32" id="inv-stat-ok">-</div><div class="lbl">有庫存</div></div></div>
      <div class="col-3"><div class="stat-card"><div class="num" style="color:#E53935" id="inv-stat-low">-</div><div class="lbl">低庫存</div></div></div>
      <div class="col-3"><div class="stat-card"><div class="num" style="color:#7B1FA2" id="inv-stat-ab">-</div><div class="lbl">異常</div></div></div>
    </div>
    <div class="search-bar">
      <input type="search" class="form-control" id="inv-search" placeholder="🔍 搜尋產品名稱、備註關鍵字…" oninput="filterInventory()">
    </div>
    <div id="inv-list"><div class="text-center py-5" style="color:var(--brown2)">🐾 載入中…</div></div>
  </div>
</div>

<!-- ═══ 新增頁 ═══ -->
<div class="page" id="page-form" style="display:none">
  <div class="topbar">
    <div class="d-flex align-items-center gap-2"><span style="font-size:1.5rem">🐶</span><h6>新增入出庫紀錄</h6></div>
  </div>
  <div class="container-fluid px-3 pt-3" style="max-width:600px">
    <div id="f-msg" class="alert" style="display:none"></div>
    <form onsubmit="submitForm(event)">
      <div class="form-block">
        <h6>📋 基本資訊</h6>
        <div class="mb-3">
          <label class="form-label">日期</label>
          <input type="date" class="form-control" id="f-date" required>
        </div>
        <div class="mb-3">
          <label class="form-label">承辦人員</label>
          <input type="text" class="form-control" id="f-staff" placeholder="請輸入姓名" required>
        </div>
        <div>
          <label class="form-label">屬性</label>
          <select class="form-select" id="f-type" onchange="onTypeChange()" required>
            <option value="">請選擇</option>
            <option value="入庫">📦 入庫</option>
            <option value="出庫">🚚 出庫</option>
            <option value="借出">🤝 借出</option>
          </select>
        </div>
      </div>
      <div class="form-block">
        <h6>🏷️ 產品資訊</h6>
        <div class="mb-3" id="f-vendor-row">
          <label class="form-label">供應商</label>
          <input type="text" class="form-control" id="f-vendor" placeholder="供應商名稱">
        </div>
        <div class="mb-3">
          <label class="form-label">產品類別</label>
          <select class="form-select" id="f-category" onchange="toggleCatOther('f-cat-other',this)">
            <option value="">請選擇</option>
            <option value="內包材">內包材</option>
            <option value="外包材">外包材</option>
            <option value="耗材">耗材</option>
            <option value="其他">其他</option>
          </select>
          <input type="text" class="form-control mt-2" id="f-cat-other" placeholder="請輸入類別" style="display:none">
        </div>
        <div class="mb-3">
          <label class="form-label">產品名稱 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="f-product" placeholder="請輸入產品名稱" required>
        </div>
        <div>
          <label class="form-label">規格</label>
          <input type="text" class="form-control" id="f-spec" placeholder="例：50cm×500m">
        </div>
      </div>
      <div class="form-block">
        <h6>🔢 數量資訊</h6>
        <div class="row g-2">
          <div class="col-8">
            <label class="form-label" id="f-qty-label">數量</label>
            <input type="number" class="form-control" id="f-qty" min="0" step="0.01" placeholder="0" required>
          </div>
          <div class="col-4">
            <label class="form-label">單位</label>
            <select class="form-select" id="f-unit">
              <option value="">單位</option>
              <option value="箱">箱</option>
              <option value="只">只</option>
              <option value="組">組</option>
              <option value="公斤">公斤</option>
            </select>
          </div>
        </div>
        <div class="mt-2">
          <label class="form-label" id="f-location-label">存放位置</label>
          <input type="text" class="form-control" id="f-location" placeholder="請輸入存放位置">
        </div>
        <div class="mt-2" id="f-cost-row">
          <label class="form-label">成本 (NT$)</label>
          <input type="number" class="form-control" id="f-cost" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-block">
        <h6>📝 備註</h6>
        <textarea class="form-control" id="f-notes" rows="2" placeholder="備註（選填）"></textarea>
      </div>
      <button type="submit" class="btn-submit mb-3" id="f-submit-btn">💾 儲存</button>
    </form>
  </div>
</div>

<!-- ═══ 紀錄頁 ═══ -->
<div class="page" id="page-list" style="display:none">
  <div class="topbar">
    <div class="d-flex align-items-center gap-2"><span style="font-size:1.5rem">🐶</span><h6>出入庫紀錄</h6></div>
    <button class="btn-icon" onclick="loadRecords()"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
  <div class="container-fluid px-3 pt-3">
    <div class="row g-2 mb-3">
      <div class="col-4"><div class="stat-card"><div class="num text-primary" id="list-total">-</div><div class="lbl">總筆數</div></div></div>
      <div class="col-4"><div class="stat-card"><div class="num" style="color:#2E7D32" id="list-in">-</div><div class="lbl">入庫量</div></div></div>
      <div class="col-4"><div class="stat-card"><div class="num" style="color:#E65100" id="list-out">-</div><div class="lbl">出庫量</div></div></div>
    </div>
    <div class="search-bar">
      <div class="row g-2">
        <div class="col-8"><input type="search" class="form-control" id="list-search" placeholder="🔍 搜尋產品、承辦人…" oninput="exactFilter=null; filterRecords()"></div>
        <div class="col-4">
          <select class="form-select" id="list-filter" onchange="filterRecords()">
            <option value="">全部</option>
            <option value="入庫">入庫</option>
            <option value="出庫">出庫</option>
            <option value="借出">借出</option>
          </select>
        </div>
      </div>
    </div>
    <div id="exact-filter-bar" style="display:none;margin-bottom:.5rem">
      <div class="ef-chip">
        <i class="bi bi-funnel-fill"></i>
        <span id="ef-label"></span>
        <button onclick="clearExactFilter()" title="清除篩選">✕</button>
      </div>
    </div>
    <div class="sort-bar">
      <span class="sort-lbl">排序：</span>
      <button class="sort-btn active" id="sort-date"   onclick="setSort('date')"  >🕐 時間</button>
      <button class="sort-btn"        id="sort-name"   onclick="setSort('name')"  >🏷️ 品名</button>
      <button class="sort-btn"        id="sort-type"   onclick="setSort('type')"  >📦 類型</button>
    </div>
    <div id="rec-list"><div class="text-center py-5" style="color:var(--brown2)">🐾 載入中…</div></div>
  </div>
</div>

<!-- ═══ 盤點頁 ═══ -->
<div class="page" id="page-stocktake" style="display:none">
  <div class="topbar">
    <div class="d-flex align-items-center gap-2"><span style="font-size:1.5rem">🐶</span><h6>最新盤點紀錄</h6></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';
const STOCKTAKE_SKIP = ['時間戳記','盤點人'];

let allRows = [];
let allInventory = [];
let currentEditRow = null;

/* ═══════════════ 路由 ═══════════════ */
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('page-' + page).style.display = 'block';
  document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');
  window.scrollTo(0, 0);
  if (page === 'inventory') loadInventory();
  if (page === 'list')      loadRecords();
  if (page === 'stocktake') loadStocktake();
}

/* ═══════════════ 庫存頁 ═══════════════ */
async function loadInventory() {
  document.getElementById('inv-list').innerHTML = '<div class="text-center py-5" style="color:#8D6E63">🐾 載入中…</div>';
  try {
    const rows = await (await fetch(SCRIPT_URL)).json();
    allInventory = calcInventory(rows);
    renderInventory(allInventory);
  } catch(err) {
    document.getElementById('inv-list').innerHTML = `<div class="text-center py-4 text-danger">❌ 載入失敗：${err.message}</div>`;
  }
}

function calcInventory(rows) {
  const map = {};
  rows.forEach(r => {
    const key = (r['產品名稱']||'') + '|||' + (r['規格']||'');
    if (!map[key]) map[key] = { name:r['產品名稱']||'', spec:r['規格']||'', unit:r['單位']||'', inQty:0, outQty:0, notes:new Set() };
    map[key].inQty  += Number(r['入庫數量'])||0;
    map[key].outQty += Number(r['出庫數量'])||0;
    if (r['單位']) map[key].unit = r['單位'];
    if (r['備註']) map[key].notes.add(String(r['備註']).trim());
  });
  return Object.values(map)
    .map(p => ({ ...p, balance: p.inQty - p.outQty, notes:[...p.notes].join(' ') }))
    .sort((a,b) => b.balance - a.balance);
}

function renderInventory(list) {
  const el = document.getElementById('inv-list');
  if (!list.length) { el.innerHTML = '<div class="text-center py-4" style="color:#8D6E63">沒有資料</div>'; return; }

  const ok       = list.filter(p => p.balance > 0);
  const zero     = list.filter(p => p.balance === 0);
  const abnormal = list.filter(p => p.balance < 0);
  const low      = ok.filter(p => p.balance < 100);

  document.getElementById('inv-stat-items').textContent = list.length;
  document.getElementById('inv-stat-ok').textContent    = ok.length;
  document.getElementById('inv-stat-low').textContent   = low.length;
  document.getElementById('inv-stat-ab').textContent    = abnormal.length;

  const card = p => {
    const cls    = p.balance < 0 ? 'abnormal' : p.balance === 0 ? 'zero' : p.balance < 100 ? 'low' : '';
    const qtyCls = p.balance < 0 ? 'qty-abnormal' : p.balance === 0 ? 'qty-zero' : p.balance < 100 ? 'qty-low' : 'qty-ok';
    const badge  = p.balance < 0 ? '<span class="tag-abnormal ms-1">⚠️ 異常</span>' : '';
    const _sn = p.name.replace(/'/g, "\\'");
    const _ss = p.spec.replace(/'/g, "\\'");
    return `<div class="inv-card ${cls}" onclick="goToRecords('${_sn}','${_ss}')">
      <div class="info">
        <div class="pname">${p.name}${badge}</div>
        ${p.spec ? `<div class="spec">${p.spec}</div>` : ''}
        <div class="numbers">
          <span class="itag itag-in">入 ${p.inQty.toLocaleString()}</span>
          <span class="itag itag-out">出 ${p.outQty.toLocaleString()}</span>
        </div>
        ${p.notes ? `<div class="inv-notes">${p.notes}</div>` : ''}
      </div>
      <div class="balance">
        <div class="qty ${qtyCls}">${p.balance.toLocaleString()}</div>
        <div class="unit">${p.unit||'—'}</div>
      </div>
    </div>`;
  };

  let html = '';
  if (abnormal.length) { html += `<div class="section-title">🚨 庫存異常（${abnormal.length} 項）</div>` + abnormal.map(card).join(''); }
  if (ok.length)       { html += `<div class="section-title">📦 有庫存（${ok.length} 項）</div>`     + ok.map(card).join(''); }
  if (zero.length)     { html += `<div class="section-title">⚪ 已用完（${zero.length} 項）</div>`   + zero.map(card).join(''); }
  el.innerHTML = html;
}

function filterInventory() {
  const kw = document.getElementById('inv-search').value.toLowerCase();
  renderInventory(!kw ? allInventory : allInventory.filter(p =>
    p.name.toLowerCase().includes(kw) || p.spec.toLowerCase().includes(kw) || p.notes.toLowerCase().includes(kw)));
}

/* ─ 庫存卡片點擊 → 跳紀錄頁並精準篩選（品名＋規格）─ */
let exactFilter = null; // { name, spec }

function goToRecords(name, spec) {
  exactFilter = { name, spec };
  document.getElementById('list-search').value = '';
  document.getElementById('list-filter').value = '';
  navigate('list');
}

function clearExactFilter() {
  exactFilter = null;
  document.getElementById('exact-filter-bar').style.display = 'none';
  filterRecords();
}

/* ═══════════════ 新增表單 ═══════════════ */
function onTypeChange() {
  const type = document.getElementById('f-type').value;
  document.getElementById('f-qty-label').textContent      = { '入庫':'入庫數量','出庫':'出庫數量','借出':'借出數量' }[type] || '數量';
  document.getElementById('f-location-label').textContent = { '入庫':'存放位置','出庫':'領取單位','借出':'領取單位' }[type] || '存放位置/領取單位';
  document.getElementById('f-location').placeholder = type === '入庫' ? '請輸入存放位置（例：包材室）' : '請輸入領取單位';
  document.getElementById('f-vendor-row').style.display = (type === '入庫' || type === '') ? '' : 'none';
  document.getElementById('f-cost-row').style.display   = type === '入庫' ? '' : 'none';
}

function toggleCatOther(otherId, sel) {
  document.getElementById(otherId).style.display = sel.value === '其他' ? '' : 'none';
}

function getCatValue(selId, otherId) {
  const v = document.getElementById(selId).value;
  if (v === '其他') {
    const t = document.getElementById(otherId).value.trim();
    return t ? `其他：${t}` : '其他';
  }
  return v;
}

async function submitForm(e) {
  e.preventDefault();
  const btn  = document.getElementById('f-submit-btn');
  const type = document.getElementById('f-type').value;
  const data = {
    date:     document.getElementById('f-date').value,
    staff:    document.getElementById('f-staff').value,
    type,
    vendor:   document.getElementById('f-vendor').value,
    category: getCatValue('f-category','f-cat-other'),
    product:  document.getElementById('f-product').value,
    spec:     document.getElementById('f-spec').value,
    inQty:    type === '入庫' ? document.getElementById('f-qty').value : 0,
    outQty:   (type === '出庫'||type === '借出') ? document.getElementById('f-qty').value : 0,
    unit:     document.getElementById('f-unit').value,
    location: document.getElementById('f-location').value,
    cost:     document.getElementById('f-cost').value,
    notes:    document.getElementById('f-notes').value,
  };
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    await gasPost(data);
    showMsg('f-msg', '✅ 已成功儲存！', 'success');
    e.target.reset();
    document.getElementById('f-date').value  = new Date().toISOString().slice(0,10);
    document.getElementById('f-staff').value = '黃儀婷'; // 恢復預設承辦人
    document.getElementById('f-cat-other').style.display = 'none';
    onTypeChange();
  } catch {
    showMsg('f-msg', '❌ 儲存失敗，請重試', 'danger');
  } finally {
    btn.disabled = false; btn.textContent = '💾 儲存';
  }
}

/* ═══════════════ 紀錄頁 ═══════════════ */
async function loadRecords() {
  document.getElementById('rec-list').innerHTML = '<div class="text-center py-5" style="color:#8D6E63">🐾 載入中…</div>';
  try {
    allRows = await (await fetch(SCRIPT_URL)).json();
    filterRecords(); // 保留搜尋狀態（含從庫存頁跳轉時帶入的關鍵字）
  } catch(err) {
    document.getElementById('rec-list').innerHTML = `<div class="text-center py-4 text-danger">❌ 載入失敗：${err.message}</div>`;
  }
}

function renderCards(rows) {
  const el = document.getElementById('rec-list');
  if (!rows.length) { el.innerHTML = '<div class="text-center py-4" style="color:#8D6E63">沒有資料</div>'; return; }
  el.innerHTML = rows.map((r) => {
    const realIdx = allRows.indexOf(r); // 取 allRows 真實 index，避免篩選後錯位
    const type = r['屬性'], isIn = type === '入庫';
    const cls  = isIn ? 'in' : type === '借出' ? 'borrow' : 'out';
    const qty  = isIn ? r['入庫數量'] : r['出庫數量'];
    const bc   = isIn ? 'badge-in' : type === '借出' ? 'badge-borrow' : 'badge-out';
    const qc   = isIn ? 'qty-in'   : type === '借出' ? 'qty-borrow'   : 'qty-out';
    return `<div class="rec-card ${cls}" onclick="openEdit(${realIdx})">
      <div class="rec-top">
        <div>
          <div class="rec-name">${r['產品名稱']}</div>
          ${r['規格'] ? `<div class="rec-spec">${r['規格']}</div>` : ''}
        </div>
        <div class="text-end">
          <div class="rec-qty ${qc}">${Number(qty||0).toLocaleString()}</div>
          <div style="font-size:.7rem;color:var(--brown2);font-weight:700">${r['單位']||''}</div>
        </div>
      </div>
      <div class="rec-meta">
        <span class="rec-tag ${bc}">${type}</span>
        <span class="rec-tag">${fmtDate(r['日期'])}</span>
        ${r['承辦人員'] ? `<span class="rec-tag">${r['承辦人員']}</span>` : ''}
        <span style="margin-left:auto;font-size:.75rem;color:var(--brown2)"><i class="bi bi-pencil"></i> 點擊編輯</span>
      </div>
      ${r['備註'] ? `<div class="rec-notes">${r['備註']}</div>` : ''}
    </div>`;
  }).join('');
}

function renderStats(rows) {
  document.getElementById('list-total').textContent = rows.length;
  document.getElementById('list-in').textContent    = rows.reduce((s,r)=>s+(Number(r['入庫數量'])||0),0).toLocaleString();
  document.getElementById('list-out').textContent   = rows.reduce((s,r)=>s+(Number(r['出庫數量'])||0),0).toLocaleString();
}

function filterRecords() {
  const kw   = document.getElementById('list-search').value.toLowerCase();
  const type = document.getElementById('list-filter').value;

  // 精準篩選模式（從庫存卡片點擊進來）
  const efBar = document.getElementById('exact-filter-bar');
  if (exactFilter) {
    const label = exactFilter.spec
      ? `${exactFilter.name}　${exactFilter.spec}`
      : exactFilter.name;
    efBar.style.display = '';
    document.getElementById('ef-label').textContent = label;
  } else {
    efBar.style.display = 'none';
  }

  const f = allRows.filter(r => {
    if (exactFilter) {
      const nameOk = (r['產品名稱'] || '') === exactFilter.name;
      const specOk = exactFilter.spec
        ? (r['規格'] || '') === exactFilter.spec
        : true;
      const mt = !type || r['屬性'] === type;
      return nameOk && specOk && mt;
    }
    const mk = !kw   || Object.values(r).some(v=>String(v).toLowerCase().includes(kw));
    const mt = !type || r['屬性'] === type;
    return mk && mt;
  });
  const sorted = applySortToRows(f);
  renderCards(sorted); renderStats(sorted);
}

/* ═══════════════ 排序 ═══════════════ */
let sortKey = 'date';   // 'date' | 'name' | 'type'
let sortAsc = false;    // 最新在前（時間預設 desc）

function setSort(key) {
  if (sortKey === key) {
    sortAsc = !sortAsc;
  } else {
    sortKey = key;
    sortAsc = key !== 'date'; // 時間預設新→舊；品名/類型預設 A→Z
  }
  // 更新按鈕樣式
  ['date','name','type'].forEach(k => {
    const btn = document.getElementById('sort-' + k);
    if (!btn) return;
    btn.classList.toggle('active', k === sortKey);
    const arrow = btn.querySelector('.arrow');
    if (k === sortKey) {
      if (!arrow) btn.innerHTML += '<i class="arrow">' + (sortAsc ? ' ↑' : ' ↓') + '</i>';
      else arrow.textContent = sortAsc ? ' ↑' : ' ↓';
    } else {
      if (arrow) arrow.remove();
    }
  });
  filterRecords();
}

function applySortToRows(rows) {
  const TYPE_ORDER = { '入庫': 0, '出庫': 1, '借出': 2 };
  return [...rows].sort((a, b) => {
    let va, vb;
    if (sortKey === 'date') {
      va = new Date(a['日期'] || 0).getTime();
      vb = new Date(b['日期'] || 0).getTime();
    } else if (sortKey === 'name') {
      va = (a['產品名稱'] || '').toLowerCase();
      vb = (b['產品名稱'] || '').toLowerCase();
    } else { // type
      va = TYPE_ORDER[a['屬性']] ?? 9;
      vb = TYPE_ORDER[b['屬性']] ?? 9;
    }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

/* ═══════════════ 編輯覆蓋層 ═══════════════ */
function openEdit(index) {
  const r = allRows[index];
  currentEditRow = r._row;
  document.getElementById('e-row').value = r._row || '';
  document.getElementById('e-ts').value  = r['時間戳記'] || '';
  document.getElementById('e-date').value     = toInputDate(r['日期']);
  document.getElementById('e-staff').value    = r['承辦人員'] || '';
  document.getElementById('e-type').value     = r['屬性'] || '入庫';
  document.getElementById('e-vendor').value   = r['供應商'] || r['供應商名稱'] || '';
  document.getElementById('e-product').value  = r['產品名稱'] || '';
  document.getElementById('e-spec').value     = r['規格'] || '';
  document.getElementById('e-unit').value     = r['單位'] || '';
  document.getElementById('e-location').value = r['存放位置'] || r['存放位置/領取單位'] || '';
  document.getElementById('e-cost').value     = r['成本'] || '';
  document.getElementById('e-notes').value    = r['備註'] || '';
  setEditCat(r['產品類別'] || '');
  const isIn = r['屬性'] === '入庫';
  document.getElementById('e-qty').value = isIn ? (r['入庫數量']||0) : (r['出庫數量']||0);
  document.getElementById('e-msg').style.display = 'none';
  onEditTypeChange();
  const overlay = document.getElementById('page-edit');
  overlay.style.display = 'block';
  overlay.scrollTop = 0;
}

function closeEdit() {
  document.getElementById('page-edit').style.display = 'none';
}

function setEditCat(value) {
  const sel   = document.getElementById('e-category');
  const other = document.getElementById('e-cat-other');
  other.style.display = 'none'; other.value = '';
  if (!value) { sel.value = ''; return; }
  if (['內包材','外包材','耗材'].includes(value)) {
    sel.value = value;
  } else if (value.startsWith('其他')) {
    sel.value = '其他';
    other.style.display = '';
    other.value = value.replace(/^其他：?/,'');
  } else { sel.value = ''; }
}

function onEditTypeChange() {
  const type = document.getElementById('e-type').value;
  document.getElementById('e-qty-label').textContent      = { '入庫':'入庫數量','出庫':'出庫數量','借出':'借出數量' }[type] || '數量';
  document.getElementById('e-location-label').textContent = { '入庫':'存放位置','出庫':'領取單位','借出':'領取單位' }[type] || '存放位置/領取單位';
  document.getElementById('e-location').placeholder = type === '入庫' ? '請輸入存放位置' : '請輸入領取單位';
  document.getElementById('e-vendor-row').style.display = type === '入庫' ? '' : 'none';
  document.getElementById('e-cost-row').style.display   = type === '入庫' ? '' : 'none';
}


/* POST 到 GAS：no-cors 避免 CORS redirect 掛住；10 秒 timeout 保底 */
function gasPost(payload) {
  const req = fetch(SCRIPT_URL, {
    method: 'POST',
    body:   JSON.stringify(payload),
    mode:   'no-cors',            // GAS 回 redirect，no-cors 不等 body 直接完成
  });
  const timeout = new Promise((_, rej) =>
    setTimeout(() => rej(new Error('timeout')), 10000));
  return Promise.race([req, timeout]);
}

async function saveEdit() {
  const btn  = document.getElementById('e-save-btn');
  const type = document.getElementById('e-type').value;
  const data = {
    action: 'update',
    row:    Number(document.getElementById('e-row').value),
    timestamp: document.getElementById('e-ts').value,
    date:   document.getElementById('e-date').value,
    staff:  document.getElementById('e-staff').value,
    type,
    vendor:   document.getElementById('e-vendor').value,
    category: getCatValue('e-category','e-cat-other'),
    product:  document.getElementById('e-product').value,
    spec:     document.getElementById('e-spec').value,
    inQty:    type === '入庫' ? document.getElementById('e-qty').value : 0,
    outQty:   (type === '出庫'||type === '借出') ? document.getElementById('e-qty').value : 0,
    unit:     document.getElementById('e-unit').value,
    location: document.getElementById('e-location').value,
    cost:     document.getElementById('e-cost').value,
    notes:    document.getElementById('e-notes').value,
  };
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    await gasPost(data);
    showMsg('e-msg', '✅ 已更新！', 'success');
    setTimeout(() => { closeEdit(); loadRecords(); }, 800);
  } catch {
    showMsg('e-msg', '❌ 更新失敗，請重試', 'danger');
  } finally {
    btn.disabled = false; btn.textContent = '💾 儲存變更';
  }
}

async function deleteRecord() {
  const row  = Number(document.getElementById('e-row').value);
  const name = document.getElementById('e-product').value || '此筆';
  if (!confirm(`確定要刪除「${name}」這筆紀錄嗎？\n刪除後無法復原。`)) return;

  const saveBtn = document.getElementById('e-save-btn');
  const delBtn  = document.getElementById('e-del-btn');
  saveBtn.disabled = true; delBtn.disabled = true; delBtn.textContent = '刪除中…';

  try {
    await gasPost({ action: 'delete', row });
    showMsg('e-msg', '🗑️ 已刪除！', 'success');
    setTimeout(() => { closeEdit(); loadRecords(); }, 800);
  } catch {
    showMsg('e-msg', '❌ 刪除失敗，請重試', 'danger');
  } finally {
    saveBtn.disabled = false; delBtn.disabled = false; delBtn.textContent = '🗑️ 刪除此筆紀錄';
  }
}

/* ═══════════════ 盤點頁 ═══════════════ */
async function loadStocktake() {
  document.getElementById('st-products').innerHTML = '<div class="text-center py-5" style="color:#8D6E63">🐾 載入中…</div>';
  document.getElementById('st-info').innerHTML = '';
  try {
    const data = await (await fetch(SCRIPT_URL + '?action=stocktake')).json();
    if (!Object.keys(data).length) {
      document.getElementById('st-products').innerHTML = '<div class="text-center py-4" style="color:#8D6E63">尚無盤點紀錄</div>';
      return;
    }
    const rawTs = data['時間戳記'] || '';
    const ts    = rawTs ? new Date(rawTs) : null;
    const tsStr = (ts && !isNaN(ts))
      ? ts.toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
      : rawTs || '—';

    // 盤點人：依優先順序三層偵測
    const PERSON_KEYS = ['盤點人', '盤點人員', '姓名', '填寫人'];
    let person = '';
    let personKey = null;  // 記錄偵測到的 key，之後從商品清單排除

    // 層1：GAS 已標準化 → 直接用固定鍵
    for (const k of PERSON_KEYS) {
      if (data[k]) { person = data[k]; personKey = k; break; }
    }
    // 層2：值為非空非數字字串（舊格式：鍵=欄位名, 值=人名）
    if (!person) {
      const found = Object.entries(data).find(([k, v]) =>
        k && k.trim() && !STOCKTAKE_SKIP.includes(k) && !PERSON_KEYS.includes(k)
        && v && isNaN(Number(v)));
      if (found) { person = found[1]; personKey = found[0]; }
    }
    // 層3：Google 表單 B 欄格式 → 鍵本身即為人名，值為空字串
    if (!person) {
      const found = Object.entries(data).find(([k, v]) =>
        k && k.trim() && !STOCKTAKE_SKIP.includes(k) && !PERSON_KEYS.includes(k)
        && (v === '' || v === null) && isNaN(Number(k)));
      if (found) { person = found[0]; personKey = found[0]; }
    }
    person = person || '—';

    document.getElementById('st-info').innerHTML = `
      <div class="st-person-banner">
        <div class="icon">👤</div>
        <div>
          <div class="sub">盤點人</div>
          <div class="name">${person}</div>
        </div>
      </div>
      <div class="st-time-bar">
        <i class="bi bi-clock"></i> ${tsStr}
      </div>`;

    // 只保留：有欄位名稱 + 值為空或數字（排除 metadata / 人名欄位）
    const products = Object.entries(data).filter(([k, v]) => {
      if (!k || !k.trim()) return false;                            // 跳過空白欄位名稱
      if (STOCKTAKE_SKIP.includes(k)) return false;                 // 跳過已知 meta 欄
      if (PERSON_KEYS.includes(k)) return false;                    // 跳過標準盤點人欄
      if (personKey && k === personKey) return false;               // 跳過偵測到的人名欄
      if (v !== '' && v !== null && isNaN(Number(v))) return false; // 跳過非數字值
      return true;
    });
    let rows = '';
    products.forEach(([name, raw]) => {
      const q   = raw === '' ? null : Number(raw);
      const nil = q === null || isNaN(q);
      const cls = nil ? 'st-qty-zero' : q === 0 ? 'st-qty-zero' : q < 20 ? 'st-qty-low' : 'st-qty-ok';
      const _sn = name.replace(/'/g, "\\'");
      rows += `<tr onclick="goToRecords('${_sn}','')">
        <td>${name}<span class="st-go">›</span></td>
        <td class="${cls}">${nil ? '—' : q.toLocaleString()}</td>
      </tr>`;
    });
    document.getElementById('st-products').innerHTML = `
      <div class="section-title">📦 庫存數量</div>
      <div class="st-wrap">
        <table class="st-table">
          <thead><tr><th>品項</th><th>數量</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  } catch(err) {
    document.getElementById('st-products').innerHTML = `<div class="text-center py-4 text-danger">❌ 載入失敗：${err.message}</div>`;
  }
}

/* ═══════════════ 工具 ═══════════════ */
function showMsg(id, text, type) {
  const m = document.getElementById(id);
  m.className = `alert alert-${type} mt-2`;
  m.textContent = text;
  m.style.display = 'block';
  if (type === 'success') setTimeout(() => m.style.display = 'none', 3000);
}

function fmtDate(v) {
  if (!v) return '';
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString('zh-TW');
}

function toInputDate(v) {
  if (!v) return '';
  const d = new Date(v);
  return isNaN(d) ? '' : d.toISOString().slice(0,10);
}

  document.getElementById('f-staff').value = '黃儀婷'; // 預設承辦人
  navigate('inventory');
});
