<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倉庫管理系統 修正版</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --pudding:#ffe16a;
  --custard:#fff4bd;
  --cream:#fffaf0;
  --milk:#fffef9;
  --caramel:#7a4a25;
  --cocoa:#4f2f1c;
  --hat:#3f2b21;
  --line:#f1d481;
  --orange:#f4a126;
  --green:#2f8a53;
  --red:#d94338;
  --blue:#2371b7;
  --purple:#8650a4;
  --yellow2:var(--custard);
  --brown2:#806452;
}
* {
  box-sizing:border-box;
  font-family:'Microsoft JhengHei','Noto Sans TC','PingFang TC',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  letter-spacing:0;
  text-rendering:geometricPrecision;
  -webkit-font-smoothing:antialiased;
}
html { background:var(--cream); }
body {
  min-height:100vh;
  background:
    radial-gradient(circle at 18px 18px, rgba(122,74,37,.08) 0 2px, transparent 2.5px) 0 0/42px 42px,
    linear-gradient(180deg, #fff8d7 0%, var(--cream) 42%, #fffefa 100%);
  padding-bottom:82px;
  color:var(--cocoa);
  font-size:16px;
  line-height:1.45;
}
.topbar {
  background:linear-gradient(180deg, var(--pudding), #ffd45c);
  padding:.85rem 1rem;
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:2px solid rgba(122,74,37,.16);
  box-shadow:0 4px 12px rgba(122,74,37,.14);
}
.topbar::after {
  content:"";
  position:absolute;
  left:50%;
  top:9px;
  width:46px;
  height:16px;
  transform:translateX(-50%);
  background:var(--hat);
  border-radius:8px 8px 5px 5px;
  opacity:.16;
  pointer-events:none;
}
.topbar h6 { margin:0; color:var(--cocoa); font-weight:800; font-size:1.05rem; line-height:1.2; }
.btn-icon {
  width:40px;
  height:38px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:var(--milk);
  border:2px solid rgba(122,74,37,.18);
  border-radius:8px;
  color:var(--caramel);
  cursor:pointer;
  box-shadow:0 2px 0 rgba(122,74,37,.14);
}
.btn-icon:active { transform:translateY(1px); box-shadow:0 1px 0 rgba(122,74,37,.14); }
.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:100;
  background:rgba(255,254,249,.97);
  border-top:2px solid var(--line);
  display:flex;
  box-shadow:0 -4px 14px rgba(122,74,37,.12);
}
.bottom-nav a {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 0 8px;
  color:#8b6a55;
  text-decoration:none;
  font-size:.68rem;
  font-weight:800;
  gap:3px;
  cursor:pointer;
}
.bottom-nav a i { font-size:1.25rem; line-height:1; }
.bottom-nav a.active { color:var(--orange); background:linear-gradient(180deg, rgba(255,225,106,.2), transparent); }
.stat-card {
  background:var(--milk);
  border:2px solid rgba(241,212,129,.95);
  border-radius:8px;
  padding:.85rem .45rem;
  text-align:center;
  box-shadow:0 4px 0 rgba(122,74,37,.1);
  min-height:78px;
}
.stat-card .num { font-size:1.35rem; font-weight:800; line-height:1.1; color:var(--cocoa); }
.stat-card .lbl { font-size:.72rem; color:#7d604e; font-weight:800; margin-top:4px; line-height:1.15; }
.search-bar, .form-block, .st-wrap {
  background:rgba(255,254,249,.98);
  border:2px solid rgba(241,212,129,.8);
  border-radius:8px;
  padding:.8rem;
  margin-bottom:.85rem;
  box-shadow:0 4px 0 rgba(122,74,37,.08);
}
.form-block { padding:1.05rem; border-top:6px solid var(--pudding); }
.form-block h6, .section-title {
  font-size:.78rem;
  font-weight:800;
  color:var(--caramel);
  text-transform:uppercase;
  margin-bottom:.85rem;
}
.form-label { font-weight:800; font-size:.9rem; color:var(--cocoa); }
.form-control, .form-select {
  font-size:.96rem;
  border-radius:8px;
  border:2px solid var(--line);
  min-height:44px;
  color:var(--cocoa);
  background-color:#fff;
  font-weight:600;
}
.form-control::placeholder { color:#a8907e; opacity:1; }
.form-control:focus, .form-select:focus { border-color:var(--orange); box-shadow:0 0 0 .18rem rgba(244,161,38,.2); }
.section-title { margin:.8rem 0 .45rem .25rem; }
.alert { border-radius:8px; font-weight:800; border-width:2px; }
.inv-card, .rec-card {
  background:var(--milk);
  border-radius:8px;
  padding:.95rem 1rem;
  margin-bottom:.7rem;
  box-shadow:0 4px 0 rgba(122,74,37,.09);
  border:2px solid rgba(241,212,129,.82);
  border-left:7px solid var(--pudding);
  cursor:pointer;
}
.inv-card { display:flex; align-items:center; gap:.75rem; }
.inv-card.low { border-left-color:var(--red); }
.inv-card.zero { border-left-color:#B0BEC5; opacity:.76; }
.inv-card.abnormal { border-left-color:var(--purple); background:#fff7ff; }
.info { flex:1; min-width:0; }
.pname, .rec-name { font-weight:800; font-size:1rem; color:var(--cocoa); overflow:hidden; text-overflow:ellipsis; }
.pname { white-space:nowrap; }
.spec, .rec-spec { font-size:.78rem; color:#806452; margin-top:2px; font-weight:700; }
.numbers { display:flex; gap:.6rem; margin-top:.4rem; flex-wrap:wrap; }
.itag, .rec-tag { font-size:.72rem; font-weight:800; border-radius:8px; padding:.2em .6em; }
.itag-in, .badge-in { background:#eaf8ef; color:var(--green); }
.itag-out, .badge-out { background:#fff0e8; color:#bf4c17; }
.badge-borrow { background:#eaf4ff; color:var(--blue); }
.balance { text-align:right; flex-shrink:0; min-width:72px; }
.balance .qty { font-size:1.5rem; font-weight:800; line-height:1; }
.balance .unit { font-size:.72rem; color:#806452; font-weight:800; }
.qty-ok { color:var(--green); }
.qty-low { color:var(--red); }
.qty-zero { color:#90A4AE; }
.qty-abnormal { color:var(--purple); }
.tag-abnormal { font-size:.72rem; font-weight:800; border-radius:8px; padding:.2em .65em; background:var(--purple); color:#fff; margin-left:.35rem; }
.rec-card.in { border-left-color:var(--green); }
.rec-card.out { border-left-color:#e96d21; }
.rec-card.borrow { border-left-color:var(--blue); }
.rec-top { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; }
.rec-meta { display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.4rem; align-items:center; }
.rec-qty { font-weight:800; font-size:1rem; }
.qty-in { color:var(--green); }
.qty-out { color:#e96d21; }
.qty-borrow { color:var(--blue); }
.rec-notes, .inv-notes { font-size:.78rem; color:#806452; margin-top:.4rem; line-height:1.55; white-space:pre-wrap; word-break:break-word; font-weight:600; }
.ef-chip { display:inline-flex; align-items:center; gap:.4rem; background:#fff4dc; border:2px solid var(--orange); border-radius:20px; padding:.35em .8em; font-size:.78rem; font-weight:800; color:#bf6f0d; }
.ef-chip button { background:none; border:none; color:#806452; padding:0; line-height:1; }
.sort-bar { display:flex; align-items:center; gap:.45rem; margin-bottom:.6rem; flex-wrap:wrap; }
.sort-lbl { font-size:.72rem; font-weight:800; color:#806452; }
.sort-btn { font-size:.74rem; font-weight:800; border:2px solid var(--line); background:#fff; color:#806452; border-radius:20px; padding:.3em .8em; cursor:pointer; }
.sort-btn.active { background:var(--hat); border-color:var(--hat); color:#fff; }
.btn-submit, .btn-delete { border-radius:8px; min-height:50px; font-size:1rem; font-weight:800; width:100%; }
.btn-submit { background:var(--orange); border:2px solid #d98717; color:#fff; box-shadow:0 4px 0 rgba(122,74,37,.18); }
.btn-submit:disabled { background:#9b8170; border-color:#9b8170; }
.btn-delete { background:#fff; border:2px solid var(--red); color:var(--red); }
.ac-wrap { position:relative; }
.ac-list { position:absolute; top:calc(100% + 2px); left:0; right:0; z-index:400; background:#fff; border:2px solid var(--orange); border-radius:0 0 8px 8px; max-height:230px; overflow-y:auto; box-shadow:0 6px 16px rgba(122,74,37,.15); display:none; }
.ac-item { padding:9px 14px; cursor:pointer; border-bottom:1px solid var(--yellow2); }
.ac-item:hover, .ac-item.ac-active { background:var(--custard); }
.ac-name { font-weight:800; color:var(--cocoa); font-size:.96rem; }
.ac-meta { font-size:.78rem; color:#806452; margin-top:2px; font-weight:700; }
.overlay { display:none; position:fixed; inset:0; overflow-y:auto; background:var(--cream); z-index:200; padding-bottom:40px; }
.st-person-banner { background:linear-gradient(180deg, var(--pudding), #ffd45c); border:2px solid rgba(122,74,37,.15); border-radius:8px; padding:.75rem 1rem; margin-bottom:.6rem; display:flex; align-items:center; gap:.6rem; box-shadow:0 4px 0 rgba(122,74,37,.1); }
.st-person-banner .name { font-size:1.1rem; font-weight:800; color:var(--cocoa); }
.st-person-banner .sub, .st-time-bar { font-size:.76rem; color:#806452; font-weight:800; }
.st-time-bar { background:#fff; border:2px solid rgba(241,212,129,.8); border-radius:8px; padding:.55rem .9rem; margin-bottom:.85rem; display:flex; align-items:center; gap:.4rem; box-shadow:0 3px 0 rgba(122,74,37,.08); }
.st-table, .sth-table { width:100%; border-collapse:collapse; }
.st-table th, .sth-table th { background:var(--custard); padding:.6rem .75rem; font-size:.76rem; font-weight:800; color:var(--caramel); text-align:right; }
.st-table th:first-child, .sth-table th:first-child { text-align:left; }
.st-table td, .sth-table td { padding:.7rem .75rem; font-size:.94rem; color:var(--cocoa); border-top:1px solid var(--line); text-align:right; font-weight:700; }
.st-table td:first-child, .sth-table td:first-child { text-align:left; }
.st-prev, .sth-zero { color:#90A4AE!important; font-weight:400!important; }
.st-diff-up { color:var(--green); font-weight:800; }
.st-diff-dn { color:#C62828; font-weight:800; }
.st-edit-input { width:72px; padding:2px 5px; border:2px solid var(--orange); border-radius:6px; font-size:.9rem; text-align:right; outline:none; }
.st-edit-btn { border:none; background:none; font-size:.95rem; cursor:pointer; padding:1px 3px; color:#806452; }
@media (min-width:700px) { .container-fluid { max-width:760px; } }
</style>
</head>
<body>
<nav class="bottom-nav">
  <a id="nav-inventory" onclick="navigate('inventory')"><i class="bi bi-boxes"></i>庫存</a>
  <a id="nav-form" onclick="navigate('form')"><i class="bi bi-plus-circle-fill"></i>新增</a>
  <a id="nav-list" onclick="navigate('list')"><i class="bi bi-journal-text"></i>紀錄</a>
  <a id="nav-stocktake" onclick="navigate('stocktake')"><i class="bi bi-clipboard-check"></i>盤點</a>
</nav>

<div class="page" id="page-inventory">
  <div class="topbar">
    <div class="d-flex align-items-center gap-2"><span style="font-size:1.5rem">倉</span><h6>庫存結餘</h6></div>
    <button class="btn-icon" onclick="loadInventory()" title="重新整理"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
  <div class="container-fluid px-3 pt-3">
    <div class="row g-2 mb-3">
      <div class="col-3"><div class="stat-card"><div class="num text-primary" id="inv-stat-items">-</div><div class="lbl">品項數</div></div></div>
      <div class="col-3"><div class="stat-card"><div class="num" style="color:#2E7D32" id="inv-stat-ok">-</div><div class="lbl">有庫存</div></div></div>
      <div class="col-3"><div class="stat-card"><div class="num" style="color:#E53935" id="inv-stat-low">-</div><div class="lbl">低庫存</div></div></div>
      <div class="col-3"><div class="stat-card"><div class="num" style="color:#7B1FA2" id="inv-stat-ab">-</div><div class="lbl">異常</div></div></div>
    </div>
    <div class="search-bar">
      <input type="search" class="form-control" id="inv-search" placeholder="搜尋產品名稱、規格、備註" oninput="filterInventory()">
    </div>
    <div id="inv-list"><div class="text-center py-5" style="color:var(--brown2)">載入中...</div></div>
  </div>
</div>

<div class="page" id="page-form" style="display:none">
  <div class="topbar"><div class="d-flex align-items-center gap-2"><span style="font-size:1.5rem">倉</span><h6>新增入出庫紀錄</h6></div></div>
  <div class="container-fluid px-3 pt-3" style="max-width:600px">
    <div id="f-msg" class="alert" style="display:none"></div>
    <form onsubmit="submitForm(event)">
      <div class="form-block">
        <h6>基本資訊</h6>
        <div class="mb-3"><label class="form-label">日期</label><input type="date" class="form-control" id="f-date" required></div>
        <div class="mb-3"><label class="form-label">承辦人員</label><input type="text" class="form-control" id="f-staff" placeholder="請輸入姓名" required></div>
        <div><label class="form-label">屬性</label><select class="form-select" id="f-type" onchange="onTypeChange()" required><option value="">請選擇</option><option value="入庫">入庫</option><option value="出庫">出庫</option><option value="借出">借出</option></select></div>
      </div>
      <div class="form-block">
        <h6>產品資訊</h6>
        <div class="mb-3" id="f-vendor-row">
          <label class="form-label">供應商</label>
          <div class="ac-wrap">
            <input type="text" class="form-control" id="f-vendor" placeholder="輸入關鍵字搜尋供應商" autocomplete="off" oninput="acVendorSearch()" onfocus="acVendorSearch()" onkeydown="acVendorKeyNav(event)" onblur="setTimeout(acVendorHide,180)">
            <div class="ac-list" id="ac-vendor-list"></div>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">產品名稱 <span class="text-danger">*</span></label>
          <div class="ac-wrap">
            <input type="text" class="form-control" id="f-product" placeholder="輸入關鍵字快速搜尋" autocomplete="off" required oninput="acSearch()" onkeydown="acKeyNav(event)" onblur="setTimeout(acHide,180)">
            <div class="ac-list" id="ac-list"></div>
          </div>
        </div>
        <div class="mb-3"><label class="form-label">規格</label><input type="text" class="form-control" id="f-spec" placeholder="例：50cm x 500m"></div>
        <div><label class="form-label">產品類別</label><select class="form-select" id="f-category" onchange="toggleCatOther('f-cat-other',this)"><option value="">請選擇</option><option value="內包材">內包材</option><option value="外包材">外包材</option><option value="耗材">耗材</option><option value="其他">其他</option></select><input type="text" class="form-control mt-2" id="f-cat-other" placeholder="請輸入類別" style="display:none"></div>
      </div>
      <div class="form-block">
        <h6>數量資訊</h6>
        <div class="row g-2">
          <div class="col-8"><label class="form-label" id="f-qty-label">數量</label><input type="number" class="form-control" id="f-qty" min="0" step="0.01" placeholder="0" required></div>
          <div class="col-4"><label class="form-label">單位</label><input type="text" class="form-control" id="f-unit" placeholder="單位" list="unit-list" autocomplete="off"><datalist id="unit-list"><option value="箱"><option value="只"><option value="組"><option value="公斤"><option value="片"><option value="條"><option value="捲"><option value="包"><option value="個"><option value="袋"><option value="瓶"><option value="張"></datalist></div>
        </div>
        <div class="mt-2"><label class="form-label" id="f-location-label">存放位置</label><input type="text" class="form-control" id="f-location" placeholder="請輸入存放位置"></div>
        <div class="mt-2" id="f-cost-row"><label class="form-label">成本 (NT$)</label><input type="number" class="form-control" id="f-cost" min="0" placeholder="0"></div>
      </div>
      <div class="form-block"><h6>備註</h6><textarea class="form-control" id="f-notes" rows="2" placeholder="備註（選填）"></textarea></div>
      <button type="submit" class="btn-submit mb-3" id="f-submit-btn">儲存</button>
    </form>
  </div>
</div>

<div class="page" id="page-list" style="display:none">
  <div class="topbar">
    <div class="d-flex align-items-center gap-2"><span style="font-size:1.5rem">倉</span><h6>出入庫紀錄</h6></div>
    <button class="btn-icon" onclick="loadRecords()" title="重新整理"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
  <div class="container-fluid px-3 pt-3">
    <div class="row g-2 mb-3">
      <div class="col-4"><div class="stat-card"><div class="num text-primary" id="list-total">-</div><div class="lbl">總筆數</div></div></div>
      <div class="col-4"><div class="stat-card"><div class="num" style="color:#2E7D32" id="list-in">-</div><div class="lbl">入庫量</div></div></div>
      <div class="col-4"><div class="stat-card"><div class="num" style="color:#E65100" id="list-out">-</div><div class="lbl">出庫量</div></div></div>
    </div>
    <div class="search-bar"><div class="row g-2"><div class="col-8"><input type="search" class="form-control" id="list-search" placeholder="搜尋產品、承辦人、備註" oninput="exactFilter=null; filterRecords()"></div><div class="col-4"><select class="form-select" id="list-filter" onchange="filterRecords()"><option value="">全部</option><option value="入庫">入庫</option><option value="出庫">出庫</option><option value="借出">借出</option></select></div></div></div>
    <div id="exact-filter-bar" style="display:none;margin-bottom:.5rem"><div class="ef-chip"><i class="bi bi-funnel-fill"></i><span id="ef-label"></span><button onclick="clearExactFilter()" title="清除篩選">x</button></div></div>
    <div class="sort-bar"><span class="sort-lbl">排序：</span><button class="sort-btn active" id="sort-date" onclick="setSort('date')">時間</button><button class="sort-btn" id="sort-name" onclick="setSort('name')">品名</button><button class="sort-btn" id="sort-type" onclick="setSort('type')">類型</button></div>
    <div id="rec-list"><div class="text-center py-5" style="color:var(--brown2)">載入中...</div></div>
  </div>
</div>

<div class="page" id="page-stocktake" style="display:none">
  <div class="topbar">
    <div class="d-flex align-items-center gap-2"><span style="font-size:1.5rem">倉</span><h6>最新盤點紀錄</h6></div>
    <button class="btn-icon" onclick="loadStocktake()" title="重新整理"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
  <div class="container-fluid px-3 pt-3" style="max-width:600px">
    <div id="st-info"></div>
    <div id="st-products"><div class="text-center py-5" style="color:var(--brown2)">載入中...</div></div>
  </div>
</div>

<div id="page-sth" class="overlay">
  <div class="topbar"><div class="d-flex align-items-center gap-2"><button class="btn-icon" onclick="closeSth()"><i class="bi bi-arrow-left"></i></button><h6 id="sth-title">盤點歷史</h6></div></div>
  <div class="container-fluid px-3 pt-3" style="max-width:600px"><div id="sth-body"></div></div>
</div>

<div id="page-edit" class="overlay">
  <div class="topbar"><div class="d-flex align-items-center gap-2"><button class="btn-icon" onclick="closeEdit()"><i class="bi bi-arrow-left"></i></button><h6>編輯紀錄</h6></div><div style="width:36px"></div></div>
  <div class="container-fluid px-3 pt-3" style="max-width:600px">
    <input type="hidden" id="e-row"><input type="hidden" id="e-ts">
    <div class="form-block"><h6>基本資訊</h6><div class="mb-3"><label class="form-label">日期</label><input type="date" class="form-control" id="e-date"></div><div class="mb-3"><label class="form-label">承辦人員</label><input type="text" class="form-control" id="e-staff"></div><div><label class="form-label">屬性</label><select class="form-select" id="e-type" onchange="onEditTypeChange()"><option value="入庫">入庫</option><option value="出庫">出庫</option><option value="借出">借出</option></select></div></div>
    <div class="form-block"><h6>產品資訊</h6><div class="mb-3" id="e-vendor-row"><label class="form-label">供應商</label><input type="text" class="form-control" id="e-vendor"></div><div class="mb-3"><label class="form-label">產品類別</label><select class="form-select" id="e-category" onchange="toggleCatOther('e-cat-other',this)"><option value="">請選擇</option><option value="內包材">內包材</option><option value="外包材">外包材</option><option value="耗材">耗材</option><option value="其他">其他</option></select><input type="text" class="form-control mt-2" id="e-cat-other" placeholder="請輸入類別" style="display:none"></div><div class="mb-3"><label class="form-label">產品名稱</label><input type="text" class="form-control" id="e-product"></div><div><label class="form-label">規格</label><input type="text" class="form-control" id="e-spec"></div></div>
    <div class="form-block"><h6>數量資訊</h6><div class="row g-2"><div class="col-8"><label class="form-label" id="e-qty-label">數量</label><input type="number" class="form-control" id="e-qty" min="0" step="0.01"></div><div class="col-4"><label class="form-label">單位</label><input type="text" class="form-control" id="e-unit" list="unit-list"></div></div><div class="mt-2"><label class="form-label" id="e-location-label">存放位置</label><input type="text" class="form-control" id="e-location"></div><div class="mt-2" id="e-cost-row"><label class="form-label">成本 (NT$)</label><input type="number" class="form-control" id="e-cost" min="0"></div></div>
    <div class="form-block"><h6>備註</h6><textarea class="form-control" id="e-notes" rows="2"></textarea></div>
    <div id="e-msg" class="alert" style="display:none"></div>
    <button class="btn-submit mb-3" id="e-save-btn" onclick="saveEdit()">儲存變更</button>
    <button class="btn-delete mb-3" id="e-del-btn" onclick="deleteRecord()">刪除此筆紀錄</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnuNsZxMRs9S4aWW7AARlBGob2BQ7u7JMUzV_jZRDeRRk02qvp2KitVstrF_9NmQO6/exec';
const STOCKTAKE_SKIP = ['時間戳記','盤點人'];
const PERSON_KEYS = ['盤點人', '盤點人員', '姓名', '填寫人'];

let allRows = [];
let allInventory = [];
let currentEditRow = null;
let stHistory = [];
let exactFilter = null;
let sortKey = 'date';
let sortAsc = false;
let acIndex = -1;
let acVendorIndex = -1;

function text(v) {
  return String(v ?? '');
}

function esc(v) {
  return text(v).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function jsStr(v) {
  return JSON.stringify(text(v));
}

async function fetchJson(url = SCRIPT_URL) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (!Array.isArray(data)) throw new Error('回傳資料不是陣列，請檢查 Apps Script 部署');
  return data;
}

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('page-' + page).style.display = 'block';
  document.querySelectorAll('.bottom-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('nav-' + page)?.classList.add('active');
  window.scrollTo(0, 0);
  if (page === 'inventory') loadInventory();
  if (page === 'list') loadRecords();
  if (page === 'stocktake') loadStocktake();
  if (page === 'form') ensureRowsForAC();
}

async function ensureRowsForAC() {
  if (allRows.length) return;
  try { allRows = await fetchJson(); } catch { }
}

async function loadInventory() {
  document.getElementById('inv-list').innerHTML = '<div class="text-center py-5" style="color:#8D6E63">載入中...</div>';
  try {
    const rows = await fetchJson();
    allRows = rows;
    allInventory = calcInventory(rows);
    renderInventory(allInventory);
  } catch (err) {
    document.getElementById('inv-list').innerHTML = `<div class="text-center py-4 text-danger">載入失敗：${esc(err.message)}</div>`;
  }
}

function calcInventory(rows) {
  const map = {};
  rows.forEach(r => {
    const name = text(r['產品名稱']).trim();
    const spec = text(r['規格']).trim();
    if (!name && !spec) return;
    const key = name + '|||' + spec;
    if (!map[key]) map[key] = { name, spec, unit:text(r['單位']).trim(), inQty:0, outQty:0, notes:new Set() };
    map[key].inQty += Number(r['入庫數量']) || 0;
    map[key].outQty += Number(r['出庫數量']) || 0;
    if (r['單位']) map[key].unit = text(r['單位']).trim();
    if (r['備註']) map[key].notes.add(text(r['備註']).trim());
  });
  return Object.values(map)
    .map(p => ({ ...p, balance:p.inQty - p.outQty, notes:[...p.notes].join(' ') }))
    .sort((a,b) => b.balance - a.balance || a.name.localeCompare(b.name, 'zh-Hant'));
}

function renderInventory(list) {
  const el = document.getElementById('inv-list');
  if (!list.length) {
    el.innerHTML = '<div class="text-center py-4" style="color:#8D6E63">沒有資料</div>';
    ['items','ok','low','ab'].forEach(k => document.getElementById('inv-stat-' + k).textContent = '0');
    return;
  }
  const ok = list.filter(p => p.balance > 0);
  const zero = list.filter(p => p.balance === 0);
  const abnormal = list.filter(p => p.balance < 0);
  const low = ok.filter(p => p.balance < 100);
  document.getElementById('inv-stat-items').textContent = list.length;
  document.getElementById('inv-stat-ok').textContent = ok.length;
  document.getElementById('inv-stat-low').textContent = low.length;
  document.getElementById('inv-stat-ab').textContent = abnormal.length;

  const card = p => {
    const cls = p.balance < 0 ? 'abnormal' : p.balance === 0 ? 'zero' : p.balance < 100 ? 'low' : '';
    const qtyCls = p.balance < 0 ? 'qty-abnormal' : p.balance === 0 ? 'qty-zero' : p.balance < 100 ? 'qty-low' : 'qty-ok';
    const badge = p.balance < 0 ? '<span class="tag-abnormal">異常</span>' : '';
    return `<div class="inv-card ${cls}" data-name="${esc(p.name)}" data-spec="${esc(p.spec)}" onclick="goToRecords(this.dataset.name,this.dataset.spec)">
      <div class="info">
        <div class="pname">${esc(p.name)}${badge}</div>
        ${p.spec ? `<div class="spec">${esc(p.spec)}</div>` : ''}
        <div class="numbers"><span class="itag itag-in">入 ${p.inQty.toLocaleString()}</span><span class="itag itag-out">出 ${p.outQty.toLocaleString()}</span></div>
        ${p.notes ? `<div class="inv-notes">${esc(p.notes)}</div>` : ''}
      </div>
      <div class="balance"><div class="qty ${qtyCls}">${p.balance.toLocaleString()}</div><div class="unit">${esc(p.unit || '-')}</div></div>
    </div>`;
  };
  let html = '';
  if (abnormal.length) html += `<div class="section-title">庫存異常（${abnormal.length} 項）</div>` + abnormal.map(card).join('');
  if (ok.length) html += `<div class="section-title">有庫存（${ok.length} 項）</div>` + ok.map(card).join('');
  if (zero.length) html += `<div class="section-title">已用完（${zero.length} 項）</div>` + zero.map(card).join('');
  el.innerHTML = html;
}

function filterInventory() {
  const kw = document.getElementById('inv-search').value.toLowerCase();
  renderInventory(!kw ? allInventory : allInventory.filter(p =>
    p.name.toLowerCase().includes(kw) || p.spec.toLowerCase().includes(kw) || p.notes.toLowerCase().includes(kw)));
}

function goToRecords(name, spec) {
  exactFilter = { name, spec };
  document.getElementById('list-search').value = '';
  document.getElementById('list-filter').value = '';
  navigate('list');
}

function clearExactFilter() {
  exactFilter = null;
  document.getElementById('exact-filter-bar').style.display = 'none';
  filterRecords();
}

function acBuildList(kw) {
  const kwL = kw.toLowerCase();
  const seen = new Set();
  const buckets = [[], [], [], []];
  allRows.forEach(r => {
    const name = text(r['產品名稱']).trim();
    const spec = text(r['規格']).trim();
    const cat = text(r['產品類別']).trim();
    const unit = text(r['單位']).trim();
    const notes = text(r['備註']).trim();
    if (!name) return;
    const key = name + '|||' + spec;
    if (seen.has(key)) return;
    const nameL = name.toLowerCase();
    const specL = spec.toLowerCase();
    const notesL = notes.toLowerCase();
    let bucket = -1;
    if (nameL.startsWith(kwL)) bucket = 0;
    else if (nameL.includes(kwL)) bucket = 1;
    else if (specL.includes(kwL)) bucket = 2;
    else if (notesL.includes(kwL)) bucket = 3;
    if (bucket < 0) return;
    seen.add(key);
    let matchNote = '';
    if (bucket === 3) {
      const idx = notesL.indexOf(kwL);
      const start = Math.max(0, idx - 8);
      const end = Math.min(notes.length, idx + kwL.length + 12);
      matchNote = (start > 0 ? '...' : '') + notes.slice(start, end) + (end < notes.length ? '...' : '');
    }
    buckets[bucket].push({ name, spec, cat, unit, matchNote });
  });
  return buckets.flat().slice(0, 12);
}

function acSearch() {
  acIndex = -1;
  const kw = document.getElementById('f-product').value.trim();
  const list = document.getElementById('ac-list');
  if (!kw) { list.style.display = 'none'; return; }
  const matches = acBuildList(kw);
  if (!matches.length) { list.style.display = 'none'; return; }
  list._matches = matches;
  list.innerHTML = matches.map((m, i) => {
    const meta = [m.spec, m.cat, m.unit].filter(Boolean).join(' · ');
    const extra = m.matchNote ? `備註：${esc(m.matchNote)}` : '';
    return `<div class="ac-item" onmousedown="acSelect(${i})" onmouseover="acHighlight(${i})"><div class="ac-name">${esc(m.name)}</div>${(meta || extra) ? `<div class="ac-meta">${esc([meta, extra].filter(Boolean).join('　'))}</div>` : ''}</div>`;
  }).join('');
  list.style.display = 'block';
}

function acHighlight(idx) {
  acIndex = idx;
  document.querySelectorAll('#ac-list .ac-item').forEach((el, i) => el.classList.toggle('ac-active', i === idx));
}

function acKeyNav(e) {
  const list = document.getElementById('ac-list');
  if (list.style.display === 'none') return;
  const items = list.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex + 1, items.length - 1); acHighlight(acIndex); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIndex = Math.max(acIndex - 1, 0); acHighlight(acIndex); }
  else if (e.key === 'Enter' && acIndex >= 0) { e.preventDefault(); acSelect(acIndex); }
  else if (e.key === 'Escape') acHide();
}

function acSelect(idx) {
  const list = document.getElementById('ac-list');
  const m = (list._matches || [])[idx];
  if (!m) return;
  document.getElementById('f-product').value = m.name;
  document.getElementById('f-spec').value = m.spec;
  const catSel = document.getElementById('f-category');
  const builtIn = ['內包材','外包材','耗材','其他'];
  if (builtIn.includes(m.cat)) {
    catSel.value = m.cat;
    document.getElementById('f-cat-other').style.display = 'none';
  } else if (m.cat) {
    catSel.value = '其他';
    document.getElementById('f-cat-other').style.display = '';
    document.getElementById('f-cat-other').value = m.cat;
  }
  document.getElementById('f-unit').value = m.unit;
  acHide();
  document.getElementById('f-qty').focus();
}

function acHide() {
  document.getElementById('ac-list').style.display = 'none';
}

function acVendorSearch() {
  acVendorIndex = -1;
  const kw = document.getElementById('f-vendor').value.trim().toLowerCase();
  const list = document.getElementById('ac-vendor-list');
  const seen = new Set();
  const all = [];
  allRows.forEach(r => {
    const v = text(r['供應商名稱'] || r['供應商']).trim();
    if (v && !seen.has(v)) { seen.add(v); all.push(v); }
  });
  const matches = kw ? all.filter(v => v.toLowerCase().includes(kw)).slice(0, 10) : all.slice(0, 10);
  if (!matches.length) { list.style.display = 'none'; return; }
  list._vendorMatches = matches;
  list.innerHTML = matches.map((v, i) => `<div class="ac-item" onmousedown="acVendorSelect(${i})" onmouseover="acVendorHighlight(${i})"><div class="ac-name">${esc(v)}</div></div>`).join('');
  list.style.display = 'block';
}

function acVendorHighlight(idx) {
  acVendorIndex = idx;
  document.querySelectorAll('#ac-vendor-list .ac-item').forEach((el, i) => el.classList.toggle('ac-active', i === idx));
}

function acVendorKeyNav(e) {
  const list = document.getElementById('ac-vendor-list');
  if (list.style.display === 'none') {
    if (e.key === 'ArrowDown') { e.preventDefault(); acVendorSearch(); }
    return;
  }
  const items = list.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acVendorIndex = Math.min(acVendorIndex + 1, items.length - 1); acVendorHighlight(acVendorIndex); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acVendorIndex = Math.max(acVendorIndex - 1, 0); acVendorHighlight(acVendorIndex); }
  else if (e.key === 'Enter' && acVendorIndex >= 0) { e.preventDefault(); acVendorSelect(acVendorIndex); }
  else if (e.key === 'Escape') acVendorHide();
}

function acVendorSelect(idx) {
  const list = document.getElementById('ac-vendor-list');
  const vendor = (list._vendorMatches || [])[idx];
  if (!vendor) return;
  document.getElementById('f-vendor').value = vendor;
  acVendorHide();
  document.getElementById('f-product').focus();
}

function acVendorHide() {
  document.getElementById('ac-vendor-list').style.display = 'none';
}

function onTypeChange() {
  const type = document.getElementById('f-type').value;
  document.getElementById('f-qty-label').textContent = { '入庫':'入庫數量','出庫':'出庫數量','借出':'借出數量' }[type] || '數量';
  document.getElementById('f-location-label').textContent = { '入庫':'存放位置','出庫':'領取單位','借出':'領取單位' }[type] || '存放位置/領取單位';
  document.getElementById('f-location').placeholder = type === '入庫' ? '請輸入存放位置' : '請輸入領取單位';
  document.getElementById('f-vendor-row').style.display = (type === '入庫' || type === '') ? '' : 'none';
  document.getElementById('f-cost-row').style.display = type === '入庫' ? '' : 'none';
}

function toggleCatOther(otherId, sel) {
  document.getElementById(otherId).style.display = sel.value === '其他' ? '' : 'none';
}

function getCatValue(selId, otherId) {
  const v = document.getElementById(selId).value;
  if (v === '其他') {
    const t = document.getElementById(otherId).value.trim();
    return t ? `其他：${t}` : '其他';
  }
  return v;
}

function gasPost(payload) {
  const req = fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(payload), mode:'no-cors' });
  const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000));
  return Promise.race([req, timeout]);
}

async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('f-submit-btn');
  const type = document.getElementById('f-type').value;
  const data = {
    date:document.getElementById('f-date').value,
    staff:document.getElementById('f-staff').value,
    type,
    vendor:document.getElementById('f-vendor').value,
    category:getCatValue('f-category','f-cat-other'),
    product:document.getElementById('f-product').value,
    spec:document.getElementById('f-spec').value,
    inQty:type === '入庫' ? document.getElementById('f-qty').value : 0,
    outQty:(type === '出庫' || type === '借出') ? document.getElementById('f-qty').value : 0,
    unit:document.getElementById('f-unit').value,
    location:document.getElementById('f-location').value,
    cost:document.getElementById('f-cost').value,
    notes:document.getElementById('f-notes').value
  };
  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    await gasPost(data);
    showMsg('f-msg', '已成功儲存！', 'success');
    e.target.reset();
    setDefaults();
    onTypeChange();
    allRows = [];
  } catch {
    showMsg('f-msg', '儲存失敗，請重試', 'danger');
  } finally {
    btn.disabled = false; btn.textContent = '儲存';
  }
}

async function loadRecords() {
  document.getElementById('rec-list').innerHTML = '<div class="text-center py-5" style="color:#8D6E63">載入中...</div>';
  try {
    allRows = await fetchJson();
    filterRecords();
  } catch (err) {
    document.getElementById('rec-list').innerHTML = `<div class="text-center py-4 text-danger">載入失敗：${esc(err.message)}</div>`;
  }
}

function renderCards(rows) {
  const el = document.getElementById('rec-list');
  if (!rows.length) { el.innerHTML = '<div class="text-center py-4" style="color:#8D6E63">沒有資料</div>'; return; }
  el.innerHTML = rows.map(r => {
    const realIdx = allRows.indexOf(r);
    const type = text(r['屬性']);
    const isIn = type === '入庫';
    const cls = isIn ? 'in' : type === '借出' ? 'borrow' : 'out';
    const qty = isIn ? r['入庫數量'] : r['出庫數量'];
    const bc = isIn ? 'badge-in' : type === '借出' ? 'badge-borrow' : 'badge-out';
    const qc = isIn ? 'qty-in' : type === '借出' ? 'qty-borrow' : 'qty-out';
    return `<div class="rec-card ${cls}" onclick="openEdit(${realIdx})">
      <div class="rec-top"><div><div class="rec-name">${esc(r['產品名稱'])}</div>${r['規格'] ? `<div class="rec-spec">${esc(r['規格'])}</div>` : ''}</div><div class="text-end"><div class="rec-qty ${qc}">${(Number(qty) || 0).toLocaleString()}</div><div style="font-size:.7rem;color:var(--brown2);font-weight:700">${esc(r['單位'])}</div></div></div>
      <div class="rec-meta"><span class="rec-tag ${bc}">${esc(type)}</span><span class="rec-tag">${esc(fmtDate(r['日期']))}</span>${r['承辦人員'] ? `<span class="rec-tag">${esc(r['承辦人員'])}</span>` : ''}<span style="margin-left:auto;font-size:.75rem;color:var(--brown2)"><i class="bi bi-pencil"></i> 點擊編輯</span></div>
      ${r['備註'] ? `<div class="rec-notes">${esc(r['備註'])}</div>` : ''}
    </div>`;
  }).join('');
}

function renderStats(rows) {
  document.getElementById('list-total').textContent = rows.length;
  document.getElementById('list-in').textContent = rows.reduce((s,r) => s + (Number(r['入庫數量']) || 0), 0).toLocaleString();
  document.getElementById('list-out').textContent = rows.reduce((s,r) => s + (Number(r['出庫數量']) || 0), 0).toLocaleString();
}

function filterRecords() {
  const kw = document.getElementById('list-search').value.toLowerCase();
  const type = document.getElementById('list-filter').value;
  const efBar = document.getElementById('exact-filter-bar');
  if (exactFilter) {
    efBar.style.display = '';
    document.getElementById('ef-label').textContent = exactFilter.spec ? `${exactFilter.name}　${exactFilter.spec}` : exactFilter.name;
  } else {
    efBar.style.display = 'none';
  }
  const f = allRows.filter(r => {
    if (exactFilter) {
      const nameOk = text(r['產品名稱']) === exactFilter.name;
      const specOk = exactFilter.spec ? text(r['規格']) === exactFilter.spec : true;
      const mt = !type || r['屬性'] === type;
      return nameOk && specOk && mt;
    }
    const mk = !kw || Object.values(r).some(v => text(v).toLowerCase().includes(kw));
    const mt = !type || r['屬性'] === type;
    return mk && mt;
  });
  const sorted = applySortToRows(f);
  renderCards(sorted);
  renderStats(sorted);
}

function setSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = key !== 'date'; }
  ['date','name','type'].forEach(k => {
    const btn = document.getElementById('sort-' + k);
    btn.classList.toggle('active', k === sortKey);
    btn.textContent = ({date:'時間',name:'品名',type:'類型'}[k]) + (k === sortKey ? (sortAsc ? ' ↑' : ' ↓') : '');
  });
  filterRecords();
}

function applySortToRows(rows) {
  const typeOrder = { '入庫':0, '出庫':1, '借出':2 };
  return [...rows].sort((a,b) => {
    let va, vb;
    if (sortKey === 'date') { va = new Date(a['日期'] || 0).getTime(); vb = new Date(b['日期'] || 0).getTime(); }
    else if (sortKey === 'name') { va = text(a['產品名稱']).toLowerCase(); vb = text(b['產品名稱']).toLowerCase(); }
    else { va = typeOrder[a['屬性']] ?? 9; vb = typeOrder[b['屬性']] ?? 9; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
}

function openEdit(index) {
  const r = allRows[index];
  if (!r) return;
  currentEditRow = r._row;
  document.getElementById('e-row').value = r._row || '';
  document.getElementById('e-ts').value = r['時間戳記'] || '';
  document.getElementById('e-date').value = toInputDate(r['日期']);
  document.getElementById('e-staff').value = r['承辦人員'] || '';
  document.getElementById('e-type').value = r['屬性'] || '入庫';
  document.getElementById('e-vendor').value = r['供應商'] || r['供應商名稱'] || '';
  document.getElementById('e-product').value = r['產品名稱'] || '';
  document.getElementById('e-spec').value = r['規格'] || '';
  document.getElementById('e-unit').value = r['單位'] || '';
  document.getElementById('e-location').value = r['存放位置'] || r['存放位置/領取單位'] || '';
  document.getElementById('e-cost').value = r['成本'] || '';
  document.getElementById('e-notes').value = r['備註'] || '';
  setEditCat(r['產品類別'] || '');
  const isIn = r['屬性'] === '入庫';
  document.getElementById('e-qty').value = isIn ? (r['入庫數量'] || 0) : (r['出庫數量'] || 0);
  document.getElementById('e-msg').style.display = 'none';
  onEditTypeChange();
  const overlay = document.getElementById('page-edit');
  overlay.style.display = 'block';
  overlay.scrollTop = 0;
}

function closeEdit() {
  document.getElementById('page-edit').style.display = 'none';
}

function setEditCat(value) {
  const sel = document.getElementById('e-category');
  const other = document.getElementById('e-cat-other');
  other.style.display = 'none'; other.value = '';
  if (!value) { sel.value = ''; return; }
  if (['內包材','外包材','耗材'].includes(value)) sel.value = value;
  else if (value.startsWith('其他')) { sel.value = '其他'; other.style.display = ''; other.value = value.replace(/^其他：?/, ''); }
  else sel.value = '';
}

function onEditTypeChange() {
  const type = document.getElementById('e-type').value;
  document.getElementById('e-qty-label').textContent = { '入庫':'入庫數量','出庫':'出庫數量','借出':'借出數量' }[type] || '數量';
  document.getElementById('e-location-label').textContent = { '入庫':'存放位置','出庫':'領取單位','借出':'領取單位' }[type] || '存放位置/領取單位';
  document.getElementById('e-location').placeholder = type === '入庫' ? '請輸入存放位置' : '請輸入領取單位';
  document.getElementById('e-vendor-row').style.display = type === '入庫' ? '' : 'none';
  document.getElementById('e-cost-row').style.display = type === '入庫' ? '' : 'none';
}

async function saveEdit() {
  const btn = document.getElementById('e-save-btn');
  const type = document.getElementById('e-type').value;
  const data = {
    action:'update',
    row:Number(document.getElementById('e-row').value),
    timestamp:document.getElementById('e-ts').value,
    date:document.getElementById('e-date').value,
    staff:document.getElementById('e-staff').value,
    type,
    vendor:document.getElementById('e-vendor').value,
    category:getCatValue('e-category','e-cat-other'),
    product:document.getElementById('e-product').value,
    spec:document.getElementById('e-spec').value,
    inQty:type === '入庫' ? document.getElementById('e-qty').value : 0,
    outQty:(type === '出庫' || type === '借出') ? document.getElementById('e-qty').value : 0,
    unit:document.getElementById('e-unit').value,
    location:document.getElementById('e-location').value,
    cost:document.getElementById('e-cost').value,
    notes:document.getElementById('e-notes').value
  };
  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    await gasPost(data);
    showMsg('e-msg', '已更新！', 'success');
    setTimeout(() => { closeEdit(); loadRecords(); }, 800);
  } catch {
    showMsg('e-msg', '更新失敗，請重試', 'danger');
  } finally {
    btn.disabled = false; btn.textContent = '儲存變更';
  }
}

async function deleteRecord() {
  const row = Number(document.getElementById('e-row').value);
  const name = document.getElementById('e-product').value || '此筆';
  if (!confirm(`確定要刪除「${name}」這筆紀錄嗎？\n刪除後無法復原。`)) return;
  const saveBtn = document.getElementById('e-save-btn');
  const delBtn = document.getElementById('e-del-btn');
  saveBtn.disabled = true; delBtn.disabled = true; delBtn.textContent = '刪除中...';
  try {
    await gasPost({ action:'delete', row });
    showMsg('e-msg', '已刪除！', 'success');
    setTimeout(() => { closeEdit(); loadRecords(); }, 800);
  } catch {
    showMsg('e-msg', '刪除失敗，請重試', 'danger');
  } finally {
    saveBtn.disabled = false; delBtn.disabled = false; delBtn.textContent = '刪除此筆紀錄';
  }
}

function stDetectPerson(data) {
  for (const k of PERSON_KEYS) if (data[k]) return { person:data[k], personKey:k };
  const f2 = Object.entries(data).find(([k,v]) => k && k.trim() && !STOCKTAKE_SKIP.includes(k) && !PERSON_KEYS.includes(k) && v && isNaN(Number(v)));
  if (f2) return { person:f2[1], personKey:f2[0] };
  const f3 = Object.entries(data).find(([k,v]) => k && k.trim() && !STOCKTAKE_SKIP.includes(k) && !PERSON_KEYS.includes(k) && (v === '' || v === null) && isNaN(Number(k)));
  if (f3) return { person:f3[0], personKey:f3[0] };
  return { person:'-', personKey:null };
}

function stFilterProducts(data, personKey, person) {
  return Object.entries(data).filter(([k,v]) => {
    if (!k || !k.trim()) return false;
    if (k === '_stRow') return false;
    if (STOCKTAKE_SKIP.includes(k) || PERSON_KEYS.includes(k)) return false;
    if (personKey && k === personKey) return false;
    if (person && person !== '-' && k === person) return false;
    if (v !== '' && v !== null && isNaN(Number(v))) return false;
    return true;
  });
}

function stFmtTs(raw) {
  if (!raw) return '-';
  const ts = new Date(raw);
  return !isNaN(ts) ? ts.toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : raw;
}

async function loadStocktake() {
  document.getElementById('st-products').innerHTML = '<div class="text-center py-5" style="color:#8D6E63">載入中...</div>';
  document.getElementById('st-info').innerHTML = '';
  try {
    const all = await fetchJson(SCRIPT_URL + '?action=stocktake-history');
    if (all.length && '_row' in all[0]) {
      document.getElementById('st-products').innerHTML = '<div class="text-center py-4 text-danger">Apps Script 尚未回傳盤點資料，請確認 GAS 已重新部署。</div>';
      return;
    }
    stHistory = all;
    if (!stHistory.length) {
      document.getElementById('st-products').innerHTML = '<div class="text-center py-4" style="color:#8D6E63">尚無盤點紀錄</div>';
      return;
    }
    const data = stHistory[0];
    const { person, personKey } = stDetectPerson(data);
    document.getElementById('st-info').innerHTML = `<div class="st-person-banner"><div style="font-size:1.4rem">人</div><div><div class="sub">盤點人</div><div class="name">${esc(person)}</div></div></div><div class="st-time-bar"><i class="bi bi-clock"></i> ${esc(stFmtTs(data['時間戳記']))}</div>`;
    const prevData = stHistory[1] || null;
    const stRow = data._stRow || 0;
    const products = stFilterProducts(data, personKey, person);
    const rows = products.map(([name, raw]) => {
      const currQ = raw === '' ? null : Number(raw);
      const currNil = currQ === null || isNaN(currQ);
      const prevRaw = prevData ? prevData[name] : undefined;
      const prevQ = (prevRaw === '' || prevRaw === null || prevRaw === undefined) ? null : Number(prevRaw);
      const prevNil = prevQ === null || isNaN(prevQ);
      const diff = (!currNil && !prevNil) ? (currQ - prevQ) : null;
      const diffStr = diff === null ? '-' : (diff > 0 ? '+' : '') + diff.toLocaleString();
      const diffCls = diff === null ? 'st-prev' : diff > 0 ? 'st-diff-up' : diff < 0 ? 'st-diff-dn' : 'st-prev';
      const currCls = currNil ? 'st-prev' : currQ === 0 ? 'qty-zero' : currQ < 20 ? 'qty-low' : 'qty-ok';
      return `<tr data-name="${esc(name)}" onclick="openSth(this.dataset.name)"><td>${esc(name)}</td><td class="st-prev">${prevNil ? '-' : prevQ.toLocaleString()}</td><td class="${currCls}" data-val="${currNil ? '' : currQ}" data-name="${esc(name)}" data-strow="${stRow}" onclick="event.stopPropagation(); startEditSt(this)"><span>${currNil ? '-' : currQ.toLocaleString()}</span> <i class="bi bi-pencil-fill"></i></td><td class="${diffCls}">${diffStr}</td></tr>`;
    }).join('');
    document.getElementById('st-products').innerHTML = `<div class="section-title">最新盤點數量</div><div class="st-wrap"><table class="st-table"><thead><tr><th>品項</th><th>上期</th><th>本期</th><th>差異</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  } catch (err) {
    document.getElementById('st-products').innerHTML = `<div class="text-center py-4 text-danger">載入失敗：${esc(err.message)}</div>`;
  }
}

function startEditSt(td) {
  if (td.querySelector('input')) return;
  const curVal = td.dataset.val;
  const name = td.dataset.name;
  const stRow = td.dataset.strow;
  td.innerHTML = `<div class="d-flex align-items-center justify-content-end gap-1"><input type="number" class="st-edit-input" value="${esc(curVal)}" min="0"><button class="st-edit-btn" title="儲存">✓</button><button class="st-edit-btn" title="取消">x</button></div>`;
  const wrap = td.querySelector('div');
  const inp = td.querySelector('input');
  const saveBtn = td.querySelector('button[title="儲存"]');
  const cancelBtn = td.querySelector('button[title="取消"]');
  wrap.addEventListener('click', event => event.stopPropagation());
  inp.addEventListener('keydown', event => {
    if (event.key === 'Enter') saveStocktake(saveBtn, name, Number(stRow));
    if (event.key === 'Escape') loadStocktake();
  });
  saveBtn.addEventListener('click', () => saveStocktake(saveBtn, name, Number(stRow)));
  cancelBtn.addEventListener('click', () => loadStocktake());
  inp.focus();
  inp.select();
}

async function saveStocktake(btn, name, stRow) {
  const td = btn.closest('td');
  const input = td.querySelector('input');
  const val = input.value.trim();
  if (val === '' || isNaN(Number(val)) || Number(val) < 0) { input.style.borderColor = '#E53935'; return; }
  btn.textContent = '...';
  btn.disabled = true;
  try {
    await gasPost({ action:'stocktake-update', row:Number(stRow), product:name, value:Number(val) });
    await loadStocktake();
  } catch (e) {
    btn.textContent = '✓';
    btn.disabled = false;
    alert('儲存失敗：' + e.message);
  }
}

function openSth(name) {
  if (!stHistory.length) return;
  document.getElementById('sth-title').textContent = `${name} 盤點歷史`;
  const rows = stHistory.map(snap => {
    const { person } = stDetectPerson(snap);
    const raw = snap[name];
    const q = (raw === '' || raw === null || raw === undefined) ? null : Number(raw);
    const nil = q === null || isNaN(q);
    return `<tr><td>${esc(stFmtTs(snap['時間戳記']))}<span style="font-size:.82rem;color:var(--brown2);margin-left:6px">${esc(person)}</span></td><td class="${nil ? 'sth-zero' : ''}">${nil ? '-' : q.toLocaleString()}</td></tr>`;
  }).join('');
  document.getElementById('sth-body').innerHTML = `<div class="st-wrap mt-2"><table class="sth-table"><thead><tr><th>盤點時間</th><th>數量</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  const panel = document.getElementById('page-sth');
  panel.style.display = 'block';
  panel.scrollTop = 0;
}

function closeSth() {
  document.getElementById('page-sth').style.display = 'none';
}

function showMsg(id, msg, type) {
  const m = document.getElementById(id);
  m.className = `alert alert-${type} mt-2`;
  m.textContent = msg;
  m.style.display = 'block';
  if (type === 'success') setTimeout(() => m.style.display = 'none', 3000);
}

function fmtDate(v) {
  if (!v) return '';
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleDateString('zh-TW');
}

function toInputDate(v) {
  if (!v) return '';
  const d = new Date(v);
  return isNaN(d) ? '' : d.toISOString().slice(0, 10);
}

function setDefaults() {
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('f-staff').value = '黃儀婷';
  document.getElementById('f-cat-other').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', () => {
  setDefaults();
  onTypeChange();
  setSort('date');
  navigate('inventory');
});
</script>
