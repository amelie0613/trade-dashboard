<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Firebase 讀寫診斷</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
body{font-family:sans-serif;max-width:800px;margin:0 auto;padding:20px;background:#f0f4f8;}
h2{color:#0b1d35;}
input{width:100%;padding:10px;border:1.5px solid #cbd5e1;border-radius:8px;font-size:14px;margin-bottom:10px;box-sizing:border-box;}
button{padding:10px 18px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;margin:4px;}
.btn-blue{background:#0369a1;color:#fff;}
.btn-green{background:#16a34a;color:#fff;}
.btn-red{background:#dc2626;color:#fff;}
.btn-gray{background:#64748b;color:#fff;}
.box{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;border:1.5px solid #e2e8f0;}
.title{font-weight:700;font-size:14px;color:#0369a1;margin-bottom:10px;}
pre{background:#1e293b;color:#e2e8f0;padding:14px;border-radius:8px;font-size:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;}
.ok{color:#16a34a;font-weight:700;}
.err{color:#dc2626;font-weight:700;}
.warn{color:#d97706;font-weight:700;}
</style>
</head>
<body>
<h2>🔬 Firebase 讀寫診斷工具</h2>

<div class="box">
  <div class="title">案件編號</div>
  <input type="text" id="caseId" placeholder="例：T20260424A05" value="T20260424A05">
</div>

<!-- 步驟1：讀取 -->
<div class="box">
  <div class="title">步驟 1：讀取目前 Firebase 資料</div>
  <button class="btn-blue" onclick="readCase()">讀取</button>
  <pre id="r1">尚未執行</pre>
</div>

<!-- 步驟2：模擬 doEdit 只修改採購 -->
<div class="box">
  <div class="title">步驟 2：模擬「只修改採購」後寫入（update 方式）</div>
  <p style="font-size:12px;color:#64748b;margin-bottom:8px;">只改 purchase.supplier，其他欄位不動 — 寫完後重新讀取，看 sales 是否還在</p>
  <button class="btn-green" onclick="testUpdate()">執行 update() 測試</button>
  <pre id="r2">尚未執行</pre>
</div>

<!-- 步驟3：模擬舊的 set merge:false -->
<div class="box">
  <div class="title">步驟 3：模擬「舊版 set merge:false」（重現問題）</div>
  <p style="font-size:12px;color:#dc2626;margin-bottom:8px;">⚠️ 這個測試會重現資料消失的問題，執行後步驟4可以還原</p>
  <button class="btn-red" onclick="testSetNoMerge()">執行 set merge:false（重現問題）</button>
  <pre id="r3">尚未執行</pre>
</div>

<!-- 步驟4：還原 -->
<div class="box">
  <div class="title">步驟 4：還原（把步驟1讀到的資料寫回去）</div>
  <button class="btn-gray" onclick="restoreCase()">還原資料</button>
  <pre id="r4">尚未執行</pre>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAvyDv1dEC9K-xYwLuyUahGhRPuQunWlxs",
  authDomain:        "ot001-5c061.firebaseapp.com",
  projectId:         "ot001-5c061",
  storageBucket:     "ot001-5c061.firebasestorage.app",
  messagingSenderId: "569582007093",
  appId:             "1:569582007093:web:9e3b2aa67053030ee2d27c",
};

var _db = null;
var _originalData = null; // 步驟1讀到的原始資料，供還原用

async function getDb(){
  if(_db) return _db;
  try { firebase.app(); } catch(e) { firebase.initializeApp(FIREBASE_CONFIG); }
  await firebase.auth().signInAnonymously().catch(function(){});
  _db = firebase.firestore();
  return _db;
}

function fmt(obj){ return JSON.stringify(obj, null, 2); }
function show(id, cls, msg){ var el=document.getElementById(id); el.className=cls; el.textContent=msg; }

// ── 步驟1：讀取 ──────────────────────────────────────
async function readCase(){
  var caseId = document.getElementById('caseId').value.trim();
  show('r1','','讀取中...');
  try {
    var db   = await getDb();
    var snap = await db.collection('cases').doc(caseId).get();
    if(!snap.exists){ show('r1','err','❌ 找不到案件：'+caseId); return; }
    var data = snap.data();
    _originalData = JSON.parse(JSON.stringify(data)); // 備份

    var summary = '✅ 讀取成功\n\n'
      + '── 頂層欄位 ──\n'
      + Object.keys(data).map(function(k){ return k+': '+(typeof data[k]==='object'?'[物件]':data[k]); }).join('\n')
      + '\n\n── meta ──\n' + fmt(data.meta||{})
      + '\n\n── purchase ──\n' + fmt(data.purchase||{})
      + '\n\n── sales ──\n' + fmt(data.sales||{})
      + '\n\n── transfer ──\n' + fmt(data.transfer||{})
      + '\n\n── 完整資料 ──\n' + fmt(data);

    show('r1','', summary);
  } catch(e){ show('r1','err','❌ 錯誤：'+e.toString()); }
}

// ── 步驟2：測試 update()（正確做法）────────────────
async function testUpdate(){
  var caseId = document.getElementById('caseId').value.trim();
  show('r2','','執行中...');
  try {
    var db = await getDb();

    // 模擬 doEdit 只修改採購欄位（用 dot notation）
    var updateFields = {
      'purchase.supplier':     '【測試修改】海之寶企業有限公司',
      'purchase.paymentTerms': '【測試】貨到付款',
      'purchase.periods':      [{ name:'AAA', currency:'TWD', amount:999, expectedDate:'2026-04-30', note:'' }],
      'meta.caseType':         '採購',
    };

    var log = '寫入欄位（update dot notation）：\n' + fmt(updateFields) + '\n\n';

    // 執行 update
    await db.collection('cases').doc(caseId).update(updateFields);
    log += '✅ update() 執行成功\n\n';

    // 重新讀取，確認 sales 還在
    var snap2 = await db.collection('cases').doc(caseId).get();
    var data2 = snap2.data();

    log += '── 讀取結果 ──\n';
    log += 'purchase.supplier: ' + (data2.purchase||{}).supplier + '\n';
    log += 'sales.customer: ' + (data2.sales||{}).customer + '\n';
    log += 'sales.periods 長度: ' + ((data2.sales||{}).periods||[]).length + '\n';
    log += 'transfer.fillStatus: ' + (data2.transfer||{}).fillStatus + '\n';

    var salesOk = (data2.sales||{}).customer || ((data2.sales||{}).periods||[]).length > 0;
    log += '\n' + (salesOk ? '✅ sales 資料保留完整！update() 方式正確' : '❌ sales 資料消失了！');

    show('r2','', log);
  } catch(e){ show('r2','err','❌ 錯誤：'+e.toString()); }
}

// ── 步驟3：測試 set merge:false（重現問題）──────────
async function testSetNoMerge(){
  var caseId = document.getElementById('caseId').value.trim();
  show('r3','','執行中...');
  try {
    var db = await getDb();

    // 先讀取現有資料
    var snap = await db.collection('cases').doc(caseId).get();
    var existing = snap.data() || {};

    // 模擬舊版邏輯：deep copy + 合併 firestoreFields（只有採購）
    var merged = JSON.parse(JSON.stringify(existing));

    // firestoreFields 只有採購相關（銷售的 input 不存在，所以沒寫進去）
    var firestoreFields = {
      'meta.staff':            '黃意萍',
      'meta.caseType':         '採購',
      'purchase.supplier':     '【舊版測試】海之寶企業有限公司',
      'purchase.paymentTerms': '貨到付款',
      'purchase.periods':      [{ name:'AAA', currency:'TWD', amount:999, expectedDate:'2026-04-30', note:'' }],
    };

    // 舊版的合併邏輯
    Object.keys(firestoreFields).forEach(function(key){
      var val = firestoreFields[key];
      if(key.indexOf('.') > 0){
        var parts = key.split('.');
        var obj = merged;
        for(var i=0; i<parts.length-1; i++){
          if(!obj[parts[i]] || typeof obj[parts[i]] !== 'object') obj[parts[i]] = {};
          obj = obj[parts[i]];
        }
        obj[parts[parts.length-1]] = val;
      } else {
        merged[key] = val;
      }
    });

    var log = '合併後 merged.sales：\n' + fmt(merged.sales||{}) + '\n\n';
    log += '執行 set(merged, {merge:false})...\n';

    // 執行 set merge:false
    await db.collection('cases').doc(caseId).set(merged, {merge:false});
    log += '✅ set 執行成功\n\n';

    // 重新讀取
    var snap2 = await db.collection('cases').doc(caseId).get();
    var data2 = snap2.data();

    log += '── 讀取結果 ──\n';
    log += 'purchase.supplier: ' + (data2.purchase||{}).supplier + '\n';
    log += 'sales.customer: ' + (data2.sales||{}).customer + '\n';
    log += 'sales.periods 長度: ' + ((data2.sales||{}).periods||[]).length + '\n';

    var salesOk = (data2.sales||{}).customer || ((data2.sales||{}).periods||[]).length > 0;
    log += '\n' + (salesOk ? '✅ sales 資料保留' : '❌ 問題重現！sales 資料消失了（這就是 bug）');
    log += '\n\n⚠️ 請執行步驟4還原資料！';

    show('r3','', log);
  } catch(e){ show('r3','err','❌ 錯誤：'+e.toString()); }
}

// ── 步驟4：還原 ──────────────────────────────────────
async function restoreCase(){
  var caseId = document.getElementById('caseId').value.trim();
  if(!_originalData){ show('r4','err','❌ 請先執行步驟1讀取原始資料'); return; }
  show('r4','','還原中...');
  try {
    var db = await getDb();
    await db.collection('cases').doc(caseId).set(_originalData, {merge:false});
    show('r4','','✅ 還原成功！資料已恢復到步驟1讀取的狀態\n\n' + fmt(_originalData));
  } catch(e){ show('r4','err','❌ 還原失敗：'+e.toString()); }
}
</script>
</body>
</html>
