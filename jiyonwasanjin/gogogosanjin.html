<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDA 申報工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --accent:#1C4E3C; --accent-light:#E8F2EE; --bg:#F7F5F0;
  --border:#E0DDD6; --text:#1A1916; --muted:#6B6860;
  --ok:#0F6E56; --ok-light:#E1F5EE; --err:#C0392B; --err-light:#FDF0EE;
  --warn:#B85C00; --warn-light:#FEF5E7;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); padding:20px; }
.wrap { max-width:820px; margin:0 auto; }
h1 { font-size:22px; text-align:center; margin-bottom:6px; }
.sub { text-align:center; color:var(--muted); font-size:13px; margin-bottom:24px; }

/* Card */
.card { background:#fff; border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:16px; }
.ttl { font-size:14px; font-weight:700; color:var(--accent); margin-bottom:14px; }

/* Company tabs */
.co-tabs { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.co-tab { padding:7px 16px; border:1px solid var(--border); border-radius:20px; cursor:pointer; font-size:13px; background:#fff; transition:all .15s; font-family:'Noto Sans TC',sans-serif; }
.co-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Grid */
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px; }
.fg { display:flex; flex-direction:column; gap:5px; }
label.fl { font-size:12px; font-weight:500; color:var(--muted); }
.req { color:var(--err); }

/* Inputs */
input, select { font-family:'Noto Sans TC',sans-serif; font-size:13px; padding:9px 11px; border:1px solid var(--border); border-radius:6px; background:#fff; width:100%; }
input:focus, select:focus { outline:none; border-color:var(--accent); }

/* Toggle */
.toggle-bar { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:12px; }
.toggle-btn { flex:1; padding:10px; border:none; cursor:pointer; font-size:13px; font-weight:600; font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--muted); transition:all .15s; }
.toggle-btn.on { background:var(--accent); color:#fff; }

/* Checks */
.checks { display:flex; flex-wrap:wrap; gap:14px; padding:8px 0; }
.chk { display:flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; }
.chk input { width:16px; height:16px; accent-color:var(--accent); }

/* Buttons */
.brow { display:flex; gap:8px; margin-top:14px; }
.btn { padding:9px 18px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; font-family:'Noto Sans TC',sans-serif; transition:all .15s; }
.btn-add { background:var(--accent); color:#fff; flex:1; }
.btn-add:hover { opacity:.9; }
.btn-clr { background:var(--bg); color:var(--muted); border:1px solid var(--border); }
.btn-clr:hover { background:var(--border); }
.btn-dl { background:var(--ok); color:#fff; width:100%; padding:12px; font-size:14px; }
.btn-dl:hover { opacity:.9; }

/* List */
.list { display:flex; flex-direction:column; gap:8px; }
.item { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px 14px; display:flex; align-items:center; gap:10px; }
.item-n { font-size:11px; font-weight:700; color:var(--muted); min-width:24px; }
.item-i { flex:1; }
.item-name { font-size:13px; font-weight:600; }
.item-d { font-size:11px; color:var(--muted); margin-top:2px; }
.item-del { background:none; border:none; cursor:pointer; color:var(--muted); font-size:16px; padding:4px; }
.item-del:hover { color:var(--err); }

/* Status */
.st { font-size:12px; margin-top:8px; }
.st.ok { color:var(--ok); }
.st.err { color:var(--err); }

/* Notice */
.notice { background:var(--accent-light); border-left:3px solid var(--accent); border-radius:6px; padding:10px 14px; font-size:12px; margin-bottom:14px; }

@media(max-width:600px) { .row2,.row3 { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 FDA 申報工具</h1>
  <p class="sub">填好多筆資料 → 下載 Excel → 匯入非追不可系統</p>

  <!-- ① 公司設定 -->
  <div class="card">
    <div class="ttl">⚙️ 公司設定</div>
    <div class="co-tabs" id="co-tabs">
      <button class="co-tab active" onclick="selCo(0)">公司 A</button>
      <button class="co-tab" onclick="selCo(1)">公司 B</button>
      <button class="co-tab" onclick="selCo(2)">公司 C</button>
    </div>
    <div class="row3">
      <div class="fg">
        <label class="fl">公司名稱</label>
        <input type="text" id="cfg-name" placeholder="例：海之實企業" oninput="saveCo()" />
      </div>
      <div class="fg">
        <label class="fl">API Key</label>
        <input type="text" id="cfg-api" placeholder="API Key" oninput="saveCo()" />
      </div>
      <div class="fg">
        <label class="fl">Secure Key</label>
        <input type="text" id="cfg-sec" placeholder="Secure Key" oninput="saveCo()" />
      </div>
    </div>
    <div class="st ok" id="co-st"></div>
  </div>

  <!-- ② 表單 -->
  <div class="card">
    <div class="ttl">✏️ 填寫申報資料</div>
    <div class="notice">💡 填完一筆點「加入清單」，繼續填下一筆，全部填完再下載 Excel。</div>

    <!-- 申報方式 + 日期 + 流水號 -->
    <div class="row3">
      <div class="fg">
        <label class="fl">申報方式 <span class="req">*</span></label>
        <select id="f-type" onchange="onTypeChange()">
          <option value="">請選擇</option>
          <option value="1">月申報</option>
          <option value="2">日申報</option>
        </select>
      </div>
      <div class="fg">
        <label class="fl">申報日期 <span class="req">*</span></label>
        <input type="date" id="f-date" />
      </div>
      <div class="fg" id="seq-grp" style="opacity:.4">
        <label class="fl">流水號（日申報必填）</label>
        <input type="text" id="f-seq" placeholder="例：01" maxlength="2" />
      </div>
    </div>

    <!-- 通知號碼 / 報單號碼 -->
    <div style="margin-bottom:12px">
      <label class="fl" style="display:block;margin-bottom:5px">通知號碼 / 報單號碼 <span class="req">*</span> 擇一填入</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <input type="text" id="f-notify" placeholder="通知號碼 例：IFT15FJ0037807" />
        <input type="text" id="f-bill" placeholder="報單號碼 例：BD 15036F0071" />
      </div>
    </div>

    <!-- 淨重 + 物流 + 備註 -->
    <div class="row3">
      <div class="fg">
        <label class="fl">交貨淨重 kg <span class="req">*</span></label>
        <input type="number" id="f-weight" placeholder="例：228" min="0" step="0.01" />
      </div>
      <div class="fg">
        <label class="fl">物流業者自編碼</label>
        <input type="text" id="f-logistics" placeholder="無則留空" />
      </div>
      <div class="fg">
        <label class="fl">交貨備註</label>
        <input type="text" id="f-note" placeholder="選填" />
      </div>
    </div>

    <!-- 下游業者 / 其他用途 擇一 -->
    <div class="toggle-bar">
      <button type="button" class="toggle-btn on" id="tab-buyer" onclick="switchMode('buyer')">🏢 下游業者</button>
      <button type="button" class="toggle-btn" id="tab-other" onclick="switchMode('other')">📋 其他用途</button>
    </div>

    <div id="panel-buyer" style="margin-bottom:12px">
      <div class="fg">
        <label class="fl">下游業者自編碼 <span class="req">*</span></label>
        <input type="text" id="f-buyer" placeholder="填入下游業者自編碼" />
      </div>
    </div>

    <div id="panel-other" style="display:none;margin-bottom:12px">
      <div class="fg">
        <label class="fl">至少勾選一項 <span class="req">*</span></label>
        <div class="checks">
          <label class="chk"><input type="checkbox" id="f-direct" /><span>直接販售至消費者</span></label>
          <label class="chk"><input type="checkbox" id="f-self" /><span>自用</span></label>
          <label class="chk"><input type="checkbox" id="f-factory" /><span>工廠自用</span></label>
          <label class="chk"><input type="checkbox" id="f-discard" /><span>報廢</span></label>
        </div>
      </div>
    </div>

    <div class="brow">
      <button class="btn btn-clr" onclick="clearForm()">清除</button>
      <button class="btn btn-add" onclick="addItem()">➕ 加入清單</button>
    </div>
    <div class="st" id="form-st"></div>
  </div>

  <!-- ③ 清單 + 下載 -->
  <div class="card" id="list-card" style="display:none">
    <div class="ttl">📦 待匯入清單（<span id="list-count">0</span> 筆）</div>
    <div id="list" class="list" style="margin-bottom:16px"></div>
    <button class="btn btn-dl" onclick="downloadExcel()">⬇️ 下載 FDA 匯入用 Excel</button>
    <div class="st" id="dl-st" style="text-align:center;margin-top:8px"></div>
  </div>
</div>

<script>
// ── 公司設定 ───────────────────────────────────────────────
let cos = [{name:'',api:'',sec:''},{name:'',api:'',sec:''},{name:'',api:'',sec:''}];
let curCo = 0;

(function loadCo() {
  const s = localStorage.getItem('fda_cos');
  if (s) cos = JSON.parse(s);
  selCo(0);
})();

function selCo(i) {
  curCo = i;
  document.querySelectorAll('.co-tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.getElementById('cfg-name').value = cos[i].name||'';
  document.getElementById('cfg-api').value  = cos[i].api||'';
  document.getElementById('cfg-sec').value  = cos[i].sec||'';
  setst('co-st','','');
}

function saveCo() {
  cos[curCo].name = document.getElementById('cfg-name').value.trim();
  cos[curCo].api  = document.getElementById('cfg-api').value.trim();
  cos[curCo].sec  = document.getElementById('cfg-sec').value.trim();
  localStorage.setItem('fda_cos', JSON.stringify(cos));
  document.querySelectorAll('.co-tab').forEach((t,i) => { t.textContent = cos[i].name || `公司 ${['A','B','C'][i]}`; });
  setst('co-st','✓ 已儲存','ok');
}

// ── 表單 ───────────────────────────────────────────────────
let mode = 'buyer';
let items = [];

function onTypeChange() {
  const t = document.getElementById('f-type').value;
  const g = document.getElementById('seq-grp');
  g.style.opacity = t==='2' ? '1' : '.4';
  if (t!=='2') document.getElementById('f-seq').value = '';
}

function switchMode(m) {
  mode = m;
  document.getElementById('panel-buyer').style.display = m==='buyer' ? 'block' : 'none';
  document.getElementById('panel-other').style.display = m==='other' ? 'block' : 'none';
  document.getElementById('tab-buyer').classList.toggle('on', m==='buyer');
  document.getElementById('tab-other').classList.toggle('on', m==='other');
}

function clearForm() {
  ['f-notify','f-bill','f-weight','f-logistics','f-note','f-buyer','f-seq'].forEach(id => document.getElementById(id).value='');
  ['f-direct','f-self','f-factory','f-discard'].forEach(id => document.getElementById(id).checked=false);
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-type').value = '';
  document.getElementById('seq-grp').style.opacity = '.4';
  switchMode('buyer');
  setst('form-st','','');
}

function addItem() {
  const type    = document.getElementById('f-type').value;
  const date    = document.getElementById('f-date').value;
  const seq     = document.getElementById('f-seq').value.trim();
  const notify  = document.getElementById('f-notify').value.trim();
  const bill    = document.getElementById('f-bill').value.trim();
  const weight  = document.getElementById('f-weight').value.trim();
  const logistics = document.getElementById('f-logistics').value.trim();
  const note    = document.getElementById('f-note').value.trim();
  const buyer   = document.getElementById('f-buyer').value.trim();
  const direct  = document.getElementById('f-direct').checked;
  const self_u  = document.getElementById('f-self').checked;
  const factory = document.getElementById('f-factory').checked;
  const discard = document.getElementById('f-discard').checked;

  if (!type || !date) { setst('form-st','⚠️ 請選擇申報方式和日期','err'); return; }
  if (type==='2' && !seq) { setst('form-st','⚠️ 日申報必須填流水號','err'); return; }
  if (!notify && !bill) { setst('form-st','⚠️ 通知號碼或報單號碼擇一填入','err'); return; }
  if (!weight) { setst('form-st','⚠️ 請填交貨淨重','err'); return; }
  if (mode==='buyer' && !buyer) { setst('form-st','⚠️ 請填下游業者自編碼','err'); return; }
  if (mode==='other' && !direct && !self_u && !factory && !discard) { setst('form-st','⚠️ 請至少勾選一項用途','err'); return; }

  const d = new Date(date);
  const yyyy = d.getFullYear();
  const mm   = String(d.getMonth()+1).padStart(2,'0');
  const dd   = String(d.getDate()).padStart(2,'0');
  const applyDate = type==='1' ? `${yyyy}/${mm}` : `${yyyy}/${mm}/${dd}`;

  items.push({ id:Date.now(), mode, type, applyDate, seq, notify, bill, weight, logistics, note, buyer, direct, self_u, factory, discard });
  renderList();
  clearForm();
  setst('form-st',`✓ 已加入（共 ${items.length} 筆）`,'ok');
}

function renderList() {
  const div = document.getElementById('list');
  div.innerHTML = '';
  items.forEach((it,i) => {
    const target = it.mode==='buyer' ? it.buyer
      : [it.direct&&'販售', it.self_u&&'自用', it.factory&&'工廠', it.discard&&'報廢'].filter(Boolean).join('／');
    const code = it.notify||it.bill;
    const el = document.createElement('div');
    el.className = 'item';
    el.innerHTML = `
      <div class="item-n">#${i+1}</div>
      <div class="item-i">
        <div class="item-name">${target}</div>
        <div class="item-d">${it.applyDate}${it.seq?' 流水號:'+it.seq:''} · ${code} · ${it.weight}kg</div>
      </div>
      <button class="item-del" onclick="removeItem(${it.id})">✕</button>
    `;
    div.appendChild(el);
  });
  document.getElementById('list-count').textContent = items.length;
  document.getElementById('list-card').style.display = items.length>0 ? 'block' : 'none';
}

function removeItem(id) {
  items = items.filter(i=>i.id!==id);
  renderList();
}

// ── 下載 Excel ─────────────────────────────────────────────
function downloadExcel() {
  if (!items.length) return;

  const wb = XLSX.utils.book_new();

  const main       = [['申報日期(必填)','申報日期流水號','輸入許可通知號碼(必填)','項次(必填)','交貨包裝規格','物流業者(必填)','下游業者(必填)','交貨備註']];
  const prodDate   = [['申報日期(必填)','申報日期流水號','輸入許可通知號碼(必填)','項次(必填)','批號(必填)','產品製造日期','產品有效日期','交貨淨重(必填)','退貨淨重']];
  const logSheet   = [['申報日期(必填)','申報日期流水號','輸入許可通知號碼(必填)','項次(必填)','物流業者自編碼','物流業者群組名稱']];
  const buyerSheet = [['申報日期(必填)','申報日期流水號','輸入許可通知號碼(必填)','項次(必填)','下游業者自編碼(必填)']];
  const otherSheet = [['申報日期(必填)','申報日期流水號','輸入許可通知號碼(必填)','項次(必填)','販售至消費者(必填)','自用(必填)','交貨資料自用類別','交貨資料其它自用品說明','工廠自用(必填)','交貨資料報廢(必填)']];

  items.forEach(it => {
    const code = it.notify||it.bill;
    const hasLog  = it.logistics ? '1' : '0';
    const hasBuyer = it.mode==='buyer' ? '1' : '0';

    main.push([it.applyDate, it.seq, code, '', '', hasLog, hasBuyer, it.note]);
    prodDate.push([it.applyDate, it.seq, code, '', '', '', '', it.weight, '']);

    if (it.logistics) {
      logSheet.push([it.applyDate, it.seq, code, '', it.logistics, '']);
    }

    if (it.mode==='buyer') {
      buyerSheet.push([it.applyDate, it.seq, code, '', it.buyer]);
    } else {
      otherSheet.push([
        it.applyDate, it.seq, code, '',
        it.direct  ? '1':'0',
        it.self_u  ? '1':'0',
        '', '',
        it.factory ? '1':'0',
        it.discard ? '1':'0'
      ]);
    }
  });

  [
    [main,       '交貨資料'],
    [prodDate,   '交貨資料產品日期'],
    [logSheet,   '交貨資料物流業者'],
    [buyerSheet, '交貨資料下游業者'],
    [otherSheet, '交貨資料其他'],
  ].forEach(([data, name]) => {
    const ws = XLSX.utils.aoa_to_sheet(data.map(r=>r.map(v=>v===undefined?'':String(v))));
    const range = XLSX.utils.decode_range(ws['!ref']||'A1');
    for (let R=range.s.r; R<=range.e.r; R++)
      for (let C=range.s.c; C<=range.e.c; C++) {
        const addr = XLSX.utils.encode_cell({r:R,c:C});
        if (ws[addr]) ws[addr].t = 's';
      }
    XLSX.utils.book_append_sheet(wb, ws, name);
  });

  const dt = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, `FDA匯入資料_${dt}.xlsx`);
  setst('dl-st','✓ 已下載！請至非追不可系統點「資料匯入」上傳','ok');
}

function setst(id, txt, cls) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className = 'st'+(cls?' '+cls:'');
}

document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
</script>
</body>
</html>
