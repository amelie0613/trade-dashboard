<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出入庫異常分析</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }

header {
  background: #1a3c5e; color: #fff;
  padding: 14px 24px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
}
header h1 { font-size: 1.1rem; font-weight: 600; }
header span { font-size: .8rem; opacity: .65; }

#drop-zone {
  margin: 32px auto; max-width: 620px;
  border: 2px dashed #90b4d4; border-radius: 12px;
  padding: 44px 24px; text-align: center;
  background: #fff; cursor: pointer; transition: .2s;
}
#drop-zone:hover, #drop-zone.drag-over { border-color: #1a3c5e; background: #eaf1f8; }
#drop-zone .icon { font-size: 2.8rem; margin-bottom: 10px; }
#drop-zone p { color: #555; }
#drop-zone input { display: none; }

#main { display: none; padding: 16px 20px 40px; max-width: 1500px; margin: 0 auto; }

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 18px;
}
.card { background: #fff; border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,.09); text-align: center; }
.card .num { font-size: 2rem; font-weight: 700; }
.card .lbl { font-size: .73rem; color: #888; margin-top: 4px; }
.card.red .num { color: #c0392b; }
.card.green .num { color: #27ae60; }
.card.blue .num { color: #2980b9; }

.section {
  background: #fff; border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,.09);
  margin-bottom: 18px; overflow: hidden;
}
.section-hd {
  background: #1a3c5e; color: #fff;
  padding: 11px 18px; font-size: .9rem; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.section-hd .badge {
  background: #c0392b; color: #fff;
  border-radius: 12px; padding: 1px 10px; font-size: .72rem; font-weight: 700;
}

.filters {
  padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 8px;
  border-bottom: 1px solid #eee; background: #fafafa;
}
.filters select, .filters input {
  padding: 5px 9px; border: 1px solid #ccc;
  border-radius: 6px; font-size: .8rem; background: #fff;
}
.filters label { font-size: .78rem; color: #555; display: flex; align-items: center; gap: 4px; }

.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .8rem; }
th {
  background: #ecf0f4; padding: 8px 11px;
  text-align: left; font-weight: 600; color: #444;
  white-space: nowrap; cursor: pointer; user-select: none;
  position: sticky; top: 0;
}
th:hover { background: #dce4ed; }
td { padding: 7px 11px; border-bottom: 1px solid #f2f2f2; white-space: nowrap; }
tr:hover td { background: #f7faff; }
tr.anomaly-row td { background: #fff8f8; }
tr.anomaly-row:hover td { background: #fef0f0; }

.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: .72rem; font-weight: 600; }
.tag-red    { background: #fde8e8; color: #c0392b; }
.tag-orange { background: #fef3e2; color: #e67e22; }
.tag-green  { background: #e8f8f0; color: #27ae60; }
.tag-gray   { background: #f0f0f0; color: #888; }

.diff-high { color: #c0392b; font-weight: 700; }
.diff-mid  { color: #e67e22; font-weight: 600; }
.diff-ok   { color: #27ae60; }

.remarks { max-width: 260px; overflow: hidden; text-overflow: ellipsis; }
.empty { text-align: center; padding: 28px; color: #bbb; font-size: .88rem; }
#loading { display: none; text-align: center; padding: 30px; color: #666; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📦 出入庫異常分析</h1>
    <span>先出貨後進貨 偵測（以日期比對）</span>
  </div>
</header>

<div id="drop-zone" onclick="document.getElementById('fi').click()">
  <div class="icon">📂</div>
  <p><strong>點擊或拖曳</strong>出入庫 .xlsx 至此</p>
  <p style="margin-top:6px;font-size:.78rem;color:#aaa;">只分析同批號同時有入庫與出庫紀錄，比對出庫日期是否早於最早入庫日期</p>
  <input type="file" id="fi" accept=".xlsx,.xls">
</div>
<div id="loading">⏳ 讀取中…</div>

<div id="main">
  <div class="cards" id="cards"></div>

  <!-- 異常明細 -->
  <div class="section">
    <div class="section-hd">
      ⚠️ 先出後入異常明細
      <span class="badge" id="a-count">0</span>
    </div>
    <div class="filters">
      <label>業務屬性
        <select id="fa-type" onchange="renderAnomaly()"><option value="">全部</option></select>
      </label>
      <label>產品名稱
        <input id="fa-prod" placeholder="搜尋…" oninput="renderAnomaly()" style="width:150px">
      </label>
      <label>批號
        <input id="fa-batch" placeholder="搜尋…" oninput="renderAnomaly()" style="width:130px">
      </label>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th onclick="sortA('出庫日期')">出庫日期 ▲▼</th>
          <th onclick="sortA('最早入庫日期')">最早入庫日期 ▲▼</th>
          <th onclick="sortA('日期差')">差距(天) ▲▼</th>
          <th>業務屬性</th>
          <th onclick="sortA('產品代碼')">產品代碼 ▲▼</th>
          <th>產品名稱</th>
          <th>批號</th>
          <th onclick="sortA('數量')">數量 ▲▼</th>
          <th>倉庫</th>
          <th>備註</th>
        </tr></thead>
        <tbody id="tbody-a"></tbody>
      </table>
    </div>
  </div>

  <!-- 全部比對 -->
  <div class="section">
    <div class="section-hd">
      📋 有入有出批號 — 全部出庫比對
      <span style="font-size:.75rem;opacity:.8;" id="b-count"></span>
    </div>
    <div class="filters">
      <label>狀態
        <select id="fb-st" onchange="renderAll()">
          <option value="">全部</option>
          <option value="先出後入(異常)">先出後入(異常)</option>
          <option value="同日(正常)">同日(正常)</option>
          <option value="先入後出(正常)">先入後出(正常)</option>
        </select>
      </label>
      <label>業務屬性
        <select id="fb-type" onchange="renderAll()"><option value="">全部</option></select>
      </label>
      <label>產品名稱
        <input id="fb-prod" placeholder="搜尋…" oninput="renderAll()" style="width:150px">
      </label>
      <label>批號
        <input id="fb-batch" placeholder="搜尋…" oninput="renderAll()" style="width:130px">
      </label>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th onclick="sortB('出庫日期')">出庫日期 ▲▼</th>
          <th onclick="sortB('最早入庫日期')">最早入庫日期 ▲▼</th>
          <th onclick="sortB('日期差')">差距(天) ▲▼</th>
          <th>狀態</th>
          <th>業務屬性</th>
          <th onclick="sortB('產品代碼')">產品代碼 ▲▼</th>
          <th>產品名稱</th>
          <th>批號</th>
          <th onclick="sortB('數量')">數量 ▲▼</th>
          <th>倉庫</th>
          <th>備註</th>
        </tr></thead>
        <tbody id="tbody-b"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const OUT_TYPES = ['銷售出貨', '拆解出庫'];
const IN_TYPES  = ['採購收貨', '拆解入庫'];

let allMerged = [];
let sortA_st = { col: '日期差', asc: false };
let sortB_st = { col: '出庫日期', asc: true };

// File handling
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
document.getElementById('fi').addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  document.getElementById('loading').style.display = 'block';
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    processData(XLSX.utils.sheet_to_json(ws, { defval: '' }));
  };
  reader.readAsArrayBuffer(file);
}

function toDateStr(v) {
  if (!v) return '';
  let d = v instanceof Date ? v : new Date(v);
  if (isNaN(d)) return '';
  // 用本地時間避免 UTC 偏移造成日期偏移
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function dayDiff(outDs, inDs) {
  // 正數 = 出庫日期比入庫日期早（異常），負數 = 正常
  const msPerDay = 86400000;
  return (new Date(inDs) - new Date(outDs)) / msPerDay;
}

function classify(diff) {
  if (diff === null) return '無入庫';
  if (diff > 0)  return '先出後入(異常)';
  if (diff === 0) return '同日(正常)';
  return '先入後出(正常)';
}

function processData(rows) {
  rows.forEach(r => {
    r._dir    = OUT_TYPES.includes(r['業務屬性']) ? 'out' : IN_TYPES.includes(r['業務屬性']) ? 'in' : null;
    r._key    = r['批號'] + '||' + r['產品代碼'];
    r._dateStr = toDateStr(r['出入庫時間']);
  });

  const inKeys  = new Set(rows.filter(r => r._dir === 'in').map(r => r._key));
  const outKeys = new Set(rows.filter(r => r._dir === 'out').map(r => r._key));
  const bothKeys = new Set([...inKeys].filter(k => outKeys.has(k)));

  // 最早入庫日期 per key
  const earliestIn = {};
  rows.filter(r => r._dir === 'in' && bothKeys.has(r._key)).forEach(r => {
    if (!earliestIn[r._key] || r._dateStr < earliestIn[r._key])
      earliestIn[r._key] = r._dateStr;
  });

  allMerged = rows.filter(r => r._dir === 'out' && bothKeys.has(r._key)).map(r => {
    const ei = earliestIn[r._key] || null;
    const diff = ei ? dayDiff(r._dateStr, ei) : null;
    return { ...r, 最早入庫日期: ei, 日期差: diff, 狀態: classify(diff) };
  });

  // 統計
  const totalOut = rows.filter(r => r._dir === 'out').length;
  const totalIn  = rows.filter(r => r._dir === 'in').length;
  const anom = allMerged.filter(r => r.狀態 === '先出後入(異常)').length;
  document.getElementById('cards').innerHTML = `
    <div class="card blue"><div class="num">${totalOut}</div><div class="lbl">出庫總筆數</div></div>
    <div class="card blue"><div class="num">${totalIn}</div><div class="lbl">入庫總筆數</div></div>
    <div class="card green"><div class="num">${bothKeys.size}</div><div class="lbl">有入有出批號組合</div></div>
    <div class="card red"><div class="num">${anom}</div><div class="lbl">異常筆數（先出後入）</div></div>
  `;

  const types = [...new Set(allMerged.map(r => r['業務屬性']))].sort();
  ['fa-type', 'fb-type'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="">全部</option>';
    types.forEach(t => sel.innerHTML += `<option>${t}</option>`);
  });

  document.getElementById('loading').style.display = 'none';
  document.getElementById('drop-zone').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  renderAnomaly();
  renderAll();
}

function filter(data, typeId, prodId, batchId, statusId) {
  const typ   = document.getElementById(typeId)?.value || '';
  const prod  = (document.getElementById(prodId)?.value || '').toLowerCase();
  const batch = (document.getElementById(batchId)?.value || '').toLowerCase();
  const st    = document.getElementById(statusId)?.value || '';
  return data.filter(r =>
    (!typ   || r['業務屬性'] === typ) &&
    (!prod  || (r['產品名稱']||'').toLowerCase().includes(prod)) &&
    (!batch || (r['批號']||'').toLowerCase().includes(batch)) &&
    (!st    || r.狀態 === st)
  );
}

function doSort(data, col, asc) {
  const fn = {
    '出庫日期':   r => r._dateStr || '',
    '最早入庫日期': r => r.最早入庫日期 || '',
    '日期差':    r => r.日期差 ?? -Infinity,
    '產品代碼':  r => r['產品代碼'] || '',
    '數量':     r => parseFloat(r['數量']) || 0,
  }[col] || (r => r[col] || '');
  return [...data].sort((a, b) => asc ? (fn(a) > fn(b) ? 1 : -1) : (fn(a) < fn(b) ? 1 : -1));
}

function diffLabel(d) {
  if (d === null || d === undefined) return '<span class="tag tag-gray">-</span>';
  const cls = d > 7 ? 'diff-high' : d > 1 ? 'diff-mid' : d > 0 ? 'tag-orange' : 'diff-ok';
  const txt = d > 0 ? `早 ${d} 天` : d === 0 ? '同日' : `晚 ${Math.abs(d)} 天`;
  return `<span class="${cls}">${txt}</span>`;
}

function statusTag(s) {
  const m = { '先出後入(異常)': 'tag-red', '同日(正常)': 'tag-gray', '先入後出(正常)': 'tag-green' };
  return `<span class="tag ${m[s] || 'tag-gray'}">${s}</span>`;
}

function typeTag(t) {
  const m = { '銷售出貨': 'tag-red', '拆解出庫': 'tag-orange' };
  return `<span class="tag ${m[t] || 'tag-gray'}">${t}</span>`;
}

function renderAnomaly() {
  let data = filter(allMerged.filter(r => r.狀態 === '先出後入(異常)'), 'fa-type', 'fa-prod', 'fa-batch', '');
  data = doSort(data, sortA_st.col, sortA_st.asc);
  document.getElementById('a-count').textContent = data.length;
  const tb = document.getElementById('tbody-a');
  tb.innerHTML = data.length ? data.map(r => `<tr class="anomaly-row">
    <td>${r._dateStr}</td>
    <td>${r.最早入庫日期 || '-'}</td>
    <td>${diffLabel(r.日期差)}</td>
    <td>${typeTag(r['業務屬性'])}</td>
    <td>${r['產品代碼']}</td>
    <td>${r['產品名稱']}</td>
    <td>${r['批號']}</td>
    <td style="text-align:right">${(+r['數量']).toLocaleString()}</td>
    <td>${r['倉庫名稱']}</td>
    <td class="remarks" title="${(r['備註']||'').replace(/"/g,"'")}">${r['備註']||''}</td>
  </tr>`).join('') : '<tr><td colspan="10" class="empty">無異常資料</td></tr>';
}

function renderAll() {
  let data = filter(allMerged, 'fb-type', 'fb-prod', 'fb-batch', 'fb-st');
  data = doSort(data, sortB_st.col, sortB_st.asc);
  document.getElementById('b-count').textContent = `共 ${data.length} 筆`;
  const tb = document.getElementById('tbody-b');
  tb.innerHTML = data.length ? data.map(r => `<tr class="${r.狀態 === '先出後入(異常)' ? 'anomaly-row' : ''}">
    <td>${r._dateStr}</td>
    <td>${r.最早入庫日期 || '-'}</td>
    <td>${diffLabel(r.日期差)}</td>
    <td>${statusTag(r.狀態)}</td>
    <td>${typeTag(r['業務屬性'])}</td>
    <td>${r['產品代碼']}</td>
    <td>${r['產品名稱']}</td>
    <td>${r['批號']}</td>
    <td style="text-align:right">${(+r['數量']).toLocaleString()}</td>
    <td>${r['倉庫名稱']}</td>
    <td class="remarks" title="${(r['備註']||'').replace(/"/g,"'")}">${r['備註']||''}</td>
  </tr>`).join('') : '<tr><td colspan="11" class="empty">無資料</td></tr>';
}

function sortA(col) { sortA_st.asc = sortA_st.col === col ? !sortA_st.asc : false; sortA_st.col = col; renderAnomaly(); }
function sortB(col) { sortB_st.asc = sortB_st.col === col ? !sortB_st.asc : true;  sortB_st.col = col; renderAll(); }
</script>
</body>
</html>
