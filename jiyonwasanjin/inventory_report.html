<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>庫存明細報表</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #EFF4F8;
      min-height: 100vh; padding: 14px; color: #1a1a1a;
    }

    .container {
      max-width: 1600px; margin: 0 auto; background: white;
      border-radius: 10px; box-shadow: 0 6px 24px rgba(104,120,192,0.12); overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4a5a9f 0%, #6878C0 100%);
      color: white; padding: 13px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-left h1 { font-size: 19px; font-weight: 900; }
    .header-meta    { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .filter-chip    { background: rgba(255,255,255,0.18); border-radius: 4px; padding: 1px 8px; font-size: 11px; }
    .header-actions { display: flex; gap: 8px; }

    .btn {
      padding: 6px 14px; border-radius: 7px; border: none;
      font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-primary   { background: #f08080; color: white; }
    .btn-secondary { background: rgba(255,255,255,0.25); color: white; border: 1px solid rgba(255,255,255,0.45); }

    .content { padding: 14px 18px 18px; }

    .type-tabs { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

    .type-tab {
      padding: 7px 15px; border-radius: 8px; border: 2px solid;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; transition: all 0.2s;
      background: white; display: flex; align-items: center; gap: 5px;
    }
    .type-tab:hover { opacity: 0.85; }
    .type-tab[data-type="all"]     { border-color:#6878C0; color:#6878C0; }
    .type-tab[data-type="normal"]  { border-color:#059669; color:#059669; }
    .type-tab[data-type="soon"]    { border-color:#EA580C; color:#EA580C; }
    .type-tab[data-type="expired"] { border-color:#DC2626; color:#DC2626; }
    .type-tab[data-type="long"]    { border-color:#B45309; color:#B45309; }
    .type-tab[data-type="all"].active     { background:#6878C0; color:white; }
    .type-tab[data-type="normal"].active  { background:#059669; color:white; }
    .type-tab[data-type="soon"].active    { background:#EA580C; color:white; }
    .type-tab[data-type="expired"].active { background:#DC2626; color:white; }
    .type-tab[data-type="long"].active    { background:#B45309; color:white; }
    .tab-count { font-size: 10px; font-weight: 900; background: rgba(0,0,0,0.12); border-radius: 20px; padding: 1px 6px; }
    .type-tab.active .tab-count { background: rgba(255,255,255,0.28); }

    .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .view-label { font-size: 12px; color: #666; font-weight: 600; }
    .view-btn {
      padding: 5px 14px; border-radius: 6px; border: 1.5px solid #6878C0;
      font-size: 12px; font-weight: 700; cursor: pointer; background: white;
      color: #6878C0; font-family: 'Noto Sans TC', sans-serif; transition: all 0.2s;
    }
    .view-btn.active { background: #6878C0; color: white; }
    .view-btn:hover  { filter: brightness(0.95); }

    .summary-bar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .summary-card { background: #f6f7ff; border: 1px solid #dde6ef; border-radius: 8px; padding: 8px 16px; min-width: 110px; }
    .summary-label { font-size: 10px; color: #888; font-weight: 600; margin-bottom: 2px; }
    .summary-value { font-size: 18px; font-weight: 900; color: #6878C0; }
    .summary-value.red    { color: #DC2626; }
    .summary-value.orange { color: #EA580C; }
    .summary-value.amber  { color: #B45309; }
    .summary-value.green  { color: #059669; }

    .print-title { display: none; font-size: 14px; font-weight: 800; color: #6878C0; padding-bottom: 7px; border-bottom: 2px solid #6878C0; margin-bottom: 10px; }

    .table-wrapper { border-radius: 8px; border: 1px solid #dde6ef; overflow: auto; }

    table { width: 100%; table-layout: fixed; border-collapse: collapse; min-width: 1100px; }

    th {
      background: #6878C0; color: white; padding: 8px 4px;
      text-align: center; font-weight: 700; font-size: 12px;
      border: 1px solid rgba(255,255,255,0.2); white-space: nowrap;
      overflow: hidden; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    th:hover  { background: #4a5a9f; }
    th.pivot-th { background: #7888d0; }
    th.pivot-th:hover { background: #5868A8; }

    .sort-icon { font-size: 10px; margin-left: 3px; opacity: 0.4; }
    .sort-icon.active { opacity: 1; }

    td { padding: 6px 4px; font-size: 12px; border: 1px solid #e8edf5; overflow: hidden; vertical-align: middle; }

    tr.row-normal  td { background: #ffffff; }
    tr.row-expired td { background: #fff5f5; }
    tr.row-soon    td { background: #fff8f0; }
    tr.row-long    td { background: #fefce8; }
    tr:not(.total-row):hover td { filter: brightness(0.97); }

    tr.total-row td { background: #eceeff !important; font-weight: 700; color: #1a1a1a; }

    .cost-blue   { color: #6878C0; font-weight: 700; }
    .cost-red    { color: #DC2626; font-weight: 700; }
    .cost-orange { color: #EA580C; font-weight: 700; }
    .cost-amber  { color: #B45309; font-weight: 700; }

    .days-green   { color: #059669; font-weight: 700; }
    .days-expired { color: #DC2626; font-weight: 700; }
    .days-long    { color: #B45309; font-weight: 700; }
    .days-soon    { color: #EA580C; font-weight: 700; }
    .days-normal  { color: #6878C0; font-weight: 700; }

    .scope-badge {
      display: inline-block; background: #eceeff; color: #4a5a9f;
      border: 1px solid #c0c8ef; border-radius: 5px;
      font-size: 10px; font-weight: 700; padding: 1px 5px; white-space: nowrap;
    }
    .lots-badge {
      display: inline-block; background: #f3f4f6; color: #4B5563;
      border: 1px solid #e5e7eb; border-radius: 5px;
      font-size: 10px; font-weight: 700; padding: 1px 6px; white-space: nowrap;
    }
    .avg-badge {
      display: inline-block; background: #fef3c7; color: #92400E;
      border: 1px solid #fde68a; border-radius: 5px;
      font-size: 9px; font-weight: 700; padding: 0px 5px; white-space: nowrap;
      margin-left: 3px; vertical-align: middle;
    }

    .footer { padding: 9px 18px; background: #f5f5f5; border-top: 1px solid #e0e0e0; font-size: 11px; color: #999; }

    @page { size: A4 landscape; margin: 7mm 7mm; }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      html, body { margin: 0; padding: 0; background: white !important; }
      body { padding: 0 !important; }
      .container { border-radius: 0 !important; box-shadow: none !important; max-width: 100% !important; width: 100% !important; margin: 0 !important; }
      .header-actions { display: none !important; }
      .type-tabs      { display: none !important; }
      .toolbar        { display: none !important; }
      .print-title    { display: block !important; }

      /* ★ 移除捲動容器 — 防止截線 */
      .table-wrapper  { overflow: visible !important; border: none !important; border-radius: 0 !important; }
      table { min-width: 0 !important; width: 100% !important; }

      /* ★ 字體縮小以利列印 */
      th  { font-size: 10px !important; padding: 5px 3px !important; position: static !important; }
      td  { font-size: 10px !important; padding: 4px 3px !important; }

      /* ★ 防止列被頁面切斷 */
      table { page-break-inside: auto; }
      thead { display: table-header-group; }
      tbody tr { page-break-inside: avoid; break-inside: avoid; }

      .summary-bar   { margin-bottom: 6px; }
      .summary-card  { padding: 5px 10px; min-width: 90px; }
      .summary-value { font-size: 13px; }

      tr.row-expired td { background: #fff5f5 !important; }
      tr.row-soon    td { background: #fff8f0 !important; }
      tr.row-long    td { background: #fefce8 !important; }
      tr.total-row   td { background: #eceeff !important; }
      th { background: #6878C0 !important; color: white !important; }
      th.pivot-th { background: #7888d0 !important; }
      .header { background: linear-gradient(135deg, #4a5a9f 0%, #6878C0 100%) !important; }
      .footer { background: #f5f5f5 !important; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>&#128203; 庫存明細報表</h1>
      <div class="header-meta">
        <span>產生時間：<span id="genDate">—</span></span>
        <span id="filterChips"></span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="window.history.back()">&#8592; 返回</button>
      <button class="btn btn-primary" onclick="exportPDF()">&#128229; 匯出 PDF</button>
    </div>
  </div>

  <div class="content">

    <div class="type-tabs">
      <button class="type-tab active" data-type="all"     onclick="switchType('all',this)">&#128203; 全部 <span class="tab-count" id="cnt-all">0</span></button>
      <button class="type-tab" data-type="normal"  onclick="switchType('normal',this)">&#9989; 正常品 <span class="tab-count" id="cnt-normal">0</span></button>
      <button class="type-tab" data-type="soon"    onclick="switchType('soon',this)">&#9888;&#65039; 即將到期 <span class="tab-count" id="cnt-soon">0</span></button>
      <button class="type-tab" data-type="expired" onclick="switchType('expired',this)">&#10060; 過期品 <span class="tab-count" id="cnt-expired">0</span></button>
      <button class="type-tab" data-type="long"    onclick="switchType('long',this)">&#8987; 長期在庫 <span class="tab-count" id="cnt-long">0</span></button>
    </div>

    <div class="toolbar">
      <span class="view-label">視圖：</span>
      <button class="view-btn active" onclick="switchView('detail',this)">&#128203; 明細</button>
      <button class="view-btn"        onclick="switchView('pivot',this)">&#128260; 樞紐（依產品+倉庫合併）</button>
    </div>

    <div class="summary-bar">
      <div class="summary-card">
        <div class="summary-label" id="labelCount">顯示筆數</div>
        <div class="summary-value" id="summaryCount">—</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">總庫存數量</div>
        <div class="summary-value" id="summaryQty">—</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">總存貨成本</div>
        <div class="summary-value" id="summaryCost">—</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">已設定單價</div>
        <div class="summary-value green" id="summaryPriced">—</div>
      </div>
    </div>

    <div class="print-title" id="printTitle">庫存明細報表</div>

    <div id="detailSection">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:6%;"  onclick="sortDetailBy('category')">類別<span class="sort-icon" id="si-d-category">&#8645;</span></th>
              <th style="width:5%;"  onclick="sortDetailBy('code')">產品代碼<span class="sort-icon" id="si-d-code">&#8645;</span></th>
              <th style="width:13%;" onclick="sortDetailBy('name')">產品名稱<span class="sort-icon" id="si-d-name">&#8645;</span></th>
              <th style="width:7%;"  onclick="sortDetailBy('spec')">規格<span class="sort-icon" id="si-d-spec">&#8645;</span></th>
              <th style="width:6%;"  onclick="sortDetailBy('qty')">庫存數量<span class="sort-icon" id="si-d-qty">&#8645;</span></th>
              <th style="width:4%;"  onclick="sortDetailBy('unit')">單位<span class="sort-icon" id="si-d-unit">&#8645;</span></th>
              <th style="width:7%;"  onclick="sortDetailBy('warehouse')">倉庫<span class="sort-icon" id="si-d-warehouse">&#8645;</span></th>
              <th style="width:9%;"  onclick="sortDetailBy('lot')">批號<span class="sort-icon" id="si-d-lot">&#8645;</span></th>
              <th style="width:7%;"  onclick="sortDetailBy('lotDate')">入庫日期<span class="sort-icon" id="si-d-lotDate">&#8645;</span></th>
              <th style="width:7%;"  onclick="sortDetailBy('expDate')">有效期至<span class="sort-icon" id="si-d-expDate">&#8645;</span></th>
              <th style="width:6%;"  onclick="sortDetailBy('daysNum')" id="thDays">剩餘天數<span class="sort-icon" id="si-d-daysNum">&#8645;</span></th>
              <th style="width:7%;"  onclick="sortDetailBy('price')">單價<span class="sort-icon" id="si-d-price">&#8645;</span></th>
              <th style="width:7%;"  onclick="sortDetailBy('scope')">核算範圍<span class="sort-icon" id="si-d-scope">&#8645;</span></th>
              <th style="width:9%;"  onclick="sortDetailBy('cost')">存貨成本<span class="sort-icon" id="si-d-cost">&#8645;</span></th>
            </tr>
          </thead>
          <tbody id="detailBody"></tbody>
        </table>
      </div>
    </div>

    <div id="pivotSection" style="display:none;">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="pivot-th" style="width:7%;"  onclick="sortPivotBy('category')">類別<span class="sort-icon" id="si-p-category">&#8645;</span></th>
              <th class="pivot-th" style="width:21%;" onclick="sortPivotBy('name')">產品名稱<span class="sort-icon" id="si-p-name">&#8645;</span></th>
              <th class="pivot-th" style="width:10%;" onclick="sortPivotBy('warehouse')">倉庫<span class="sort-icon" id="si-p-warehouse">&#8645;</span></th>
              <th class="pivot-th" style="width:9%;"  onclick="sortPivotBy('qty')">合計數量<span class="sort-icon" id="si-p-qty">&#8645;</span></th>
              <th class="pivot-th" style="width:4%;"  onclick="sortPivotBy('unit')">單位<span class="sort-icon" id="si-p-unit">&#8645;</span></th>
              <th class="pivot-th" style="width:6%;"  onclick="sortPivotBy('lots')">批數<span class="sort-icon" id="si-p-lots">&#8645;</span></th>
              <th class="pivot-th" style="width:9%;"  onclick="sortPivotBy('avgPrice')">平均單價<span class="sort-icon" id="si-p-avgPrice">&#8645;</span></th>
              <th class="pivot-th" style="width:9%;"  onclick="sortPivotBy('scope')">核算範圍<span class="sort-icon" id="si-p-scope">&#8645;</span></th>
              <th class="pivot-th" style="width:11%;" onclick="sortPivotBy('cost')">合計存貨成本<span class="sort-icon" id="si-p-cost">&#8645;</span></th>
              <th class="pivot-th" style="width:14%;" onclick="sortPivotBy('statusOrder')">狀態分布<span class="sort-icon" id="si-p-statusOrder">&#8645;</span></th>
            </tr>
          </thead>
          <tbody id="pivotBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <div class="footer">
    &#128309; 正常品 &#65372; &#128308; 過期品 &#65372; &#128992; 即將到期 &#65372; &#128993; 長期在庫 &#65372; PDF 輸出 A4 橫式彩色 &#65372; 點擊欄標頭可排序
  </div>
</div>

<script>
let allRows     = [];
let currentType = 'all';
let currentView = 'detail';

let sdCol = null, sdDir = 'asc';
let spCol = 'name', spDir = 'asc';

const DAYS_HEADER     = { all:'剩餘/在庫天數', normal:'剩餘天數', expired:'超期天數', long:'在庫天數', soon:'剩餘天數' };
const TITLES          = { all:'全部庫存', normal:'正常品', soon:'即將到期', expired:'過期品', long:'長期在庫' };
const COST_CLS        = { normal:'cost-blue', expired:'cost-red', soon:'cost-orange', long:'cost-amber' };
const ROW_CLS         = { normal:'row-normal', expired:'row-expired', soon:'row-soon', long:'row-long' };
const STATUS_PRIORITY = ['expired','long','soon','normal'];
const STATUS_ORDER    = { expired:0, long:1, soon:2, normal:3 };

function worstStatus(statuses) {
  for (const s of STATUS_PRIORITY) if (statuses.has(s)) return s;
  return 'normal';
}

function getFiltered() {
  return currentType === 'all' ? allRows : allRows.filter(r => r.status === currentType);
}

function fmtMoney(n) { return n > 0 ? '$' + Math.round(n).toLocaleString() : '—'; }

function sortDetailBy(col) {
  sdDir = sdCol === col && sdDir === 'asc' ? 'desc' : 'asc';
  sdCol = col;
  updateSortIcons('d', col, sdDir, ['category','code','name','spec','qty','unit','warehouse','lot','lotDate','expDate','daysNum','price','scope','cost']);
  render();
}

function applySortDetail(rows) {
  if (!sdCol) return rows;
  const numCols = new Set(['qty','daysNum','price','cost']);
  const dir = sdDir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    let va = a[sdCol], vb = b[sdCol];
    if (numCols.has(sdCol)) { va = va ?? -Infinity; vb = vb ?? -Infinity; return (va - vb) * dir; }
    va = String(va || ''); vb = String(vb || '');
    return va.localeCompare(vb, 'zh-TW') * dir;
  });
}

function sortPivotBy(col) {
  spDir = spCol === col && spDir === 'asc' ? 'desc' : 'asc';
  spCol = col;
  updateSortIcons('p', col, spDir, ['category','name','warehouse','qty','unit','lots','avgPrice','scope','cost','statusOrder']);
  render();
}

function applySortPivot(groups) {
  const numCols = new Set(['qty','lots','avgPrice','cost','statusOrder']);
  const dir = spDir === 'asc' ? 1 : -1;
  return [...groups].sort((a, b) => {
    let va = a[spCol], vb = b[spCol];
    if (numCols.has(spCol)) { va = va ?? -Infinity; vb = vb ?? -Infinity; return (va - vb) * dir; }
    va = String(va || ''); vb = String(vb || '');
    return va.localeCompare(vb, 'zh-TW') * dir;
  });
}

function updateSortIcons(prefix, activeCol, dir, cols) {
  cols.forEach(c => {
    const el = document.getElementById('si-' + prefix + '-' + c);
    if (!el) return;
    el.textContent = activeCol === c ? (dir === 'asc' ? '▲' : '▼') : '⇅';
    el.classList.toggle('active', c === activeCol);
  });
}

function switchType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const dh = document.getElementById('thDays');
  if (dh) dh.firstChild.nodeValue = DAYS_HEADER[type];
  render();
}

function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('detailSection').style.display = view === 'detail' ? '' : 'none';
  document.getElementById('pivotSection').style.display  = view === 'pivot'  ? '' : 'none';
  document.getElementById('labelCount').textContent      = view === 'pivot'  ? '品項組合數' : '顯示筆數';
  render();
}

function updateSummary(rows) {
  const totalCost = rows.reduce((s,r) => s + r.cost, 0);
  const totalQty  = rows.reduce((s,r) => s + r.qty,  0);
  const pricedCnt = rows.filter(r => r.price > 0).length;

  if (currentView === 'pivot') {
    document.getElementById('summaryCount').textContent = buildPivotGroups(rows).length.toLocaleString() + ' 組';
  } else {
    document.getElementById('summaryCount').textContent = rows.length.toLocaleString() + ' 筆';
  }
  document.getElementById('summaryQty').textContent    = totalQty.toLocaleString();
  document.getElementById('summaryCost').textContent   = fmtMoney(totalCost);
  document.getElementById('summaryPriced').textContent = pricedCnt + ' / ' + rows.length + ' 筆';

  const costEl = document.getElementById('summaryCost');
  costEl.className = 'summary-value';
  if      (currentType === 'expired') costEl.classList.add('red');
  else if (currentType === 'soon')    costEl.classList.add('orange');
  else if (currentType === 'long')    costEl.classList.add('amber');
}

function render() {
  const rows = getFiltered();
  updateSummary(rows);
  document.getElementById('printTitle').textContent =
    '庫存明細報表 ― ' + TITLES[currentType] + (currentView === 'pivot' ? '（樞紐）' : '');
  if (currentView === 'detail') renderDetail(applySortDetail(rows));
  else                          renderPivot(applySortPivot(buildPivotGroups(rows)));
}

function renderDetail(rows) {
  const tbody = document.getElementById('detailBody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="14" style="text-align:center;padding:30px;color:#999;">此類別暫無資料</td></tr>';
    return;
  }

  let grandQty = 0, grandCost = 0, html = '';

  rows.forEach(r => {
    grandQty  += r.qty;
    grandCost += r.cost;

    let daysCls = 'days-normal';
    if      (r.status === 'expired')               daysCls = 'days-expired';
    else if (r.status === 'soon')                  daysCls = 'days-soon';
    else if (r.status === 'long')                  daysCls = 'days-long';
    else if (r.daysNum !== null && r.daysNum > 210) daysCls = 'days-green';

    const priceDisp = r.price > 0 ? '$' + r.price.toLocaleString() : '<span style="color:#bbb;">未設定</span>';
    const scopeDisp = r.scope ? '<span class="scope-badge">' + r.scope + '</span>' : '<span style="color:#bbb;">—</span>';

    html += '<tr class="' + (ROW_CLS[r.status] || 'row-normal') + '">'
      + '<td>' + (r.category || '—') + '</td>'
      + '<td style="text-align:center;">' + (r.code || '—') + '</td>'
      + '<td>' + (r.name || '—') + '</td>'
      + '<td style="color:#666;">' + (r.spec || '—') + '</td>'
      + '<td style="text-align:right;">' + r.qty.toLocaleString() + '</td>'
      + '<td style="text-align:center;">' + (r.unit || '—') + '</td>'
      + '<td>' + (r.warehouse || '—') + '</td>'
      + '<td>' + (r.lot || '—') + '</td>'
      + '<td style="text-align:center;">' + (r.lotDate || '—') + '</td>'
      + '<td style="text-align:center;">' + (r.expDate || '—') + '</td>'
      + '<td style="text-align:center;" class="' + daysCls + '">' + (r.daysText || '—') + '</td>'
      + '<td style="text-align:right;">' + priceDisp + '</td>'
      + '<td style="text-align:center;">' + scopeDisp + '</td>'
      + '<td style="text-align:right;" class="' + (COST_CLS[r.status] || 'cost-blue') + '">' + (r.cost > 0 ? '$' + Math.round(r.cost).toLocaleString() : '—') + '</td>'
      + '</tr>';
  });

  html += '<tr class="total-row">'
    + '<td colspan="4" style="text-align:right;padding-right:8px;">合計</td>'
    + '<td style="text-align:right;">' + grandQty.toLocaleString() + '</td>'
    + '<td colspan="7"></td>'
    + '<td style="text-align:right;">' + fmtMoney(grandCost) + '</td>'
    + '<td></td></tr>';

  tbody.innerHTML = html;
}

function buildPivotGroups(rows) {
  const map = {};
  rows.forEach(r => {
    const key = r.name + '||' + r.warehouse;
    if (!map[key]) {
      map[key] = {
        category: r.category, name: r.name, warehouse: r.warehouse,
        unit: r.unit, scope: r.scope,
        qty: 0, cost: 0, lots: 0,
        pricedQty: 0, pricedCost: 0,
        statuses: new Set(), statusItems: {},
      };
    }
    const g = map[key];
    g.qty  += r.qty;
    g.cost += r.cost;
    g.lots++;
    if (r.price > 0) { g.pricedQty += r.qty; g.pricedCost += r.cost; }
    g.statuses.add(r.status);
    g.statusItems[r.status] = (g.statusItems[r.status] || 0) + 1;
  });

  return Object.values(map).map(g => {
    const worst = worstStatus(g.statuses);
    g.avgPrice    = g.pricedQty > 0 ? g.pricedCost / g.pricedQty : 0;
    g.worstStatus = worst;
    g.statusOrder = STATUS_ORDER[worst] ?? 4;
    return g;
  });
}

function renderPivot(groups) {
  const tbody = document.getElementById('pivotBody');
  if (!groups.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:30px;color:#999;">此類別暫無資料</td></tr>';
    return;
  }

  let grandQty = 0, grandCost = 0, html = '';

  const statusLabels = { normal:'正常', expired:'過期', soon:'即將到期', long:'長期' };
  const statusColors = { normal:'#6878C0', expired:'#DC2626', soon:'#EA580C', long:'#B45309' };

  groups.forEach(g => {
    grandQty  += g.qty;
    grandCost += g.cost;

    const worst   = g.worstStatus;
    const costCls = COST_CLS[worst] || 'cost-blue';
    const rowCls  = ROW_CLS[worst]  || 'row-normal';

    let priceDisp;
    if (g.avgPrice > 0) {
      const isPartial = g.pricedQty < g.qty;
      priceDisp = '$' + Math.round(g.avgPrice).toLocaleString()
        + '<span class="avg-badge">' + (isPartial ? '部分' : '均') + '</span>';
    } else {
      priceDisp = '<span style="color:#bbb;">未設定</span>';
    }

    const scopeDisp = g.scope ? '<span class="scope-badge">' + g.scope + '</span>' : '<span style="color:#bbb;">—</span>';

    const statusDisp = STATUS_PRIORITY.filter(s => g.statusItems[s])
      .map(s => '<span style="color:' + statusColors[s] + ';font-weight:700;">' + statusLabels[s] + '\xD7' + g.statusItems[s] + '</span>')
      .join(' ');

    html += '<tr class="' + rowCls + '">'
      + '<td>' + (g.category || '—') + '</td>'
      + '<td><strong>' + (g.name || '—') + '</strong></td>'
      + '<td>' + (g.warehouse || '—') + '</td>'
      + '<td style="text-align:right;font-weight:700;">' + g.qty.toLocaleString() + '</td>'
      + '<td style="text-align:center;">' + (g.unit || '—') + '</td>'
      + '<td style="text-align:center;"><span class="lots-badge">' + g.lots + ' 批</span></td>'
      + '<td style="text-align:right;">' + priceDisp + '</td>'
      + '<td style="text-align:center;">' + scopeDisp + '</td>'
      + '<td style="text-align:right;" class="' + costCls + '">' + (g.cost > 0 ? '$' + Math.round(g.cost).toLocaleString() : '—') + '</td>'
      + '<td>' + (statusDisp || '—') + '</td>'
      + '</tr>';
  });

  html += '<tr class="total-row">'
    + '<td colspan="3" style="text-align:right;padding-right:8px;">合計 ' + groups.length + ' 組</td>'
    + '<td style="text-align:right;">' + grandQty.toLocaleString() + '</td>'
    + '<td colspan="4"></td>'
    + '<td style="text-align:right;">' + fmtMoney(grandCost) + '</td>'
    + '<td></td></tr>';

  tbody.innerHTML = html;
}

function exportPDF() { window.print(); }

document.addEventListener('DOMContentLoaded', () => {
  let payload = null;
  try {
    const raw = localStorage.getItem('inventoryReportPayload');
    if (raw) payload = JSON.parse(raw);
  } catch(e) { console.warn(e); }

  if (!payload || !payload.reportRows) {
    document.getElementById('detailBody').innerHTML =
      '<tr><td colspan="14" style="text-align:center;padding:40px;color:#999;">無資料。請從主程式點選「明細報表」匯出。</td></tr>';
    return;
  }

  allRows = payload.reportRows;
  document.getElementById('genDate').textContent = payload.generatedAt || '—';

  if (payload.filters) {
    const f = payload.filters;
    const parts = [];
    if (f.warehouse && f.warehouse !== '全部倉庫') parts.push('&#127981; ' + f.warehouse);
    if (f.category  && f.category  !== '全部類別') parts.push('&#127991; ' + f.category);
    if (f.search)                                    parts.push('&#128269; "' + f.search + '"');
    const chipsEl = document.getElementById('filterChips');
    chipsEl.innerHTML = parts.length
      ? parts.map(p => '<span class="filter-chip">' + p + '</span>').join('') + '<span style="opacity:0.65;font-size:10px;">共 ' + f.total + ' 筆</span>'
      : '<span style="opacity:0.65;font-size:10px;">全部資料 ' + f.total + ' 筆</span>';
  }

  const counts = { all: allRows.length, normal: 0, expired: 0, soon: 0, long: 0 };
  allRows.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
  Object.entries(counts).forEach(([k,v]) => {
    const el = document.getElementById('cnt-' + k);
    if (el) el.textContent = v;
  });

  updateSortIcons('p', spCol, spDir, ['category','name','warehouse','qty','unit','lots','avgPrice','scope','cost','statusOrder']);
  render();
});
</script>
