<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>差異比較明細報表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root {
  --primary: #6878C0;
  --primary-dark: #4a5a9f;
  --primary-light: #eceeff;
  --primary-mid: #7888d0;
  --accent: #f0f2ff;
  --text: #1a2540;
  --muted: #64748b;
  --border: #dde6ef;
  --bg: #EFF4F8;
  --white: #ffffff;
  --green: #1a7a3c;
  --red: #b02020;
  --orange: #b05000;
  --blue-mid: #1a4fa0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
}

/* ── HEADER ── */
.report-header {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-mid) 100%);
  color: white;
  padding: 18px 28px 14px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.report-title { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
.report-subtitle { font-size: 12px; opacity: 0.75; margin-top: 4px; }
.report-meta { text-align: right; font-size: 11px; opacity: 0.8; line-height: 1.7; }

/* ── TOOLBAR ── */
.toolbar {
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-chips { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.chip {
  background: var(--accent);
  border: 1px solid var(--border);
  color: var(--primary-dark);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 500;
}
.btn-print {
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.btn-print:hover { background: var(--primary-dark); }

/* ── TYPE TABS ── */
.type-tabs {
  display: flex;
  gap: 0;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 0 20px;
  overflow-x: auto;
}
.type-tab {
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  font-family: inherit;
  transition: all 0.15s;
}
.type-tab:hover { color: var(--primary); }
.type-tab.active { color: var(--primary-dark); border-bottom-color: var(--primary); }

/* ── SUMMARY CARDS ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  padding: 14px 20px 10px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
.kpi-card {
  background: var(--accent);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  text-align: center;
}
.kpi-card.active { border-color: var(--primary); background: var(--primary-light); }
.kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; }
.kpi-value { font-size: 22px; font-weight: 900; color: var(--primary-dark); line-height: 1.1; margin: 2px 0; }
.kpi-card.new-card .kpi-value { color: #1a7a3c; }
.kpi-card.gone-card .kpi-value { color: #b02020; }
.kpi-card.up-card .kpi-value { color: #1a4fa0; }
.kpi-card.down-card .kpi-value { color: #b05000; }
.kpi-card.same-card .kpi-value { color: var(--muted); }

/* ── TABLE AREA ── */
.table-wrap {
  padding: 14px 20px 24px;
}
.table-count {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.tbl-scroll {
  overflow-x: auto;
  border-radius: 0;
  border: 1.5px solid var(--border);
  border-radius: 8px;
}

/* Spreadsheet-style table */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  table-layout: fixed;
  min-width: 1100px;
}
thead th {
  background: var(--primary);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 8px 8px;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: sticky;
  top: 0;
  border: 1px solid rgba(255,255,255,0.25);
  text-align: center;
  overflow: hidden;
}
thead th:hover { background: var(--primary-dark); }
thead th .sort-icon { margin-left: 3px; opacity: 0.6; font-style: normal; font-size: 10px; }
thead th.col-freeze { background: var(--primary-mid); }

/* Alternating rows like spreadsheet */
tbody tr td { border: 1px solid #dde6ef; }
tbody tr:nth-child(odd)  td { background: #ffffff; }
tbody tr:nth-child(even) td { background: #f4f6fd; }
tbody tr:hover td { background: var(--primary-light) !important; }
tbody tr.row-total td { background: #dce8f5 !important; font-weight: 700; border-top: 2px solid var(--primary); }
td {
  padding: 6px 8px;
  font-size: 12px;
  vertical-align: middle;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-new  { background: #d4f0dd; color: #1a7a3c; }
.badge-gone { background: #fde0e0; color: #b02020; }
.badge-up   { background: #d6e6ff; color: #1a4fa0; }
.badge-down { background: #ffe8cc; color: #b05000; }
.badge-same { background: #e8e8e8; color: #666; }
.badge-cat  { background: var(--primary-light); color: var(--primary-dark); border: 1px solid var(--border); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 15px;
}
.empty-state .icon { font-size: 40px; margin-bottom: 10px; }

/* ── PRINT ── */
@media print {
  /* 隱藏操作列 */
  .toolbar, .type-tabs { display: none !important; }

  /* 保持顏色 */
  * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }

  /* 移除捲動容器限制 — 這是切線的主因 */
  .tbl-scroll {
    overflow: visible !important;
    border: none !important;
    border-radius: 0 !important;
  }
  .table-wrap { padding: 8px 0 0; }

  /* 字體縮小 */
  body  { font-size: 10px; }
  table { font-size: 10px; width: 100%; }
  thead th { font-size: 10px; padding: 5px 6px; position: static !important; }
  td        { padding: 4px 6px; font-size: 10px; }

  /* ★ 防止列被頁面切斷（切線的第二個原因） */
  tbody tr  { page-break-inside: avoid; break-inside: avoid; }

  /* thead 每頁重複顯示 */
  thead     { display: table-header-group; }

  /* KPI 卡片換頁不切 */
  .kpi-row  { page-break-inside: avoid; break-inside: avoid; }
  .kpi-card { page-break-inside: avoid; break-inside: avoid; }
}
@page { size: A4 landscape; margin: 8mm; }
</style>
</head>
<body>

<div class="report-header">
  <div>
    <div class="report-title">&#128202; 差異比較明細報表</div>
    <div class="report-subtitle" id="header-subtitle">載入中…</div>
  </div>
  <div class="report-meta" id="header-meta"></div>
</div>

<div class="toolbar">
  <div class="filter-chips" id="filter-chips"></div>
  <button class="btn-print" onclick="window.print()">&#128424; 列印 / PDF</button>
</div>

<div class="type-tabs" id="type-tabs"></div>

<div class="kpi-row" id="kpi-row"></div>

<div class="table-wrap">
  <div class="table-count" id="table-count"></div>
  <div class="tbl-scroll">
    <div id="table-container"></div>
  </div>
</div>

<script>
const CHG_LABEL = { new:'&#128994; 新增', gone:'&#128308; 消失', up:'&#128309; 增加', down:'&#128992; 減少', same:'&#9898; 不變' };
const BADGE_CLS = { new:'badge-new', gone:'badge-gone', up:'badge-up', down:'badge-down', same:'badge-same' };
const ROW_CLS   = { new:'row-new',   gone:'row-gone',   up:'row-up',   down:'row-down',   same:'' };
const CHG_ORDER = ['new','gone','up','down','same'];

let payload = null;
let allRows = [];
let currentTab = 'all';
let sortCol = null;
let sortDir = 'asc';

function fmt(n){
  if(n === null || n === undefined || n === '') return '—';
  return Number(n).toLocaleString('zh-TW');
}
function fmtCost(n){
  if(n === null || n === undefined) return '—';
  return '$' + Math.round(n).toLocaleString('zh-TW');
}
function fmtDiff(n){
  if(n === null || n === undefined) return '—';
  return (n > 0 ? '+' : '') + Number(n).toLocaleString('zh-TW');
}
function fmtCostDiff(n){
  if(n === null || n === undefined) return '—';
  return (n > 0 ? '+$' : '$') + Math.round(n).toLocaleString('zh-TW');
}

window.addEventListener('DOMContentLoaded', function(){
  try {
    payload = JSON.parse(localStorage.getItem('diffReportPayload') || '{}');
  } catch(e) { payload = {}; }

  allRows = payload.rows || [];
  const f = payload.filters || {};
  const hasPrices = payload.hasPrices || false;

  // Header
  document.getElementById('header-subtitle').textContent =
    '倉庫：' + (f.warehouse||'全部') + '　類別：' + (f.category||'全部') + '　變化類型：' + (f.filter||'全部');
  document.getElementById('header-meta').innerHTML =
    '產生時間：' + (payload.generatedAt || '') + '<br>共 ' + allRows.length + ' 筆';

  // Filter chips
  const chips = document.getElementById('filter-chips');
  [['變化類型', f.filter||'全部'], ['倉庫', f.warehouse||'全部'], ['類別', f.category||'全部'], ['筆數', allRows.length + ' 筆']]
    .forEach(([k,v]) => {
      chips.innerHTML += `<span class="chip">${k}：${v}</span>`;
    });

  // Build type tabs
  buildTypeTabs();

  // KPI cards
  buildKPI();

  // Table
  renderTable();
});

function buildTypeTabs(){
  const tabs = document.getElementById('type-tabs');
  const counts = { all: allRows.length };
  CHG_ORDER.forEach(t => { counts[t] = allRows.filter(r => r._changeType === t).length; });
  const labels = { all:'全部', new:'&#128994; 新增', gone:'&#128308; 消失', up:'&#128309; 增加', down:'&#128992; 減少', same:'&#9898; 不變' };
  ['all', ...CHG_ORDER].forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'type-tab' + (key === 'all' ? ' active' : '');
    btn.innerHTML = `${labels[key]} (${counts[key]})`;
    btn.onclick = () => switchTab(key, btn);
    tabs.appendChild(btn);
  });
}

function switchTab(key, btn){
  currentTab = key;
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sortCol = null; sortDir = 'asc';
  renderTable();
}

function buildKPI(){
  const kpi = document.getElementById('kpi-row');
  const totals = { new:0, gone:0, up:0, down:0, same:0 };
  allRows.forEach(r => totals[r._changeType]++);
  const cards = [
    ['全部', allRows.length, '', ''],
    ['新增品項', totals.new, 'new-card', '#1a7a3c'],
    ['消失品項', totals.gone, 'gone-card', '#b02020'],
    ['數量增加', totals.up, 'up-card', '#1a4fa0'],
    ['數量減少', totals.down, 'down-card', '#b05000'],
  ];
  kpi.innerHTML = cards.map(([label, val, cls]) =>
    `<div class="kpi-card ${cls}"><div class="kpi-label">${label}</div><div class="kpi-value">${val}</div></div>`
  ).join('');

  if(payload.hasPrices){
    let totA = 0, totB = 0;
    allRows.forEach(r => { if(r._costA != null) totA += r._costA; if(r._costB != null) totB += r._costB; });
    const diff = totA - totB;
    const sign = diff >= 0 ? '+' : '';
    kpi.style.gridTemplateColumns = 'repeat(5,1fr) 1fr 1fr 1fr';
    kpi.innerHTML += [
      ['本期總成本', '$' + Math.round(totA).toLocaleString('zh-TW'), ''],
      ['上期總成本', '$' + Math.round(totB).toLocaleString('zh-TW'), ''],
      ['成本差異', sign + '$' + Math.round(Math.abs(diff)).toLocaleString('zh-TW') + (diff < 0 ? '&#8595;' : '&#8593;'), diff < 0 ? 'gone-card' : 'new-card'],
    ].map(([label, val, cls]) =>
      `<div class="kpi-card ${cls}"><div class="kpi-label">${label}</div><div class="kpi-value" style="font-size:16px">${val}</div></div>`
    ).join('');
  }
}

function getRows(){
  let rows = currentTab === 'all' ? [...allRows] : allRows.filter(r => r._changeType === currentTab);
  if(!sortCol) return rows;
  rows.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if(av === null || av === undefined) av = sortDir === 'asc' ? Infinity : -Infinity;
    if(bv === null || bv === undefined) bv = sortDir === 'asc' ? Infinity : -Infinity;
    if(typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortDir === 'asc' ? av - bv : bv - av;
  });
  return rows;
}

function onSort(col){
  if(sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  renderTable();
}

function sortIcon(col){
  if(sortCol !== col) return '<i class="sort-icon">&#8645;</i>';
  return '<i class="sort-icon">' + (sortDir === 'asc' ? '&#9650;' : '&#9660;') + '</i>';
}

function _pick(r, ...keys){
  for(const k of keys){ const v = r[k]; if(v !== undefined && v !== null && v !== '') return v; }
  return null;
}

function renderTable(){
  const rows = getRows();
  const hasPrices = payload.hasPrices;
  const container = document.getElementById('table-container');
  const countEl   = document.getElementById('table-count');

  if(!rows.length){
    countEl.textContent = '0 筆';
    container.innerHTML = '<div class="empty-state"><div class="icon">&#128202;</div><p>無符合條件的差異資料</p></div>';
    return;
  }

  const cols = [
    { key: '_changeType', label: '變化',     w: '6%',   align: 'center' },
    { key: '產品類別',    label: '類別',     w: '6%',   align: 'center' },
    { key: '產品代碼',    label: '代碼',     w: '6%',   align: 'center' },
    { key: '產品名稱',    label: '產品名稱', w: '14%',  align: 'left'   },
    { key: '產品規格',    label: '規格',     w: '7%',   align: 'left'   },
    { key: '倉庫',        label: '倉庫',     w: '8%',   align: 'left'   },
    { key: '批號',        label: '批號',     w: '8%',   align: 'left'   },
    { key: '基本單位',    label: '單位',     w: '4%',   align: 'center' },
    { key: '_qtyA',       label: '本期數量', w: '7%',   align: 'right'  },
    { key: '_qtyB',       label: '上期數量', w: '7%',   align: 'right'  },
    { key: '_diff',       label: '差異(A-B)',w: '7%',   align: 'right'  },
  ];
  if(hasPrices){
    cols.push(
      { key: '_unitPrice', label: '單價',    w: '6%',   align: 'right' },
      { key: '_costA',     label: '本期成本',w: '8%',   align: 'right' },
      { key: '_costB',     label: '上期成本',w: '8%',   align: 'right' },
      { key: '_costDiff',  label: '成本差異',w: '8%',   align: 'right' },
    );
  }

  // Totals for the footer row
  let totQtyA = 0, totQtyB = 0, totQtyD = 0, totCostA = 0, totCostB = 0, totCostD = 0;
  rows.forEach(r => {
    if(r._qtyA != null) totQtyA += +r._qtyA || 0;
    if(r._qtyB != null) totQtyB += +r._qtyB || 0;
    if(r._diff != null) totQtyD += +r._diff  || 0;
    if(hasPrices){
      if(r._costA != null) totCostA += +r._costA || 0;
      if(r._costB != null) totCostB += +r._costB || 0;
      if(r._costDiff != null) totCostD += +r._costDiff || 0;
    }
  });

  countEl.innerHTML = `<span>${rows.length.toLocaleString('zh-TW')} 筆</span>`;

  let html = `<table><thead><tr>`;
  cols.forEach(c => {
    html += `<th style="width:${c.w};text-align:${c.align}" onclick="onSort('${c.key}')">${c.label}${sortIcon(c.key)}</th>`;
  });
  html += `</tr></thead><tbody>`;

  rows.forEach(r => {
    const ct = r._changeType;
    // Support both internal keys (_changeType from diff_report) and direct Ot sheet columns
    const cat  = _pick(r, '產品類別', '類別', '存貨類別') || '—';
    const code = _pick(r, '產品代碼', '品號', '存貨代碼') || '—';
    const name = _pick(r, '產品名稱', '品名', '存貨名稱') || '—';
    const spec = _pick(r, '產品規格', '規格') || '—';
    const wh   = _pick(r, '倉庫', '倉庫名稱', '倉別') || '—';
    const lot  = _pick(r, '批號', '批次') || '—';
    const unit = _pick(r, '基本單位', '基本單位名稱', '單位') || '—';

    html += `<tr>`;
    cols.forEach(c => {
      let val = '', style = `text-align:${c.align}`;
      switch(c.key){
        case '_changeType':
          val = ct ? `<span class="badge ${BADGE_CLS[ct]||'badge-same'}">${CHG_LABEL[ct]||ct}</span>` : '—';
          break;
        case '產品類別':
          val = `<span class="badge badge-cat">${cat}</span>`; break;
        case '產品代碼': val = `<code style="font-size:11px">${code}</code>`; break;
        case '產品名稱': val = name; style += ';font-weight:600'; break;
        case '產品規格': val = spec; style += ';color:#555'; break;
        case '倉庫': val = wh; break;
        case '批號': val = lot; style += ';font-family:monospace;font-size:11px'; break;
        case '基本單位': val = unit; break;
        case '_qtyA':
          val = ct === 'gone' ? '<span style="color:var(--muted)">—</span>' : fmt(r._qtyA);
          style += ';font-weight:700'; break;
        case '_qtyB':
          val = ct === 'new' ? '<span style="color:var(--muted)">—</span>' : fmt(r._qtyB);
          style += ';font-weight:700'; break;
        case '_diff':{
          const d = r._diff;
          const cls = d > 0 ? 'color:var(--green)' : d < 0 ? 'color:var(--red)' : 'color:var(--muted)';
          val = `<span style="${cls};font-weight:700">${fmtDiff(d)}</span>`; break;
        }
        case '_unitPrice': val = r._unitPrice != null ? fmt(r._unitPrice) : '—'; break;
        case '_costA': val = r._costA != null ? fmtCost(r._costA) : '—'; style += ';font-weight:700'; break;
        case '_costB': val = r._costB != null ? fmtCost(r._costB) : '—'; style += ';font-weight:700'; break;
        case '_costDiff':{
          const cd = r._costDiff;
          const cls2 = cd > 0 ? 'color:var(--green)' : cd < 0 ? 'color:var(--red)' : 'color:var(--muted)';
          val = cd != null ? `<span style="${cls2};font-weight:700">${fmtCostDiff(cd)}</span>` : '—'; break;
        }
        default: val = r[c.key] || '—';
      }
      html += `<td style="${style}">${val}</td>`;
    });
    html += `</tr>`;
  });

  // Total row
  html += `<tr class="row-total">`;
  cols.forEach(c => {
    let val = '', style = `text-align:${c.align}`;
    switch(c.key){
      case '_changeType': val = `合計 ${rows.length.toLocaleString('zh-TW')} 筆`; style = 'text-align:center;font-size:11px'; break;
      case '_qtyA':   val = totQtyA ? fmt(totQtyA) : '—'; style += ';color:var(--blue-mid)'; break;
      case '_qtyB':   val = totQtyB ? fmt(totQtyB) : '—'; style += ';color:var(--blue-mid)'; break;
      case '_diff':   val = `<span style="${totQtyD>0?'color:var(--green)':totQtyD<0?'color:var(--red)':'color:var(--muted)'}">${fmtDiff(totQtyD)}</span>`; break;
      case '_costA':  val = totCostA ? fmtCost(totCostA) : '—'; style += ';color:var(--blue-mid)'; break;
      case '_costB':  val = totCostB ? fmtCost(totCostB) : '—'; style += ';color:var(--blue-mid)'; break;
      case '_costDiff':val = `<span style="${totCostD>0?'color:var(--green)':totCostD<0?'color:var(--red)':'color:var(--muted)'}">${fmtCostDiff(totCostD)}</span>`; break;
      default: val = '';
    }
    html += `<td style="${style}">${val}</td>`;
  });
  html += `</tr></tbody></table>`;
  container.innerHTML = html;
}
</script>
</body>
</html>
